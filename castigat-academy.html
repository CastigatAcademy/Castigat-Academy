function ExamView({levelId,st,setSt,onPass,onBack}){
  const exam=EXAMS[levelId];
  const[qi,setQi]=useState(0);
  const[sc,setSc]=useState(0);
  const[sel,setSel]=useState(null);
  const[phase,setPhase]=useState("intro");
  const[xpPop,setXpPop]=useState(false);
  const[monoGenre,setMonoGenre]=useState("tous");
  const[selectedMono,setSelectedMono]=useState(null);
  const[monoRecording,setMonoRecording]=useState(false);
  const[monoAudio,setMonoAudio]=useState(null);
  const monoRecorderRef=useRef(null);
  const monoAudioRef=useRef(null);
  const lvObj=LEVELS.find(l=>l.id===levelId);
  const lvIdx=LEVELS.indexOf(lvObj);
  const nextLv=LEVELS[lvIdx+1];
  if(!exam||!nextLv)return null;

  const getMonosTier=()=>{
    const tiers={figurant:"debutant",apprenti:"intermediaire",comedien:"intermediaire",prolesseur:"avance"};
    return tiers[levelId]||"debutant";
  };
  const filteredMonos=FEED_MONOLOGUES.filter(m=>{
    if(getMonosTier()==="debutant"&&!["debutant"].includes(m.tier))return false;
    if(getMonosTier()==="intermediaire"&&!["debutant","intermediaire"].includes(m.tier))return false;
    if(monoGenre==="tous")return true;
    if(monoGenre==="homme")return m.genre==="homme"||m.genre==="mixte";
    if(monoGenre==="femme")return m.genre==="femme"||m.genre==="mixte";
    return true;
  });

  const startMonoRecording=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:{facingMode:"user"}});const rec=new MediaRecorder(stream);const chunks=[];rec.ondataavailable=e=>chunks.push(e.data);rec.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);setMonoAudio(url);stream.getTracks().forEach(t=>t.stop());};rec.start();monoRecorderRef.current=rec;setMonoRecording(true);}catch(e){if(e.name==="NotAllowedError")alert("Accès caméra/micro refusé");else{try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});const rec=new MediaRecorder(stream);const chunks=[];rec.ondataavailable=e=>chunks.push(e.data);rec.onstop=()=>{const blob=new Blob(chunks,{type:'audio/webm'});const url=URL.createObjectURL(blob);setMonoAudio(url);stream.getTracks().forEach(t=>t.stop());};rec.start();monoRecorderRef.current=rec;setMonoRecording(true);}catch(e2){console.log("Mic access denied",e2)}}}};
  const stopMonoRecording=()=>{if(monoRecorderRef.current){monoRecorderRef.current.stop();setMonoRecording(false)}};
  const playMonoRecording=()=>{if(monoAudioRef.current){monoAudioRef.current.play()}};

  const answer=idx=>{setSel(idx);setTimeout(()=>{
    const ok=idx===exam.questions[qi].a;const ns=ok?sc+1:sc;setSc(ns);setSel(null);
    if(qi<exam.questions.length-1)setQi(qi+1);
    else{
      if(ns>=exam.minScore){
        if(st.plan==="free"){setPhase("pass");setXpPop(true);setSt(p=>({...p,xp:Math.max(p.xp,nextLv.xp),passedExams:[...(p.passedExams||[]).filter(e=>e!==levelId),levelId]}));}else{setPhase("monologue");}
      }else{setPhase("fail")}
    }
  },900)};

  if(phase==="intro") return(
    <div className="slide-up" style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 35%,var(--gold-glow),var(--bg) 55%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',textAlign:'center'}}>
      <div style={{width:70,height:70,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20,boxShadow:'0 8px 40px rgba(200,164,78,.25)'}}>
        {I.trophy({size:30,sw:1.8,style:{color:'#07070b'}})}
      </div>
      <p className="label-gold" style={{marginBottom:8}}>EXAMEN DE PASSAGE</p>
      <h2 className="heading" style={{fontSize:24,marginBottom:6}}>{lvObj.name} → {nextLv.name}</h2>
      <p className="body" style={{fontSize:12,marginBottom:6}}>{exam.questions.length} questions — {exam.minScore} bonnes réponses requises</p>
      <p className="body" style={{fontSize:11,maxWidth:280,marginBottom:32}}>Prouvez que vous maîtrisez les compétences de ce niveau pour passer au suivant.</p>
      <button onClick={()=>setPhase("quiz")} className="btn-gold" style={{padding:'14px 44px',fontSize:13,letterSpacing:'.04em'}}>Commencer l'examen</button>
      <button onClick={onBack} style={{marginTop:16,fontSize:11,color:'var(--text-3)'}}>Retour</button>
    </div>
  );

  if(phase==="quiz") return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'44px 24px'}}>
      <div className="mw">
        <p className="label-gold" style={{marginBottom:6}}>EXAMEN · {lvObj.name} → {nextLv.name}</p>
        <div style={{marginBottom:20}}><Bar val={qi+1} max={exam.questions.length} cls="fill-gold" h={3}/><p style={{fontSize:8,color:'var(--text-3)',marginTop:4,textAlign:'right'}}>Q{qi+1}/{exam.questions.length}</p></div>
        <div style={{padding:22,borderRadius:14,background:'var(--bg-card)',border:'1px solid var(--line-s)'}}>
          <h2 className="heading" style={{fontSize:18,marginBottom:16}}>{exam.questions[qi].q}</h2>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {exam.questions[qi].o.map((o,i)=>{
              const isC=i===exam.questions[qi].a,isS=sel===i;
              let bg='var(--bg-raised)',bc='var(--line)';
              if(sel!==null){if(isC){bg='rgba(74,222,128,.08)';bc='var(--emerald)'}else if(isS){bg='rgba(239,68,68,.08)';bc='#ef4444'}}
              return(<button key={i} onClick={()=>sel===null&&answer(i)} style={{padding:'10px 12px',borderRadius:8,border:'1.5px solid',borderColor:bc,background:bg,textAlign:'left',fontSize:11,fontWeight:500,display:'flex',alignItems:'center',gap:7}}>
                <span style={{fontSize:9,fontWeight:700,color:'var(--gold)'}}>{String.fromCharCode(65+i)}</span><span style={{flex:1}}>{o}</span>
                {sel!==null&&isC&&<span style={{color:'var(--emerald)',fontSize:10}}>✓</span>}
                {sel!==null&&isS&&!isC&&<span style={{color:'#ef4444',fontSize:10}}>✗</span>}
              </button>);
            })}
          </div>
        </div>
      </div>
    </div>
  );

  if(phase==="monologue") return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'44px 24px'}}>
      <div className="mw">
        <button onClick={()=>{setPhase("pass");setXpPop(true);setSt(p=>({...p,xp:Math.max(p.xp,nextLv.xp),passedExams:[...(p.passedExams||[]).filter(e=>e!==levelId),levelId]}));}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:20}}>{I.chL({size:16})} Passer</button>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:56,height:56,borderRadius:14,background:'linear-gradient(135deg,var(--coral-dim),var(--coral))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',boxShadow:'0 8px 30px rgba(232,116,90,.2)'}}>
            {I.mic({size:26,sw:1.6,style:{color:'#fff'}})}
          </div>
          <p className="label-gold" style={{color:'var(--coral)',marginBottom:6}}>MONOLOGUE D'EXAMEN</p>
          <h2 className="heading" style={{fontSize:22,marginBottom:8}}>Enregistrez-vous</h2>
          <p className="body" style={{fontSize:11}}>Choisissez un monologue et enregistrez votre interprétation</p>
        </div>
        <div style={{marginBottom:18}}>
          <p style={{fontSize:10,fontWeight:700,color:'var(--text-3)',marginBottom:8}}>GENRE</p>
          <div style={{display:'flex',gap:8}}>
            {["tous","homme","femme"].map(g=>(
              <button key={g} onClick={()=>setMonoGenre(g)} style={{padding:'6px 14px',borderRadius:20,fontSize:10,fontWeight:700,background:monoGenre===g?'var(--gold)':'var(--bg-card)',color:monoGenre===g?'#07070b':'var(--text)',border:'1px solid',borderColor:monoGenre===g?'var(--gold)':'var(--line)',cursor:'pointer',transition:'all .2s'}}>
                {g==="tous"?"Peu importe":g==="homme"?"Homme":"Femme"}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <p style={{fontSize:10,fontWeight:700,color:'var(--text-3)',marginBottom:8}}>MONOLOGUE</p>
          <select onChange={(e)=>setSelectedMono(filteredMonos.find(m=>m.id===e.target.value))} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1px solid var(--line)',background:'var(--bg-raised)',color:'var(--text)',fontSize:11,fontFamily:'inherit',cursor:'pointer'}}>
            <option value="">— Sélectionner un monologue</option>
            {filteredMonos.map(m=><option key={m.id} value={m.id}>{m.title} — {m.source}</option>)}
          </select>
        </div>
        {selectedMono&&(
          <div style={{padding:14,borderRadius:12,background:'rgba(200,164,78,.03)',border:'1px solid rgba(200,164,78,.15)',marginBottom:20}}>
            <p style={{fontSize:9,color:'var(--text-3)',marginBottom:6}}>« {selectedMono.text.substring(0,120)}… »</p>
            <p style={{fontSize:8,color:'var(--text-3)',marginTop:4}}>{selectedMono.tips}</p>
          </div>
        )}
        {selectedMono&&(
          <div style={{marginBottom:18}}>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
              {!monoRecording?<button onClick={startMonoRecording} className="btn-outline" style={{padding:'10px 16px',fontSize:11,display:'flex',alignItems:'center',gap:5}}>🎤 Enregistrer</button>:<button onClick={stopMonoRecording} style={{padding:'10px 16px',fontSize:11,display:'flex',alignItems:'center',gap:5,background:'rgba(232,116,90,.15)',border:'1.5px solid var(--coral)',borderRadius:12,color:'var(--coral)',fontWeight:600,cursor:'pointer'}}>⏹️ Arrêter</button>}
              {monoAudio&&<><button onClick={playMonoRecording} className="btn-outline" style={{padding:'10px 16px',fontSize:11,display:'flex',alignItems:'center',gap:5}}>▶️ Écouter</button><video ref={monoAudioRef} src={monoAudio} style={{display:'none'}}/><audio ref={monoAudioRef} src={monoAudio} style={{display:'none'}}/></>}
            </div>
            {monoAudio&&(
              <div style={{padding:12,borderRadius:10,background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.2)'}}>
                <p style={{fontSize:11,fontWeight:600,color:'var(--emerald)',marginBottom:2}}>✓ Enregistrement sauvegardé</p>
                <p style={{fontSize:9,color:'var(--text-2)'}}>Prêt à être envoyé{st.plan==="premium"?" au coach":""}</p>
              </div>
            )}
          </div>
        )}
        {selectedMono&&monoAudio&&(
          <button onClick={()=>{setPhase("pass");setXpPop(true);setSt(p=>({...p,xp:Math.max(p.xp,nextLv.xp),passedExams:[...(p.passedExams||[]).filter(e=>e!==levelId),levelId],coachMessages:st.plan==="premium"?[...p.coachMessages,{id:Date.now(),mono:selectedMono.title,status:"pending",timestamp:new Date().toDateString()}]:p.coachMessages}));}} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13}}>
            {st.plan==="premium"?"Envoyer au coach":"Je valide mon passage"}
          </button>
        )}
      </div>
    </div>
  );

  if(phase==="pass") return(
    <div className="slide-up" style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 40%,rgba(74,222,128,.06),var(--bg) 55%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',textAlign:'center'}}>
      <Confetti count={50}/>
      {xpPop&&<XPPop n={50} done={()=>setXpPop(false)}/>}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,animation:'float 3s ease-in-out infinite'}}><span className="emoji em-xl">✨</span></div>
      <h2 className="heading" style={{fontSize:28,marginBottom:6}}>Examen réussi !</h2>
      <p className="body" style={{fontSize:14,marginBottom:4}}>{sc}/{exam.questions.length} bonnes réponses</p>
      <p className="heading gold-shimmer" style={{fontSize:20,marginBottom:8}}>Bienvenue au niveau {nextLv.name}</p>
      <p className="body" style={{fontSize:12,marginBottom:28}}>{nextLv.desc}</p>
      <button onClick={onPass} className="btn-gold" style={{padding:'14px 48px',fontSize:13}}>Continuer</button>
    </div>
  );

  /* fail */
  return(
    <div className="slide-up" style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 40%,rgba(239,68,68,.04),var(--bg) 55%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',textAlign:'center'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}><span className="emoji em-xl">🏋</span></div>
      <h2 className="heading" style={{fontSize:24,marginBottom:6}}>Pas encore…</h2>
      <p className="body" style={{fontSize:14,marginBottom:4}}>{sc}/{exam.questions.length} — il en faut {exam.minScore}</p>
      <p className="body" style={{fontSize:12,maxWidth:280,marginBottom:28}}>Continuez à travailler les exercices de ce niveau et réessayez quand vous serez prêt·e !</p>
      <button onClick={()=>{setQi(0);setSc(0);setSel(null);setPhase("intro")}} className="btn-gold" style={{padding:'14px 36px',fontSize:13,marginBottom:12}}>Réessayer</button>
      <button onClick={onBack} style={{fontSize:11,color:'var(--text-3)'}}>Retour</button>
    </div>
  );
}

function Top({xp,streak}){

  return(

}

/* ═══ ONBOARDING ═══ */
function Onboard({done:onDone}){
  const[step,setStep]=useState(0);
  const[loginMode,setLoginMode]=useState(false);
  const[ans,setAns]=useState([]);
  const[ansIdx,setAnsIdx]=useState([]);/* actual option indices chosen */
  const[form,setForm]=useState({prenom:'',nom:'',birth:'',email:'',password:'',cgu:false,pseudo:''});
  const[formErr,setFormErr]=useState('');
  const[formLoading,setFormLoading]=useState(false);
  const[avatar,setAvatar]=useState('dramaturge');
  const[showCGU,setShowCGU]=useState(false);
  const[showInstallStep,setShowInstallStep]=useState(false);
  const[installIsIOS,setInstallIsIOS]=useState(false);
  const[installDevice,setInstallDevice]=useState(null);/* null='choose', 'apple', 'android' */
  const[showNotifStep,setShowNotifStep]=useState(false);
  const[showSectionIntro,setShowSectionIntro]=useState(-1);

  /* Floating particles — gold + violet (must be before any early return) */
  const Landing_particles=React.useMemo(()=>{
    const pts=[];
    for(let i=0;i<25;i++){
      const size=Math.random()*4+2;
      const left=Math.random()*100;
      const dur=Math.random()*6+4;
      const delay=Math.random()*-8;
      const startY=Math.random()*100;
      pts.push({size,left,dur,delay,startY,opa:Math.random()*.5+.2,color:'gold'});
    }
    for(let i=0;i<20;i++){
      const size=Math.random()*4+2.5;
      const left=Math.random()*100;
      const dur=Math.random()*6+4;
      const delay=Math.random()*-8;
      const startY=Math.random()*100;
      pts.push({size,left,dur,delay,startY,opa:Math.random()*.5+.3,color:'violet'});
    }
    return pts;
  },[]);

  if(showCGU) return <CGU onClose={()=>setShowCGU(false)}/>;

  const validateForm=()=>{
    if(!form.prenom.trim())return"Veuillez renseigner votre prénom.";
    if(!form.nom.trim())return"Veuillez renseigner votre nom.";
    if(!form.birth)return"Veuillez renseigner votre date de naissance.";
    if(!form.email.trim()||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email.trim()))return"Adresse email invalide.";
    if(!form.password||form.password.length<6)return"Le mot de passe doit contenir au moins 6 caractères.";
    if(!form.cgu)return"Veuillez accepter les CGU.";
    return null;
  };
  const submitForm=async()=>{
    const err=validateForm();if(err){setFormErr(err);return}
    setFormErr('');setFormLoading(true);
    try{
      const{data,error}=await _supabase.auth.signUp({
        email:form.email.trim(),
        password:form.password,
        options:{data:{display_name:form.prenom+' '+form.nom,prenom:form.prenom,nom:form.nom,birth:form.birth}}
      });
      if(error){setFormErr(error.message);setFormLoading(false);return}
      setFormLoading(false);setStep(2);
    }catch(e){setFormErr("Erreur de connexion. Réessayez.");setFormLoading(false)}
  };

  const loginUser=async()=>{
    if(!form.email.trim()||!form.email.includes('@')){setFormErr("Adresse email invalide.");return}
    if(!form.password||form.password.length<6){setFormErr("Mot de passe requis (6 caractères min.).");return}
    setFormErr('');setFormLoading(true);
    try{
      const{data,error}=await _supabase.auth.signInWithPassword({email:form.email.trim(),password:form.password});
      if(error){setFormErr(error.message==='Invalid login credentials'?'Email ou mot de passe incorrect.':error.message);setFormLoading(false);return}
      /* Restore user profile from Supabase */
      const displayName=data.user?.user_metadata?.display_name||data.user?.email?.split('@')[0]||'';
      setFormLoading(false);
      onDone({user:displayName,email:data.user.email,pseudo:displayName});
    }catch(e){setFormErr("Erreur de connexion. Réessayez.");setFormLoading(false)}
  };

  /* Login screen */
  if(loginMode) return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',padding:'40px 24px'}}>
      <div className="mw">
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{width:56,height:56,borderRadius:16,background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px',boxShadow:'0 8px 32px rgba(200,164,78,.2)'}}>
            {I.user({size:26,sw:1.6,style:{color:'#07070b'}})}
          </div>
          <h1 className="heading" style={{fontSize:28,marginBottom:8}}>Bon retour !</h1>
          <p className="body" style={{fontSize:12}}>Connectez-vous pour retrouver votre progression</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div><label className="input-label">Adresse email</label><input className="input-field" type="email" placeholder="votre@email.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
          <div><label className="input-label">Mot de passe</label><input className="input-field" type="password" placeholder="Votre mot de passe" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')loginUser()}}/></div>
          {formErr&&<div style={{padding:'10px 14px',borderRadius:8,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)'}}><p style={{fontSize:11,color:'#ef4444'}}>{formErr}</p></div>}
          <button className="btn-gold" onClick={loginUser} disabled={formLoading} style={{width:'100%',padding:'15px 0',fontSize:13,letterSpacing:'.08em',marginTop:4,opacity:formLoading?.6:1}}>{formLoading?'Connexion...':'SE CONNECTER'}</button>
          <p style={{textAlign:'center',fontSize:12,color:'var(--text-3)',marginTop:8}}>Pas encore de compte ? <span onClick={()=>{setLoginMode(false);setFormErr('')}} style={{color:'var(--gold)',cursor:'pointer',fontWeight:600}}>S'inscrire</span></p>
        </div>
      </div>
    </div>
  );

  /* Step 0 — Welcome */
  if(step===0&&!showInstallStep&&!showNotifStep) return(
    <div style={{minHeight:'100vh',background:'#07070c',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px',position:'relative',overflow:'hidden'}}>
      {/* Dot pattern background */}
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px)',backgroundSize:'24px 24px',pointerEvents:'none'}}/>

      {/* Spotlight cone from top */}
      <div style={{position:'absolute',top:'-5%',left:'50%',transform:'translateX(-50%)',width:300,height:'70%',background:'linear-gradient(180deg,rgba(200,164,78,.12) 0%,rgba(200,164,78,.03) 50%,transparent 100%)',clipPath:'polygon(35% 0%, 65% 0%, 85% 100%, 15% 100%)',pointerEvents:'none',animation:'spotlight-ray 4s ease-in-out infinite'}}/>
      {/* Side glows */}
      <div style={{position:'absolute',top:'20%',left:'-10%',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(167,139,250,.06),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:'30%',right:'-10%',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,164,78,.05),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:300,background:'linear-gradient(0deg,rgba(167,139,250,.04),transparent)',pointerEvents:'none'}}/>

      {/* Floating particles */}

      <div className="mw">
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{width:56,height:56,borderRadius:16,background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px',boxShadow:'0 8px 32px rgba(200,164,78,.2)'}}>
            {I.edit({size:26,sw:1.6,style:{color:'#07070b'}})}
          </div>
          <h1 className="heading" style={{fontSize:26,marginBottom:8}}>Choisissez votre pseudo</h1>
          <p className="body" style={{fontSize:12}}>C'est le nom que les autres verront</p>
        </div>
        <div style={{marginBottom:20}}>
          <label className="input-label">Pseudo/Nom d'artiste</label>
          <input className="input-field" type="text" placeholder="Votre pseudo" value={form.pseudo||''} onChange={e=>setForm({...form,pseudo:e.target.value})} maxLength="30"/>
          <p style={{fontSize:9,color:'var(--text-3)',marginTop:6,textAlign:'center'}}>Vous pouvez le changer plus tard</p>
        </div>
        <button className="btn-gold" onClick={()=>setStep(4)} style={{width:'100%',padding:'15px 0',fontSize:13,letterSpacing:'.08em'}}>CONTINUER</button>
      </div>
    </div>
  );

  /* Step 4 — Intro quiz */
  if(step===4) return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 32px',textAlign:'center'}}>
      <div style={{width:64,height:64,borderRadius:18,background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',boxShadow:'0 12px 40px rgba(200,164,78,.2)'}}>
        <span className="emoji" style={{fontSize:30}}>📋</span>
      </div>
      <h2 className="heading" style={{fontSize:26,marginBottom:10}}>Avant de commencer…</h2>
      <p className="body" style={{fontSize:14,maxWidth:300,lineHeight:1.7,marginBottom:12}}>Quelques questions pour mieux vous connaître et adapter votre parcours.</p>
      <p style={{fontSize:11,color:'var(--text-3)',maxWidth:280,lineHeight:1.6,marginBottom:36}}>Ça ne prend que 2 minutes, promis !</p>
      <button className="btn-gold" onClick={()=>setStep(5)} style={{padding:'14px 48px',fontSize:13,letterSpacing:'.06em'}}>C'EST PARTI</button>
    </div>
  );

  /* Steps 5+ — Quiz */
  const qStep=step-5;
  if(qStep>=0&&qStep<QUIZ.length){
    const q=QUIZ[qStep];
    const sectionColors={experience:{bg:'rgba(52,211,153,.08)',color:'var(--emerald)',label:'MON EXPÉRIENCE'},feeling:{bg:'rgba(232,116,90,.08)',color:'var(--coral)',label:'MON RESSENTI'},knowledge:{bg:'rgba(167,139,250,.1)',color:'var(--violet)',label:'MES CONNAISSANCES'}};
    const sc=sectionColors[q.section]||sectionColors.knowledge;
    /* Section intro screen — show when entering a new section */
    if(q.sectionTitle&&showSectionIntro!==qStep){
      return(
        <div className="fade-up" key={"sec-"+step} style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 32px',textAlign:'center'}}>
          <div style={{width:56,height:56,borderRadius:16,background:sc.bg,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20,fontSize:24}}>
            <span className="emoji">{q.section==="experience"?"🎪":q.section==="feeling"?"💭":q.section==="knowledge"?"🎓":"🎭"}</span>
          </div>
          <h2 className="heading" style={{fontSize:26,marginBottom:10,color:'var(--text)'}}>{q.sectionTitle}</h2>
          <p className="body" style={{fontSize:13,maxWidth:300,marginBottom:36,lineHeight:1.6}}>{q.sectionSub}</p>
          <button className="btn-gold" onClick={()=>setShowSectionIntro(qStep)} style={{padding:'14px 48px',fontSize:13,letterSpacing:'.06em'}}>C'EST PARTI</button>
        </div>
      );
    }
    return(
      <div className="fade-up" key={step} style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',padding:'44px 24px'}}>
        <div style={{marginBottom:36}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
            <p className="label">QUESTION {qStep+1} / {QUIZ.length}</p>
            <p style={{fontSize:11,fontWeight:700,color:'var(--gold-dim)'}}>{Math.round((qStep+1)/QUIZ.length*100)}%</p>
          </div>
          <Bar val={qStep+1} max={QUIZ.length} h={3}/>
        </div>
        <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,background:sc.bg,color:sc.color,fontSize:9,fontWeight:700,letterSpacing:'.08em',marginBottom:12}}>{sc.label}</span>
        <h2 className="heading" style={{fontSize:24,color:'var(--text)',marginBottom:32}}>{q.q}</h2>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {q.opts.map((o,i)=>(
            <button key={i} onClick={()=>{setAns([...ans,q.sc[i]]);setAnsIdx([...ansIdx,i]);setStep(step+1)}}
              className="card" style={{padding:'14px 16px',textAlign:'left',display:'flex',alignItems:'center',gap:14}}>
              <span style={{width:26,height:26,borderRadius:7,background:'var(--bg-raised)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--gold)',flexShrink:0}}>{String.fromCharCode(65+i)}</span>
              <span style={{fontSize:13,fontWeight:500}}>{o}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  /* Result — only knowledge questions count toward level */
  const knowledgeQs=QUIZ.filter(q=>q.section==="knowledge");
  const knowledgeAns=ans.filter((_,i)=>QUIZ[i]&&QUIZ[i].section==="knowledge");
  /* Count correct answers (score 3 = best answer for each knowledge question) */
  const correctCount=knowledgeAns.filter(a=>a===3).length;
  const tot=knowledgeAns.reduce((a,b)=>a+b,0),pct=tot/(knowledgeQs.length*3);
  const idx=pct<.1?0:pct<.2?1:pct<.3?2:pct<.4?3:pct<.5?4:pct<.6?5:pct<.7?6:pct<.8?7:pct<.9?8:9;
  const lv=LEVELS[Math.min(idx,9)];
  const userInfo={prenom:form.prenom.trim(),nom:form.nom.trim(),birth:form.birth,email:form.email.trim(),avatar,pseudo:form.pseudo.trim()||'Comédien'};
  return(
    <div className="slide-up" style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 40%,var(--gold-glow),var(--bg) 55%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',textAlign:'center'}}>
      <Confetti count={35}/>
      <div style={{marginBottom:20,animation:'float 4s ease-in-out infinite'}}><AvatarSVG id={avatar} size={80}/></div>
      <p className="label" style={{marginBottom:10}}>VOTRE NIVEAU ESTIMÉ</p>
      <h2 className="heading gold-shimmer" style={{fontSize:36,marginBottom:8}}>{lv.name}</h2>
      <p className="body" style={{fontSize:12,marginBottom:8}}>{lv.desc}</p>
      <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'8px 18px',borderRadius:12,background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.15)',marginBottom:8}}>
        <span style={{fontSize:11,color:'var(--violet)',fontWeight:700}}>Connaissances : {correctCount}/{knowledgeQs.length} bonnes réponses</span>
      </div>
      <p className="body" style={{fontSize:12,maxWidth:280,marginBottom:36}}>Bienvenue {userInfo.prenom} ! Vous progresserez à votre rythme.</p>
      <button className="btn-gold" onClick={()=>{
        onDone(Math.min(idx,9),{...userInfo,quizProfile:{answerIndices:ansIdx,knowledgeScore:correctCount,knowledgeTotal:knowledgeQs.length}})
      }} style={{padding:'15px 52px',fontSize:14,letterSpacing:'.04em'}}>C'est parti</button>
    </div>
  );
}

/* ═══ PROGRESSION PATH ═══ */
function ProgressPath({st,go,setMod,setExam,setSceneAn}){
  const lv=getLv(st.xp);
  const currentNodeRef=useRef(null);
  const[showPrevLevels,setShowPrevLevels]=useState(false);
  /* The level the user started at (from onboarding test) */
  const startLevelIdx=st.lv||0;
  /* Map each level to a scene analysis */
  const LEVEL_SA={figurant:"sa1",apprenti:"sa2",dimanche:"sa3",amateur:"sa4",pensionnaire:"sa5",societaire:"sa6",interprete:"sa7",artiste:"sa8",metteur:"sa9"};
  const allNodes=[];
  let prevTier=null;
  let globalNodeIdx=0;
  LEVELS.forEach((level,li)=>{
    /* Skip previous levels unless user toggled them */
    if(li<startLevelIdx&&!showPrevLevels)return;
    const tier=getTier(level);
    if(!prevTier||prevTier.id!==tier.id){allNodes.push({type:"tier",tier,levelIdx:li});prevTier=tier}
    allNodes.push({type:"sublevel",level,levelIdx:li});
    const prM=PR[level.id]||[],cuM=CU[level.id]||[];
    const merged=[];let pi=0,ci=0;
    while(pi<prM.length||ci<cuM.length){if(pi<prM.length){merged.push({...prM[pi],sec:"pr"});pi++}if(ci<cuM.length){merged.push({...cuM[ci],sec:"cu"});ci++}}
    /* Insert scene analysis node roughly in the middle of the level */
    const saId=LEVEL_SA[level.id];
    const saObj=saId?SCENE_ANALYSES.find(s=>s.id===saId):null;
    const insertAt=saObj?Math.floor(merged.length/2):null;
    let nodeCount=0;
    merged.forEach((m,mi)=>{
      const isDone=m.sec==="pr"?st.doneEx.includes(m.id):st.doneCu.includes(m.id);
      /* Unlock logic: first node always unlocked, monologues unlock by total exercise count, rest requires previous done */
      const isMonologue=m.cat==="Monologue";
      const totalExDone=st.doneEx.length;
      /* Monologue thresholds: 1st at 3 ex, 2nd at 8, 3rd at 15, 4th at 22, then every +8 */
      const monoThresholds=[3,8,15,22,30,38,46,54,62,70,78,86];
      const monoIdx=isMonologue?(()=>{const allMonos=Object.values(PR).flat().filter(e=>e.cat==="Monologue");return allMonos.findIndex(e=>e.id===m.id)})():-1;
      const monoUnlocked=isMonologue&&monoIdx>=0&&monoIdx<monoThresholds.length?totalExDone>=monoThresholds[monoIdx]:false;
      /* Exercises from levels below test level are always unlocked */
      const belowTestLevel=li<startLevelIdx;
      /* Culture nodes in levels above current require previous level's exam passed */
      const isCultureNode=m.sec==="cu";
      const prevLevelId=li>0?LEVELS[li-1].id:null;
      const cultureGated=isCultureNode&&li>LEVELS.indexOf(lv)&&prevLevelId&&!(st.passedExams||[]).includes(prevLevelId);
      const isUnlocked=cultureGated?false:(isDone||belowTestLevel||globalNodeIdx===0||(isMonologue?monoUnlocked:(()=>{
        const prevNodes=allNodes.filter(n=>n.type==="node"||n.type==="scene_analysis");
        if(prevNodes.length===0)return true;
        const lastPrev=prevNodes[prevNodes.length-1];
        return lastPrev.isDone;
      })()));
      allNodes.push({type:"node",mod:m,isDone,isUnlocked,levelIdx:li,nodeIdx:globalNodeIdx++,total:merged.length,level});
      nodeCount++;
      /* Insert scene analysis after the midpoint */
      if(saObj&&nodeCount===insertAt){
        const saDone=(st.doneSA||[]).includes(saObj.id);
        /* SA unlocked only if previous node is done */
        const prevNodes=allNodes.filter(n=>n.type==="node"||n.type==="scene_analysis");
        const lastPrev=prevNodes.length>0?prevNodes[prevNodes.length-1]:null;
        const saUnlocked=saDone||(lastPrev?lastPrev.isDone:true);
        allNodes.push({type:"scene_analysis",sa:saObj,isDone:saDone,isUnlocked:saUnlocked,levelIdx:li,nodeIdx:globalNodeIdx++,level});
      }
    });
    /* Add exam node at end of each level (except last) */
    if(li<LEVELS.length-1&&EXAMS[level.id]){
      const nextLv=LEVELS[li+1];
      const allDone=merged.every(m=>m.sec==="pr"?st.doneEx.includes(m.id):st.doneCu.includes(m.id));
      const examReady=st.xp>=level.xp&&allDone;
      const examPassed=st.xp>=nextLv.xp;
      allNodes.push({type:"exam",levelId:level.id,level,nextLevel:nextLv,examReady,examPassed});
    }
  });
  let currentIdx=-1;
  let lastDoneIdx=-1;
  for(let i=0;i<allNodes.length;i++){
    const isActive=allNodes[i].type==="node"||allNodes[i].type==="scene_analysis";
    if(isActive&&allNodes[i].isDone) lastDoneIdx=i;
    if(isActive&&allNodes[i].isUnlocked&&!allNodes[i].isDone&&currentIdx===-1) currentIdx=i;
  }

  /* Auto-scroll disabled on load to prevent page jumping */
  /* useEffect(()=>{
    if(currentNodeRef.current){
      currentNodeRef.current.scrollIntoView({behavior:'smooth',block:'center'});
    }
  },[]); */

  /* Build positioned nodes for sinuous path */
  const W=320;const CX=W/2;const AMP=80;const ROW=90;
  const posNodes=[];let row=0;
  allNodes.forEach((node,idx)=>{
    if(node.type==="tier"||node.type==="sublevel"||node.type==="exam"){posNodes.push({...node,idx,x:CX,y:row*ROW,isLayout:true});row++;return;}
    /* Sinuous S-curve: nodes swing left-right */
    const cycle=node.nodeIdx%6;
    const t=cycle/5;
    const xOff=Math.sin(t*Math.PI*2)*AMP;
    posNodes.push({...node,idx,x:CX+xOff,y:row*ROW,isLayout:false});
    row++;
  });
  const totalH=row*ROW+40;

  /* SVG path between consecutive activity nodes */
  const activityNodes=posNodes.filter(n=>!n.isLayout);
  const pathSegments=[];
  for(let i=1;i<activityNodes.length;i++){
    const a=activityNodes[i-1],b=activityNodes[i];
    const isDone=b.isDone;const isCur=b.idx===currentIdx;
    const col=isDone?(b.type==="scene_analysis"?'var(--coral)':b.mod?.sec==="cu"?'var(--violet)':'var(--gold)'):isCur?'var(--gold)':'var(--line)';
    const opa=isDone?.6:isCur?.8:.15;
    const my=(a.y+b.y)/2;
    pathSegments.push({d:`M${a.x},${a.y} C${a.x},${my} ${b.x},${my} ${b.x},${b.y}`,col,opa,done:isDone||isCur});
  }

  return(
    <div style={{position:'relative',width:W,margin:'0 auto',minHeight:totalH,padding:'0 0 16px'}}>
      {/* Button to show previous levels */}
      {startLevelIdx>0&&!showPrevLevels&&(
        <button onClick={()=>setShowPrevLevels(true)} style={{width:'100%',padding:'10px 0',marginBottom:12,borderRadius:10,border:'1px solid var(--line)',background:'var(--bg-card)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{fontSize:10,color:'var(--text-2)',fontWeight:600}}>Voir les niveaux précédents ({startLevelIdx})</span>
          <span style={{fontSize:9,color:'var(--text-3)'}}>▼</span>
        </button>
      )}
      {startLevelIdx>0&&showPrevLevels&&(
        <button onClick={()=>setShowPrevLevels(false)} style={{width:'100%',padding:'10px 0',marginBottom:12,borderRadius:10,border:'1px solid var(--gold-dim)',background:'rgba(200,164,78,.04)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{fontSize:10,color:'var(--gold)',fontWeight:600}}>Masquer les niveaux précédents</span>
          <span style={{fontSize:9,color:'var(--gold)'}}>▲</span>
        </button>
      )}
      {/* Dotted connectors between nodes */}
      <svg style={{position:'absolute',top:0,left:0,width:W,height:totalH,pointerEvents:'none',zIndex:0}}>
        {activityNodes.slice(1).map((b,i)=>{
          const a=activityNodes[i];
          const steps=5;const dots=[];
          for(let t=1;t<=steps;t++){
            const frac=t/(steps+1);
            const mx=(a.x+b.x)/2;const my=(a.y+b.y)/2;
            const px=a.x*(1-frac)*(1-frac)*1+2*mx*frac*(1-frac)+b.x*frac*frac;
            const py=a.y+frac*(b.y-a.y);
            dots.push({x:px,y:py});
          }
          const isDone=b.isDone;const isCur=b.idx===currentIdx;
          const col=isDone?'var(--text-3)':isCur?'var(--text-3)':'var(--line)';
          const opa=isDone?.5:isCur?.4:.2;
          return dots.map((dot,di)=>(
            <circle key={i+"-"+di} cx={dot.x} cy={dot.y} r={1.5} fill={col} opacity={opa}/>
          ));
        })}
      </svg>

      {/* Render nodes */}
      {posNodes.map((node,pidx)=>{
        if(node.type==="exam"){
          return(<div key={"exam"+pidx} style={{position:'absolute',top:node.y-18,left:0,right:0,display:'flex',justifyContent:'center',zIndex:2}}>
            <button disabled={!node.examReady&&!node.examPassed} onClick={()=>{if(node.examReady&&!node.examPassed)setExam(node.levelId)}}
              style={{padding:'8px 18px',borderRadius:12,
                background:node.examPassed?'linear-gradient(135deg,rgba(74,222,128,.1),rgba(74,222,128,.03))':node.examReady?'linear-gradient(135deg,rgba(200,164,78,.1),rgba(200,164,78,.03))':'var(--bg-card)',
                border:node.examPassed?'1.5px solid var(--emerald)':node.examReady?'1.5px solid var(--gold)':'1.5px solid var(--line)',
                cursor:node.examReady&&!node.examPassed?'pointer':'default',opacity:node.examReady||node.examPassed?1:.3,
                display:'flex',alignItems:'center',gap:8,transition:'all .3s',backdropFilter:'blur(8px)'}}>
              <span className="emoji" style={{fontSize:14}}>{node.examPassed?"✅":node.examReady?"✏️":"🔒"}</span>
              <div style={{textAlign:'left'}}>
                <p style={{fontSize:9,fontWeight:800,color:node.examPassed?'var(--emerald)':node.examReady?'var(--gold)':'var(--text-3)',letterSpacing:'.05em'}}>
                  {node.examPassed?"RÉUSSI":"EXAMEN"}</p>
                <p style={{fontSize:8,color:'var(--text-3)'}}>{node.level.name} → {node.nextLevel.name}</p>
              </div>
            </button>
          </div>);
        }
        if(node.type==="tier"){
          const unlocked=st.xp>=LEVELS.find(l=>l.tier===node.tier.id)?.xp;
          return(<div key={"t"+pidx} style={{position:'absolute',top:node.y-8,left:0,right:0,zIndex:2}}>
            <TierBanner tierId={node.tier.id} unlocked={unlocked}/>
          </div>);
        }
        if(node.type==="sublevel"){
          const unlocked=st.xp>=node.level.xp;const isCur=node.level.id===lv.id;
          return(<div key={"s"+pidx} style={{position:'absolute',top:node.y-12,left:0,right:0,zIndex:2}}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'6px 14px',borderRadius:12,background:isCur?'rgba(200,164,78,.06)':'transparent',opacity:unlocked?1:.35}}>
              <span className="emoji" style={{fontSize:16}}>{unlocked?node.level.icon:"🔒"}</span>
              <div><p style={{fontSize:11,fontWeight:700,color:isCur?'var(--gold)':'var(--text)'}}>{node.level.name}</p><p style={{fontSize:9,color:'var(--text-3)'}}>{node.level.desc}</p></div>
            </div>
          </div>);
        }
        /* ── Scene Analysis node ── */
        if(node.type==="scene_analysis"){
          const sa=node.sa;const isCur=node.idx===currentIdx;const showAvatar=currentIdx>=0?isCur:(lastDoneIdx>=0&&node.idx===lastDoneIdx);
          const isFuture=node.isUnlocked&&!node.isDone&&!isCur;
          const nodeOpacity=isCur?1:node.isDone?.5:isFuture?.65:node.isUnlocked?.65:.25;
          return(
            <div key={sa.id} ref={isCur?currentNodeRef:null} style={{position:'absolute',top:node.y-24,left:node.x-50,width:100,zIndex:3,textAlign:'center',opacity:nodeOpacity,transition:'opacity .3s'}}>
              <button onClick={()=>{
                if((node.isDone||isCur)&&setSceneAn){setSceneAn(sa)}
                else if(node.isUnlocked){alert("Qui va piano va sano 🎭\nTerminez d'abord les exercices précédents !")}
              }}
                className={"path-node"+(node.isDone?" done analysis":isCur?" current analysis":node.isUnlocked?" unlocked analysis":" locked")}
                style={{cursor:node.isDone||isCur?'pointer':node.isUnlocked?'pointer':'default',margin:'0 auto',boxShadow:isCur?'0 0 24px rgba(232,116,90,.3)':node.isDone?'0 4px 16px rgba(232,116,90,.15)':'none'}}>
                {showAvatar&&<span className="path-avatar"><MiniChar avatar={st.user?.avatar||"dramaturge"} size={22}/></span>}
                <span className="emoji" style={{fontSize:14}}>📜</span>
                {node.isDone&&<span style={{position:'absolute',bottom:-2,right:-2,width:14,height:14,borderRadius:'50%',background:'var(--emerald)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:900,border:'2px solid var(--bg)'}}>✓</span>}
              </button>
              <p style={{fontSize:8,fontWeight:700,color:node.isDone?'var(--coral)':isCur?'var(--text)':node.isUnlocked?'var(--text-2)':'var(--text-3)',lineHeight:1.3,marginTop:4}}>{sa.title}</p>
              {node.isDone?<p style={{fontSize:6,fontWeight:700,color:'var(--emerald)',marginTop:1}}>TERMINÉ ✓</p>
              :isCur?<p style={{fontSize:7,fontWeight:700,color:'var(--coral)',marginTop:2,animation:'pathPulse 2s ease-in-out infinite',letterSpacing:'.06em'}}>▶ ANALYSER</p>
              :<p style={{fontSize:7,color:'var(--coral)',fontWeight:600,opacity:.7}}>ANALYSE</p>}
            </div>
          );
        }
        /* ── Regular exercise / culture node ── */
        const n=node;const isCur=n.idx===currentIdx;const showAvatar=currentIdx>=0?isCur:(lastDoneIdx>=0&&n.idx===lastDoneIdx);const isV=n.mod.type==="video";const isCul=n.mod.sec==="cu";
        const isFuture=n.isUnlocked&&!n.isDone&&!isCur;
        const nodeOpacity=isCur?1:n.isDone?.5:isFuture?.65:n.isUnlocked?.65:.25;
        const glowCol=isCul?'rgba(167,139,250,.3)':'rgba(200,164,78,.3)';
        return(
          <div key={n.mod.id} ref={isCur?currentNodeRef:null} style={{position:'absolute',top:n.y-24,left:n.x-50,width:100,zIndex:3,textAlign:'center',opacity:nodeOpacity,transition:'opacity .3s'}}>
            <button onClick={()=>{
              if(n.isDone||isCur){setMod({...n.mod});go(n.mod.sec==="pr"?"practice":"culture")}
              else if(n.isUnlocked){alert("Qui va piano va sano 🎭\nTerminez d'abord les exercices précédents !")}
            }}
              className={"path-node"+(n.isDone?" done":isCur?" current":n.isUnlocked?" unlocked":" locked")+(isV?" milestone":"")+(isCul?" culture":"")}
              style={{cursor:n.isDone||isCur?'pointer':n.isUnlocked?'pointer':'default',margin:'0 auto',boxShadow:isCur?`0 0 24px ${glowCol}`:n.isDone?`0 4px 16px ${glowCol.replace('.3','.12')}`:'none'}}>
              {showAvatar&&<span className="path-avatar"><MiniChar avatar={st.user?.avatar||"dramaturge"} size={22}/></span>}
              <span className="emoji" style={{fontSize:isV?18:14}}>{n.mod.icon}</span>
              {n.isDone&&<span style={{position:'absolute',bottom:-2,right:-2,width:14,height:14,borderRadius:'50%',background:'var(--emerald)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:900,border:'2px solid var(--bg)'}}>✓</span>}
            </button>
            <p style={{fontSize:8,fontWeight:700,color:n.isDone?(isCul?'var(--violet)':'var(--gold)'):isCur?'var(--text)':n.isUnlocked?'var(--text-2)':'var(--text-3)',lineHeight:1.3,marginTop:4}}>{n.mod.title}</p>
            {n.isDone&&<p style={{fontSize:6,fontWeight:700,color:'var(--emerald)',marginTop:1}}>TERMINÉ ✓</p>}
            {isCur&&!n.isDone&&<p style={{fontSize:7,fontWeight:700,color:isCul?'var(--violet)':'var(--gold)',marginTop:2,animation:'pathPulse 2s ease-in-out infinite',letterSpacing:'.06em'}}>▶ COMMENCER</p>}
          </div>
        );
      })}
    </div>
  );
}

                <p className="label" style={{color:'var(--violet)',marginBottom:4}}>RÉVISION DE LA SEMAINE</p>

            );

          /* Pick 1 random culture module per week (stable for the week) */

          const weekItem=doneCuItems[weekHash%doneCuItems.length];

          return(
            <div className="card" style={{padding:18,marginBottom:24,background:revDone?'linear-gradient(160deg,rgba(74,222,128,.04),var(--bg-card))':'linear-gradient(160deg,rgba(167,139,250,.04),var(--bg-card))',border:revDone?'1px solid rgba(74,222,128,.15)':'1px solid rgba(167,139,250,.1)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className="emoji" style={{fontSize:18}}>🔄</span>
                  <p className="label" style={{color:revDone?'var(--emerald)':'var(--violet)'}}>RÉVISION DE LA SEMAINE</p>
                </div>
                {revDone&&<span style={{fontSize:8,fontWeight:800,color:'var(--emerald)',padding:'3px 8px',borderRadius:6,background:'rgba(74,222,128,.12)'}}>✓ Fait</span>}
              </div>
              <button onClick={()=>{setSt(p=>({...p,weekRevision:true}));setMod({...weekItem,sec:"cu"});go("culture")}}
                style={{width:'100%',padding:'12px 14px',borderRadius:10,background:'var(--bg-card)',border:revDone?'1px solid rgba(74,222,128,.12)':'1px solid rgba(167,139,250,.12)',textAlign:'left',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:36,height:36,borderRadius:10,background:revDone?'linear-gradient(135deg,rgba(74,222,128,.15),rgba(74,222,128,.04))':'linear-gradient(135deg,rgba(167,139,250,.15),rgba(167,139,250,.04))',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{fontSize:16}}>{weekItem.icon}</span>
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:9,fontWeight:700,color:revDone?'var(--emerald)':'var(--violet)',letterSpacing:'.06em'}}>CULTURE</p>
                  <p style={{fontSize:11,fontWeight:600,color:'var(--text)',textDecoration:revDone?'line-through':'none'}}>{weekItem.title}</p>

                <div style={{color:revDone?'var(--emerald)':'var(--violet)',fontSize:10,fontWeight:700}}>{revDone?'Refaire →':'Réviser →'}</div>

            {id:"wg2",label:"Faire une leçon culture",done:st.weekCulture||false,target:1,current:(st.weekCulture||false)?1:0},

              {st.lastWeekScore!==null&&st.lastWeekScore<4&&doneCount===0&&<div style={{padding:'8px 12px',borderRadius:8,background:st.lastWeekScore>=3?'rgba(200,164,78,.06)':st.lastWeekScore>=2?'rgba(167,139,250,.06)':'rgba(232,116,90,.06)',border:st.lastWeekScore>=3?'1px solid rgba(200,164,78,.1)':st.lastWeekScore>=2?'1px solid rgba(167,139,250,.1)':'1px solid rgba(232,116,90,.1)',marginBottom:10,textAlign:'center'}}>

              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <p className="label-gold">OBJECTIFS HEBDO</p>

                    {g.done&&<span style={{fontSize:9,color:'var(--emerald)'}}>✓</span>}
                  </div>
                  <p style={{fontSize:10,fontWeight:500,color:g.done?'var(--emerald)':'var(--text-2)',flex:1,textDecoration:g.done?'line-through':'none'}}>{g.label}</p>

                    <div style={{height:'100%',borderRadius:3,width:(g.current/g.target*100)+"%",background:g.done?'var(--emerald)':'var(--gold)'}}/>

                </div>
              ))}
              {allDone&&<p style={{fontSize:9,color:'var(--emerald)',textAlign:'center',marginTop:8,fontStyle:'italic'}}>Semaine parfaite — le théâtre vous sourit !</p>}

        {/* ═══ MON ENTRAÎNEMENT SUR MESURE ═══ */}
        {(()=>{
          const profile=st.user?.quizProfile;
          const totalDone=st.doneEx.length;
          const feedback=st.exFeedback||{};
          const catLast=st.catLastPracticed||{};
          const saResults=st.saResults||{};
          const cuResults=st.cuResults||{};
          const now=new Date();

          /* ── Bilan unlocked after 7 days ── */
          const firstDate=st.firstActivityDate?new Date(st.firstActivityDate):null;
          const daysSinceStart=firstDate?Math.floor((now-firstDate)/(1000*60*60*24)):0;
          const isUnlocked=daysSinceStart>=7&&totalDone>=5;

          /* ── Daily pulse insights ── */
          const pulseAnswers=(st.dailyPulse||{}).answers||[];
          const pulseByCat={};
          pulseAnswers.forEach(a=>{if(!pulseByCat[a.cat])pulseByCat[a.cat]=[];pulseByCat[a.cat].push(a.val)});
          const pulseAvg=(cat)=>{const arr=pulseByCat[cat];return arr&&arr.length>0?arr.reduce((s,v)=>s+v,0)/arr.length:null};
          const pulseConfidence=pulseAvg("confiance");
          const pulseTrac=pulseAvg("trac");
          const pulseBlocage=pulseAvg("blocage");
          const pulseMotivation=pulseAvg("motivation");
          const pulseCorps=pulseAvg("corps");
          const pulseEmotions=pulseAvg("emotions");
          const recentPulse=pulseAnswers.slice(-7);
          const recentPulseAvg=recentPulse.length>0?recentPulse.reduce((s,a)=>s+a.val,0)/recentPulse.length:null;

          /* ── Data sources collected ── */
          const dataSources=[];
          if(profile)dataSources.push("onboarding");
          if(Object.keys(feedback).length>0)dataSources.push("feedback");
          if(Object.keys(st.stars||{}).length>0)dataSources.push("stars");
          if(Object.keys(saResults).length>0)dataSources.push("analyses");
          if(Object.keys(cuResults).length>0)dataSources.push("culture");
          if(st.warmups>0)dataSources.push("warmups");
          if(pulseAnswers.length>0)dataSources.push("pulse");

          /* ── Scene analysis insights ── */
          const saEntries=Object.values(saResults);
          const saAvgScore=saEntries.length>0?Math.round(saEntries.reduce((s,e)=>s+e.score,0)/saEntries.length):null;
          const lastSADate=st.lastSADate?new Date(st.lastSADate):null;
          const daysSinceSA=lastSADate?Math.floor((now-lastSADate)/(1000*60*60*24)):999;

          /* ── Culture quiz insights ── */
          const cuEntries=Object.values(cuResults);
          const cuAvgRatio=cuEntries.length>0?cuEntries.reduce((s,e)=>s+(e.score/e.total),0)/cuEntries.length:null;
          const cuWeakCats={};
          cuEntries.forEach(e=>{if(e.score/e.total<0.6){cuWeakCats[e.cat]=(cuWeakCats[e.cat]||0)+1}});
          const weakestCuCat=Object.entries(cuWeakCats).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;

          /* ── Category stats (performance + feedback + freshness) ── */
          const allEx=Object.values(PR).flat();
          const cats=["Respiration","Diction","Corps","Intentions"];
          const catIcon={Respiration:"💨",Diction:"🗣️",Corps:"🏋",Intentions:"🎭"};
          const catStats={};
          cats.forEach(cat=>{
            const catEx=allEx.filter(e=>e.cat===cat);
            const doneInCat=catEx.filter(e=>st.doneEx.includes(e.id));
            const avgStars=doneInCat.length>0?doneInCat.reduce((s,e)=>(s+(st.stars?.[e.id]||0)),0)/doneInCat.length:0;
            const catFeedback=Object.entries(feedback).filter(([id,f])=>f.cat===cat);
            const hardCount=catFeedback.filter(([_,f])=>f.level==="hard").length;
            const easyCount=catFeedback.filter(([_,f])=>f.level==="easy").length;
            const difficulty=catFeedback.length>0?(hardCount-easyCount)/catFeedback.length:0;
            const lastPractice=catLast[cat]?new Date(catLast[cat]):null;
            const daysSince=lastPractice?Math.floor((now-lastPractice)/(1000*60*60*24)):999;
            catStats[cat]={done:doneInCat.length,total:catEx.length,avg:avgStars,difficulty,daysSince,hardCount,easyCount,feedbackCount:catFeedback.length};

          /* 3. Culture quiz: weak categories */
          if(weakestCuCat&&cats.includes(weakestCuCat)){

          if(cuAvgRatio!==null&&cuAvgRatio<0.5&&!priorities.find(p=>p.score>2.5)){

          /* 4. Onboarding quiz: blocages et objectifs */
          if(profile?.answerIndices){

            const goalIdx=profile.answerIndices[6];

              const ex=(PR[lid]||[]).find(e=>e.cat===pri.cat&&!st.doneEx.includes(e.id)&&!recs.find(r=>r.id===e.id));

          /* ── Coach messages — uses ALL data sources ── */
          const coachMsg=(()=>{
            const fbEntries=Object.values(feedback);

            if(cuAvgRatio!==null&&cuAvgRatio<0.4&&cuEntries.length>=2)return{text:"Les quiz culture sont un point à travailler. Relisez les leçons avant de retenter — la théorie nourrit la pratique !",emoji:"📚"};

            if((st.warmups||0)>=5&&totalDone<5)return{text:"Vous vous échauffez bien ! Maintenant passez aux exercices pour mettre en pratique.",emoji:"🎤"};

            return{text:"Votre entraînement se précise au fil du temps. Chaque exercice m'aide à mieux vous guider.",emoji:"🎭"};
          })();

          const precisionLabel=precision<30?"En observation":precision<55?"En apprentissage":precision<80?"Affiné":"Expert";

          /* ══════════ RENDER — BILAN PERSONNALISÉ ══════════ */

          /* ── LOCKED STATE ── */
          if(!isUnlocked){
            const daysPct=Math.min(100,Math.round(daysSinceStart/7*100));
            const exPct=Math.min(100,Math.round(totalDone/5*100));
            const totalPct=Math.round((daysPct+exPct)/2);
            return(
              <div className="card" style={{padding:20,marginBottom:20,background:'linear-gradient(160deg,rgba(200,164,78,.03),var(--bg-card))',border:'1px solid rgba(200,164,78,.08)',textAlign:'center'}}>

          };

          /* ── Progression over time ── */
          const totalStars=Object.values(st.stars||{}).reduce((s,v)=>s+v,0);
          const avgStarsGlobal=totalDone>0?(totalStars/totalDone).toFixed(1):0;
          const feedbackEntries=Object.values(feedback);
          const hardRatio=feedbackEntries.length>0?Math.round(feedbackEntries.filter(f=>f.level==="hard").length/feedbackEntries.length*100):0;
          const easyRatio=feedbackEntries.length>0?Math.round(feedbackEntries.filter(f=>f.level==="easy").length/feedbackEntries.length*100):0;

          /* ── UNLOCKED STATE ── */

                    {I.target({size:13,sw:1.6,style:{color:'#07070b'}})}

                </div>

                {[{k:"onboarding",l:"Profil",ic:I.user({size:8,sw:1.2})},{k:"feedback",l:"Retours",ic:I.msg({size:8,sw:1.2})},{k:"stars",l:"Étoiles",ic:I.star({size:8,sw:1.2})},{k:"analyses",l:"Analyses",ic:I.book({size:8,sw:1.2})},{k:"culture",l:"Culture",ic:I.layers({size:8,sw:1.2})},{k:"warmups",l:"Échauff.",ic:I.mic({size:8,sw:1.2})},{k:"pulse",l:"Pulse",ic:I.target({size:8,sw:1.2})}].map(d=>(
                  <span key={d.k} style={{fontSize:6,padding:'2px 6px',borderRadius:4,display:'inline-flex',alignItems:'center',gap:2,background:dataSources.includes(d.k)?'rgba(200,164,78,.08)':'rgba(255,255,255,.02)',border:dataSources.includes(d.k)?'1px solid rgba(200,164,78,.15)':'1px solid var(--line)',color:dataSources.includes(d.k)?'var(--gold)':'var(--text-3)',opacity:dataSources.includes(d.k)?1:.4,fontWeight:600}}>{d.ic} {d.l}</span>

                    {saAvgScore!==null&&(
                      <div style={{padding:10,borderRadius:10,background:'rgba(200,164,78,.03)',border:'1px solid rgba(200,164,78,.06)'}}>
                        <p style={{fontSize:9,fontWeight:700,color:'var(--text-2)',marginBottom:4,display:'flex',alignItems:'center',gap:4}}>{I.book({size:11,sw:1.6})} Analyses de texte</p>
                        <p style={{fontSize:10,color:'var(--text)',lineHeight:1.6}}>Score moyen : <span style={{fontWeight:700,color:saAvgScore>=70?'var(--emerald)':saAvgScore>=50?'var(--gold)':'var(--coral)'}}>{saAvgScore}%</span> sur {saEntries.length} analyse{saEntries.length>1?"s":""}.{saAvgScore<50?" Relisez les extraits attentivement avant de répondre — cherchez les intentions derrière les mots.":saAvgScore>=70?" Excellente compréhension dramaturgique !":""}</p>
                      </div>
                    )}

                    {/* Culture quiz insight */}
                    {cuAvgRatio!==null&&(
                      <div style={{padding:10,borderRadius:10,background:'rgba(200,164,78,.03)',border:'1px solid rgba(200,164,78,.06)'}}>
                        <p style={{fontSize:9,fontWeight:700,color:'var(--text-2)',marginBottom:4,display:'flex',alignItems:'center',gap:4}}>{I.layers({size:11,sw:1.6})} Culture théâtrale</p>

                      </div>

                    {/* Pulse insights — confiance, trac, motivation */}
                    {pulseAnswers.length>=3&&(()=>{
                      const insights=[];

                      }
                      return insights.length>0?(
                        <div style={{padding:10,borderRadius:10,background:'rgba(167,139,250,.03)',border:'1px solid rgba(167,139,250,.08)'}}>

/* ═══ SPEECH HELPERS ═══ */
const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition||null;
function normalize(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()}
function levenshtein(a,b){
  if(a===b)return 0;const m=a.length,n=b.length;
  const d=Array.from({length:m+1},(_,i)=>i);
  for(let j=1;j<=n;j++){let prev=d[0];d[0]=j;
    for(let i=1;i<=m;i++){const tmp=d[i];d[i]=a[i-1]===b[j-1]?prev:1+Math.min(prev,d[i],d[i-1]);prev=tmp}}
  return d[m];
}
function fuzzyMatch(a,b){
  /* Match if Levenshtein distance is within threshold relative to word length */
  if(a===b)return true;
  const threshold=a.length<=3?1:a.length<=6?2:3;
  return levenshtein(a,b)<=threshold;
}
function compareWords(expected,spoken){
  const origWords=expected.split(/\s+/);
  const ew=normalize(expected).split(" ").filter(w=>w);
  const sw=normalize(spoken).split(" ").filter(w=>w);
  if(!sw.length)return ew.map((w,i)=>({word:origWords[i]||w,status:"pending"}));
  /* Sliding window: for each expected word, search nearby spoken words */
  const matched=new Set();/* indices in sw already used */
  return ew.map((w,i)=>{
    /* Search in a window around position i (±3 words to handle insertions/omissions) */
    const searchStart=Math.max(0,i-3);
    const searchEnd=Math.min(sw.length-1,i+3);
    let bestIdx=-1,bestDist=999;
    for(let j=searchStart;j<=searchEnd;j++){
      if(matched.has(j))continue;
      const d=levenshtein(w,sw[j]);
      if(d<bestDist){bestDist=d;bestIdx=j}
    }
    const threshold=w.length<=3?1:w.length<=6?2:3;
    if(bestIdx>=0&&bestDist<=threshold){
      matched.add(bestIdx);
      return{word:origWords[i]||w,status:"correct"};
    }
    /* Check if any spoken word further ahead matches (speaker may be ahead) */
    for(let j=searchEnd+1;j<sw.length;j++){
      if(matched.has(j))continue;
      if(fuzzyMatch(w,sw[j])){matched.add(j);return{word:origWords[i]||w,status:"correct"}}
    }
    /* If user has spoken enough words to cover this position → wrong (red) */
    /* Otherwise → pending (not yet spoken, stays white) */
    if(sw.length>i)return{word:origWords[i]||w,status:"wrong"};
    return{word:origWords[i]||w,status:"pending"};
  });
}

function Warmup({onClose,st,setSt}){
  const[warmupLevel,setWarmupLevel]=useState(null);/* null = picker */
  const[wi,setWi]=useState(0);
  const[phase,setPhase]=useState("ready");/* ready, active, rest, done, results */
  const[timer,setTimer]=useState(0);
  const[totalDone,setTotalDone]=useState(0);
  const[transcript,setTranscript]=useState("");
  const[listening,setListening]=useState(false);
  const[wordResults,setWordResults]=useState([]);
  const[micSupported]=useState(!!SpeechRec);
  const[micError,setMicError]=useState("");
  const[score,setScore]=useState(null);
  const[history,setHistory]=useState([]);/* {id,title,score,total,pct,time} */
  const recRef=React.useRef(null);

  const exercises=warmupLevel?WARMUP_EXERCISES.filter(w=>w.level===warmupLevel):[];
  const ex=exercises[wi]||WARMUP_EXERCISES[0];
  const dur=parseInt(ex.dur)*60;

  /* Timer */
  useEffect(()=>{
    if(phase!=="active")return;
    const iv=setInterval(()=>setTimer(t=>{
      if(t>=dur){clearInterval(iv);stopListening();setPhase("rest");return dur}
      return t+1;
    }),1000);
    return()=>clearInterval(iv);
  },[phase,dur]);

  /* Start speech recognition */
  const startListening=()=>{
    if(!SpeechRec){setMicError("Votre navigateur ne supporte pas la reconnaissance vocale. Utilisez Chrome pour cette fonctionnalité.");return}
    try{
      const rec=new SpeechRec();
      rec.lang="fr-FR";rec.continuous=true;rec.interimResults=true;
      rec.onresult=(e)=>{
        let full="";
        for(let i=0;i<e.results.length;i++){full+=e.results[i][0].transcript}
        setTranscript(full);
        const results=compareWords(ex.phrase,full);
        setWordResults(results);
        /* Check if all words matched */
        const correct=results.filter(r=>r.status==="correct").length;
        const total=results.length;
        if(correct===total&&total>0){
          SFX.success();
          setScore({correct,total});
        }else{
          setScore({correct,total});
        }
      };
      rec.onerror=(e)=>{
        if(e.error==='not-allowed')setMicError("Accès au micro refusé. Autorisez le micro dans les paramètres de votre navigateur.");
        else if(e.error!=='aborted')setMicError("Erreur micro : "+e.error);
      };
      rec.onend=()=>{
        /* Auto-restart if still active */
        if(recRef.current&&phase==="active"){try{rec.start()}catch(e){}}
        else{setListening(false)}
      };
      rec.start();
      recRef.current=rec;
      setListening(true);
      setMicError("");
    }catch(e){setMicError("Impossible de démarrer le micro.")}
  };

  const stopListening=()=>{
    if(recRef.current){try{recRef.current.abort()}catch(e){}recRef.current=null}
    setListening(false);
  };

  const pauseListening=()=>{
    if(recRef.current){try{recRef.current.stop()}catch(e){}}
    setListening(false);
  };

  const resumeListening=()=>{
    if(recRef.current){try{recRef.current.start();setListening(true)}catch(e){}}
  };

  const startExercise=()=>{
    setTimer(0);setPhase("active");setTranscript("");setWordResults([]);setScore(null);setMicError("");
    if(recRef.current&&listening){resumeListening()}
    else{startListening()}
  };

  const finishExercise=()=>{
    pauseListening();
    const s=score||{correct:0,total:normalize(ex.phrase).split(" ").length};
    setHistory(h=>[...h,{id:ex.id,title:ex.title,correct:s.correct||0,total:s.total,pct:s.total>0?Math.round((s.correct||0)/s.total*100):0,time:timer,cat:ex.cat}]);
    setPhase("rest");
  };

  const next=()=>{
    pauseListening();
    const nd=totalDone+1;setTotalDone(nd);
    if(wi<exercises.length-1){setWi(wi+1);setTimer(0);setPhase("ready");setTranscript("");setWordResults([]);setScore(null);setMicError("")}
    else{
      stopListening();
      const xpGain=warmupLevel==="avance"?50:warmupLevel==="intermediaire"?40:30;
      setPhase("results");SFX.success();setSt(p=>({...p,xp:p.xp+xpGain,lastActiveDate:new Date().toDateString()}));
    }
  };
  const skip=()=>{
    pauseListening();
    setHistory(h=>[...h,{id:ex.id,title:ex.title,correct:0,total:normalize(ex.phrase).split(" ").length,pct:0,time:0,cat:ex.cat,skipped:true}]);
    if(wi<exercises.length-1){setWi(wi+1);setTimer(0);setPhase("ready");setTranscript("");setWordResults([]);setScore(null)}
    else{stopListening();setPhase("results")}
  };
  const pct=dur>0?Math.min(timer/dur,1):0;
  const fmtTime=s=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?'0':''}${sec}`};
  const wlvl=WARMUP_LEVELS.find(l=>l.id===warmupLevel);

  /* Cleanup on unmount */
  useEffect(()=>()=>stopListening(),[]);

  /* Level picker */
  if(!warmupLevel) return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 100px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:24}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',boxShadow:'0 8px 32px rgba(200,164,78,.2)'}}>
            {I.mic({size:24,sw:1.6,style:{color:'#07070b'}})}
          </div>
          <h1 className="heading" style={{fontSize:26,marginBottom:6}}>Échauffement vocal</h1>
          <p className="body" style={{fontSize:12}}>Choisissez votre niveau de difficulté</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {WARMUP_LEVELS.map(lv=>{
            const exCount=WARMUP_EXERCISES.filter(w=>w.level===lv.id).length;
            const locked=st.xp<lv.unlockXP;
            return(
              <button key={lv.id} disabled={locked} onClick={()=>{setWarmupLevel(lv.id);setTimeout(()=>startListening(),100)}}
                className="card obj-3d" style={{padding:18,display:'flex',alignItems:'center',gap:14,opacity:locked?.4:1,cursor:locked?'not-allowed':'pointer',textAlign:'left'}}>
                <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${lv.color}22,${lv.color}08)`,
                  border:`1.5px solid ${lv.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                  {locked?I.lock({size:20,sw:1.5}):<span className="emoji" style={{fontSize:'20px'}}>{lv.icon}</span>}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:700,color:locked?'var(--text-3)':'var(--text)'}}>{lv.name}</p>
                  <p style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{exCount} exercices · {lv.id==="debutant"?"Phrases courtes":lv.id==="intermediaire"?"Enchaînements rapides":"Textes complexes"}</p>
                  {locked&&<p style={{fontSize:9,color:lv.color,marginTop:3,fontWeight:600}}>{lv.unlockXP} XP requis</p>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:3,color:lv.color,fontSize:10,fontWeight:700}}>
                  {lv.id==="debutant"?"⭐":lv.id==="intermediaire"?"⭐⭐":"⭐⭐⭐"}
                </div>
              </button>
            );
          })}
        </div>
        {!micSupported&&<div style={{padding:'10px 14px',borderRadius:8,background:'rgba(200,164,78,.06)',border:'1px solid var(--line-s)',marginTop:16,textAlign:'center'}}>
          <p style={{fontSize:10,color:'var(--gold)'}}>La reconnaissance vocale nécessite Google Chrome. Vous pouvez faire les exercices manuellement.</p>
        </div>}
      </div>
    </div>
  );

  /* Results screen */
  if(phase==="results"){
    const totalCorrect=history.reduce((a,h)=>a+h.correct,0);
    const totalWords=history.reduce((a,h)=>a+h.total,0);
    const globalPct=totalWords>0?Math.round(totalCorrect/totalWords*100):0;
    const skipped=history.filter(h=>h.skipped).length;
    const completed=history.filter(h=>!h.skipped).length;
    const xpGain=warmupLevel==="avance"?50:warmupLevel==="intermediaire"?40:30;
    const grade=globalPct>=90?"Excellent !":globalPct>=70?"Très bien !":globalPct>=50?"Pas mal !":"Continuez !";
    const gradeColor=globalPct>=90?"var(--emerald)":globalPct>=70?"var(--gold)":globalPct>=50?"var(--coral)":"var(--text-2)";
    return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <Confetti count={globalPct>=70?40:0}/>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:70,height:70,borderRadius:'50%',
              background:`linear-gradient(135deg,${gradeColor}20,${gradeColor}08)`,
              border:`2px solid ${gradeColor}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <p className="heading" style={{fontSize:26,color:gradeColor}}>{globalPct}%</p>
            </div>
            <h2 className="heading" style={{fontSize:24,marginBottom:4}}>{grade}</h2>
            <p className="body" style={{fontSize:12}}>Échauffement {wlvl?.name}</p>
            <p className="heading gold-shimmer" style={{fontSize:18,marginTop:8}}>+{xpGain} XP</p>
          </div>

          {/* Stats summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:20}}>
            {[{v:completed,l:"Complétés",c:"var(--emerald)"},{v:skipped,l:"Passés",c:"var(--text-3)"},{v:totalCorrect+"/"+totalWords,l:"Mots réussis",c:"var(--gold)"}].map((s,i)=>(
              <div key={i} style={{padding:12,borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',textAlign:'center'}}>
                <p className="heading" style={{fontSize:18,color:s.c}}>{s.v}</p>
                <p style={{fontSize:8,color:'var(--text-3)',marginTop:2}}>{s.l}</p>
              </div>
            ))}
          </div>

          {/* Exercise-by-exercise breakdown */}
          <p className="label" style={{marginBottom:8}}>DÉTAIL PAR EXERCICE</p>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:24}}>
            {history.map((h,i)=>(
              <div key={i} style={{padding:'10px 14px',borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',
                  background:h.skipped?'rgba(78,74,68,.1)':h.pct>=80?'rgba(74,222,128,.1)':h.pct>=50?'rgba(200,164,78,.1)':'rgba(239,68,68,.08)',
                  border:h.skipped?'1px solid var(--text-3)':h.pct>=80?'1px solid var(--emerald)':h.pct>=50?'1px solid var(--gold)':'1px solid #ef4444',flexShrink:0}}>
                  {h.skipped?<span style={{fontSize:9,color:'var(--text-3)'}}>—</span>
                  :<span style={{fontSize:10,fontWeight:800,color:h.pct>=80?'var(--emerald)':h.pct>=50?'var(--gold)':'#ef4444'}}>{h.pct}%</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:11,fontWeight:600,color:h.skipped?'var(--text-3)':'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.title}</p>
                  <p style={{fontSize:8,color:'var(--text-3)'}}>{h.cat} · {h.skipped?"Passé":h.correct+"/"+h.total+" mots"}</p>
                </div>
                {!h.skipped&&<div style={{width:40}}>
                  <div style={{height:3,borderRadius:3,background:'rgba(255,255,255,.04)',overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:3,width:h.pct+"%",background:h.pct>=80?'var(--emerald)':h.pct>=50?'var(--gold)':'var(--coral)'}}/>
                  </div>
                </div>}
              </div>
            ))}
          </div>

          <button onClick={onClose} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13}}>Retour aux Outils</button>
        </div>
      </div>
    );
  }

  return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 100px'}}>
      <div className="mw">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <button onClick={()=>{stopListening();if(wi>0&&phase==="ready"){setWi(wi-1);setTimer(0);setPhase("ready");setTranscript("");setWordResults([]);setScore(null);setMicError("")}else{setWarmupLevel(null)}}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12}}>{I.chL({size:16})} {wi>0&&phase==="ready"?"Précédent":"Retour"}</button>
          <button onClick={()=>{stopListening();onClose()}} style={{fontSize:10,color:'var(--text-3)'}}>Quitter ✕</button>
        </div>

        {/* Progress bar */}
        <div style={{marginBottom:6}}>
          <Bar val={wi+(phase==="rest"?1:pct)} max={exercises.length} cls="fill-gold" h={3}/>
          <p style={{fontSize:8,color:'var(--text-3)',marginTop:4,textAlign:'right'}}>Exercice {wi+1} / {exercises.length}</p>
        </div>

        {/* Exercise header */}
        <div style={{textAlign:'center',marginBottom:16,marginTop:16}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:10}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 14px',borderRadius:20,background:'rgba(200,164,78,.06)',border:'1px solid var(--line-s)'}}>
              <span style={{fontSize:9,fontWeight:700,color:wlvl?.color||'var(--gold)',letterSpacing:'.08em'}}>{ex.cat.toUpperCase()}</span>
              <span style={{fontSize:8,color:'var(--text-3)'}}>·</span>
              <span style={{fontSize:9,color:'var(--text-3)'}}>{ex.dur}</span>
            </div>
            <span style={{fontSize:9,color:wlvl?.color||'var(--gold)'}}>{"⭐".repeat(ex.difficulty||1)}</span>
          </div>
          <h2 className="heading" style={{fontSize:24,marginBottom:8}}>{ex.title}</h2>
        </div>

        {/* Phrase with word-by-word coloring */}
        <div style={{padding:24,borderRadius:16,background:'var(--bg-card)',border:'1px solid var(--line-s)',marginBottom:16,textAlign:'center',boxShadow:'0 0 40px var(--gold-glow)',position:'relative'}}>
          <p className="label-gold" style={{marginBottom:10}}>RÉPÉTEZ À VOIX HAUTE</p>
          {wordResults.length>0?(
            <p style={{fontSize:18,lineHeight:2,fontFamily:'Cormorant Garamond, serif',fontWeight:400,fontStyle:'italic'}}>
              «{" "}{wordResults.map((wr,i)=>(
                <span key={i} style={{
                  color:wr.status==="correct"?"var(--emerald)":wr.status==="wrong"?"#ef4444":"var(--text-3)",
                  fontWeight:wr.status==="correct"?600:wr.status==="wrong"?700:400,
                  textDecoration:wr.status==="wrong"?"underline wavy #ef4444":"none",
                  transition:'color .3s',
                  padding:'2px 1px',
                  borderRadius:3,
                  background:wr.status==="wrong"?"rgba(239,68,68,.08)":wr.status==="correct"?"rgba(74,222,128,.06)":"transparent",
                }}>{wr.word}{i<wordResults.length-1?" ":""}</span>
              ))}{" »"}
            </p>
          ):(
            <p className="heading-light" style={{fontSize:18,color:'var(--text)',lineHeight:1.7,fontStyle:'italic'}}>« {ex.phrase} »</p>
          )}
          {/* Score indicator */}
          {score&&phase==="active"&&(
            <div style={{marginTop:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <div style={{height:4,flex:1,maxWidth:120,borderRadius:4,background:'rgba(255,255,255,.04)',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:4,width:(score.correct/score.total*100)+"%",
                  background:score.correct===score.total?'var(--emerald)':score.correct/score.total>.6?'var(--gold)':'var(--coral)',
                  transition:'width .3s'}}/>
              </div>
              <span style={{fontSize:10,fontWeight:700,color:score.correct===score.total?'var(--emerald)':'var(--gold)'}}>{score.correct}/{score.total}</span>
            </div>
          )}
        </div>

        {/* Mic status indicator */}
        {phase==="active"&&(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:12}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:listening?'var(--coral)':'var(--text-3)',
              animation:listening?'pulse 1.5s ease-in-out infinite':'none',
              boxShadow:listening?'0 0 12px rgba(212,115,92,.5)':'none'}}/>
            <span style={{fontSize:10,fontWeight:600,color:listening?'var(--coral)':'var(--text-3)'}}>
              {listening?"Micro actif — parlez...":"Micro inactif"}
            </span>
          </div>
        )}

        {/* Mic status indicator in ready phase */}
        {phase==="ready"&&micSupported&&(
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:16,padding:'8px 12px',borderRadius:10,background:'rgba(212,115,92,.06)',border:'1px solid rgba(212,115,92,.12)'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'var(--coral)',animation:'pulse 1.5s ease-in-out infinite'}}/>
            <span style={{fontSize:10,fontWeight:600,color:'var(--coral)'}}>Micro prêt à écouter</span>
          </div>
        )}

        {/* Mic error */}
        {micError&&(
          <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.15)',marginBottom:12,textAlign:'center'}}>
            <p style={{fontSize:10,color:'#ef4444'}}>{micError}</p>
          </div>
        )}

        {/* Browser warning */}
        {!micSupported&&phase==="ready"&&(
          <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(200,164,78,.06)',border:'1px solid var(--line-s)',marginBottom:12,textAlign:'center'}}>
            <p style={{fontSize:10,color:'var(--gold)'}}>La reconnaissance vocale nécessite Google Chrome. Sans micro, vous pouvez quand même faire les exercices manuellement.</p>
          </div>
        )}

        {/* Timer circle */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:20}}>
          <div style={{position:'relative',width:130,height:130}}>
            <svg width="130" height="130" viewBox="0 0 130 130" style={{transform:'rotate(-90deg)'}}>
              <circle cx="65" cy="65" r="58" fill="none" stroke="var(--line)" strokeWidth="4"/>
              <circle cx="65" cy="65" r="58" fill="none" stroke={phase==="active"?"var(--gold)":phase==="rest"?"var(--emerald)":"var(--text-3)"} strokeWidth="4"
                strokeDasharray={`${2*Math.PI*58}`} strokeDashoffset={`${2*Math.PI*58*(1-pct)}`}
                strokeLinecap="round" style={{transition:'stroke-dashoffset .3s'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              {phase==="ready"&&<>
                <p className="heading" style={{fontSize:26,color:'var(--text)'}}>{ex.dur}</p>
                <p style={{fontSize:9,color:'var(--text-3)',marginTop:2}}>Prêt ?</p>
              </>}
              {phase==="active"&&<>
                <p className="heading" style={{fontSize:30,color:'var(--gold)'}}>{fmtTime(dur-timer)}</p>
                <p style={{fontSize:9,color:'var(--gold-dim)',marginTop:2}}>En cours…</p>
              </>}
              {phase==="rest"&&<>
                <span style={{color:'var(--emerald)',marginBottom:4}}>{I.check({size:26,sw:2})}</span>
                <p style={{fontSize:10,fontWeight:700,color:'var(--emerald)'}}>Fait !</p>
                {score&&<p style={{fontSize:9,color:'var(--emerald)',marginTop:2}}>{score.correct}/{score.total} mots</p>}
              </>}
            </div>
          </div>
        </div>

        {/* Action buttons */}
        <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center'}}>
          {phase==="ready"&&<button onClick={startExercise} className="btn-gold" style={{width:'100%',maxWidth:280,padding:'14px 0',fontSize:13,letterSpacing:'.04em',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            {I.mic({size:16})} {micSupported?"Commencer (micro activé)":"Commencer"}
          </button>}
          {phase==="active"&&<>
            <button onClick={finishExercise} className="btn-gold" style={{width:'100%',maxWidth:280,padding:'14px 0',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              {I.check({size:16})} J'ai terminé
            </button>
            <button onClick={skip} style={{fontSize:11,color:'var(--text-3)',marginTop:4}}>Passer →</button>
          </>}
          {phase==="rest"&&<button onClick={next} className="btn-gold" style={{width:'100%',maxWidth:280,padding:'14px 0',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
