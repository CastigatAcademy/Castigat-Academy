            {wi<exercises.length-1?"Exercice suivant →":"Terminer l'échauffement"}
          </button>}
        </div>

        {/* Tip */}
        <div style={{marginTop:20,padding:14,borderRadius:12,background:'rgba(200,164,78,.03)',border:'1px solid rgba(200,164,78,.08)'}}>
          <div style={{display:'flex',gap:8}}>
            <span style={{color:'var(--gold-dim)',flexShrink:0,marginTop:1}}>{I.info({size:13,sw:1.4})}</span>
            <div><p className="label-gold" style={{marginBottom:3}}>CONSEIL</p>
            <p className="body" style={{fontSize:10}}>{
              ex.cat==="Diction"?"Articulez chaque syllabe clairement, même lentement. La vitesse viendra après la précision.":
              ex.cat==="Projection"?"Projetez depuis le diaphragme, pas la gorge. Imaginez que votre voix doit atteindre le fond de la salle.":
              ex.cat==="Vocalise"?"Ouvrez grand la bouche pour chaque voyelle. Le son doit résonner dans le masque (nez, pommettes).":
              "Prenez une grande inspiration abdominale avant de commencer. Le ventre se gonfle, pas la poitrine."
            }</p></div>
          </div>
        </div>

        {/* Exercise list */}
        <div style={{marginTop:20}}>
          <p className="label" style={{marginBottom:8}}>PROGRAMME</p>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {exercises.map((w,i)=>{
              const isDone=i<wi||(i===wi&&(phase==="rest"||phase==="done"));
              const isCur=i===wi&&phase!=="done";
              return(<div key={w.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:10,
                background:isCur?'rgba(200,164,78,.04)':'transparent',border:isCur?'1px solid var(--line-s)':'1px solid transparent'}}>
                <div style={{width:22,height:22,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',
                  background:isDone?'rgba(74,222,128,.1)':isCur?'var(--gold-glow)':'var(--bg-card)',
                  border:isDone?'1px solid var(--emerald)':isCur?'1px solid var(--gold-dim)':'1px solid var(--line)',
                  fontSize:9,fontWeight:700,color:isDone?'var(--emerald)':isCur?'var(--gold)':'var(--text-3)'}}>
                  {isDone?"✓":i+1}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:10,fontWeight:isDone||isCur?700:500,color:isDone?'var(--emerald)':isCur?'var(--text)':'var(--text-3)'}}>{w.title}</p>
                  <p style={{fontSize:8,color:'var(--text-3)'}}>{w.cat} · {w.dur}</p>
                </div>
              </div>);
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ ANALYSE DE SCÈNE ═══ */
function SceneAnalysis({analysis,st,setSt,onClose}){
  const[qi,setQi]=useState(0);
  const[answers,setAnswers]=useState({});/* {idx: {chosen, selfEval, userText, revealed}} */
  const[phase,setPhase]=useState("intro");/* intro, question, correction, results */
  const q=analysis.questions[qi];
  const ans=answers[qi]||{};
  const total=analysis.questions.length;
  const tierColor=analysis.tier==="avance"?"var(--violet)":analysis.tier==="intermediaire"?"var(--coral)":"var(--gold)";

  const selectQCM=(idx)=>{if(ans.revealed)return;setAnswers(a=>({...a,[qi]:{...ans,chosen:idx}}))};
  const setUserText=(t)=>setAnswers(a=>({...a,[qi]:{...ans,userText:t}}));
  const setSelfEval=(v)=>setAnswers(a=>({...a,[qi]:{...ans,selfEval:v}}));

  const reveal=()=>{
    setAnswers(a=>({...a,[qi]:{...ans,revealed:true}}));
    if(q.type==="qcm"&&ans.chosen===q.a)SFX.success();
    else SFX.click();
  };

  const nextQ=()=>{
    if(qi<total-1){setQi(qi+1)}
    else{
      /* Calculate score */
      let score=0;
      analysis.questions.forEach((qq,i)=>{
        const aa=answers[i]||{};
        if(qq.type==="qcm"&&aa.chosen===qq.a)score++;
        if(qq.type==="libre"&&aa.selfEval==="found")score++;
        if(qq.type==="libre"&&aa.selfEval==="partial")score+=0.5;
        if(qq.type==="argument"&&aa.selfEval)score++;
      });
      const xpGain=analysis.tier==="avance"?60:analysis.tier==="intermediaire"?45:30;
      const saScore=Math.round(score/total*100);
      setSt(p=>({...p,xp:p.xp+xpGain,weekXP:(p.weekXP||0)+xpGain,weekAnalysis:true,doneSA:[...(p.doneSA||[]),analysis.id].filter((v,i,a)=>a.indexOf(v)===i),
        saResults:{...(p.saResults||{}),[analysis.id]:{score:saScore,total,tier:analysis.tier,date:new Date().toISOString()}},
        lastSADate:new Date().toISOString()
      }));
      SFX.success();
      setPhase("results");
    }
  };

  const canReveal=q.type==="qcm"?ans.chosen!==undefined:q.type==="libre"?(ans.userText||"").trim().length>2:q.type==="argument"?(ans.userText||"").trim().length>2:false;

  /* Intro */
  if(phase==="intro") return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:24}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',position:'relative',zIndex:2}}>
          <p className="label" style={{color:tierColor,marginBottom:8}}>{analysis.tier==="avance"?"AVANCÉ":analysis.tier==="intermediaire"?"INTERMÉDIAIRE":"DÉBUTANT"}</p>
          <h1 className="heading hero-text" style={{fontSize:24,marginBottom:8}}>{analysis.title}</h1>
          <p className="body" style={{fontSize:11,marginBottom:20}}>{analysis.source}</p>
        </div>
        {analysis.context&&<div style={{padding:16,borderRadius:12,background:'rgba(255,255,255,.02)',border:'1px solid var(--line)',marginBottom:16}}>
          <p className="label" style={{marginBottom:6,color:'var(--text-2)'}}>CONTEXTE</p>
          <p style={{fontSize:11,color:'var(--text-2)',lineHeight:1.7}}>{analysis.context}</p>
        </div>}
        <div className="card-gold" style={{padding:22,marginBottom:20}}>
          <p className="label-gold" style={{marginBottom:10}}>EXTRAIT</p>
          <p style={{fontSize:14,lineHeight:1.9,color:'var(--text)',fontFamily:'Cormorant Garamond, serif',fontWeight:400}}>« {analysis.extract} »</p>
        </div>
        <p className="body" style={{fontSize:11,textAlign:'center',marginBottom:16}}>{total} question{total>1?"s":""} — QCM, réflexion libre et analyse argumentée</p>
        <button onClick={()=>setPhase("question")} className="btn-gold btn-pulse" style={{width:'100%',padding:'14px 0',fontSize:13}}>Commencer l'analyse</button>
      </div>
    </div>
  );

  /* Results */
  if(phase==="results"){
    let score=0;let maxScore=0;
    analysis.questions.forEach((qq,i)=>{
      const aa=answers[i]||{};
      if(qq.type==="qcm"){maxScore++;if(aa.chosen===qq.a)score++}
      if(qq.type==="libre"){maxScore++;if(aa.selfEval==="found")score++;else if(aa.selfEval==="partial")score+=0.5}
      if(qq.type==="argument"){maxScore++;if(aa.selfEval)score++}
    });
    const pct=maxScore>0?Math.round(score/maxScore*100):0;
    const xpGain=analysis.tier==="avance"?60:analysis.tier==="intermediaire"?45:30;
    return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <Confetti count={pct>=70?40:0}/>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:70,height:70,borderRadius:'50%',
              background:pct>=70?'rgba(74,222,128,.1)':'rgba(200,164,78,.1)',
              border:`2px solid ${pct>=70?'var(--emerald)':'var(--gold)'}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <p className="heading" style={{fontSize:26,color:pct>=70?'var(--emerald)':'var(--gold)'}}>{pct}%</p>
            </div>
            <h2 className="heading" style={{fontSize:22,marginBottom:4}}>{pct>=80?"Excellente analyse !":pct>=60?"Bonne compréhension !":"Continuez à analyser !"}</h2>
            <p className="body" style={{fontSize:11}}>{analysis.title}</p>
            <p className="heading gold-shimmer" style={{fontSize:18,marginTop:8}}>+{xpGain} XP</p>
          </div>
          {/* Breakdown */}
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:24}}>
            {analysis.questions.map((qq,i)=>{
              const aa=answers[i]||{};
              const ok=qq.type==="qcm"?aa.chosen===qq.a:qq.type==="libre"?aa.selfEval==="found":!!aa.selfEval;
              const partial=qq.type==="libre"&&aa.selfEval==="partial";
              return(
                <div key={i} style={{padding:'10px 14px',borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:26,height:26,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',
                    background:ok?'rgba(74,222,128,.1)':partial?'rgba(200,164,78,.1)':'rgba(239,68,68,.08)',
                    border:ok?'1px solid var(--emerald)':partial?'1px solid var(--gold)':'1px solid #ef4444',flexShrink:0}}>
                    <span style={{fontSize:10,fontWeight:800,color:ok?'var(--emerald)':partial?'var(--gold)':'#ef4444'}}>{ok?"✓":partial?"½":"✗"}</span>
                  </div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:10,fontWeight:600,color:'var(--text)'}}>{qq.q.substring(0,60)}{qq.q.length>60?"…":""}</p>
                    <p style={{fontSize:8,color:'var(--text-3)'}}>{qq.type==="qcm"?"QCM":qq.type==="libre"?"Réponse libre":"Question argumentée"}</p>
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={onClose} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13}}>Retour</button>
        </div>
      </div>
    );
  }

  /* Question view */
  return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 120px'}}>
      <div className="mw">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <button onClick={()=>{if(qi>0)setQi(qi-1);else setPhase("intro")}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12}}>{I.chL({size:16})} {qi>0?"Précédent":"Retour"}</button>
          <button onClick={onClose} style={{fontSize:10,color:'var(--text-3)'}}>Quitter ✕</button>
        </div>
        <Bar val={qi+(ans.revealed?1:0)} max={total} cls="fill-gold" h={3}/>
        <p style={{fontSize:8,color:'var(--text-3)',marginTop:4,textAlign:'right'}}>Question {qi+1} / {total}</p>

        {/* Extract reminder (collapsed) */}
        <details style={{marginTop:14,marginBottom:14}}>
          <summary style={{fontSize:10,color:'var(--gold)',cursor:'pointer',fontWeight:600}}>Revoir l'extrait</summary>
          <div style={{padding:12,marginTop:6,borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)'}}>
            <p style={{fontSize:12,lineHeight:1.8,color:'var(--text-2)',fontFamily:'Cormorant Garamond, serif',fontWeight:400}}>« {analysis.extract} »</p>
            <p style={{fontSize:9,color:'var(--text-3)',marginTop:6}}>— {analysis.source}</p>
          </div>
        </details>

        {/* Question type badge */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <span style={{padding:'3px 10px',borderRadius:12,fontSize:9,fontWeight:700,letterSpacing:'.06em',
            background:q.type==="qcm"?'rgba(200,164,78,.08)':q.type==="libre"?'rgba(167,139,250,.08)':'rgba(212,115,92,.08)',
            color:q.type==="qcm"?'var(--gold)':q.type==="libre"?'var(--violet)':'var(--coral)',
            border:`1px solid ${q.type==="qcm"?'var(--gold-dim)':q.type==="libre"?'var(--violet-dim)':'var(--coral)'}22`}}>
            {q.type==="qcm"?"QCM":q.type==="libre"?"RÉPONSE LIBRE":"ARGUMENTÉE"}
          </span>
        </div>

        {/* Question text */}
        <h3 className="heading" style={{fontSize:18,lineHeight:1.4,marginBottom:16}}>{q.q}</h3>

        {/* QCM */}
        {q.type==="qcm"&&(
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
            {q.o.map((opt,i)=>{
              const selected=ans.chosen===i;
              const isCorrect=i===q.a;
              const showResult=ans.revealed;
              return(
                <button key={i} onClick={()=>selectQCM(i)} disabled={ans.revealed}
                  style={{padding:'12px 16px',borderRadius:12,textAlign:'left',fontSize:12,fontWeight:selected?700:400,
                    background:showResult?(isCorrect?'rgba(74,222,128,.08)':selected?'rgba(239,68,68,.06)':'var(--bg-card)'):(selected?'var(--gold-glow)':'var(--bg-card)'),
                    border:`1.5px solid ${showResult?(isCorrect?'var(--emerald)':selected?'#ef4444':'var(--line)'):(selected?'var(--gold)':'var(--line)')}`,
                    color:showResult?(isCorrect?'var(--emerald)':selected?'#ef4444':'var(--text-2)'):(selected?'var(--gold)':'var(--text)'),
                    transition:'all .2s',cursor:ans.revealed?'default':'pointer'}}>
                  <span style={{marginRight:8,fontWeight:800}}>{String.fromCharCode(65+i)}.</span>{opt}
                  {showResult&&isCorrect&&" ✓"}
                  {showResult&&selected&&!isCorrect&&" ✗"}
                </button>
              );
            })}
          </div>
        )}

        {/* Libre */}
        {q.type==="libre"&&(
          <div style={{marginBottom:16}}>
            <textarea value={ans.userText||""} onChange={e=>setUserText(e.target.value)} disabled={ans.revealed}
              placeholder="Écrivez votre analyse ici... (minimum 10 caractères)"
              style={{width:'100%',minHeight:100,padding:14,borderRadius:12,background:'var(--bg-card)',border:'1px solid var(--line)',color:'var(--text)',
                fontFamily:'Noto Sans, Inter, sans-serif',fontSize:12,lineHeight:1.7,resize:'vertical',outline:'none'}}/>
            {ans.revealed&&(
              <div style={{marginTop:12}}>
                <p className="label" style={{color:'var(--violet)',marginBottom:8}}>RÉPONSE DE RÉFÉRENCE</p>
                <div style={{padding:14,borderRadius:12,background:'rgba(167,139,250,.04)',border:'1px solid rgba(167,139,250,.12)'}}>
                  <p style={{fontSize:11,lineHeight:1.7,color:'var(--text)'}}>{q.ref}</p>
                </div>
                {!ans.selfEval&&(
                  <div style={{marginTop:12}}>
                    <p style={{fontSize:10,color:'var(--text-2)',marginBottom:8}}>Comment évaluez-vous votre réponse ?</p>
                    <div style={{display:'flex',gap:6}}>
                      {[{v:"found",l:"J'ai trouvé l'essentiel",c:"var(--emerald)"},{v:"partial",l:"Partiellement",c:"var(--gold)"},{v:"missed",l:"Je n'avais pas vu ça",c:"var(--coral)"}].map(e=>(
                        <button key={e.v} onClick={()=>setSelfEval(e.v)}
                          style={{flex:1,padding:'8px 4px',borderRadius:8,fontSize:9,fontWeight:600,
                            background:`${e.c}08`,border:`1px solid ${e.c}33`,color:e.c}}>{e.l}</button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* Argumentée */}
        {q.type==="argument"&&(
          <div style={{marginBottom:16}}>
            <textarea value={ans.userText||""} onChange={e=>setUserText(e.target.value)} disabled={ans.revealed}
              placeholder="Donnez votre position et argumentez... (minimum 10 caractères)"
              style={{width:'100%',minHeight:100,padding:14,borderRadius:12,background:'var(--bg-card)',border:'1px solid var(--line)',color:'var(--text)',
                fontFamily:'Noto Sans, Inter, sans-serif',fontSize:12,lineHeight:1.7,resize:'vertical',outline:'none'}}/>
            {ans.revealed&&q.positions&&(
              <div style={{marginTop:12}}>
                <p className="label" style={{color:'var(--coral)',marginBottom:10}}>PERSPECTIVES</p>
                {(()=>{const merged=Object.assign({},...q.positions);return[{key:"pour",label:"Pour",color:"var(--emerald)"},{key:"contre",label:"Contre",color:"var(--coral)"},{key:"synthese",label:"Synthèse",color:"var(--gold)"}].map(p=>(
                  merged[p.key]&&<div key={p.key} style={{padding:12,borderRadius:10,background:'var(--bg-card)',border:`1px solid ${p.color}22`,marginBottom:8}}>
                    <p style={{fontSize:9,fontWeight:700,color:p.color,marginBottom:4,letterSpacing:'.08em'}}>{p.label.toUpperCase()}</p>
                    <p style={{fontSize:11,lineHeight:1.7,color:'var(--text)'}}>{merged[p.key]}</p>
                  </div>
                ))})()}
                {!ans.selfEval&&(
                  <div style={{marginTop:8}}>
                    <p style={{fontSize:10,color:'var(--text-2)',marginBottom:6}}>Avez-vous enrichi votre point de vue ?</p>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>setSelfEval(true)} className="btn-outline" style={{flex:1,padding:'8px 0',fontSize:10}}>Oui, j'ai appris quelque chose</button>
                      <button onClick={()=>setSelfEval(false)} style={{flex:1,padding:'8px 0',fontSize:10,borderRadius:10,border:'1px solid var(--line)',color:'var(--text-3)'}}>Je maintiens ma position</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* Action buttons */}
        {!ans.revealed&&(
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {canReveal&&<button onClick={reveal} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13}}>
              {q.type==="qcm"?"Valider ma réponse":"Voir la correction"}
            </button>}
            {!canReveal&&q.type!=="qcm"&&<button onClick={reveal} style={{width:'100%',padding:'12px 0',fontSize:11,borderRadius:10,border:'1px solid var(--line-s)',color:'var(--text-3)'}}>
              Passer — voir la correction directement
            </button>}
          </div>
        )}
        {ans.revealed&&(q.type==="qcm"||(q.type==="libre"&&ans.selfEval)||(q.type==="argument"&&ans.selfEval!==undefined))&&(
          <button onClick={nextQ} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13,marginBottom:8}}>
            {qi<total-1?"Question suivante →":"Voir mes résultats"}
          </button>
        )}

        {/* Explanation for QCM */}
        {q.type==="qcm"&&ans.revealed&&q.expl&&(
          <div style={{padding:14,borderRadius:12,background:'rgba(200,164,78,.04)',border:'1px solid var(--line-s)',marginTop:8}}>
            <p className="label-gold" style={{marginBottom:6}}>EXPLICATION</p>
            <p style={{fontSize:11,lineHeight:1.7,color:'var(--text)'}}>{q.expl}</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══ CHALLENGE DICTION — 90s speed run ═══ */
function DictionChallenge({onClose,st,setSt}){
  const[level,setLevel]=useState(null);
  const[phase,setPhase]=useState("pick");/* pick, countdown, go, done */
  const[timeLeft,setTimeLeft]=useState(60);
  const[phraseIdx,setPhraseIdx]=useState(0);
  const[validated,setValidated]=useState(0);
  const[transcript,setTranscript]=useState("");
  const[wordResults,setWordResults]=useState([]);
  const[listening,setListening]=useState(false);
  const[micError,setMicError]=useState("");
  const[countdownVal,setCountdownVal]=useState(3);
  const[phrases,setPhrases]=useState([]);
  const[history,setHistory]=useState([]);/* {phrase,success,time} */
  const recRef=React.useRef(null);
  const phraseRef=React.useRef(0);
  const validatedRef=React.useRef(0);
  const timeRef=React.useRef(60);
  const stoppedRef=React.useRef(false);
  const consumedRef=React.useRef(0);/* char offset: text before this belongs to previous phrases */
  const fullTextRef=React.useRef("");/* full transcript so far (for buttons) */

  /* Shuffle phrases for the level */
  const startChallenge=(lv)=>{
    const pool=[...CHALLENGE_PHRASES[lv]];
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
    setPhrases(pool);
    setLevel(lv);
    setPhraseIdx(0);phraseRef.current=0;
    setValidated(0);validatedRef.current=0;
    setTimeLeft(60);timeRef.current=60;
    setTranscript("");setWordResults([]);setHistory([]);
    stoppedRef.current=false;consumedRef.current=0;fullTextRef.current="";
    setPhase("countdown");setCountdownVal(3);
  };

  /* Countdown 3-2-1 */
  useEffect(()=>{
    if(phase!=="countdown")return;
    if(countdownVal<=0){setPhase("go");launchRec();return}
    const t=setTimeout(()=>setCountdownVal(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[phase,countdownVal]);

  /* Main 60s timer */
  useEffect(()=>{
    if(phase!=="go")return;
    const iv=setInterval(()=>{
      setTimeLeft(t=>{
        const nt=t-1;
        timeRef.current=nt;
        if(nt<=0){clearInterval(iv);stopListening();setPhase("done");return 0}
        return nt;
      });
    },1000);
    return()=>clearInterval(iv);
  },[phase]);

  /* ── Speech recognition: ONE session continuous=true, char-offset per phrase ── */
  const launchRec=()=>{
    if(!SpeechRec){setMicError("Votre navigateur ne supporte pas la reconnaissance vocale. Utilisez Chrome.");return}
    stoppedRef.current=false;
    consumedRef.current=0;fullTextRef.current="";
    try{
      const rec=new SpeechRec();
      rec.lang="fr-FR";rec.continuous=true;rec.interimResults=true;

      rec.onresult=(e)=>{
        /* Build FULL transcript from all results */
        let full="";
        for(let i=0;i<e.results.length;i++){full+=e.results[i][0].transcript+" "}
        full=full.trimEnd();
        fullTextRef.current=full;
        /* Text for current phrase = everything after consumed chars */
        const phraseText=full.substring(consumedRef.current).trim();
        setTranscript(phraseText);
        const currentPhrase=phrases[phraseRef.current];
        if(!currentPhrase||!phraseText)return;
        const results=compareWords(currentPhrase,phraseText);
        setWordResults(results);
        const correct=results.filter(r=>r.status==="correct").length;
        const total=results.length;
        const wrong=results.filter(r=>r.status==="wrong").length;
        const spoken=correct+wrong;/* words actually attempted */
        if(correct>=Math.ceil(total*0.85)&&spoken>=Math.ceil(total*0.75)&&total>0){
          SFX.tap();
          /* Mark all current text as consumed */
          consumedRef.current=full.length;
          const newV=validatedRef.current+1;
          validatedRef.current=newV;
          setValidated(newV);
          setHistory(h=>[...h,{phrase:currentPhrase,success:true,time:60-timeRef.current}]);
          let nextIdx=phraseRef.current+1;
          if(nextIdx>=phrases.length)nextIdx=0;
          phraseRef.current=nextIdx;
          setPhraseIdx(nextIdx);
          setTranscript("");setWordResults([]);
        }
      };

      rec.onerror=(e)=>{
        if(e.error==='not-allowed'){setMicError("Accès au micro refusé.");stoppedRef.current=true}
        /* no-speech / network / audio-capture = transient, onend restarts */
      };

      rec.onend=()=>{
        if(!stoppedRef.current&&timeRef.current>0){
          /* Try to restart same instance first */
          try{rec.start()}catch(ex){
            /* If that fails, create fresh instance */
            setTimeout(()=>{if(!stoppedRef.current&&timeRef.current>0){
              try{const r2=new SpeechRec();r2.lang="fr-FR";r2.continuous=true;r2.interimResults=true;
              r2.onresult=rec.onresult;r2.onerror=rec.onerror;r2.onend=rec.onend;
              r2.start();recRef.current=r2;setListening(true);consumedRef.current=0;fullTextRef.current="";}catch(e2){}
            }},300);
          }
        }else{setListening(false)}
      };

      rec.start();
      recRef.current=rec;
      setListening(true);setMicError("");
    }catch(e){setMicError("Impossible de démarrer le micro.")}
  };

  const stopListening=()=>{
    stoppedRef.current=true;
    if(recRef.current){try{recRef.current.abort()}catch(e){}recRef.current=null}
    setListening(false);
  };

  useEffect(()=>()=>stopListening(),[]);

  /* Save score when challenge ends — must be BEFORE any conditional return */
  const[scoreSaved,setScoreSaved]=useState(false);
  useEffect(()=>{
    if(phase==="done"&&!scoreSaved){
      setScoreSaved(true);
      const xpG=Math.max(10,validated*8+(level==="avance"?20:level==="intermediaire"?10:0));
      const prev=(st.challengeScores||{})[level]||0;
      if(validated>prev){
        setSt(p=>({...p,xp:p.xp+xpG,challengeScores:{...(p.challengeScores||{}),[level]:validated},challenges:(p.challenges||0)+1}));
      }else{
        setSt(p=>({...p,xp:p.xp+Math.round(xpG/2),challenges:(p.challenges||0)+1}));
      }
      SFX.success();
    }
  },[phase,scoreSaved]);

  const tier=CHALLENGE_TIERS.slice().reverse().find(t=>validated>=t.min)||CHALLENGE_TIERS[0];
  const nextTier=CHALLENGE_TIERS.find(t=>t.min>validated);
  const fmtTime=s=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?'0':''}${sec}`};
  const currentPhrase=phrases[phraseIdx]||"";

  /* ── Level picker ── */
  if(phase==="pick")return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 100px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:24}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:'linear-gradient(135deg,var(--coral)22,var(--coral))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',boxShadow:'0 8px 32px rgba(248,113,113,.2)'}}>
            {I.zap({size:24,sw:1.6,style:{color:'#fff'}})}
          </div>
          <h1 className="heading" style={{fontSize:26,marginBottom:6}}>Challenge Diction</h1>
          <p className="body" style={{fontSize:12}}>60 secondes. Un max de phrases. C'est parti.</p>
        </div>
        {/* Best scores */}
        {(st.challengeScores||{})[level]&&<p style={{fontSize:10,color:'var(--gold)',textAlign:'center',marginBottom:16}}>Votre record : {(st.challengeScores||{})[level]} phrases</p>}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {WARMUP_LEVELS.map(lv=>{
            const locked=st.xp<lv.unlockXP;
            const best=(st.challengeScores||{})[lv.id];
            const phraseCount=CHALLENGE_PHRASES[lv.id]?.length||0;
            return(
              <button key={lv.id} disabled={locked} onClick={()=>startChallenge(lv.id)}
                className="card obj-3d" style={{padding:18,display:'flex',alignItems:'center',gap:14,opacity:locked?.4:1,cursor:locked?'not-allowed':'pointer',textAlign:'left'}}>
                <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${lv.color}22,${lv.color}08)`,
                  border:`1.5px solid ${lv.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                  {locked?I.lock({size:20,sw:1.5}):<span className="emoji" style={{fontSize:'20px'}}>{lv.icon}</span>}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:700,color:locked?'var(--text-3)':'var(--text)'}}>{lv.name}</p>
                  <p style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{phraseCount} phrases · 60 secondes</p>
                  {best!=null&&<p style={{fontSize:9,color:'var(--gold)',marginTop:2,fontWeight:600}}>Record : {best} phrases</p>}
                  {locked&&<p style={{fontSize:9,color:lv.color,marginTop:3,fontWeight:600}}>{lv.unlockXP} XP requis</p>}
                </div>
                {I.zap({size:18,sw:1.4,style:{color:lv.color}})}
              </button>
            );
          })}
        </div>
        {/* Tier legend */}
        <div style={{marginTop:20,padding:14,borderRadius:10,background:'rgba(255,255,255,.02)',border:'1px solid var(--line)'}}>
          <p style={{fontSize:9,fontWeight:700,color:'var(--text-2)',marginBottom:8}}>Paliers</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {CHALLENGE_TIERS.filter(t=>t.min>0).map(t=>(
              <span key={t.name} style={{fontSize:8,padding:'3px 8px',borderRadius:6,border:`1px solid ${t.color}`,color:t.color,fontWeight:700}}>{t.min}+ = {t.name}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  /* ── Countdown 3-2-1 ── */
  if(phase==="countdown")return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <p style={{fontSize:80,fontWeight:900,color:'var(--gold)',animation:'fadeIn .3s ease-out'}}>{countdownVal}</p>
        <p style={{fontSize:14,color:'var(--text-2)',marginTop:8}}>Préparez-vous…</p>
      </div>
    </div>
  );

  /* ── Results ── */
  if(phase==="done"){
    const xpGain=Math.max(10,validated*8+(level==="avance"?20:level==="intermediaire"?10:0));
    const isNewRecord=!(st.challengeScores||{})[level]||validated>(st.challengeScores||{})[level];
    return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <Confetti count={validated>=12?50:validated>=8?30:validated>=5?15:0}/>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:80,height:80,borderRadius:'50%',background:`linear-gradient(135deg,${tier.color}30,${tier.color}10)`,border:`3px solid ${tier.color}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <p className="heading" style={{fontSize:32,color:tier.color}}>{validated}</p>
            </div>
            <h2 className="heading" style={{fontSize:24,marginBottom:4}}>{validated===0?"Essaie encore !":tier.name+" !"}</h2>
            <p style={{fontSize:12,color:'var(--text-2)'}}>{validated} phrase{validated!==1?"s":""} validée{validated!==1?"s":""} en 60 secondes</p>
            {isNewRecord&&validated>0&&<p style={{fontSize:11,color:'var(--gold)',fontWeight:700,marginTop:6}}>Nouveau record !</p>}
            <p className="heading gold-shimmer" style={{fontSize:18,marginTop:8}}>+{isNewRecord?xpGain:Math.round(xpGain/2)} XP</p>
            {nextTier&&<p style={{fontSize:10,color:'var(--text-3)',marginTop:8}}>Prochain palier : <span style={{color:nextTier.color,fontWeight:700}}>{nextTier.name}</span> ({nextTier.min} phrases)</p>}
          </div>
          {/* History */}
          {history.length>0&&<div style={{marginBottom:20}}>
            <p style={{fontSize:9,fontWeight:700,color:'var(--text-2)',marginBottom:8}}>Phrases validées :</p>
            {history.map((h,i)=>(
              <div key={i} style={{padding:'8px 10px',borderRadius:8,background:'rgba(74,222,128,.04)',border:'1px solid rgba(74,222,128,.1)',marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:'var(--emerald)',flexShrink:0}}>{I.check({size:12,sw:1.6})}</span>
                <p style={{fontSize:9,color:'var(--text)',flex:1,lineHeight:1.4}}>« {h.phrase} »</p>
                <span style={{fontSize:8,color:'var(--text-3)',flexShrink:0}}>{h.time}s</span>
              </div>
            ))}
          </div>}
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>startChallenge(level)} className="btn-gold" style={{flex:1,padding:'14px 0',fontSize:13}}>Rejouer</button>
            <button onClick={onClose} style={{flex:1,padding:'14px 0',fontSize:13,borderRadius:12,border:'1px solid var(--line)',background:'var(--bg-card)',color:'var(--text)',cursor:'pointer'}}>Terminer</button>
          </div>
        </div>
          <button onClick={async()=>{const sc=validated+'/'+phrases.length;const txt='Je viens de scorer '+sc+' au Challenge Diction sur Castigat Academy ! Tu peux faire mieux ? Essaie ici : https://castigat-academy.vercel.app';if(navigator.share){try{await navigator.share({title:'Challenge Diction - Castigat Academy',text:txt})}catch(e){}}else{try{await navigator.clipboard.writeText(txt);alert('Lien copié !')}catch(e){alert(txt)}}}} style={{width:'100%',padding:'14px 0',fontSize:13,fontWeight:700,color:'var(--violet)',borderRadius:10,background:'rgba(109,40,217,.08)',border:'1px solid rgba(109,40,217,.2)',cursor:'pointer',marginTop:10,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{I.share2({size:15})} Défie un ami</button>
      </div>
    );
  }

  /* ── Active game ── */
  const pctTime=timeLeft/60;
  const timerColor=timeLeft<=10?'var(--coral)':timeLeft<=30?'var(--gold)':'var(--emerald)';
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:'20px 20px 40px'}}>
      <div className="mw">
        {/* Timer bar */}
        <div style={{marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:28,fontWeight:900,color:timerColor,fontVariantNumeric:'tabular-nums'}}>{fmtTime(timeLeft)}</span>
            <div style={{textAlign:'right'}}>
              <p style={{fontSize:24,fontWeight:900,color:'var(--text)'}}>{validated}</p>
              <p style={{fontSize:8,color:'var(--text-3)',fontWeight:600}}>phrase{validated!==1?"s":""}</p>
            </div>
          </div>
          <div style={{height:4,borderRadius:2,background:'rgba(255,255,255,.06)',overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:2,width:(pctTime*100)+'%',background:timerColor,transition:'width 1s linear'}}/>
          </div>
        </div>

        {/* Current tier */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:16}}>
          <span style={{fontSize:9,fontWeight:700,color:tier.color,padding:'3px 10px',borderRadius:6,border:`1px solid ${tier.color}`,background:`${tier.color}10`}}>{tier.name}</span>
          {nextTier&&<span style={{fontSize:8,color:'var(--text-3)'}}>→ {nextTier.name} dans {nextTier.min-validated}</span>}
        </div>

        {/* Phrase number */}
        <p style={{fontSize:9,color:'var(--text-3)',textAlign:'center',marginBottom:8,fontWeight:600}}>Phrase {phraseIdx+1} / {phrases.length}</p>

        {/* Phrase to say */}
        <div style={{padding:24,borderRadius:16,background:'rgba(255,255,255,.03)',border:'1px solid var(--line)',textAlign:'center',marginBottom:16,minHeight:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div>
            <p style={{fontSize:16,fontWeight:700,color:'var(--text)',lineHeight:1.6}}>
              {wordResults.length>0?wordResults.map((w,i)=>(
                <span key={i} style={{color:w.status==="correct"?'var(--emerald)':w.status==="wrong"?'var(--coral)':'var(--text)',transition:'color .2s'}}>{w.word} </span>
              )):`« ${currentPhrase} »`}
            </p>
          </div>
        </div>

        {/* Mic status */}
        <div style={{textAlign:'center',marginBottom:16}}>
          {listening&&<div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:20,background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.15)'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'var(--emerald)',animation:'pulse 1.5s infinite'}}/>
            <span style={{fontSize:10,color:'var(--emerald)',fontWeight:600}}>Parlez maintenant</span>
          </div>}
          {micError&&<p style={{fontSize:10,color:'var(--coral)',marginTop:8}}>{micError}</p>}
          {transcript&&<p style={{fontSize:9,color:'var(--text-3)',marginTop:10,fontStyle:'italic',maxWidth:300,margin:'10px auto 0'}}>« {transcript} »</p>}
        </div>

        {/* Action buttons */}
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <button onClick={()=>{SFX.tap();consumedRef.current=fullTextRef.current.length;const newV=validatedRef.current+1;validatedRef.current=newV;setValidated(newV);setHistory(h=>[...h,{phrase:currentPhrase,success:true,time:60-timeRef.current}]);let nextIdx=phraseRef.current+1;if(nextIdx>=phrases.length)nextIdx=0;phraseRef.current=nextIdx;setPhraseIdx(nextIdx);setTranscript("");setWordResults([]);}}
            className="btn-gold" style={{flex:1,padding:'14px 0',fontSize:13,borderRadius:12}}>
            C'est dit !
          </button>
          <button onClick={()=>{consumedRef.current=fullTextRef.current.length;setHistory(h=>[...h,{phrase:currentPhrase,success:false,time:60-timeRef.current}]);let nextIdx=phraseRef.current+1;if(nextIdx>=phrases.length)nextIdx=0;phraseRef.current=nextIdx;setPhraseIdx(nextIdx);setTranscript("");setWordResults([]);}}
            style={{flex:1,padding:'14px 0',fontSize:13,borderRadius:12,border:'1px solid var(--line)',background:'var(--bg-card)',color:'var(--text-3)',cursor:'pointer'}}>
            Passer
          </button>
        </div>
        <button onClick={()=>{stopListening();setPhase("done")}} style={{width:'100%',padding:'10px 0',fontSize:10,color:'var(--text-3)',cursor:'pointer'}}>Arrêter le challenge</button>
      </div>
    </div>
  );
}

/* ═══ AVANT-SCÈNE ═══ */
function AvantScene({onClose,st}){
  const[format,setFormat]=useState(null);/* null=picker */
  const[modIdx,setModIdx]=useState(0);
  const[phase,setPhase]=useState("active");/* active, done */
  const[breathPhase,setBreathPhase]=useState("in");/* in, out */
  const[breathTimer,setBreathTimer]=useState(0);
  const[breathTotal,setBreathTotal]=useState(0);
  const[bodyStep,setBodyStep]=useState(0);
  const[visuStep,setVisuStep]=useState(0);
  const[mantraIdx]=useState(()=>Math.floor(Math.random()*AVANTSCENE_MANTRAS.length));
  const[sessionTime,setSessionTime]=useState(0);
  const[detenteIdx,setDetenteIdx]=useState(0);
  const[textFade,setTextFade]=useState(true);/* text fade-in animation trigger */
  const[musicOn,setMusicOn]=useState(false);
  const[immersionPhase,setImmersionPhase]=useState("intro");/* intro, breathing, affirmations */
  const[immersionBreathCount,setImmersionBreathCount]=useState(0);
  const[showYFIntro,setShowYFIntro]=useState(true);/* show intro screen for yeux fermés */
  const[showIntroDur,setShowIntroDur]=useState(false);/* introspection duration picker */
  const ambientRef=useRef(null);
  const ambientGainRef=useRef(null);

  const fmt=AVANTSCENE_FORMATS.find(f=>f.id===format);
  const modules=fmt?fmt.modules:[];
  const currentMod=modules[modIdx];
  const isConnexion=format?.startsWith("introspection")||format?.startsWith("connexion");

  /* Ambient music — warm harmonic drone using Web Audio API */
  const startAmbient=()=>{
    if(ambientRef.current)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(ctx.state==='suspended')ctx.resume();
      const master=ctx.createGain();master.gain.value=0;master.connect(ctx.destination);
      const freqs=[136.1,174,220,261.6];
      const oscs=freqs.map((f,i)=>{
        const o=ctx.createOscillator();o.type=i<2?"sine":"triangle";o.frequency.value=f;
        const g=ctx.createGain();g.gain.value=i<2?0.12:0.06;
        o.connect(g);return{o,g};
      });
      const lfo=ctx.createOscillator();lfo.type="sine";lfo.frequency.value=0.15;
      const lfoGain=ctx.createGain();lfoGain.gain.value=0.02;
      lfo.connect(lfoGain);
      const filter=ctx.createBiquadFilter();filter.type="lowpass";filter.frequency.value=800;filter.Q.value=0.7;
      oscs.forEach(({o,g})=>{g.connect(filter);lfoGain.connect(g.gain);o.start()});
      lfo.start();
      filter.connect(master);
      master.gain.linearRampToValueAtTime(0.55,ctx.currentTime+4);
      ambientRef.current=ctx;ambientGainRef.current=master;
      setMusicOn(true);
    }catch(e){console.log("Audio context error",e)}
  };
  const stopAmbient=()=>{
    if(!ambientRef.current)return;
    try{
      if(ambientGainRef.current)ambientGainRef.current.gain.linearRampToValueAtTime(0,ambientRef.current.currentTime+3);
      setTimeout(()=>{try{ambientRef.current.close()}catch(e){}ambientRef.current=null;ambientGainRef.current=null},3500);
    }catch(e){ambientRef.current=null}
    setMusicOn(false);
  };

  /* Cleanup ambient on unmount */
  useEffect(()=>{return()=>{stopAmbient()}},[]);

  /* Session timer */
  useEffect(()=>{
    if(!format||phase==="done")return;
    const iv=setInterval(()=>setSessionTime(t=>t+1),1000);
    return()=>clearInterval(iv);
  },[format,phase]);

  /* Start ambient for immersive modules */
  useEffect(()=>{
    if(isConnexion&&currentMod==="breathing")startAmbient();
    if(currentMod==="detente"||currentMod==="immersion"||currentMod==="immersion_short")startAmbient();
    if(currentMod!=="detente"&&currentMod!=="immersion"&&currentMod!=="immersion_short"&&currentMod!=="breathing"&&currentMod!=="mantra"&&currentMod!=="visu"){stopAmbient()}
  },[currentMod]);

  /* Breathing animation */
  const br=AVANTSCENE_BREATHING[0];
  useEffect(()=>{
    if(currentMod!=="breathing")return;
    const cycle=br.inSec+br.outSec;
    const iv=setInterval(()=>{
      setBreathTotal(t=>{
        const nt=t+1;
        const pos=nt%cycle;
        setBreathPhase(pos<br.inSec?"in":"out");
        setBreathTimer(pos<br.inSec?pos:pos-br.inSec);
        return nt;
      });
    },1000);
    return()=>clearInterval(iv);
  },[currentMod,br]);

  /* Immersion module: 10 breaths then auto-advance */
  const immersionTarget=currentMod==="immersion_short"?5:10;
  useEffect(()=>{
    if(currentMod!=="immersion"&&currentMod!=="immersion_short")return;
    startAmbient();
    setImmersionPhase("breathing");setImmersionBreathCount(0);setBreathTotal(0);
    const cycle=br.inSec+br.outSec;
    const target=currentMod==="immersion_short"?5:10;
    const iv=setInterval(()=>{
      setBreathTotal(t=>{
        const nt=t+1;
        const pos=nt%cycle;
        setBreathPhase(pos<br.inSec?"in":"out");
        setBreathTimer(pos<br.inSec?pos:pos-br.inSec);
        if(pos===0&&nt>0)setImmersionBreathCount(c=>{
          const nc=c+1;
          if(nc>=target){
            /* Short: go straight to next module. Long: show affirmations inline */
            if(currentMod==="immersion_short")setTimeout(()=>nextModule(),1500);
            else setImmersionPhase("affirmations");
          }
          return nc;
        });
        return nt;
      });
    },1000);
    return()=>clearInterval(iv);
  },[currentMod]);

  /* Immersion affirmations auto-advance (only for full immersion) */
  useEffect(()=>{
    if(currentMod!=="immersion"||immersionPhase!=="affirmations")return;
    let cancelled=false;
    setDetenteIdx(0);setTextFade(true);
    const run=async()=>{
      await new Promise(r=>setTimeout(r,2000));
      for(let i=0;i<AVANTSCENE_AFFIRMATIONS.length;i++){
        if(cancelled)break;
        setTextFade(false);
        await new Promise(r=>setTimeout(r,400));
        setDetenteIdx(i);setTextFade(true);
        await new Promise(r=>setTimeout(r,8000));
      }
    };
    run();
    return()=>{cancelled=true};
  },[immersionPhase,currentMod]);

  /* Détente module: auto-advance affirmations with long pauses */
  useEffect(()=>{
    if(currentMod!=="detente")return;
    let cancelled=false;
    setDetenteIdx(0);setTextFade(true);
    const run=async()=>{
      await new Promise(r=>setTimeout(r,3000));/* let music settle */
      for(let i=0;i<AVANTSCENE_AFFIRMATIONS.length;i++){
        if(cancelled)break;
        setTextFade(false);
        await new Promise(r=>setTimeout(r,300));
        setDetenteIdx(i);setTextFade(true);
        /* Long pause: 8s to read + absorb + breathe */
        await new Promise(r=>setTimeout(r,8000));
      }
    };
    run();
    return()=>{cancelled=true};
  },[currentMod]);

  /* Yeux fermés: auto-advance visu steps with slow, immersive rhythm */
  useEffect(()=>{
    if(!isConnexion||currentMod!=="visu")return;
    let cancelled=false;
    const run=async()=>{
      for(let i=0;i<AVANTSCENE_VISU.length;i++){
        if(cancelled)break;
        setTextFade(false);
        await new Promise(r=>setTimeout(r,1200));/* slow fade out */
        setVisuStep(i);setTextFade(true);
        await new Promise(r=>setTimeout(r,16000));/* 16s per step — time to absorb */
      }
      if(!cancelled){setTextFade(false);await new Promise(r=>setTimeout(r,1500));nextModule();}
    };
    run();
    return()=>{cancelled=true};
  },[currentMod,isConnexion]);

  const nextModule=()=>{
    if(modIdx<modules.length-1){setModIdx(modIdx+1);setBodyStep(0);setVisuStep(0)}
    else{setPhase("done");SFX.success()}
  };

  const fmtTime=s=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?'0':''}${sec}`};

  /* Connexion intro screen */
  if(isConnexion&&showYFIntro) return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 60px'}}>
      <div className="mw">
        <button onClick={()=>{setFormat(null);setShowYFIntro(true)}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:24}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div className="emoji" style={{fontSize:40,marginBottom:16}}>🌙</div>
          <h1 className="heading" style={{fontSize:24,marginBottom:8}}>Introspection</h1>
          <p className="body" style={{fontSize:12,color:'var(--text-2)',lineHeight:1.7}}>Un moment rien que pour vous, en musique.</p>
        </div>
        <div style={{padding:24,borderRadius:16,background:'rgba(167,139,250,.04)',border:'1px solid rgba(167,139,250,.12)',marginBottom:24}}>
          <p className="label" style={{color:'var(--violet)',marginBottom:14}}>DÉROULEMENT</p>
          {(()=>{
            const steps=[];let n=1;
            steps.push({num:n++,bg:'rgba(74,222,128,.1)',border:'rgba(74,222,128,.2)',title:(format==="introspection_5"?"5":"10")+" respirations",desc:"Le cercle pulse doucement. Inspirez, expirez. La musique vous enveloppe."});
            if(format!=="introspection_5")steps.push({num:n++,bg:'rgba(167,139,250,.1)',border:'rgba(167,139,250,.2)',title:"Affirmations du comédien",desc:"Des phrases pour vous. Ouvrez les yeux pour lire, refermez-les pour absorber."});
            steps.push({num:n++,bg:'rgba(200,164,78,.1)',border:'rgba(200,164,78,.2)',title:"Visualisation",desc:"Un voyage mental sur scène. Les images défilent. Vous êtes là où vous devez être."});
            if(format==="introspection_20")steps.push({num:n++,bg:'rgba(200,164,78,.1)',border:'rgba(200,164,78,.2)',title:"Mantra",desc:"Une phrase à emporter avec vous. Lisez-la, répétez-la, laissez-la résonner."});
            return(
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                {steps.map(s=>(
                  <div key={s.num} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                    <div style={{width:28,height:28,borderRadius:8,background:s.bg,border:'1px solid '+s.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0}}>{s.num}</div>
                    <div>
                      <p style={{fontSize:12,fontWeight:700,marginBottom:2}}>{s.title}</p>
                      <p style={{fontSize:10,color:'var(--text-3)',lineHeight:1.5}}>{s.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
        <div style={{padding:16,borderRadius:12,background:'rgba(200,164,78,.03)',border:'1px solid rgba(200,164,78,.08)',marginBottom:28,textAlign:'center'}}>
          <p style={{fontSize:11,color:'var(--text-2)',lineHeight:1.6}}>Mettez vos écouteurs. Installez-vous confortablement.</p>
        </div>
        <button onClick={()=>setShowYFIntro(false)} className="btn-gold" style={{width:'100%',padding:'16px 0',fontSize:14,fontWeight:700}}>
          Je suis prêt·e
        </button>
      </div>
    </div>
  );

  /* Format picker */
  if(!format) return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 60px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:24}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',position:'relative',zIndex:2,marginBottom:24}}>
          <h1 className="heading hero-text" style={{fontSize:26,marginBottom:6}}>Avant-Scène</h1>
          <p className="body hero-text hero-text-d1" style={{fontSize:12}}>Votre rituel de préparation avant représentation</p>
        </div>
        <p className="label" style={{marginBottom:10}}>CHOISISSEZ VOTRE FORMAT</p>
        {(()=>{
          const mainFormats=AVANTSCENE_FORMATS.filter(f=>!f.group);
          const introFormats=AVANTSCENE_FORMATS.filter(f=>f.group==="introspection");
          const colors=[
            {bg:'linear-gradient(135deg,var(--gold-dim),var(--gold))',label:'var(--gold)'},
            {bg:'linear-gradient(135deg,var(--violet-dim),var(--violet))',label:'var(--violet)'},
            {bg:'linear-gradient(135deg,var(--coral),#e8977f)',label:'var(--coral)'},
          ];
          return(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {mainFormats.map((f,i)=>{
                const c=colors[i%colors.length];
                return(
                  <button key={f.id} onClick={()=>setFormat(f.id)} className="card obj-3d"
                    style={{padding:18,display:'flex',alignItems:'center',gap:14,textAlign:'left'}}>
                    <div style={{width:44,height:44,borderRadius:12,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <span style={{fontSize:'20px',filter:'grayscale(1) brightness(10)'}}>{f.icon}</span>
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:14,fontWeight:700}}>{f.name}</p>
                      <p style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{f.dur} · {f.modules.length} étapes</p>
                    </div>
                    {I.chR({size:16,style:{color:'var(--text-3)'}})}
                  </button>
                );
              })}
              {/* Introspection — single card that expands to duration choices */}
              <button onClick={()=>setShowIntroDur(!showIntroDur)} className="card obj-3d"
                style={{padding:18,display:'flex',alignItems:'center',gap:14,textAlign:'left'}}>
                <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#1a1a3a,#2a2a4a)',border:'1px solid rgba(167,139,250,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:'20px',filter:'grayscale(1) brightness(10)'}}>🌙</span>
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:700}}>Introspection</p>
                  <p style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>Immersion, visualisation, recentrage</p>
                </div>
                <span style={{color:'var(--text-3)',fontSize:12,transition:'transform .3s',transform:showIntroDur?'rotate(90deg)':'rotate(0)'}}>▸</span>
              </button>
              {showIntroDur&&(
                <div style={{display:'flex',gap:8,paddingLeft:8,animation:'fadeUp .3s ease-out'}}>
                  {introFormats.map(f=>(
                    <button key={f.id} onClick={()=>setFormat(f.id)} className="card"
                      style={{flex:1,padding:'14px 10px',textAlign:'center',background:'linear-gradient(160deg,rgba(167,139,250,.06),var(--bg-card))',border:'1px solid rgba(167,139,250,.12)'}}>
                      <p style={{fontSize:16,fontWeight:800,color:'var(--violet)',marginBottom:2}}>{f.dur}</p>
                      <p style={{fontSize:8,color:'var(--text-3)'}}>{f.modules.length} étapes</p>
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })()}
        {/* Mantras preview */}
        <div style={{marginTop:24,padding:18,borderRadius:14,background:'rgba(200,164,78,.03)',border:'1px solid var(--line)'}}>
          <p className="label-gold" style={{marginBottom:8}}>MANTRA DU JOUR</p>
          <p className="heading-light" style={{fontSize:14,fontStyle:'italic',lineHeight:1.6}}>« {AVANTSCENE_MANTRAS[new Date().getDay()%AVANTSCENE_MANTRAS.length].text} »</p>
          <p style={{fontSize:9,color:'var(--text-3)',marginTop:6}}>— {AVANTSCENE_MANTRAS[new Date().getDay()%AVANTSCENE_MANTRAS.length].author}</p>
        </div>
      </div>
    </div>
  );

  /* Done */
  if(phase==="done") return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
      <div className="mw" style={{textAlign:'center'}}>
        <Confetti count={30}/>
        <div style={{marginTop:40,marginBottom:20}}>
          <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 12px 40px rgba(200,164,78,.3)'}}>
            {I.check({size:32,sw:2.5,style:{color:'#07070b'}})}
          </div>
          <h2 className="heading" style={{fontSize:24,marginBottom:6}}>Vous êtes prêt·e</h2>
          <p className="body" style={{fontSize:12,marginBottom:4}}>Préparation {fmt.name} terminée</p>
          <p style={{fontSize:11,color:'var(--gold)',fontWeight:600}}>{fmtTime(sessionTime)} de préparation</p>
        </div>
        <div style={{padding:18,borderRadius:14,background:'rgba(200,164,78,.03)',border:'1px solid var(--line)',marginBottom:24}}>
          <p className="heading-light" style={{fontSize:15,fontStyle:'italic',lineHeight:1.6}}>« {AVANTSCENE_MANTRAS[mantraIdx].text} »</p>
          <p style={{fontSize:9,color:'var(--text-3)',marginTop:8}}>— {AVANTSCENE_MANTRAS[mantraIdx].author}</p>
        </div>
        <button onClick={onClose} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13}}>Retour</button>
      </div>
    </div>
  );

  /* Active module rendering */
  return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
      <div className="mw">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <button onClick={()=>{if(modIdx>0){setModIdx(modIdx-1);setBodyStep(0);setVisuStep(0)}else{setFormat(null)}}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12}}>{I.chL({size:16})} {modIdx>0?"Précédent":"Retour"}</button>
          <span style={{fontSize:10,color:'var(--gold)',fontWeight:600}}>{fmtTime(sessionTime)}</span>
          <button onClick={onClose} style={{fontSize:10,color:'var(--text-3)'}}>Quitter ✕</button>
        </div>
        {/* Music toggle */}
        <button onClick={()=>{if(musicOn)stopAmbient();else startAmbient()}} style={{display:'flex',alignItems:'center',gap:8,margin:'0 auto 14px',padding:'8px 16px',borderRadius:20,background:musicOn?'rgba(167,139,250,.08)':'var(--bg-card)',border:'1px solid '+(musicOn?'rgba(167,139,250,.3)':'var(--line)'),cursor:'pointer',transition:'all .3s'}}>
          {I.headphones({size:14,sw:1.5,style:{color:musicOn?'var(--violet)':'var(--text-3)'}})}
          <span style={{fontSize:10,fontWeight:600,color:musicOn?'var(--violet)':'var(--text-3)'}}>{musicOn?"Musique activée":"Activer la musique"}</span>
          <div style={{width:28,height:16,borderRadius:8,background:musicOn?'var(--violet)':'rgba(255,255,255,.1)',padding:2,transition:'all .3s',display:'flex',alignItems:'center',justifyContent:musicOn?'flex-end':'flex-start'}}>
            <div style={{width:12,height:12,borderRadius:6,background:musicOn?'#fff':'rgba(255,255,255,.3)',transition:'all .3s'}}/>
          </div>
        </button>
        <Bar val={modIdx} max={modules.length} cls="fill-gold" h={3}/>
        <p style={{fontSize:8,color:'var(--text-3)',marginTop:4,textAlign:'right'}}>Étape {modIdx+1} / {modules.length}</p>

        {/* BREATHING */}
        {currentMod==="breathing"&&(
          <div style={{textAlign:'center',marginTop:20}}>
            <h2 className="heading" style={{fontSize:20,marginBottom:4}}>{br.name}</h2>
            <p className="body" style={{fontSize:11,marginBottom:8,color:'var(--text-2)'}}>{br.desc}</p>
            <p style={{fontSize:10,fontStyle:'italic',color:'var(--text-3)',marginBottom:28}}>Fermez les yeux. Suivez le rythme.</p>
            <div style={{position:'relative',width:200,height:200,margin:'0 auto 24px'}}>
              {/* Outer glow ring */}
              <div style={{position:'absolute',inset:-10,borderRadius:'50%',background:breathPhase==="in"?'radial-gradient(circle,rgba(74,222,128,.08) 0%,transparent 70%)':'radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 70%)',transition:'all 2s ease-in-out'}}/>
              {/* Main circle */}
              <div style={{width:200,height:200,borderRadius:'50%',
                background:breathPhase==="in"?'radial-gradient(circle,rgba(74,222,128,.1) 0%,rgba(74,222,128,.02) 100%)':'radial-gradient(circle,rgba(167,139,250,.1) 0%,rgba(167,139,250,.02) 100%)',
                border:`2px solid ${breathPhase==="in"?'rgba(74,222,128,.3)':'rgba(167,139,250,.3)'}`,
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',

              <div style={{padding:24,maxWidth:180,opacity:textFade?1:0,transition:'opacity 1.5s ease-in-out'}}>
                <p className="heading-light" style={{fontSize:14,fontStyle:'italic',lineHeight:1.8,color:'var(--text)',textAlign:'center'}}>
                  « {AVANTSCENE_AFFIRMATIONS[detenteIdx]} »
                </p>
              </div>
            </div>
            {/* Dots */}
            <div style={{display:'flex',gap:4,justifyContent:'center',marginBottom:24}}>
              {AVANTSCENE_AFFIRMATIONS.map((_,i)=>(
                <div key={i} style={{width:5,height:5,borderRadius:3,background:i===detenteIdx?'var(--violet)':i<detenteIdx?'rgba(167,139,250,.3)':'rgba(255,255,255,.06)',transition:'all .5s'}}/>

              <button onClick={()=>{if(detenteIdx<AVANTSCENE_AFFIRMATIONS.length-1)setDetenteIdx(detenteIdx+1)}} disabled={detenteIdx>=AVANTSCENE_AFFIRMATIONS.length-1} className="btn-outline" style={{padding:'8px 14px',fontSize:10,opacity:detenteIdx>=AVANTSCENE_AFFIRMATIONS.length-1?.3:1}}>→</button>
            </div>
            <button onClick={nextModule} className="btn-gold" style={{width:'100%',maxWidth:280,padding:'14px 0',fontSize:13}}>
              {modIdx<modules.length-1?"Étape suivante →":"Terminer"}
            </button>
          </div>

        {/* MANTRA */}
        {currentMod==="mantra"&&(
          <div style={{textAlign:'center',marginTop:30}}>
            <h2 className="heading" style={{fontSize:18,marginBottom:8,opacity:.6}}>Votre mantra</h2>
            <p style={{fontSize:10,fontStyle:'italic',color:'var(--text-3)',marginBottom:28}}>Lisez cette phrase à voix haute. Trois fois. Lentement. Laissez-la résonner en vous.</p>
            <div style={{padding:36,marginBottom:28,borderRadius:20,background:'radial-gradient(circle at center,rgba(200,164,78,.06) 0%,transparent 70%)',border:'1px solid rgba(200,164,78,.12)'}}>
              <p className="heading-light" style={{fontSize:20,fontStyle:'italic',lineHeight:1.9,color:'var(--text)',animation:'fadeIn 2s ease-out'}}>« {AVANTSCENE_MANTRAS[mantraIdx].text} »</p>
              <p style={{fontSize:10,color:'var(--text-3)',marginTop:14,letterSpacing:'.05em'}}>— {AVANTSCENE_MANTRAS[mantraIdx].author}</p>
            </div>
            <button onClick={nextModule} className="btn-gold" style={{width:'100%',maxWidth:280,padding:'14px 0',fontSize:13}}>
              {modIdx<modules.length-1?"Étape suivante →":"Terminer"}
            </button>
          </div>
        )}

        {/* VISUALISATION */}
        {currentMod==="visu"&&(
          <div style={{textAlign:'center',marginTop:10}}>
            <h2 className="heading" style={{fontSize:16,marginBottom:6,opacity:.4,letterSpacing:'.15em',fontWeight:600}}>VISUALISATION</h2>
            <p style={{fontSize:10,fontStyle:'italic',color:'var(--text-3)',marginBottom:36}}>Fermez les yeux. Lisez. Fermez-les à nouveau. Prenez votre temps.</p>

            {/* Immersive circle with glow */}
            <div style={{position:'relative',width:260,height:260,margin:'0 auto 28px'}}>
              {/* Outer glow */}
              <div style={{position:'absolute',inset:-30,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,164,78,.06) 0%,transparent 60%)',animation:'breatheCircle 8s ease-in-out infinite'}}/>
              {/* Inner ring */}
              <div style={{width:260,height:260,borderRadius:'50%',
                background:'radial-gradient(circle at center,rgba(200,164,78,.03) 0%,rgba(10,10,15,.5) 100%)',
                border:'1px solid rgba(200,164,78,.1)',
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 0 60px rgba(200,164,78,.04) inset',
                transition:'all 1.5s ease-in-out'}}>
                <div style={{padding:28,maxWidth:210,opacity:textFade?1:0,transition:'opacity 1.2s ease-in-out'}}>
                  <p style={{fontFamily:'Cormorant Garamond, serif',fontSize:15,lineHeight:2,fontStyle:'italic',color:'var(--text)',fontWeight:400,letterSpacing:'.01em'}}>
                    {AVANTSCENE_VISU[visuStep]}
                  </p>
                </div>
              </div>
            </div>

            {/* Soft progress dots */}
            <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:28}}>
              {AVANTSCENE_VISU.map((_,i)=>(
                <div key={i} style={{width:i===visuStep?16:6,height:6,borderRadius:3,background:i===visuStep?'var(--gold)':i<visuStep?'rgba(200,164,78,.25)':'rgba(255,255,255,.06)',transition:'all .8s ease'}}/>
              ))}
            </div>

            {visuStep<AVANTSCENE_VISU.length-1?(
              <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                {visuStep>0&&<button onClick={()=>{setTextFade(false);setTimeout(()=>{setVisuStep(visuStep-1);setTextFade(true)},800)}} className="btn-outline" style={{padding:'12px 20px',fontSize:12,opacity:.6}}>←</button>}
                <button onClick={()=>{setTextFade(false);setTimeout(()=>{setVisuStep(visuStep+1);setTextFade(true)},800)}} className="btn-outline" style={{padding:'12px 32px',fontSize:12}}>Suivant →</button>
              </div>
            ):(
              <button onClick={()=>{setTextFade(false);setTimeout(nextModule,1000)}} className="btn-gold" style={{width:'100%',maxWidth:280,padding:'14px 0',fontSize:13}}>
