  {id:"fm12",title:"Tartuffe — la séduction",source:"Molière — Tartuffe, Acte III, sc.3",text:"Le Ciel défend, de vrai, certains contentements ; mais on trouve avec lui des accommodements. Selon divers besoins, il est une science d'étendre les liens de notre conscience et de rectifier le mal de l'action avec la pureté de notre intention. De ces secrets, Madame, on saura vous instruire ; vous n'avez seulement qu'à vous laisser conduire. Contentez mon désir, et n'ayez point d'effroi : je vous réponds de tout, et prends le mal sur moi. Ah ! pour être dévot, je n'en suis pas moins homme ; et lorsqu'on vient à voir vos célestes appas, un cœur se laisse prendre, et ne raisonne pas. Je sais qu'un tel discours de moi paraît étrange ; mais, Madame, après tout, je ne suis pas un ange.",tier:"debutant",difficulty:1,genre:"homme",tips:"Tartuffe détourne le langage religieux pour séduire. Jouez la douceur onctueuse, la fausse piété. Le danger est sous le miel. Chaque argument théologique est un pas de plus vers Elmire."},
  {id:"fm19",title:"Sganarelle — le tabac",source:"Molière — Dom Juan, Acte I, sc.1",text:"Quoi que puisse dire Aristote et toute la Philosophie, il n'est rien d'égal au tabac : c'est la passion des honnêtes gens, et qui vit sans tabac n'est pas digne de vivre. Non seulement il réjouit et purge les cerveaux humains, mais encore il instruit les âmes à la vertu, et l'on apprend avec lui à devenir honnête homme. Ne voyez-vous pas bien, dès qu'on en prend, de quelle manière obligeante on en use avec tout le monde, et comme on est ravi d'en donner à droit et à gauche, partout où l'on se trouve ? On n'attend pas même qu'on en demande, et l'on court au-devant du souhait des gens : tant il est vrai que le tabac inspire des sentiments d'honneur et de vertu à tous ceux qui en prennent.",tier:"debutant",difficulty:1,genre:"homme",tips:"C'est un éloge absurde prononcé avec un sérieux total. Le comique vient du décalage entre la grandiloquence du ton et la trivialité du sujet. Sganarelle est convaincu de chaque mot."},
  {id:"fm21",title:"Argan — le malade",source:"Molière — Le Malade imaginaire, Acte I, sc.1",text:"Trois et deux font cinq, et cinq font dix, et dix font vingt. Soixante-trois livres quatre sols six deniers. Si bien donc que de ce mois j'ai pris une, deux, trois, quatre, cinq, six, sept et huit médecines ; et un, deux, trois, quatre, cinq, six, sept, huit, neuf, dix, onze et douze lavements ; et l'autre mois il y avait douze médecines et vingt lavements. Je ne m'étonne pas si je ne me porte pas si bien ce mois-ci que l'autre. Je le dirai à Monsieur Purgon, afin qu'il mette ordre à cela. Allons, qu'on m'ôte tout ceci. Il n'y a personne : j'ai beau dire, on me laisse toujours seul ; il n'y a pas moyen de les arrêter ici. Drelin, drelin, drelin : point d'affaire. Drelin, drelin, drelin : ils sont sourds. Toinette ! Drelin, drelin, drelin : tout comme si je ne sonnais point. Chienne, coquine ! Drelin, drelin, drelin : j'enrage.",tier:"debutant",difficulty:1,genre:"homme",tips:"Argan compte ses médicaments avec l'obsession d'un avare comptant son or. C'est à la fois pathétique et hilarant. Le corps est celui d'un homme persuadé d'être mourant. Les 'drelin' sont de plus en plus rageurs."},
  {id:"fm17",title:"Scapin — la galère",source:"Molière — Les Fourberies de Scapin, Acte II, sc.7",text:"Que diable allait-il faire dans cette galère ? Ah, maudite galère ! Traître de Turc à tous les diables ! Il faut, Seigneur Géronte, il faut que vous fassiez vite, il ne m'a donné que deux heures. Songez que cinq cents écus ce n'est rien au prix de votre fils. Et, comme je vous disais, il ne faut pas un sou de plus, et si vous n'allez quérir cette somme, votre fils sera emmené en Alger. Que diable allait-il faire dans cette galère ? Mais songez, Monsieur, que le temps presse, et que vous courez risque de perdre votre fils. Hélas ! mon pauvre maître, peut-être que je ne te verrai de ma vie, et qu'à l'heure que je parle, on t'emmène esclave en Alger. Que diable allait-il faire dans cette galère ?",tier:"debutant",difficulty:1,genre:"homme",tips:"Scapin joue la comédie à Géronte. C'est du théâtre dans le théâtre. Exagérez le désespoir — le public sait que c'est faux et c'est ça qui est drôle. Le refrain 'Que diable allait-il faire dans cette galère ?' revient comme un gag."},
  {id:"fm23",title:"Alceste — la sincérité",source:"Molière — Le Misanthrope, Acte I, sc.1",text:"Je veux qu'on soit sincère, et qu'en homme d'honneur on ne lâche aucun mot qui ne parte du cœur. Non, je ne puis souffrir cette lâche méthode qu'affectent la plupart de vos gens à la mode ; et je ne hais rien tant que les contorsions de tous ces grands faiseurs de protestations, ces affables donneurs d'embrassades frivoles, ces obligeants diseurs d'inutiles paroles, qui de civilités avec tous font combat, et traitent du même air l'honnête homme et le fat. Quel avantage a-t-on qu'un homme vous caresse, vous jure amitié, foi, zèle, estime, tendresse, et vous fasse de vous un éloge éclatant, lorsqu'au premier faquin il court en faire autant ? Moi, je veux me fâcher, et ne veux point entendre.",tier:"debutant",difficulty:1,genre:"homme",tips:"Alceste est un idéaliste furieux. Sa colère est sincère mais aussi comique — il est le seul à ne pas voir l'ironie de sa position. Jouez la conviction absolue. Chaque exemple l'énerve davantage."},
  {id:"fm2",title:"Cyrano — la tirade du nez",source:"Rostand — Cyrano de Bergerac, Acte I, sc.4",text:"Ah ! non ! c'est un peu court, jeune homme ! On pouvait dire... Oh ! Dieu !... bien des choses en somme... En variant le ton, par exemple, tenez : Agressif : « Moi, monsieur, si j'avais un tel nez, il faudrait sur-le-champ que je me l'amputasse ! » Amical : « Mais il doit tremper dans votre tasse ! Pour boire, faites-vous fabriquer un hanap ! » Descriptif : « C'est un roc !... c'est un pic !... c'est un cap ! Que dis-je, c'est un cap ?... C'est une péninsule ! » Gracieux : « Aimez-vous à ce point les oiseaux que paternellement vous vous préoccupâtes de tendre ce perchoir à leurs petites pattes ? » Truculent : « Çà, monsieur, lorsque vous pétunez, la vapeur du tabac vous sort-elle du nez sans qu'un voisin ne crie au feu de cheminée ? » Prévenant : « Gardez-vous, votre tête entraînée par ce poids, de tomber en avant sur le sol ! » Voilà ce qu'à peu près, mon cher, vous m'auriez dit si vous aviez un peu de lettres et d'esprit.",tier:"debutant",difficulty:1,genre:"homme",tips:"L'humour masque la blessure. Cyrano attaque avant qu'on l'attaque. Chaque registre a son ton propre — changez de voix, de posture. Le panache est l'armure de la douleur."},
  {id:"fm4",title:"Hamlet — être ou ne pas être",source:"Shakespeare (trad.) — Hamlet, Acte III, sc.1",text:"Être, ou ne pas être, c'est là la question. Y a-t-il plus de noblesse d'âme à subir la fronde et les flèches de la fortune outrageante, ou bien à s'armer contre une mer de douleurs et à l'arrêter par une révolte ? Mourir... dormir, rien de plus ; et dire que par ce sommeil nous mettons fin aux maux du cœur et aux mille tortures naturelles qui sont le lot de la chair : c'est là un dénouement qu'on doit souhaiter avec ferveur. Mourir... dormir, dormir ! peut-être rêver ! Oui, là est l'obstacle ; car quels rêves peut-il nous venir dans ce sommeil de la mort, quand nous sommes débarrassés de l'étreinte de cette vie ? Voilà qui doit nous arrêter. C'est cette réflexion-là qui nous vaut la calamité d'une si longue existence.",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Ce n'est pas une déclamation — c'est une réflexion intime à voix haute. Hamlet pense en temps réel. Laissez les silences vivre. Chaque pensée en entraîne une autre, comme un esprit qui tourne en boucle."},
  {id:"fm6",title:"Dom Juan — l'hypocrisie",source:"Molière — Dom Juan, Acte V, sc.2",text:"L'hypocrisie est un vice à la mode, et tous les vices à la mode passent pour vertus. Le personnage d'homme de bien est le meilleur de tous les personnages qu'on puisse jouer aujourd'hui, et la profession d'hypocrite a de merveilleux avantages. C'est un art de qui l'imposture est toujours respectée ; et quoiqu'on la découvre, on n'ose rien dire contre elle. Tous les autres vices des hommes sont exposés à la censure, et chacun a la liberté de les attaquer hautement ; mais l'hypocrisie est un vice privilégié, qui, de sa main, ferme la bouche à tout le monde, et jouit en repos d'une impunité souveraine. On lie, à force de grimaces, une société étroite avec tous les gens du parti. Qui en choque un, se les jette tous sur les bras ; et ceux que l'on sait même agir de bonne foi là-dessus, et que chacun connaît pour être véritablement touchés, ceux-là, dis-je, sont toujours les dupes des autres.",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Dom Juan jubile. C'est un manifeste cynique livré avec charme et intelligence. Le sourire ne quitte jamais les yeux. Il dévoile les rouages du monde avec un plaisir presque enfantin."},
  {id:"fm11",title:"Le Cid — les stances",source:"Corneille — Le Cid, Acte I, sc.6",text:"Percé jusques au fond du cœur d'une atteinte imprévue aussi bien que mortelle, misérable vengeur d'une juste querelle, et malheureux objet d'une injuste rigueur, je demeure immobile, et mon âme abattue cède au coup qui me tue. Si près de voir mon feu récompensé, ô Dieu, l'étrange peine ! En cet affront mon père est l'offensé, et l'offenseur le père de Chimène ! Que je sens de rudes combats ! Contre mon propre honneur mon amour s'intéresse : il faut venger un père, et perdre une maîtresse. L'un m'anime le cœur, l'autre retient mon bras. Réduit au triste choix ou de trahir ma flamme, ou de vivre en infâme, des deux côtés mon mal est infini. Ô Dieu, l'étrange peine ! Faut-il laisser un affront impuni ? Faut-il punir le père de Chimène ?",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Rodrigue est déchiré entre l'honneur et l'amour. Chaque vers est un balancement entre les deux. Le conflit intérieur doit se lire physiquement. Les stances sont un vrai monologue intérieur — pas un discours, une torture."},
  {id:"fm15",title:"Figaro — le monologue",source:"Beaumarchais — Le Mariage de Figaro, Acte V, sc.3",text:"Non, Monsieur le Comte, vous ne l'aurez pas... vous ne l'aurez pas. Parce que vous êtes un grand Seigneur, vous vous croyez un grand génie !... Noblesse, fortune, un rang, des places, tout cela rend si fier ! Qu'avez-vous fait pour tant de biens ? Vous vous êtes donné la peine de naître, et rien de plus. Du reste, homme assez ordinaire ! Tandis que moi, morbleu ! perdu dans la foule obscure, il m'a fallu déployer plus de science et de calculs pour subsister seulement, qu'on n'en a mis depuis cent ans à gouverner toutes les Espagnes : et vous voulez jouter... On imprime mes idées, et voilà ma liberté supprimée ! Il s'élève une question sur la nature des richesses ; et, comme il n'est pas nécessaire de tenir les choses pour en raisonner, n'ayant pas un sou, j'écris sur la valeur de l'argent et sur son produit net : aussitôt je vois, du fond d'un fiacre, baisser pour moi le pont d'un château fort. Que je voudrais bien tenir un de ces puissants de quatre jours, si légers sur le mal qu'ils ordonnent !",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Figaro parle au nom de tous les opprimés. C'est un discours politique autant qu'intime. L'ironie est l'arme du faible contre le puissant. Le rythme s'accélère avec la colère."},
  {id:"fm20",title:"Titus — le sacrifice",source:"Racine — Bérénice, Acte IV, sc.4",text:"Eh bien ! Titus, que viens-tu faire ? Bérénice t'attend. Où viens-tu, téméraire ? Tes adieux sont-ils prêts ? T'es-tu bien consulté ? Ton cœur te promet-il assez de cruauté ? Car enfin au combat qui pour toi se prépare, c'est peu d'être constant, il faut être barbare. Soutiendrai-je ces yeux dont la douce langueur sait si bien découvrir les chemins de mon cœur ? Quand je verrai ces yeux armés de tous leurs charmes, attachés sur les miens, m'accabler de leurs larmes, me souviendrai-je alors de mon triste devoir ? Pourrai-je dire enfin : Je ne veux plus vous voir ? Je viens percer un cœur que j'adore, qui m'aime. Et pourquoi le percer ? Qui l'ordonne ? Moi-même.",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Titus se parle à lui-même avant d'affronter Bérénice. C'est un homme qui se prépare à se briser le cœur. Le conflit entre le devoir et l'amour est déchirant. Il se tutoie — c'est un procès qu'il se fait."},
  {id:"fm22",title:"Perdican — l'amour",source:"Musset — On ne badine pas avec l'amour, Acte II, sc.5",text:"Tous les hommes sont menteurs, inconstants, faux, bavards, hypocrites, orgueilleux et lâches, méprisables et sensuels ; toutes les femmes sont perfides, artificieuses, vaniteuses, curieuses et dépravées ; le monde n'est qu'un égout sans fond où les phoques les plus informes rampent et se tordent sur des montagnes de fange ; mais il y a au monde une chose sainte et sublime, c'est l'union de deux de ces êtres si imparfaits et si affreux. On est souvent trompé en amour, souvent blessé et souvent malheureux ; mais on aime, et quand on est sur le bord de sa tombe, on se retourne pour regarder en arrière, et on se dit : J'ai souffert souvent, je me suis trompé quelquefois, mais j'ai aimé. C'est moi qui ai vécu, et non pas un être factice créé par mon orgueil et mon ennui.",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Le discours bascule du cynisme le plus noir à la déclaration d'amour la plus pure. Ce virage est le cœur du monologue — préparez-le, ne le précipitez pas. La dernière phrase doit être bouleversante."},
  {id:"fm10",title:"Antigone — le refus",source:"Anouilh — Antigone",text:"Vous me dégoûtez tous avec votre bonheur ! Avec votre vie qu'il faut aimer coûte que coûte. On dirait des chiens qui lèchent tout ce qu'ils trouvent. Et cette petite chance pour tous les jours, si on n'est pas trop exigeant. Moi, je veux tout, tout de suite, et que ce soit entier, ou alors je refuse ! Je ne veux pas être modeste, moi, et me contenter d'un petit morceau si j'ai été bien sage. Je veux être sûre de tout aujourd'hui et que cela soit aussi beau que quand j'étais petite, ou mourir. Je ne veux pas comprendre. C'est bon pour vous. Moi je suis là pour autre chose que pour comprendre. Je suis là pour vous dire non et pour mourir.",tier:"intermediaire",difficulty:2,genre:"femme",tips:"Antigone est d'une clarté absolue. Pas de pathos, pas de tremblements — une détermination pure. La force vient de la simplicité. Elle oppose le tout au compromis — c'est une révolte totale contre le monde adulte."},
  {id:"fm3",title:"Phèdre — l'aveu",source:"Racine — Phèdre, Acte II, sc.5",text:"Oui, Prince, je languis, je brûle pour Thésée. Je l'aime, non point tel que l'ont vu les enfers, volage adorateur de mille objets divers, qui va du dieu des morts déshonorer la couche ; mais fidèle, mais fier, et même un peu farouche, charmant, jeune, traînant tous les cœurs après soi, tel qu'on dépeint nos dieux, ou tel que je vous voi. Il avait votre port, vos yeux, votre langage, cette noble pudeur colorait son visage lorsque de notre Crète il traversa les flots, digne sujet des vœux des filles de Minos. Que faisiez-vous alors ? Pourquoi, sans Hippolyte, des héros de la Grèce assembla-t-il l'élite ? Pourquoi, trop jeune encor, ne pûtes-vous alors entrer dans le vaisseau qui le mit sur nos bords ? Par vous aurait péri le monstre de la Crète. Oui, c'est vous que j'aime.",tier:"intermediaire",difficulty:2,genre:"femme",tips:"Le glissement de Thésée à Hippolyte est le cœur de la tirade. Commencez dans le contrôle, laissez la passion déborder. Quand elle dit 'tel que je vous voi', le masque tombe — elle ne peut plus mentir."},
  {id:"fm7",title:"Célimène — les portraits",source:"Molière — Le Misanthrope, Acte II, sc.4",text:"Cléonte ? Il est de ces gens qui, par un long séjour dans la cour, ont su se faire un merveilleux usage du monde. Il brille de cela dans tout ce qu'il débite ; le beau langage, en tout, est son moindre talent ; car il sait de chacun copier l'agrément, et se mettre partout d'une façon si aisée qu'il paraît n'avoir rien de sa propre pensée. Damon, le raisonneur, qui m'importune, hélas, vient me voir chaque jour, sans rien dire de neuf, et me fait en causant de si longs préambules que j'en bâille d'ennui vingt fois pendant ses fables. Timante encore : le secret est son grand caractère ; il entre dans un mystère, se penche à votre oreille, et d'un air important vous dit... rien du tout ! Ma foi, ce sont les portraits du temps.",tier:"intermediaire",difficulty:2,genre:"femme",tips:"Célimène est brillante et cruelle. Elle fait rire la galerie aux dépens des absents. Jouez l'intelligence du trait d'esprit, pas la méchanceté. Chaque portrait est un numéro — changez de ton pour chaque personnage croqué."},
  {id:"fm5",title:"Médée — l'invocation",source:"Corneille — Médée, Acte I, sc.5",text:"Souverains protecteurs des lois de l'hyménée, Dieux, garants de la foi que Jason m'a donnée, Vous qu'il prit à témoin d'une immortelle ardeur, Voyez de quel mépris vous traite son parjure, Et m'aidez à venger cette commune injure. Et toi, sœur du Soleil, toi qui me vois rougir de tant de lâchetés, approuve par ta rougeur le trouble de ma honte ! Est-ce assez, ma vengeance, est-ce assez de fureur ? Ah ! quelle lâcheté ! qui craint de trop oser n'a qu'un cœur qui se traîne et qui va s'écraser. Pour qui sont ces serpents qui sifflent sur vos têtes ? Déployons à ses yeux un spectacle nouveau : faisons agir ensemble et le fer et la flamme, et par un bel excès couronnons cette trame. Jason me répudie ! et qui l'aurait pu croire ? S'il a manqué d'amour, manquons de bonne foi. Et que nos ennemis, que la terre et les cieux, les Dieux, les éléments, tout, tout tremble à mes yeux.",tier:"avance",difficulty:3,genre:"femme",tips:"Médée passe de la supplication à la menace. Les dieux sont ses témoins mais aussi ses armes. La transformation doit être visible physiquement. Sa voix descend dans les graves à mesure que la vengeance prend forme."},
  {id:"fm8",title:"Lucky — le discours",source:"Beckett — En attendant Godot, Acte I",text:"Étant donné l'existence telle qu'elle jaillit des récents travaux publics de Poinçon et Wattmann d'un Dieu personnel quaquaquaqua à barbe blanche quaqua hors du temps de l'étendue qui du haut de sa divine apathie sa divine athambie sa divine aphasie nous aime bien à quelques exceptions près on ne sait pourquoi mais ça viendra et souffre à l'instar de la divine Miranda avec ceux qui sont on ne sait pourquoi mais on a le temps dans le tourment dans les feux dont les feux les flammes pour peu que ça dure encore un peu et qui peut en douter mettront à la fin le feu aux poutres assavoir mettront à la fin le feu aux poutres et assavoir la tête la tête la tête en Normandie malgré le tennis les faits sont là on ne sait pourquoi en dépit du tennis les faits sont là la tête hélas la tête la tête en Normandie malgré le tennis...",tier:"avance",difficulty:3,genre:"homme",tips:"Le chaos EST le texte. Il n'y a pas de ponctuation logique — c'est un flux de conscience brisé. Trouvez votre propre rythme dans la désintégration. L'urgence de communiquer est le moteur, même si le langage s'effondre."},
  {id:"fm13",title:"Ruy Blas — le ver de terre",source:"Hugo — Ruy Blas, Acte III, sc.2",text:"Bon appétit, messieurs ! Ô ministres intègres ! Conseillers vertueux ! Voilà votre façon de servir, serviteurs qui pillez la maison ! Donc vous n'avez pas honte et vous choisissez l'heure, l'heure sombre où l'Espagne agonisante pleure ! Donc vous n'avez ici pas d'autres intérêts que remplir votre poche et vous moquer du reste ! Soyez flétris, devant votre pays qui tombe, fossoyeurs qui venez le voler dans sa tombe ! Mais voyez, regardez, ayez quelque pudeur. L'Espagne et sa vertu, l'Espagne et sa grandeur, tout s'en va. Et l'on voit cheminer les affaires, l'État est un cadavre, ils sont les vers de terre ! Charles Quint, dans ces temps d'opprobre et de terreur, que fais-tu dans ta tombe, ô puissant Empereur ? Oh ! lève-toi ! Viens voir !",tier:"avance",difficulty:3,genre:"homme",tips:"C'est un volcan qui explose. La colère est juste, les mots sont des armes. Projetez chaque accusation comme un coup de poing. Le rythme hugolien s'accélère — les vers sont de plus en plus courts, de plus en plus percutants."},
  {id:"fm9",title:"Roxane — la révélation",source:"Rostand — Cyrano de Bergerac, Acte V, sc.5",text:"C'était vous ! J'aurais dû deviner quand il disait mon nom ! Non ! Non ! Ce n'est pas vrai ! Je n'aimais qu'un seul être et je le perds deux fois ! Cette lettre ? ces pleurs ? Ce sang ? Tout cela, tout, c'était vous ! Et cette voix dans la nuit, c'était la vôtre. Je vous dis que depuis quatorze ans j'ai entendu sonner dans l'air cette voix tendre et grave et que jamais je ne l'ai oubliée. L'âme, c'était la vôtre ! Pourquoi vous être tu pendant quatorze ans, puisque sur cette lettre où, lui, n'était pour rien, ces pleurs étaient de vous ? Pourquoi vous être tu ? Pourquoi ? Tout ce bonheur perdu, ces années, ces larmes, ce silence — pourquoi ? Et lui qui meurt ce soir encore une fois — pourquoi ?",tier:"avance",difficulty:3,genre:"femme",tips:"La révélation détruit et illumine en même temps. Jouez l'effondrement et l'émerveillement simultanément. Le deuil cohabite avec la découverte. Chaque 'pourquoi' est une blessure qui s'ouvre."},
  {id:"fm14",title:"Bérénice — l'adieu",source:"Racine — Bérénice, Acte V, sc.7",text:"Dans un mois, dans un an, comment souffrirons-nous, Seigneur, que tant de mers me séparent de vous ? Que le jour recommence et que le jour finisse, sans que jamais Titus puisse voir Bérénice, sans que de tout le jour je puisse voir Titus ? Mais quelle est mon erreur, et que de soins perdus ! L'ingrat, de mon départ consolé par avance, daignera-t-il compter les jours de mon absence ? Ces jours si longs pour moi lui sembleront trop courts. Je n'aurai pas, Madame, à compter tant de jours. J'espère que bientôt la triste renommée vous fera confesser que vous étiez aimée. Vous connaîtrez Titus... Mais, ma princesse, adieu. Pour la dernière fois, adieu, Seigneur. Hélas !",tier:"avance",difficulty:3,genre:"femme",tips:"La douleur racinienne est contenue, pas criée. Chaque mot est pesé, chaque silence est un gouffre. La musicalité de l'alexandrin porte le chagrin. Le dernier 'Hélas' doit contenir tout ce qu'elle ne peut plus dire."},
  {id:"fm16",title:"Hermione — la fureur",source:"Racine — Andromaque, Acte V, sc.1",text:"Où suis-je ? Qu'ai-je fait ? Que dois-je faire encore ? Quel transport me saisit ? Quel chagrin me dévore ? Errante, et sans dessein, je cours dans ce palais. Ah ! ne puis-je savoir si j'aime ou si je hais ? Le cruel ! de quel œil il m'a congédiée ! Sans pitié, sans douleur, au moins étudiée. L'ai-je vu se troubler et me plaindre un moment ? En ai-je pu tirer un seul gémissement ? Muet à mes soupirs, tranquille à mes alarmes, semblait-il seulement qu'il eût part à mes larmes ? Et je le plains encore ! Et, pour comble d'ennui, mon cœur, mon lâche cœur s'intéresse pour lui ? Je tremble au seul penser du coup qui le menace ? Et, prête à me venger, je lui fais déjà grâce ? Non, ne révoquons point l'arrêt de mon courroux : qu'il périsse !",tier:"avance",difficulty:3,genre:"femme",tips:"Hermione est déchirée entre l'amour et la rage. Les questions ne sont pas rhétoriques — elle cherche vraiment la réponse. Le corps est en crise. Le va-et-vient entre vengeance et pardon est physique."},
  {id:"fm18",title:"Camille — les imprécations",source:"Corneille — Horace, Acte IV, sc.5",text:"Rome, l'unique objet de mon ressentiment ! Rome, à qui vient ton bras d'immoler mon amant ! Rome qui t'a vu naître, et que ton cœur adore ! Rome enfin que je hais parce qu'elle t'honore ! Puissent tous ses voisins ensemble conjurés saper ses fondements encore mal assurés ! Et si ce n'est assez de toute l'Italie, que l'Orient contre elle à l'Occident s'allie ; que cent peuples unis des bouts de l'univers passent pour la détruire et les monts et les mers ! Qu'elle-même sur soi renverse ses murailles, et de ses propres mains déchire ses entrailles ! Que le courroux du ciel, allumé par mes vœux, fasse pleuvoir sur elle un déluge de feux ! Puissé-je de mes yeux y voir tomber ce foudre, voir ses maisons en cendres, et tes lauriers en poudre, voir le dernier Romain à son dernier soupir, moi seule en être cause, et mourir de plaisir !",tier:"avance",difficulty:3,genre:"femme",tips:"Camille maudit Rome devant son frère qui vient de tuer son amant. C'est un acte de bravoure suicidaire. Chaque 'Rome' est un coup de poignard. L'imprécation monte crescendo jusqu'à l'image finale — sa propre mort de plaisir."},
  {id:"fm24",title:"Néron — la cruauté",source:"Racine — Britannicus, Acte II, sc.2",text:"Excité d'un désir curieux, cette nuit je l'ai vue arriver en ces lieux, triste, levant au ciel ses yeux mouillés de larmes, qui brillaient au travers des flambeaux et des armes. Belle, sans ornements, dans le simple appareil d'une beauté qu'on vient d'arracher au sommeil. Que veux-tu ? Je ne sais si cette négligence, les ombres, les flambeaux, les cris et le silence, et le farouche aspect de ses fiers ravisseurs, relevaient de ses yeux les timides douceurs. Quoi qu'il en soit, ravi d'une si belle vue, j'ai voulu lui parler, et ma voix s'est perdue : immobile, saisi d'un long étonnement, je l'ai laissée passer dans son appartement. J'ai passé dans le mien. C'est là que, solitaire, de son image en vain j'ai voulu me distraire. Trop présente à mes yeux, je croyais lui parler ; j'aimais jusqu'à ses pleurs que je faisais couler.",tier:"avance",difficulty:3,genre:"homme",tips:"Néron décrit Junie avec une beauté terrifiante. Derrière l'émerveillement esthétique, il y a le prédateur. La douceur des mots cache la violence du désir. Le dernier vers est glaçant — il aime ses propres crimes."},
  {id:"fm25",title:"Cyrano — la mort",source:"Rostand — Cyrano de Bergerac, Acte V, sc.6",text:"Non, non, mon cher amour, je ne vous aimais pas ! Le soir, quand j'avais fait quelque beau paraphe de mon nom dans le ciel, et qu'ensuite tremblant, je laissais le doux bien du geste extravagant, je savais, en montant vers les âmes les meilleures, que c'est vous ma beauté, vous mon idéal. Et je ne vous aimais pas. Que je n'aie eu de joie qui ne fût tout entière à vous ! Voici que je meurs. C'est Roxane qui pleure. Adieu ! Philosophe, physicien, rimeur, bretteur, musicien, et voyageur aérien, grand riposteur du tac au tac, amant aussi — pas pour son bien ! — ci-gît Hercule-Savinien de Cyrano de Bergerac, qui fut tout, et qui ne fut rien. Mais je m'en vais, pardonnez-moi de ne m'en aller que ce soir. Oui, vous m'arrachez tout, le laurier et la rose ! Arrachez ! Il y a malgré vous quelque chose que j'emporte, et ce soir, quand j'entrerai chez Dieu, mon salut balaiera largement le seuil bleu, quelque chose que sans un pli, sans une tache, j'emporte malgré vous... et c'est... Mon panache.",tier:"avance",difficulty:3,genre:"homme",tips:"Cyrano fait son propre éloge funèbre puis meurt debout. L'humour masque l'agonie. Il faut que le public rie et pleure en même temps. Le panache est là jusqu'au dernier souffle. Le mot final doit résonner comme un dernier coup d'épée."},

const FEED_MICROCOURS=[
  {id:"mc1",title:"Le sous-texte",content:["Le sous-texte, c'est ce que le personnage pense vraiment, derrière ce qu'il dit.","Exemple : quand Iago dit « Prenez garde à la jalousie », son sous-texte est « Sois jaloux ».","Pour trouver le sous-texte : demandez-vous « Que VEUT mon personnage dans cette scène ? » puis « Que DIT-il pour l'obtenir ? »","Le décalage entre les deux, c'est le sous-texte. C'est là que vit le jeu."],icon:"🎭"},
  {id:"mc2",title:"La respiration du comédien",content:["Tout commence par le souffle. Sans respiration, pas de voix. Sans voix, pas de jeu.","La respiration abdominale : inspirez par le nez, le ventre se gonfle. Expirez par la bouche, le ventre rentre. La poitrine ne bouge PAS.","Exercice : inspirez 4 secondes, retenez 4 secondes, expirez 8 secondes. Faites 10 cycles.","Sur scène, la respiration porte l'émotion. Un personnage stressé respire court et haut. Un personnage serein respire long et bas."],icon:"🌬️"},
  {id:"mc3",title:"Les rapports de force",content:["Dans chaque scène, un personnage domine et un autre est dominé. Parfois ça bascule.","Le rapport de force n'est pas toujours celui qu'on croit. Un valet peut dominer son maître (Iago/Othello, Figaro/Almaviva).","Pour identifier le rapport de force, demandez : « Qui a l'information ? Qui contrôle le rythme ? Qui fait bouger l'autre ? »","Sur scène, le rapport de force se traduit physiquement : regard, posture, occupation de l'espace, hauteur."],icon:"⚔️"},
  {id:"mc4",title:"L'adresse au public",content:["Au théâtre, on ne joue pas pour la caméra — on joue pour des êtres humains vivants devant soi.","Le quatrième mur est un choix, pas une obligation. Brecht le brise volontairement. Shakespeare aussi.","Même quand vous ne regardez pas le public, vous jouez VERS lui. La voix se projette vers le fond de salle, le corps se place en ouverture.","L'aparté est un outil puissant : le personnage confie quelque chose au public que les autres personnages n'entendent pas. Ça crée une complicité."],icon:"👥"},
  {id:"mc5",title:"Le rythme scénique",content:["Le rythme, c'est la musique invisible de la scène. Accélérations, ralentissements, silences.","Un silence est aussi important qu'une réplique. Il peut valoir plus qu'un monologue entier.","Exercice : prenez une scène et marquez les temps forts (⬆️) et les temps faibles (⬇️). Le rythme naît de cette alternance.","Attention à la « monotonie rythmique » — le piège du débutant qui dit tout sur le même tempo. Variez !"],icon:"🥁"},
  {id:"mc6",title:"Le corps raconte",content:["Le public voit avant d'entendre. Votre corps dit la vérité même quand votre texte ment.","Michael Chekhov : chaque émotion a un geste psychologique. La colère pousse vers l'avant, la peur recule, la joie s'ouvre, la tristesse se ferme.","Le centre du corps change selon le personnage. Un intellectuel vit dans sa tête. Un séducteur dans son bassin. Un guerrier dans sa poitrine.","Exercice : traversez la scène 5 fois avec 5 centres différents. Observez comment le personnage change."],icon:"🏋"},
  {id:"mc7",title:"La diction française",content:["Les consonnes portent le sens, les voyelles portent l'émotion. Articuler, c'est respecter les deux.","La liaison est obligatoire en vers classique. « Les‿amants » se lie, « les amants | heureux » se lie aussi.","Le « e muet » se prononce en alexandrin : « Je suis maîtr(e) de moi comm(e) de l'univers ».","Exercice quotidien : lisez un texte classique en exagérant CHAQUE consonne. Puis relâchez progressivement vers le naturel."],icon:"🗣️"},
  {id:"mc8",title:"Jouer l'écoute",content:["90% du jeu, c'est l'écoute. Le personnage qui ne parle pas est tout aussi important que celui qui parle.","Écouter sur scène, ce n'est pas attendre son tour de parler. C'est RÉAGIR en temps réel à ce qu'on entend.","Exercice : dans une scène à deux, jouez votre rôle en vous interdisant de penser à votre prochaine réplique. Écoutez VRAIMENT.","L'écoute se voit dans le regard, la respiration, les micro-mouvements. Le public le sent immédiatement."],icon:"👂"},
];

const MONTEXTE_PARCOURS=[
  {id:"e1",name:"Première lecture",icon:"📖",color:"var(--gold)",
    intro:"Avant de jouer un texte, il faut d'abord le comprendre. Pas l'analyser, pas l'interpréter — juste le comprendre. De quoi parle-t-il ? C'est la base de tout. Un comédien qui ne comprend pas précisément ce qu'il dit ne pourra jamais le faire vivre.",
    questions:[
      {q:"De quoi parle ce texte ? Résumez l'essentiel en 2-3 phrases, comme si vous l'expliquiez à quelqu'un qui ne l'a jamais lu.",tip:"Commencez toujours par le plus simple. Si vous ne pouvez pas résumer clairement, c'est que quelque chose vous échappe encore — et c'est normal."},
      {q:"Y a-t-il des mots ou des expressions que vous ne comprenez pas ? Listez-les et cherchez leur sens.",tip:"Ne faites jamais semblant de comprendre un mot. Un seul mot mal compris peut fausser toute votre interprétation."},
      {q:"Dans quel état émotionnel est votre personnage au début du texte ? Et à la fin ? Est-ce que ça change ?",tip:"Le trajet émotionnel du personnage est votre feuille de route. Si rien ne change entre le début et la fin, cherchez mieux — il y a toujours un mouvement."}
    ]},
  {id:"e2",name:"Le contexte",icon:"🏛️",color:"var(--gold-dim)",
    intro:"Un texte n'existe jamais dans le vide. Que s'est-il passé juste avant cette scène ? Pourquoi votre personnage parle-t-il maintenant ? Le contexte, c'est le terreau dans lequel pousse votre interprétation. Sans contexte, vous récitez. Avec, vous jouez.",
    questions:[
      {q:"Que s'est-il passé juste AVANT ce texte ? Quel événement déclenche cette prise de parole ?",tip:"Votre personnage ne parle pas par hasard. Quelque chose vient de se passer qui rend cette parole urgente, nécessaire, inévitable."},
      {q:"Où et quand se déroule la scène ? Comment le lieu et le moment influencent-ils ce que dit le personnage ?",tip:"On ne parle pas de la même façon dans un salon que dans une prison, en plein jour que la nuit. Le lieu agit sur le corps et la voix."},
      {q:"Quelle est la relation entre votre personnage et les personnes présentes (ou absentes) ? Comment cette relation colore-t-elle chaque mot ?",tip:"La même phrase (« je t'aime ») ne se dit pas du tout de la même façon selon qu'on s'adresse à un amant, un parent, un ennemi."}
    ]},
  {id:"e3",name:"L'adresse",icon:"👥",color:"var(--coral)",
    intro:"Au théâtre, la question fondamentale est : à qui parle-t-on ? Votre personnage s'adresse à quelqu'un — un autre personnage, le public, lui-même, Dieu, un absent. L'adresse détermine tout : le volume, le regard, la distance, l'intention. Changez l'adresse, et tout le texte change.",
    questions:[
      {q:"À qui parle votre personnage ? Y a-t-il un seul interlocuteur ou plusieurs ? L'adresse change-t-elle au cours du texte ?",tip:"Attention aux changements d'adresse — ce sont souvent les moments les plus intéressants. Le personnage se parle à lui-même puis se tourne vers l'autre : ce virage est un événement."},
      {q:"Votre personnage dit-il la vérité à son interlocuteur ? Ou cache-t-il quelque chose ? Pourquoi ?",tip:"Le décalage entre ce qu'on dit et ce qu'on pense, c'est le sous-texte. C'est là que le jeu prend toute sa richesse."},
      {q:"Si votre personnage pouvait dire la vérité brute à son interlocuteur, sans filtre, que dirait-il ?",tip:"Cet exercice vous révèle le sous-texte. La distance entre la vérité brute et le texte réel, c'est exactement l'espace dans lequel vous jouez."}
    ]},
  {id:"e4",name:"Les intentions",icon:"🎯",color:"var(--emerald)",
    intro:"Un personnage ne parle jamais pour rien. Il veut obtenir quelque chose — de l'autre, de lui-même, du monde. L'intention, c'est le moteur de chaque réplique. Sans intention claire, le jeu est mou. « Que veut mon personnage ? » est LA question que tout acteur doit se poser à chaque instant.",
    questions:[
      {q:"Quel est l'objectif principal de votre personnage dans ce texte ? Que cherche-t-il à obtenir ?",tip:"L'objectif doit être concret et précis. Pas « il est triste » mais « il veut que l'autre revienne ». L'objectif, c'est un verbe d'action."},
      {q:"Quels obstacles l'empêchent d'atteindre son objectif ? Sont-ils internes (doutes, peur) ou externes (un autre personnage, les circonstances) ?",tip:"Pas d'obstacles = pas de drame = pas de jeu. Plus l'obstacle est fort, plus l'intention doit être puissante pour le surmonter."},
      {q:"Découpez votre texte en « unités d'intention ». À chaque changement de tactique du personnage, marquez une pause. Combien d'unités trouvez-vous ?",tip:"Un personnage change de tactique quand sa première approche ne fonctionne pas. Il supplie, puis menace, puis séduit. Chaque changement est un événement scénique."},
      {q:"Quel est l'enjeu ? Que se passe-t-il si votre personnage échoue ?",tip:"Plus l'enjeu est vital, plus la scène est forte. Jouez comme si la vie de votre personnage en dépendait — souvent, symboliquement, c'est le cas."}
    ]},
  {id:"e5",name:"Les rapports de force",icon:"⚔️",color:"var(--coral)",
    intro:"Dans toute scène, il y a un rapport de force. Quelqu'un domine, quelqu'un subit — et souvent, ça bascule. Le rapport de force n'est pas toujours celui qu'on croit : un valet peut dominer son maître par le savoir, un enfant peut dominer un adulte par l'émotion. Comprendre le rapport de force, c'est comprendre l'architecture invisible de la scène.",
    questions:[
      {q:"Qui domine au début du texte ? Comment cette domination se manifeste-t-elle (parole, silence, position, savoir) ?",tip:"La domination n'est pas toujours criée. Parfois, celui qui parle le moins est celui qui contrôle le plus."},
      {q:"Le rapport de force évolue-t-il au cours du texte ? Y a-t-il un moment de bascule ? Qu'est-ce qui le provoque ?",tip:"Le moment où le rapport de force bascule est souvent le climax de la scène. Repérez-le et faites-le exister physiquement."},
      {q:"Quelles « armes » utilise votre personnage pour prendre ou garder le pouvoir ? (ironie, séduction, menace, silence, savoir, vulnérabilité…)",tip:"Chaque personnage a sa stratégie. Célimène utilise l'esprit, Phèdre la vulnérabilité, Figaro l'ironie, Néron la menace. Quelle est la vôtre ?"}
    ]},
  {id:"e6",name:"Le rythme et le corps",icon:"🥁",color:"var(--violet)",
    intro:"Le texte est une partition. Il a ses accélérations, ses ralentissements, ses silences. Le rythme porte l'émotion autant que les mots. Et le corps traduit tout ce que la voix ne dit pas. Un personnage ne pense pas seulement avec sa tête — il pense avec ses pieds, ses mains, son souffle.",
    questions:[
      {q:"Où sont les accélérations et les ralentissements dans votre texte ? Qu'est-ce qui les provoque émotionnellement ?",tip:"En général, l'émotion accélère le rythme (colère, peur, passion) et la réflexion le ralentit (doute, mélancolie, calcul). Mais l'inverse peut être très puissant aussi."},
      {q:"Repérez les silences — explicites (didascalies) ou implicites (changements de sujet, phrases inachevées). Que se passe-t-il dans ces silences ?",tip:"Le silence n'est jamais vide au théâtre. Quelque chose se passe dans la tête du personnage. Le public le sent. Ne remplissez jamais un silence — habitez-le."},
      {q:"Comment le corps de votre personnage évolue-t-il au fil du texte ? Est-il ouvert ou fermé ? Tendu ou relâché ? Ancré ou en déséquilibre ?",tip:"Avant de travailler la voix, travaillez le corps. Essayez de jouer votre texte sans un mot, juste avec le corps. Ce qui reste, c'est l'essentiel."}
    ]},
  {id:"e7",name:"L'interprétation",icon:"🎬",color:"var(--gold-light)",
    intro:"Vous avez compris le texte, le contexte, l'adresse, les intentions, les rapports de force, le rythme. Maintenant, c'est à vous. L'interprétation, c'est VOS choix. Il n'y a pas une seule façon de jouer un texte — il y a la vôtre. C'est ici que le travail d'analyse se transforme en jeu vivant.",
    questions:[
      {q:"Quelle est VOTRE vision de ce personnage ? Qu'est-ce qui vous touche, vous intrigue ou vous dérange chez lui ?",tip:"Votre rapport personnel au personnage est votre force. Vous n'avez pas besoin de l'aimer — vous avez besoin de le comprendre."},
      {q:"Si vous ne deviez retenir qu'un seul moment clé dans ce texte — celui où tout bascule — lequel serait-ce ?",tip:"Ce moment est le cœur de votre interprétation. Tout le reste doit mener vers lui ou en découler."},
      {q:"Dites votre texte à voix haute, debout, trois fois de suite. Qu'est-ce qui change entre la première et la troisième fois ?",tip:"Le texte doit passer par le corps. Tant qu'il est dans la tête, il n'est pas prêt. C'est en le disant et en le redisant qu'il devient vôtre."}
    ]}
];

/* ═══ ANALYSE DE SCÈNE ═══ */
const SCENE_ANALYSES=[
  /* ── DÉBUTANT ── */
  {id:"sa1",tier:"debutant",title:"Harpagon et sa cassette",source:"Molière — L'Avare, Acte IV, scène 7",
   context:"Harpagon, un vieil avare parisien, a caché une cassette remplie d'or dans son jardin. Quand il découvre qu'elle a disparu, il sombre dans une panique totale. C'est un monologue — il est seul sur scène, face au public.",
   extract:"Au voleur ! au voleur ! à l'assassin ! au meurtrier ! Justice, juste Ciel ! je suis perdu, je suis assassiné, on m'a coupé la gorge, on m'a dérobé mon argent. Qui peut-ce être ? Qu'est-il devenu ? Où est-il ? Où se cache-t-il ? Que ferai-je pour le trouver ? Où courir ? Où ne pas courir ? N'est-il point là ? N'est-il point ici ?",
   questions:[
     {type:"qcm",q:"Quelle émotion principale Harpagon exprime-t-il ?",o:["La joie","La panique et le désespoir","La colère froide","L'indifférence"],a:1,
      expl:"Harpagon est en proie à une panique totale. L'accumulation de questions et d'exclamations traduit un personnage qui perd complètement le contrôle. Son argent EST sa vie — le perdre équivaut pour lui à mourir, d'où les termes 'assassiné', 'coupé la gorge'."},
     {type:"qcm",q:"Quel procédé stylistique domine dans cette tirade ?",o:["La métaphore filée","L'accumulation de questions rhétoriques","L'ironie","Le champ lexical de la nature"],a:1,
      expl:"Molière utilise une accumulation de questions rhétoriques (« Où est-il ? Où se cache-t-il ? ») qui traduit l'affolement total du personnage. Ce procédé crée aussi un effet comique par l'excès."},
     {type:"libre",q:"À votre avis, pourquoi Molière fait-il dire à Harpagon 'on m'a coupé la gorge' alors qu'il s'agit d'un vol d'argent ? Quel effet cela produit-il ?",
      ref:"Harpagon identifie son argent à sa propre personne. Perdre sa cassette, c'est littéralement perdre la vie pour lui. Cet excès est à la fois révélateur de sa folie avare et comique pour le spectateur, qui voit le décalage entre la réalité (un vol) et la réaction (un meurtre). C'est le ressort même de la comédie de caractère : l'obsession pousse le personnage au ridicule."},
     {type:"qcm",q:"Si vous deviez jouer cette scène, quel serait le principal défi physique ?",o:["Rester immobile","Gérer l'essoufflement et l'agitation croissante","Chuchoter tout le texte","Tourner le dos au public"],a:1,
      expl:"Le défi majeur est de traduire physiquement la panique croissante : course sur scène, regards dans toutes les directions, essoufflement progressif. Le corps doit être aussi agité que les mots. Mais attention à ne pas tomber dans la caricature — c'est un vrai désespoir pour Harpagon."},
   ]},
  {id:"sa2",tier:"debutant",title:"La scène du balcon",source:"Shakespeare (trad.) — Roméo et Juliette, Acte II, scène 2",
   context:"Roméo, un jeune Montaigu, s'est glissé dans le jardin des Capulet après un bal. Il aperçoit Juliette à sa fenêtre et, caché dans l'ombre, lui déclare son amour sans qu'elle le sache. C'est la scène d'amour la plus célèbre du théâtre occidental.",
   extract:"Mais doucement ! quelle lumière jaillit par cette fenêtre ? Voilà l'Orient, et Juliette est le soleil ! Lève-toi, bel astre, et tue la lune jalouse, qui est déjà malade et pâle de douleur parce que toi, sa servante, tu es bien plus belle qu'elle.",
   questions:[
     {type:"qcm",q:"À qui Roméo s'adresse-t-il dans cette réplique ?",o:["À Juliette directement","À lui-même (monologue)","À son ami Mercutio","Au public"],a:1,
      expl:"Roméo se parle à lui-même en observant Juliette à sa fenêtre. C'est un aparté : Juliette ne l'entend pas encore. Cela crée une intimité avec le public qui découvre les sentiments de Roméo avant que Juliette ne les connaisse."},
     {type:"qcm",q:"Juliette est comparée à quel élément ?",o:["La lune","Le soleil","Une étoile filante","Une fleur"],a:1,
      expl:"Roméo compare Juliette au soleil — un astre si lumineux qu'il éclipse la lune. Cette métaphore cosmique élève l'amour au rang de force de la nature, un thème central chez Shakespeare."},
     {type:"libre",q:"Comment un comédien pourrait-il utiliser sa voix et son corps pour montrer que Roméo est émerveillé dans cette scène ?",
      ref:"Le comédien peut jouer sur le ralentissement du débit à 'Mais doucement !' (moment de surprise), puis une montée progressive d'intensité et de chaleur dans la voix. Physiquement, un mouvement vers l'avant, comme attiré malgré lui. Le regard reste fixé vers le haut (la fenêtre). Les mains peuvent s'ouvrir inconsciemment, geste d'offrande et de vulnérabilité. L'essentiel est de montrer que Roméo est submergé par ce qu'il voit."},
   ]},
  {id:"sa3",tier:"debutant",title:"Le Bourgeois gentilhomme",source:"Molière — Le Bourgeois gentilhomme, Acte II, scène 4",
   context:"Monsieur Jourdain, un riche bourgeois, veut apprendre les manières de la noblesse. Il prend des leçons de philosophie et découvre, stupéfait, qu'il parle en prose depuis toujours. C'est un dialogue entre Jourdain et son Maître de philosophie.",
   extract:"Par ma foi ! il y a plus de quarante ans que je dis de la prose sans que j'en susse rien, et je vous suis le plus obligé du monde de m'avoir appris cela.",
   questions:[
     {type:"qcm",q:"Pourquoi cette réplique est-elle comique ?",o:["Monsieur Jourdain fait une blague volontaire","Il découvre une évidence comme si c'était extraordinaire","Il insulte son professeur","Il parle en vers"],a:1,
      expl:"Le comique vient du décalage entre l'évidence (tout le monde parle en prose) et l'émerveillement de Monsieur Jourdain. C'est le principe du personnage comique de Molière : quelqu'un qui ne voit pas ce que tout le monde voit, ici un bourgeois qui veut s'élever socialement sans en avoir les codes."},
     {type:"libre",q:"Monsieur Jourdain veut devenir un homme cultivé. En quoi cette réplique montre-t-elle l'échec de cette ambition ?",
      ref:"Paradoxalement, en s'émerveillant d'apprendre qu'il parle en prose, Jourdain montre l'étendue de son ignorance. Un vrai homme cultivé saurait ce qu'est la prose. Sa gratitude excessive ('le plus obligé du monde') révèle qu'il confond accumulation de connaissances superficielles et vraie culture. Molière montre que l'éducation ne s'achète pas — elle se construit sur une conscience critique que Jourdain n'a pas."},
   ]},

  /* ── INTERMÉDIAIRE ── */
  {id:"sa4",tier:"intermediaire",title:"La stratégie de Iago",source:"Shakespeare (trad.) — Othello, Acte III, scène 3",
   context:"Iago, officier jaloux, manipule le général Othello pour le rendre fou de jalousie envers sa femme Desdémone. Dans cette scène, Iago feint de mettre en garde Othello tout en empoisonnant son esprit. C'est un dialogue entre les deux hommes.",
   extract:"Ô, prenez garde, monseigneur, à la jalousie ! C'est le monstre aux yeux verts qui produit l'aliment dont il se nourrit. Il vit heureux, le cocu qui, certain de son sort, n'aime plus celle qui le trompe ; mais que de minutes damnées compte celui qui adore et qui doute, qui soupçonne et qui aime éperdument !",
   questions:[
     {type:"qcm",q:"Quelle est la véritable intention de Iago quand il met en garde Othello contre la jalousie ?",o:["Il veut sincèrement protéger Othello","Il plante la graine de la jalousie en prétendant la combattre","Il ne sait pas ce qu'il fait","Il essaie de s'excuser"],a:1,
      expl:"C'est la quintessence de la manipulation : en prétendant avertir Othello contre la jalousie, Iago l'y pousse. Le sous-texte est l'inverse du texte. Iago fait naître l'idée même qu'il prétend combattre. C'est ce qu'on appelle 'semer le doute' — et c'est une leçon majeure pour tout comédien sur la différence entre ce qu'un personnage DIT et ce qu'il FAIT."},
     {type:"qcm",q:"Quel rapport de force est en jeu dans cette scène ?",o:["Iago est soumis à Othello","Othello domine complètement","Iago contrôle la scène malgré son statut inférieur","Ils sont égaux"],a:2,
      expl:"Malgré sa position sociale inférieure (il est l'enseigne d'Othello), Iago est le vrai maître de cette scène. Il contrôle l'information, le rythme de la révélation, et les émotions d'Othello. C'est un exemple parfait de rapport de force inversé : le pouvoir n'est pas où l'on croit."},
     {type:"libre",q:"Comment joueriez-vous le sous-texte de Iago ? Où mettriez-vous des pauses, des regards, des changements de ton ?",
      ref:"Le piège serait de jouer Iago comme un méchant évident. Le sous-texte fonctionne mieux si Iago semble sincèrement préoccupé. Des pauses avant 'jalousie' et 'monstre aux yeux verts' — comme s'il hésitait à en parler. Un regard vers Othello pour jauger l'effet de chaque mot. Un ton de confidence entre amis, presque tendre. C'est en jouant la bienveillance que la manipulation devient terrifiante. Les meilleurs Iago au théâtre sont ceux qui font oublier au public lui-même qu'ils mentent."},
     {type:"argument",q:"Certains metteurs en scène jouent Iago comme un homme blessé et humilié plutôt que comme un pur manipulateur. Êtes-vous d'accord avec cette lecture ?",
      positions:[
        {pour:"Iago se sent trahi par Othello qui lui a préféré Cassio pour le poste de lieutenant. Sa manipulation naît d'une blessure d'orgueil légitime. Le jouer comme un homme souffrant ajoute de la complexité et évite le cliché du 'méchant pour le plaisir de l'être'."},
        {contre:"Le texte montre un Iago qui prend plaisir à manipuler, qui calcule froidement chaque étape. Trop humaniser sa motivation risque d'affaiblir la puissance dramatique de la pièce et de minimiser la responsabilité du personnage dans la tragédie."},
        {synthese:"Les deux lectures peuvent coexister : Iago peut être à la fois blessé ET jouir de sa manipulation. C'est cette ambiguïté qui fait la richesse du rôle — et qui laisse chaque comédien apporter sa propre vérité au personnage."}
      ]},
   ]},
  {id:"sa5",tier:"intermediaire",title:"Phèdre avoue son amour",source:"Racine — Phèdre, Acte II, scène 5",
   context:"Phèdre, reine d'Athènes, est consumée par un amour interdit pour Hippolyte, le fils de son mari Thésée. Le croyant mort, elle avoue sa passion à Hippolyte en feignant de parler de Thésée jeune. C'est un dialogue entre Phèdre et Hippolyte.",
   extract:"Oui, Prince, je languis, je brûle pour Thésée. Je l'aime, non point tel que l'ont vu les enfers, volage adorateur de mille objets divers, qui va du dieu des morts déshonorer la couche ; mais fidèle, mais fier, et même un peu farouche, charmant, jeune, traînant tous les cœurs après soi, tel qu'on dépeint nos dieux, ou tel que je vous voi.",
   questions:[
     {type:"qcm",q:"Qui Phèdre décrit-elle réellement quand elle dit aimer 'Thésée' ?",o:["Son mari Thésée tel qu'il est","Son mari Thésée quand il était jeune","Son beau-fils Hippolyte","Un dieu de l'Olympe"],a:2,
      expl:"C'est le tour de force de cette tirade : Phèdre prétend parler de Thésée mais le portrait qu'elle trace ('fidèle, fier, un peu farouche, charmant, jeune') est celui d'Hippolyte, son beau-fils. Le dernier hémistiche ('tel que je vous voi') lève le voile — elle parle de l'homme en face d'elle. Le sous-texte dévore le texte."},
     {type:"qcm",q:"Quel est le registre de cette tirade ?",o:["Comique","Lyrique et passionnel","Épique","Satirique"],a:1,
      expl:"Le registre est lyrique et passionnel : 'je languis, je brûle' exprime un amour dévorant. Racine utilise l'alexandrin pour donner une musicalité quasi incantétoire à cet aveu interdit. Le rythme et les sonorités portent l'émotion autant que le sens."},
     {type:"libre",q:"Phèdre utilise le nom de Thésée comme un masque pour parler d'Hippolyte. À quel moment, selon vous, Hippolyte comprend-il la vérité ? Comment montrer ce basculement en mise en scène ?",
      ref:"Le basculement se joue sur 'tel que je vous voi' — le passage du 'il' (Thésée absent) au 'vous' (Hippolyte présent). En mise en scène, on peut marquer un temps de suspension juste avant ces mots. Hippolyte peut reculer, son corps se raidir. Phèdre peut avancer d'un pas, incapable de retenir la vérité plus longtemps. Le silence qui suit ces mots est aussi important que les mots eux-mêmes. Certaines mises en scène font durer ce silence très longtemps pour laisser l'horreur s'installer."},
     {type:"argument",q:"Phèdre est-elle coupable ou victime dans cette scène ?",
      positions:[
        {pour:"Phèdre est victime — elle subit une passion envoyée par les dieux (Vénus). Elle lutte contre cet amour interdit, elle souffre, elle a même voulu mourir. Son aveu est un échec de sa volonté, pas un choix libre."},
        {contre:"Phèdre fait le choix de parler. Personne ne l'oblige à avouer. En utilisant le stratagème du portrait de Thésée, elle montre une forme de calcul qui nuance l'image de victime passive."},
        {synthese:"Racine construit précisément cette ambiguïté : Phèdre est à la fois victime de la fatalité et agent de sa propre chute. C'est cette tension qui rend le rôle si fascinant à jouer — la comédienne doit habiter les deux dimensions simultanément."}
      ]},
   ]},
  {id:"sa6",tier:"intermediaire",title:"Le quiproquo maître-valet",source:"Marivaux — Le Jeu de l'amour et du hasard, Acte I, scène 6",
   context:"Silvia et Dorante, promis en mariage, ont chacun échangé de rôle avec leur serviteur pour observer l'autre incognito. Sans le savoir, ils tombent amoureux l'un de l'autre sous leurs déguisements. C'est un dialogue entre les deux, chacun croyant parler à un domestique.",
   extract:"SILVIA (déguisée en servante) : C'est que j'ai deviné que tu pouvais bien n'être pas ce que tu parais. DORANTE (déguisé en valet) : Et moi, j'aurais bien voulu que la maîtresse te ressemblât. SILVIA : Que voulez-vous dire par là ? DORANTE : Que j'aurais eu le plaisir de la servir autant qu'il m'en coûte de te voir.",
   questions:[
     {type:"qcm",q:"Qu'est-ce qui rend cette scène dramaturgiquement riche ?",o:["Les personnages se disent la vérité sans le savoir","Les personnages mentent complètement","Il n'y a aucun sous-texte","C'est une scène d'exposition classique"],a:0,
      expl:"Le génie de Marivaux est que les deux personnages, chacun déguisé, disent exactement la vérité de leurs sentiments tout en croyant mentir. Le double déguisement crée un jeu de miroirs : chacun est attiré par l'autre 'malgré' la condition sociale supposée. Le public, qui sait tout, savoure ce quiproquo."},
     {type:"libre",q:"Comment le comédien jouant Dorante peut-il montrer qu'il est troublé de tomber amoureux d'une 'simple servante' ? Quels signes physiques trahiraient son conflit intérieur ?",
      ref:"Dorante peut hésiter dans ses gestes — tendre la main puis la retirer. Son regard peut alterner entre l'attirance (yeux rivés sur Silvia) et la gêne sociale (détourner le regard). Il peut corriger sa posture, se reprendre quand il se montre trop tendre. Le conflit entre le cœur et le code social passe par des micro-gestes : un sourire qu'on réprime, un pas en avant suivi d'un recul. La voix peut osciller entre la chaleur et la retenue formelle."},
   ]},

  /* ── AVANCÉ ── */
  {id:"sa7",tier:"avance",title:"Lucky et le discours absurde",source:"Beckett — En attendant Godot, Acte I",
   context:"Lucky est un esclave tenu en laisse par Pozzo. Quand on lui ordonne de 'penser', il se lance dans un monologue-fleuve incohérent qui mêle philosophie, théologie et absurdité. Vladimir et Estragon, qui attendent Godot, assistent à la scène.",
   extract:"Étant donné l'existence telle qu'elle jaillit des récents travaux publics de Poinçon et Wattmann d'un Dieu personnel quaquaquaqua à barbe blanche quaqua hors du temps de l'étendue qui du haut de sa divine apathie sa divine athambie sa divine aphasie nous aime bien",
   questions:[
     {type:"qcm",q:"Pourquoi le discours de Lucky semble-t-il incohérent ?",o:["L'acteur a oublié son texte","Beckett illustre la désintégration du langage et de la pensée","C'est une erreur d'impression","Lucky parle une langue étrangère"],a:1,
      expl:"Le discours de Lucky est une déconstruction volontaire du langage. Derrière le chaos apparent, on trouve des fragments de pensée philosophique et théologique qui se dissolvent. Beckett montre un être dont la pensée se décompose — métaphore de la condition humaine dans le théâtre de l'absurde. Le sens émerge précisément de l'absence de sens."},
     {type:"libre",q:"Comment un comédien peut-il donner du sens à un texte qui semble n'en avoir aucun ? Quelles techniques utiliseriez-vous pour rendre ce monologue jouable ?",
      ref:"Le comédien peut s'appuyer sur le rythme (accélérations et ralentissements), les respirations (où Lucky reprend son souffle dit quelque chose sur sa détresse), les fragments reconnaissables ('Dieu', 'nous aime') traités comme des îlots de clarté dans le chaos. Physiquement, la tension du corps qui essaie désespérément de communiquer est essentielle. Certains comédiens choisissent de jouer la lucidité derrière la folie apparente — Lucky SAIT ce qu'il veut dire mais ne PEUT plus le dire. D'autres jouent l'urgence absolue : c'est peut-être sa dernière chance de parler."},
     {type:"argument",q:"Le théâtre de l'absurde est-il pessimiste ou, paradoxalement, porteur d'espoir ?",
      positions:[
        {pour:"En montrant l'absurdité de l'existence, Beckett libère le spectateur du besoin de trouver un sens imposé. C'est un acte de lucidité qui peut être libérateur. Et le simple fait que Vladimir et Estragon CONTINUENT d'attendre est un acte de résistance."},
        {contre:"L'univers de Beckett est un univers de dégradation : le corps se décompose, le langage se désintègre, Dieu est silencieux. Il n'y a pas d'issue, pas de progression, pas de rédemption. Le spectateur sort vidé, pas libéré."},
        {synthese:"Beckett lui-même refusait d'expliquer ses pièces. L'absurde n'est ni optimiste ni pessimiste : il constate. C'est au spectateur (et au comédien) de décider ce qu'il en fait. Cette liberté d'interprétation EST peut-être l'espoir que contient l'absurde."}
      ]},
   ]},
  {id:"sa8",tier:"avance",title:"Le monologue de Médée",source:"Corneille — Médée, Acte I, scène 5",
   context:"Médée, magicienne trahie par Jason qui l'abandonne pour une princesse, fait le bilan de sa situation. Exilée, seule, elle cherche en elle-même la force de se venger. C'est un monologue fondateur du théâtre tragique français.",
   extract:"Souverains protecteurs des lois de l'hyménée, Dieux, garants de la foi que Jason m'a donnée, Vous qu'il prit à témoin d'une immortelle ardeur Quand par un faux serment il vainquit ma pudeur, Voyez de quel mépris vous traite son parjure, Et m'aidez à venger cette commune injure.",
   questions:[
     {type:"qcm",q:"À qui Médée s'adresse-t-elle et dans quel but ?",o:["Au public pour le divertir","Aux dieux pour les prendre à témoin et demander vengeance","À Jason pour lui pardonner","À sa servante pour se plaindre"],a:1,
      expl:"Médée invoque les dieux comme témoins et complices de sa vengeance. Elle retourne leur autorité contre Jason : puisqu'il a juré devant eux et trahi, les dieux sont eux aussi offensés. C'est une rhétorique redoutable — elle transforme sa cause personnelle en cause divine."},
     {type:"libre",q:"Médée passe du statut de victime à celui de justicière divine en quelques vers. Quelles indications de jeu donneriez-vous à une comédienne pour marquer cette transformation ?",
      ref:"Le début peut être joué dans la douleur et la supplication — une femme trahie qui implore. Mais à partir de 'Voyez de quel mépris', le ton change : la douleur se transforme en colère froide, puis en détermination absolue. La transformation passe par la verticalité du corps (elle se redresse), le regard qui se durcit, la voix qui gagne en assurance. Sur 'venger cette commune injure', Médée n'est plus une victime — elle est une force. La comédienne doit montrer le moment exact où la souffrance se cristallise en résolution."},
     {type:"argument",q:"Médée est-elle un personnage féministe avant l'heure ou un monstre tragique ?",
      positions:[
        {pour:"Médée refuse d'accepter la trahison passivement. Dans un monde où les femmes n'ont aucun recours légal, elle reprend le pouvoir par la seule voie qui lui reste. Sa rébellion contre l'injustice de Jason peut se lire comme un acte de résistance proto-féministe."},
        {contre:"Médée tuera ses propres enfants. Quelle que soit la légitimité de sa colère, ses actes la placent au-delà de toute sympathie. Le personnage incarne la démesure tragique, l'hybris, pas un modèle d'émancipation."},
        {synthese:"Médée est les deux : sa révolte est légitime ET ses moyens sont monstrueux. C'est cette tension irrésolue qui en fait un des plus grands rôles du répertoire. Chaque époque relit Médée à travers ses propres questionnements sur la justice, le pouvoir et le genre."}
      ]},
   ]},
  {id:"sa9",tier:"avance",title:"La leçon de séduction",source:"Laclos / Hampton — Les Liaisons dangereuses (adapt. théâtrale)",
   context:"La Marquise de Merteuil et le Vicomte de Valmont, anciens amants devenus complices, se lancent des défis de séduction par jeu et par cruauté. Dans cette scène, Merteuil enseigne à Valmont l'art de la manipulation sentimentale.",
   extract:"VALMONT : L'amour est un combat. Les armes ne sont pas les mêmes mais on peut y mourir tout autant. MERTEUIL : On ne meurt pas d'amour, Valmont. On meurt de ne pas savoir quand il faut cesser d'aimer.",
   questions:[
     {type:"qcm",q:"Quel est le rapport de force entre Valmont et Merteuil dans cet échange ?",o:["Valmont domine","Merteuil domine","Ils sont égaux","Il n'y a pas de rapport de force"],a:1,
      expl:"Merteuil corrige Valmont, renverse sa métaphore et montre une lucidité supérieure. En une réplique, elle affirme son intelligence stratégique face au romantisme de Valmont. C'est un duel verbal qu'elle remporte. Le rapport de force est intellectuel, pas social."},
     {type:"libre",q:"Proposez une direction de jeu pour chaque personnage. Quel sous-texte donneriez-vous à chacun ?",
      ref:"Valmont : sous-texte possible = il teste Merteuil, il veut voir si elle est encore vulnérable à l'amour. Sa réplique sur le combat est à moitié sincère — il commence peut-être à sentir quelque chose pour Tourvel. Direction : charme teinté d'incertitude.\nMerteuil : sous-texte = elle perçoit la faille de Valmont et la referme immédiatement. Sa réplique est un avertissement autant qu'une démonstration de supériorité. Direction : contrôle absolu, sourire qui ne monte pas jusqu'aux yeux. Entre eux, le silence après sa réplique est un champ de bataille."},
     {type:"argument",q:"Le théâtre contemporain devrait-il continuer à monter les classiques ou se concentrer sur la création contemporaine ?",
      positions:[
        {pour:"Les classiques parlent de thèmes universels (pouvoir, amour, mort) qui résonnent toujours. Ils forment le socle culturel commun et permettent des relectures infinies à travers les époques."},
        {contre:"Trop de classiques étouffe la création vivante. Le théâtre doit refléter le monde d'aujourd'hui, avec ses langues, ses corps, ses questionnements propres. Les classiques peuvent devenir des monuments figés si on ne renouvelle pas le répertoire."},
        {synthese:"L'opposition est fausse : un classique bien monté EST du théâtre contemporain. La mise en scène, le jeu, l'adresse au public d'aujourd'hui transforment le texte. Et le théâtre a besoin des deux : la mémoire des classiques et l'audace de la création."}
      ]},
   ]},

  /* ── DÉBUTANT (suite) ── */
  {id:"sa10",tier:"debutant",title:"Cyrano et la tirade du nez",source:"Rostand — Cyrano de Bergerac, Acte I, scène 4",
   context:"Cyrano de Bergerac, poète et bretteur au nez immense, est provoqué par le Vicomte de Valvert qui se moque de son nez. Au lieu de se vexer, Cyrano improvise une tirade brillante déclinant toutes les façons dont on aurait pu insulter son nez avec plus d'esprit.",
   extract:"CYRANO : Ah non ! C'est un peu court, jeune homme ! On pouvait dire... Oh ! Dieu !... bien des choses en somme... En variant le ton, — par exemple, tenez : Agressif : « Moi, monsieur, si j'avais un tel nez, il faudrait sur-le-champ que je me l'amputasse ! »",
   questions:[
     {type:"qcm",q:"Quel est l'objectif de Cyrano avec cette tirade ?",o:["Se moquer de son propre nez","Montrer sa supériorité intellectuelle","Humilier le vicomte","Faire rire le public"],a:1,
      expl:"Cyrano retourne l'insulte en démonstration de virtuosité. En énumérant lui-même les moqueries possibles, il montre que l'attaque du vicomte était pauvre et que lui-même est plus intelligent, plus créatif et plus courageux. C'est un acte de domination intellectuelle, pas d'auto-dérision."},
     {type:"libre",q:"Comment joueriez-vous cette tirade ? Quel rythme, quelle énergie ?",
      ref:"Le rythme est l'arme principale ici : commencer lentement (le mépris), puis accélérer (la virtuosité), varier les tons (agressif, amical, descriptif...). L'énergie monte crescendo. Cyrano s'amuse et le public le sent. Il faut du panache — le mot n'est pas choisi au hasard. Le défi : ne pas jouer 'drôle' mais jouer 'brillant'. Le rire vient de l'intelligence, pas du comique."},
   ]},
  {id:"sa11",tier:"debutant",title:"Antigone face à Créon",source:"Anouilh — Antigone",
   context:"Antigone a bravé l'interdit du roi Créon en enterrant son frère Polynice. Créon tente de la raisonner et de la sauver, mais Antigone refuse tout compromis. C'est l'affrontement entre la loi humaine (Créon) et la loi morale (Antigone).",
   extract:"ANTIGONE : Je ne veux pas comprendre. C'est bon pour vous. Moi je suis là pour autre chose que pour comprendre. Je suis là pour vous dire non et pour mourir. CRÉON : C'est facile de dire non.",
   questions:[
     {type:"qcm",q:"Que représente le conflit entre Antigone et Créon ?",o:["Un conflit familial","L'idéalisme contre le pragmatisme","La jeunesse contre la vieillesse","La désobéissance civile"],a:1,
      expl:"Antigone incarne l'idéal absolu : elle refuse tout compromis, même au prix de sa vie. Créon incarne le pragmatisme du pouvoir : il comprend que gouverner demande des concessions. Le conflit est philosophique avant d'être dramatique."},
     {type:"libre",q:"Antigone dit 'je suis là pour dire non'. Quel est le sous-texte ? Que ne dit-elle pas ?",
      ref:"Sous-texte possible : 'je préfère mourir pure que vivre compromise'. Elle ne parle pas de son frère ici — elle parle d'elle-même, de son besoin d'absolu. Le 'non' n'est pas politique, il est existentiel. C'est son identité. Direction : une calme certitude, pas de la rébellion criarde."},
   ]},
  {id:"sa12",tier:"debutant",title:"L'aveu de l'Avare",source:"Molière — L'Avare, Acte IV, scène 7",
   context:"Suite de la scène d'Harpagon. Après sa panique du vol, un quiproquo s'installe avec Valère, qui croit parler d'Élise (la fille d'Harpagon qu'il aime) alors qu'Harpagon parle de sa cassette volée. Chacun croit que l'autre parle de la même chose.",
   extract:"HARPAGON : Au voleur ! au voleur ! à l'assassin ! au meurtrier ! Justice, juste Ciel ! je suis perdu, je suis assassiné, on m'a coupé la gorge, on m'a dérobé mon argent.",
   questions:[
     {type:"qcm",q:"Pourquoi ce monologue est-il à la fois comique et tragique ?",o:["Parce qu'Harpagon exagère","Parce qu'il compare la perte d'argent à la mort","Parce qu'il est seul en scène","Parce que le public connaît le voleur"],a:1,
      expl:"Harpagon vit la perte de son argent comme un meurtre — 'on m'a coupé la gorge'. L'excès est comique mais la souffrance est réelle pour lui. Molière montre que l'avarice est une maladie qui déforme la réalité. Le rire naît du décalage entre ce qui est perdu (de l'argent) et ce qui est ressenti (la mort)."},
     {type:"libre",q:"Comment doseriez-vous le comique et le pathétique dans cette scène ?",
      ref:"Le piège serait de jouer 'clown'. Harpagon est sincèrement désespéré — c'est de cette sincérité que naît le comique. Il faut jouer la douleur VRAIE d'un homme qui perd ce qu'il aime le plus au monde. Le public rit PARCE QUE c'est pathétique. Si l'acteur joue drôle, il tue le comique."},
   ]},

  /* ── INTERMÉDIAIRE (suite) ── */
  {id:"sa13",tier:"intermediaire",title:"Le monologue d'Hamlet",source:"Shakespeare (trad.) — Hamlet, Acte III, scène 1",
   context:"Le prince Hamlet, rongé par le doute, hésite entre agir pour venger son père assassiné par son oncle Claudius, ou renoncer face à l'absurdité de l'existence. C'est le plus célèbre monologue du théâtre : 'Être ou ne pas être'.",
   extract:"HAMLET : Être ou ne pas être, telle est la question. Est-il plus noble pour l'âme de souffrir les traits de la fortune outrageuse, ou de prendre les armes contre une mer de tourments et d'y mettre fin par la révolte ?",
   questions:[
     {type:"qcm",q:"De quoi parle réellement Hamlet dans ce monologue ?",o:["De philosophie","Du suicide","De la vengeance","De son père"],a:1,
      expl:"Hamlet envisage le suicide comme solution à sa souffrance. 'Être ou ne pas être' = vivre ou mourir. Les 'traits de la fortune' sont ses malheurs. 'Prendre les armes' est paradoxal car les armes sont tournées contre soi. C'est un monologue intérieur sur le courage qu'il faut pour vivre face à l'injustice."},
     {type:"libre",q:"Analysez le rythme de ce passage. Où sont les hésitations, les certitudes ?",
      ref:"'Être ou ne pas être' — suspension, hésitation. 'Telle est la question' — certitude temporaire, il pose le cadre. Puis il explore deux options, chacune commençant par un infinitif (souffrir / prendre les armes). Le rythme accélère avec 'une mer de tourments'. L'acteur doit sentir la pensée se former en temps réel — pas réciter un texte connu."},
   ]},
  {id:"sa14",tier:"intermediaire",title:"Tartuffe démasqué",source:"Molière — Tartuffe, Acte IV, scène 5",
   context:"Tartuffe, un faux dévot qui s'est installé chez Orgon en feignant la piété, tente de séduire Elmire, la femme d'Orgon. Ce dernier, caché sous la table, assiste enfin à l'hypocrisie de celui qu'il admirait aveuglément.",
   extract:"ORGON (sortant de dessous la table) : Voilà, je vous l'avoue, un abominable homme ! ELMIRE : Quoi ? vous sortez si tôt ? Vous vous moquez des gens. Rentrez sous le tapis, il n'est pas encore temps.",
   questions:[
     {type:"qcm",q:"Quel procédé dramatique Molière utilise-t-il dans cette scène ?",o:["Le quiproquo","Le théâtre dans le théâtre","La mise en abyme","L'aparté"],a:1,
      expl:"Elmire joue une scène devant Orgon caché : c'est du théâtre dans le théâtre. Elle EST comédienne dans la scène. Orgon est spectateur. Le vrai public regarde un spectateur qui regarde une actrice. Le procédé est méta-théâtral et pose la question : Elmire joue-t-elle, ou dit-elle aussi une part de vérité ?"},
     {type:"libre",q:"Comment Elmire navigue-t-elle entre le jeu (pour piéger Tartuffe) et ses propres émotions ?",
      ref:"Elmire doit séduire Tartuffe tout en contrôlant la situation — mais jusqu'où ? Sa remarque à Orgon ('Vous sortez si tôt') montre de l'agacement : elle a dû aller plus loin qu'elle ne le souhaitait. Direction : un personnage qui joue un rôle mais dont le masque craque par moments. Le dégoût physique transparaît sous la séduction."},
   ]},
  {id:"sa15",tier:"intermediaire",title:"Ruy Blas et la reine",source:"Hugo — Ruy Blas, Acte III, scène 4",
