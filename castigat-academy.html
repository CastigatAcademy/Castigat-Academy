    content:["Le théâtre naît en Grèce au VIe siècle av. J.-C., lors des Grandes Dionysies, fêtes religieuses en l'honneur du dieu Dionysos.","Thespis, considéré comme le premier acteur de l'histoire, se détache du chœur vers 534 av. J.-C. pour incarner un personnage seul — c'est la naissance du dialogue dramatique.","Les trois grands tragiques grecs : Eschyle (le père de la tragédie, il ajoute un 2e acteur), Sophocle (il en ajoute un 3e — Œdipe Roi, Antigone), Euripide (il humanise les héros — Médée, Les Troyennes).","La comédie naît avec Aristophane, maître de la satire politique (Les Nuées, Les Oiseaux). Le théâtre grec se joue en plein air, dans des amphithéâtres pouvant accueillir 15 000 spectateurs, avec des masques amplificateurs."],
    quiz:[{q:"En quelle période naît le théâtre occidental ?",o:["IIe siècle av. J.-C.","VIe siècle av. J.-C.","IIe siècle ap. J.-C.","Moyen Âge"],a:1},{q:"Qui est considéré comme le premier acteur de l'histoire ?",o:["Sophocle","Thespis","Aristophane","Euripide"],a:1},{q:"Quel tragique grec a ajouté un deuxième acteur sur scène ?",o:["Sophocle","Euripide","Eschyle","Aristophane"],a:2}]},
  {id:"h_f2",title:"Shakespeare, le génie",cat:"Auteurs",icon:"✒️",dur:"10 min",xp:25,
    content:["William Shakespeare (1564–1616), né à Stratford-upon-Avon, a écrit 37 pièces et 154 sonnets en 25 ans de carrière.","Ses tragédies explorent les abîmes de l'âme : Hamlet (le doute), Macbeth (l'ambition), Othello (la jalousie), Le Roi Lear (la folie), Roméo et Juliette (l'amour impossible).","Le Globe Theatre, construit en 1599, accueillait 3 000 spectateurs. Le parterre debout payait un penny, les loges étaient pour les nobles. Pas de décor — tout est dans le texte.","Shakespeare a inventé plus de 1 700 mots anglais (eyeball, lonely, generous...) et des expressions encore utilisées (break the ice, wild goose chase). Il écrivait pour tous : peuple et rois, rire et larmes dans la même pièce."],
    quiz:[{q:"En quelle année est construit le Globe Theatre ?",o:["1576","1599","1613","1642"],a:1},{q:"Quelle tragédie explore le thème de la jalousie ?",o:["Hamlet","Macbeth","Othello","Le Roi Lear"],a:2},{q:"Combien de sonnets Shakespeare a-t-il écrits ?",o:["100","126","154","200"],a:2}]},
  {id:"h_f3",title:"La scène : vocabulaire de base",cat:"Glossaire",icon:"📖",dur:"6 min",xp:15,
    content:["Côté cour (droite du spectateur) et côté jardin (gauche). L'astuce : C et J sont dans l'ordre alphabétique de gauche à droite — Jardin à gauche, Cour à droite. L'origine vient du Palais des Tuileries.","Le lointain (fond de scène) et la face (devant, côté public). L'avant-scène est l'espace entre le rideau et l'orchestre. Le manteau d'Arlequin est le cadre de scène.","Les coulisses : espaces latéraux cachés où les acteurs attendent. Les cintres : espace au-dessus de la scène pour les décors suspendus. Le gril : structure métallique tout en haut.","Le plateau : la scène elle-même. La fosse : espace sous la scène ou devant pour l'orchestre. Les pendrillons : rideaux latéraux qui masquent les coulisses."],
    quiz:[{q:"Côté cour, c'est quel côté pour le spectateur ?",o:["Gauche","Droite","Le fond","Ça dépend du théâtre"],a:1},{q:"Comment s'appelle le cadre de scène ?",o:["L'avant-scène","Le manteau d'Arlequin","Le lointain","Les pendrillons"],a:1}]},
  {id:"h_f4",title:"Les émotions de base",cat:"Techniques",icon:"⭐",dur:"7 min",xp:20,
    content:["Paul Ekman, psychologue américain, identifie 6 émotions universelles : joie, tristesse, colère, peur, surprise, dégoût. Elles sont reconnues dans toutes les cultures.","Au théâtre, l'émotion est le carburant du jeu. Mais on ne la 'mime' pas — on crée les conditions pour qu'elle émerge. Stanislavski appelle ça la 'reviviscence'.","Chaque émotion a une signature corporelle : la colère fait avancer et serrer les poings, la peur fait reculer et rétrécir, la joie ouvre la poitrine et élève, la tristesse pèse et replie vers le sol.","Le comédien ne ressent pas forcément l'émotion — il la joue avec précision. C'est la différence entre 'être ému' et 'émouvoir le public'. Les deux approches (ressentir vs montrer) divisent les écoles depuis 250 ans."],
    quiz:[{q:"Combien d'émotions universelles selon Ekman ?",o:["4","6","8","12"],a:1},{q:"Quelle émotion fait physiquement reculer le corps ?",o:["La colère","La joie","La peur","Le dégoût"],a:2}]},
],
apprenti:[
  {id:"h_a1",title:"Molière, le patron",cat:"Auteurs",icon:"✒️",dur:"10 min",xp:25,
    content:["Jean-Baptiste Poquelin (1622–1673), dit Molière, quitte une carrière de tapissier royal pour le théâtre. Il fonde l'Illustre Théâtre à 21 ans, fait faillite, et part 13 ans en tournée en province.","De retour à Paris, il conquiert Louis XIV. Le Misanthrope, Tartuffe (censuré 5 ans par les dévots), L'Avare, Les Femmes savantes, Le Bourgeois gentilhomme — il dénonce l'hypocrisie, la vanité et la bêtise avec un génie comique inégalé.","Molière est auteur, metteur en scène ET acteur principal de ses pièces. Il meurt le 17 février 1673 après la 4e représentation du Malade imaginaire, quelques heures après s'être effondré en scène — la légende veut qu'il soit mort sur scène, mais c'est faux.","La Comédie-Française, fondée en 1680 par fusion de sa troupe, s'appelle encore 'la Maison de Molière'. On parle de 'la langue de Molière' pour désigner le français."],
    quiz:[{q:"Quel était le vrai nom de Molière ?",o:["Pierre Corneille","Jean-Baptiste Poquelin","Jean Racine","Denis Diderot"],a:1},{q:"Combien d'années Tartuffe a-t-il été censuré ?",o:["2 ans","5 ans","10 ans","Il n'a jamais été censuré"],a:1},{q:"En quelle année meurt Molière ?",o:["1670","1673","1680","1699"],a:1}]},
  {id:"h_a2",title:"Le quatrième mur",cat:"Techniques",icon:"🎭",dur:"6 min",xp:15,
    content:["Imaginez la scène comme une boîte ouverte sur le public : trois murs existent (fond + deux côtés), le quatrième est invisible — c'est le 'mur' entre les acteurs et les spectateurs.","Diderot théorise ce concept dans son Discours sur la poésie dramatique (1758) : les acteurs doivent jouer comme si le public n'existait pas, pour créer l'illusion du réel.","Brecht fait exactement l'inverse : ses acteurs cassent le 4e mur, s'adressent au public, montrent qu'ils jouent. L'objectif ? Empêcher l'identification émotionnelle et éveiller l'esprit critique du spectateur.","Aujourd'hui, beaucoup de metteurs en scène jouent avec ce mur : tantôt fermé (réalisme), tantôt ouvert (adresse directe au public). Le théâtre contemporain mélange souvent les deux."],
    quiz:[{q:"Qui théorise le concept du 4e mur ?",o:["Molière","Brecht","Diderot","Stanislavski"],a:2},{q:"Que fait Brecht avec le 4e mur ?",o:["Il le renforce","Il le casse","Il l'ignore","Il le décore"],a:1}]},
  {id:"h_a3",title:"La voix au théâtre",cat:"Techniques",icon:"🗣️",dur:"8 min",xp:20,
    content:["La voix du comédien doit porter jusqu'au dernier rang sans micro. C'est un instrument qui se travaille quotidiennement, comme un musicien travaille ses gammes.","La projection vocale part du diaphragme, pas de la gorge. Le diaphragme est un muscle en forme de coupole sous les poumons — c'est lui qui pousse l'air. Forcer avec la gorge fatigue les cordes vocales et réduit le volume.","Le timbre est l'empreinte unique de chaque voix : grave ou aigu, chaud ou métallique, clair ou voilé. Un bon acteur module son timbre selon le personnage. Louis Jouvet avait un timbre reconnaissable entre mille.","Le 'masque' est la zone de résonance du visage (pommettes, sinus, front). Quand la voix résonne dans le masque, elle porte naturellement. Exercice : humez 'mmmmm' en sentant vibrer vos pommettes."],
    quiz:[{q:"D'où part la projection vocale ?",o:["La gorge","Le diaphragme","La poitrine","Le ventre"],a:1},{q:"Qu'est-ce que le 'masque' en technique vocale ?",o:["Un accessoire de scène","La zone de résonance du visage","Un exercice de respiration","Le maquillage de l'acteur"],a:1}]},
  {id:"h_a4",title:"Racine, la perfection",cat:"Auteurs",icon:"✒️",dur:"10 min",xp:25,
    content:["Jean Racine (1639–1699), orphelin élevé par les jansénistes de Port-Royal, est le maître absolu de la tragédie classique française. Son éducation religieuse stricte nourrit ses thèmes : la passion coupable, le destin, la fatalité.","Phèdre (l'amour interdit), Andromaque (le chantage amoureux), Britannicus (le tyran naissant), Bérénice (le renoncement) — ses pièces sont des huis clos psychologiques en alexandrins d'une musicalité parfaite.","Racine dit tout avec retenue. Pas de combat sur scène, pas de sang — la violence est dans les mots. Quand Phèdre dit 'je brûle', elle décrit un incendie intérieur plus puissant que n'importe quel effet spécial.","Sa rivalité avec Corneille (l'héroïsme vs la passion, la volonté vs la fatalité) a défini le théâtre du XVIIe siècle. Corneille montre des héros qui choisissent ; Racine montre des êtres qui subissent."],
    quiz:[{q:"Quel est le thème central de l'œuvre de Racine ?",o:["L'héroïsme","La passion et la fatalité","Le comique","La politique"],a:1},{q:"Quelle pièce de Racine traite du renoncement amoureux ?",o:["Phèdre","Andromaque","Bérénice","Britannicus"],a:2},{q:"Quelle est la grande différence entre Corneille et Racine ?",o:["Vers vs prose","Comédie vs tragédie","Héros qui choisissent vs êtres qui subissent","Théâtre grec vs théâtre romain"],a:2}]},
],
dimanche:[
  {id:"h_d1",title:"Le théâtre romain",cat:"Histoire",icon:"🏛️",dur:"8 min",xp:20,
    content:["Rome emprunte le théâtre aux Grecs dès le IIIe siècle av. J.-C. mais y ajoute le goût du spectaculaire et du divertissement de masse.","Plaute (254–184 av. J.-C.) et Térence (190–159 av. J.-C.) sont les maîtres de la comédie latine. Plaute est populaire et farcesque, Térence est raffiné et psychologique. Ils inspirent directement Molière et Shakespeare.","Les théâtres romains en pierre (contrairement aux gradins en bois grecs) accueillent jusqu'à 50 000 spectateurs. Le velum (toile tendue) protège du soleil. L'architecture est un chef-d'œuvre d'acoustique.","Le mime et la pantomime deviennent des arts à part entière. Sénèque écrit des tragédies violentes destinées à la lecture plutôt qu'à la représentation — mais elles influenceront le théâtre élisabéthain."],
    quiz:[{q:"Quel auteur comique romain a directement influencé Molière ?",o:["Sénèque","Plaute","Cicéron","Virgile"],a:1},{q:"À quoi servait le velum dans les théâtres romains ?",o:["Masquer la scène","Protéger du soleil","Amplifier le son","Décorer"],a:1}]},
  {id:"h_d2",title:"La Commedia dell'arte",cat:"Histoire",icon:"🎭",dur:"10 min",xp:25,
    content:["Née en Italie au XVIe siècle, la Commedia dell'arte est le théâtre d'improvisation par excellence. 'Dell'arte' signifie 'de métier' — ce sont des professionnels, pas des amateurs.","Les personnages sont des archétypes masqués : Arlequin (le valet agile et affamé), Colombine (la servante maligne), Pantalone (le vieux riche avare), le Docteur (le pédant ridicule), le Capitaine (le faux brave).","Les acteurs improvisent à partir de canevas sommaires (scenarii) avec des lazzi — gags codifiés et transmis de génération en génération. Le corps est roi : acrobaties, mime, pantomime.","La Commedia a profondément influencé Molière (qui partageait la salle du Petit-Bourbon avec les Comédiens-Italiens), le théâtre de marionnettes, le cinéma muet (Chaplin, Keaton) et jusqu'aux séries comiques actuelles."],
    quiz:[{q:"Que signifie 'dell'arte' ?",o:["De l'art","De métier","De la rue","D'improvisation"],a:1},{q:"Quel personnage de la Commedia est un vieux riche avare ?",o:["Arlequin","Le Docteur","Pantalone","Le Capitaine"],a:2},{q:"Qu'est-ce qu'un 'lazzo' ?",o:["Un masque","Un gag codifié","Un décor","Un costume"],a:1}]},
  {id:"h_d3",title:"Le théâtre médiéval",cat:"Histoire",icon:"🏛️",dur:"8 min",xp:20,
    content:["Au Moyen Âge, le théâtre renaît dans l'église : les tropes (dialogues chantés en latin) illustrent les épisodes bibliques lors des offices, puis sortent sur le parvis.","Les 'mystères' sont des spectacles monumentaux racontant la Bible en plusieurs journées (le Mystère de la Passion d'Arnoul Gréban dure 4 jours). Des centaines de figurants, des machines spectaculaires.","La farce — courte, comique, populaire — naît dans les rues et les foires. La Farce de Maître Pathelin (v. 1465) est un chef-d'œuvre d'humour et de ruse, toujours joué aujourd'hui.","Les Confrères de la Passion obtiennent le monopole du théâtre à Paris en 1402 à l'Hôpital de la Trinité. La moralité (pièce allégorique) et la sottie (satire politique jouée par des 'sots' en costume de fou) complètent le répertoire."],
    quiz:[{q:"Combien de jours durait le Mystère de la Passion de Gréban ?",o:["1 jour","2 jours","4 jours","7 jours"],a:2},{q:"Qu'est-ce qu'une sottie ?",o:["Une tragédie","Une satire politique jouée par des fous","Un mystère religieux","Une farce"],a:1}]},
  {id:"h_d4",title:"L'improvisation",cat:"Techniques",icon:"🎭",dur:"8 min",xp:20,
    content:["L'improvisation est la base de tout jeu vivant. Même un texte appris par cœur se joue 'comme si c'était la première fois' — c'est l'illusion de la première fois, concept fondamental du théâtre.","Règle d'or : ne jamais bloquer la proposition du partenaire. Accepter et rebondir — c'est le 'Oui, et…'. Dire 'non' ferme la scène ; dire 'oui, et…' l'ouvre à l'infini.","Keith Johnstone (Impro, 1979) et Viola Spolin (Improvisation for the Theater, 1963) sont les pionniers de l'impro moderne. Johnstone insiste sur le statut, Spolin sur le jeu sensoriel.","L'impro développe l'écoute, la réactivité, la confiance en soi et la générosité — des qualités essentielles pour tout comédien, même dans le théâtre de texte. C'est aussi un spectacle à part entière (match d'impro, format long)."],
    quiz:[{q:"Quelle est la règle d'or de l'improvisation ?",o:["Dire non pour surprendre","Oui, et…","Toujours être drôle","Parler le plus vite possible"],a:1},{q:"Qui a écrit 'Impro' en 1979 ?",o:["Viola Spolin","Keith Johnstone","Jacques Lecoq","Augusto Boal"],a:1}]},
],
amateur:[
  {id:"h_am1",title:"Méthode Stanislavski",cat:"Techniques",icon:"🧠",dur:"12 min",xp:35,
    content:["Constantin Stanislavski (1863–1938), cofondateur du Théâtre d'Art de Moscou, crée le premier 'système' complet de formation de l'acteur. Avant lui, le jeu reposait sur le talent naturel et l'imitation.","Ses outils : la mémoire affective (puiser dans ses propres souvenirs pour nourrir l'émotion du personnage), le 'si magique' (que ferais-je SI j'étais dans cette situation ?), les circonstances données, le super-objectif du personnage.","Son système évolue au fil de sa vie : de la reviviscence (revivre l'émotion) vers les actions physiques (le corps génère l'émotion). Cette évolution est souvent méconnue — l'Actors Studio de Strasberg ne retient que la première phase.","L'Actors Studio (fondé en 1947 à New York) applique sa méthode : Brando, Pacino, De Niro, Meryl Streep. Mais Stella Adler et Sanford Meisner proposent des variantes importantes — le débat sur 'la bonne méthode' dure encore aujourd'hui."],
    quiz:[{q:"Quel est le concept central de la première période de Stanislavski ?",o:["La distanciation","La mémoire affective","Le mime","L'improvisation pure"],a:1},{q:"Vers quoi évolue Stanislavski dans sa deuxième période ?",o:["Le théâtre de l'absurde","Les actions physiques","Le théâtre politique","L'abandon du texte"],a:1},{q:"Qui fonde l'Actors Studio en 1947 ?",o:["Stanislavski lui-même","Lee Strasberg","Stella Adler","Elia Kazan et Cheryl Crawford"],a:3}]},
  {id:"h_am2",title:"Tchekhov, poète du quotidien",cat:"Auteurs",icon:"✒️",dur:"10 min",xp:30,
    content:["Anton Tchekhov (1860–1904), médecin et dramaturge russe, révolutionne le théâtre en montrant la vie telle qu'elle est — sans héros, sans péripéties spectaculaires, juste des êtres humains qui attendent, espèrent, et se manquent.","Ses quatre grandes pièces : La Mouette (l'art vs la vie), Oncle Vania (le temps perdu), Les Trois Sœurs (le rêve inaccessible), La Cerisaie (la fin d'un monde). Chacune est un chef-d'œuvre de subtilité.","L'essentiel chez Tchekhov est dans le non-dit, le silence, le regard, ce qui se passe entre les répliques. Ses personnages parlent de la pluie, mais on entend leur cœur se briser. C'est le triomphe du sous-texte.","Sa collaboration avec Stanislavski au Théâtre d'Art de Moscou (à partir de 1898) change l'histoire du théâtre mondial — même si les deux hommes n'étaient pas toujours d'accord sur l'interprétation."],
    quiz:[{q:"Quel est le métier de Tchekhov en dehors du théâtre ?",o:["Avocat","Médecin","Professeur","Militaire"],a:1},{q:"Quelle pièce de Tchekhov traite de la fin d'un monde aristocratique ?",o:["La Mouette","Oncle Vania","Les Trois Sœurs","La Cerisaie"],a:3},{q:"Avec quel metteur en scène Tchekhov collabore-t-il ?",o:["Meyerhold","Stanislavski","Brecht","Grotowski"],a:1}]},
  {id:"h_am3",title:"Le travail à la table",cat:"Techniques",icon:"📖",dur:"10 min",xp:30,
    content:["Avant de se lever pour jouer, on s'assoit. Le travail à la table est la première étape des répétitions — parfois la plus longue et la plus importante.","On analyse le texte en profondeur : qui parle ? à qui ? pourquoi ? dans quel contexte historique et émotionnel ? avec quelle intention cachée ? quel est le non-dit ?","Les questions fondamentales pour chaque scène : quel est l'objectif du personnage (ce qu'il veut) ? quel est son obstacle (ce qui l'empêche) ? quelle est la relation avec l'autre (amour, pouvoir, manipulation) ? comment la scène le transforme ?","Le travail à la table peut durer des semaines chez certains metteurs en scène (Patrice Chéreau y passait un mois). Plus il est profond, plus le jeu sera riche — parce que l'acteur sait exactement POURQUOI il dit chaque mot."],
    quiz:[{q:"Quelle est la première question à se poser au travail à la table ?",o:["Comment je me déplace ?","Quel est l'objectif de mon personnage ?","Quelle voix je prends ?","Où est mon costume ?"],a:1},{q:"Quel metteur en scène était connu pour un très long travail à la table ?",o:["Bob Wilson","Patrice Chéreau","Peter Brook","Ariane Mnouchkine"],a:1}]},
  {id:"h_am4",title:"Marivaux, la surprise de l'amour",cat:"Auteurs",icon:"✒️",dur:"8 min",xp:25,
    content:["Pierre de Marivaux (1688–1763) explore comme personne les méandres du sentiment amoureux. Ses personnages ne tombent pas amoureux — ils le découvrent malgré eux, et cette découverte EST la pièce.","Le Jeu de l'amour et du hasard (deux couples échangent leurs rôles), Les Fausses Confidences (un valet orchestre une déclaration impossible), La Double Inconstance (on manipule deux amoureux pour les séparer).","Le 'marivaudage' : ce langage subtil où l'on dit le contraire de ce qu'on ressent, où un 'je ne vous aime pas' veut dire 'je meurs d'amour'. C'est un badinage sophistiqué qui cache des émotions brûlantes.","Contrairement à Molière qui observe les types sociaux, Marivaux observe le cœur en temps réel. Ses personnages se surprennent eux-mêmes — et c'est cette surprise qui enchante le public depuis 300 ans."],
    quiz:[{q:"Qu'est-ce que le marivaudage ?",o:["Crier ses sentiments","Dire le contraire de ce qu'on ressent","Un style de combat scénique","Une forme d'improvisation"],a:1},{q:"Dans quelle pièce deux couples échangent-ils leurs rôles ?",o:["Les Fausses Confidences","La Double Inconstance","Le Jeu de l'amour et du hasard","L'Île des esclaves"],a:2}]},
],
pensionnaire:[
  {id:"h_pe1",title:"Théâtre de l'absurde",cat:"Histoire",icon:"🌬️",dur:"10 min",xp:30,
    content:["Après 1945, le traumatisme de la guerre remet en question le sens même de l'existence. Le théâtre de l'absurde met cette crise en scène : le langage se dérègle, l'action tourne en rond, les personnages sont perdus.","Samuel Beckett, En attendant Godot (1953) : deux clochards attendent quelqu'un qui ne viendra jamais. Tout est dit. Le vide, l'attente, l'espoir absurde — et pourtant, c'est drôle et profondément humain.","Eugène Ionesco, La Cantatrice chauve (1950) : un couple anglais échange des banalités jusqu'à ce que le langage explose littéralement. Les Chaises (1952) : deux vieux préparent un discours pour un public de chaises vides.","Le terme 'théâtre de l'absurde' est inventé par le critique Martin Esslin en 1961. Ionesco et Beckett refusent l'étiquette. Avec Adamov, Genet, Arrabal, Pinter — ce mouvement est l'un des plus joués au monde aujourd'hui."],
    quiz:[{q:"En quelle année est créé En attendant Godot ?",o:["1945","1950","1953","1961"],a:2},{q:"Qui invente le terme 'théâtre de l'absurde' ?",o:["Ionesco","Beckett","Martin Esslin","Jean-Paul Sartre"],a:2},{q:"Dans Les Chaises de Ionesco, à qui s'adressent les deux vieux ?",o:["Au public","À des fantômes","À des chaises vides","À Dieu"],a:2}]},
  {id:"h_pe2",title:"Le théâtre physique",cat:"Techniques",icon:"🏃",dur:"10 min",xp:30,
    content:["Le théâtre physique place le corps au centre de l'expression — les mots deviennent secondaires, voire disparaissent. Le corps raconte, exprime, transforme.","Jacques Lecoq (1921–1999) fonde son école à Paris en 1956. Sa pédagogie repose sur le mouvement, l'observation du vivant, et le masque neutre — un masque sans expression qui force le corps à tout communiquer.","Le masque neutre est un outil pédagogique extraordinaire : quand le visage est neutre, le corps doit prendre le relais. L'élève découvre que son dos, ses mains, sa démarche racontent autant que son visage.","L'héritage de Lecoq est immense : la compagnie Complicité (Simon McBurney), DV8, le Théâtre du Mouvement, et des centaines d'artistes dans le monde. Le Cirque du Soleil puise aussi dans sa pédagogie."],
    quiz:[{q:"En quelle année Lecoq fonde-t-il son école à Paris ?",o:["1947","1956","1963","1972"],a:1},{q:"À quoi sert le masque neutre ?",o:["À effrayer le public","À forcer le corps à tout exprimer","À cacher l'identité de l'acteur","À protéger le visage"],a:1},{q:"Quelle compagnie britannique est directement issue de l'enseignement de Lecoq ?",o:["Royal Shakespeare","Complicité","DV8","Punchdrunk"],a:1}]},
  {id:"h_pe3",title:"La mise en scène moderne",cat:"Techniques",icon:"🎬",dur:"10 min",xp:30,
    content:["Le metteur en scène est un métier récent. Avant le XIXe siècle, les acteurs principaux organisaient eux-mêmes les représentations — on appelait ça le 'régisseur'.","André Antoine (1858–1943) révolutionne le théâtre en 1887 avec le Théâtre-Libre : il orchestre tous les éléments (jeu, décor, lumière, son) pour créer une vision cohérente. C'est la naissance de la mise en scène moderne.","La mise en scène pense l'espace, le temps, la lumière, le son, les corps et le texte comme un tout organique. Deux mises en scène du même Hamlet peuvent être radicalement opposées — et toutes deux légitimes.","Au XXe siècle, les grands metteurs en scène deviennent des auteurs à part entière : Stanislavski, Meyerhold, Brecht, Brook, Strehler, Mnouchkine, Chéreau, Wilson — chacun avec sa vision du monde et du théâtre."],
    quiz:[{q:"Qui est considéré comme le premier metteur en scène moderne en France ?",o:["Molière","André Antoine","Jacques Copeau","Louis Jouvet"],a:1},{q:"En quelle année Antoine crée-t-il le Théâtre-Libre ?",o:["1850","1870","1887","1900"],a:2},{q:"Avant la mise en scène moderne, qui organisait les représentations ?",o:["Le roi","Les acteurs principaux","Le public","Les auteurs"],a:1}]},
  {id:"h_pe4",title:"Hugo et le théâtre romantique",cat:"Auteurs",icon:"✒️",dur:"10 min",xp:30,
    content:["Victor Hugo (1802–1885) publie la Préface de Cromwell en 1827 : un manifeste explosif contre les règles du classicisme. Il veut mêler le sublime et le grotesque, les rois et le peuple, la poésie et la violence.","Hernani (25 février 1830) provoque une bataille mémorable dans la salle : les jeunes romantiques (menés par Théophile Gautier en gilet rouge) applaudissent, les classiques sifflent. 45 soirées de chahut. Le théâtre français bascule.","Ruy Blas (1838) est son chef-d'œuvre dramatique : un valet amoureux d'une reine, qui harangue les ministres corrompus. Lucrèce Borgia, Le Roi s'amuse, Marie Tudor complètent un théâtre ambitieux et spectaculaire.","Paradoxe : Hugo libère le théâtre de 200 ans de règles classiques... tout en écrivant en alexandrins magnifiques. Son vers est libre dans le classique — il casse la césure, enjambe, rejette, et fait de l'alexandrin un instrument de liberté."],
    quiz:[{q:"En quelle année a lieu la bataille d'Hernani ?",o:["1827","1830","1838","1848"],a:1},{q:"Quel personnage de Hugo est un valet amoureux d'une reine ?",o:["Hernani","Ruy Blas","Triboulet","Lucrèce"],a:1},{q:"Quelle couleur portait Théophile Gautier à la première d'Hernani ?",o:["Un chapeau noir","Un gilet rouge","Une cape bleue","Une écharpe blanche"],a:1}]},
],
societaire:[
  {id:"h_so1",title:"Le classicisme français",cat:"Histoire",icon:"🏛️",dur:"12 min",xp:35,
    content:["Le classicisme théâtral français (1630–1680) impose la règle des trois unités : temps (24h maximum), lieu (un seul décor), action (une seule intrigue principale). Ces règles viennent d'une interprétation (discutable) de la Poétique d'Aristote.","Corneille incarne l'héroïsme : Le Cid (1637) pose le dilemme honneur vs amour. Racine incarne la passion fatale : Phèdre (1677) montre une femme dévorée par un amour interdit. Molière incarne le comique de caractère : Tartuffe, L'Avare.","L'alexandrin — 12 syllabes avec césure à la 6e — est le vers roi du théâtre classique. Sa musicalité impose un rythme qui structure la pensée et l'émotion. Bien dit, il n'est jamais monotone — c'est une architecture sonore.","La Comédie-Française, fondée en 1680 par Louis XIV (fusion de la troupe de Molière et de celle de l'Hôtel de Bourgogne), est le plus ancien théâtre permanent au monde encore en activité. Les acteurs titulaires s'appellent 'sociétaires'."],
    quiz:[{q:"De quelle œuvre antique s'inspirent les trois unités ?",o:["L'Iliade d'Homère","La Poétique d'Aristote","Les Dialogues de Platon","L'Énéide de Virgile"],a:1},{q:"En quelle année est fondée la Comédie-Française ?",o:["1660","1673","1680","1700"],a:2},{q:"Comment s'appellent les acteurs titulaires de la Comédie-Française ?",o:["Pensionnaires","Sociétaires","Comédiens du Roi","Interprètes"],a:1}]},
  {id:"h_so2",title:"Corneille vs Racine",cat:"Histoire",icon:"✒️",dur:"10 min",xp:30,
    content:["Pierre Corneille (1606–1684) et Jean Racine (1639–1699) incarnent deux visions opposées de la tragédie. Leur rivalité est le grand feuilleton littéraire du XVIIe siècle.","Corneille croit au libre arbitre : ses héros (Rodrigue, Auguste, Polyeucte) choisissent, luttent, triomphent par la volonté. Le sublime cornélien, c'est la victoire de la grandeur d'âme sur les passions.","Racine croit à la fatalité : ses personnages (Phèdre, Hermione, Néron) sont prisonniers de passions qui les dépassent. Le sublime racinien, c'est la beauté du désastre — la perfection formelle qui dit l'impuissance humaine.","La querelle éclate en 1670 quand les deux écrivent chacun une Bérénice. Celle de Racine triomphe, celle de Corneille (Tite et Bérénice) échoue. C'est le passage de témoin — et la consécration de Racine comme le nouveau maître."],
    quiz:[{q:"Quelle est la vision de l'homme chez Corneille ?",o:["L'homme est victime du destin","L'homme peut choisir et triompher par sa volonté","L'homme est fondamentalement comique","L'homme est absurde"],a:1},{q:"En quelle année Corneille et Racine écrivent-ils chacun une Bérénice ?",o:["1660","1667","1670","1677"],a:2},{q:"Qui remporte la 'bataille des Bérénice' ?",o:["Corneille","Racine","Match nul","Molière"],a:1}]},
  {id:"h_so3",title:"La lumière au théâtre",cat:"Techniques",icon:"💡",dur:"10 min",xp:30,
    content:["Avant l'électricité : bougies (le lustre de la Comédie-Française en comptait 320), rampe à huile au bord de la scène, torches. Au Globe de Shakespeare, on jouait de jour — le texte devait créer la nuit.","L'arrivée de l'éclairage au gaz (1822) puis de l'électricité (1880) révolutionne le théâtre : on peut enfin créer l'obscurité, isoler un acteur dans un faisceau, sculpter l'espace avec la lumière.","Les bases de l'éclairage scénique : la face aplatit, le latéral sculpte, la douche isole et écrase, le contre-jour crée le mystère et la silhouette. La combinaison de ces angles crée une infinité d'ambiances.","Le créateur lumière est un artiste à part entière depuis les années 1960. Des noms comme Dominique Bruguière, Patrice Trottier, ou Robert Wilson (qui est autant éclairagiste que metteur en scène) ont élevé la lumière au rang d'écriture scénique."],
    quiz:[{q:"Combien de bougies comptait le lustre de la Comédie-Française ?",o:["120","220","320","520"],a:2},{q:"En quelle année l'éclairage au gaz arrive-t-il au théâtre ?",o:["1780","1822","1850","1880"],a:1},{q:"Quel type d'éclairage crée un effet de mystère et de silhouette ?",o:["La face","Le latéral","La douche","Le contre-jour"],a:3}]},
  {id:"h_so4",title:"Le texte classique : mode d'emploi",cat:"Techniques",icon:"📖",dur:"12 min",xp:35,
    content:["L'alexandrin a 12 syllabes avec une césure (pause respiratoire et rythmique) après la 6e syllabe. 'Je suis maître / de moi comme / de l'univers' (Corneille). Ce n'est pas un carcan — c'est un trampoline.","Les rimes organisent la musique du texte : suivies (AABB), croisées (ABAB), embrassées (ABBA). Les rimes masculines (terminées par une syllabe accentuée) et féminines (terminées par un 'e' muet) alternent obligatoirement.","Dire le vers sans le chanter : respecter le rythme naturel de l'alexandrin sans tomber dans la mélodie artificielle. Il faut parler EN vers, pas réciter DES vers. L'alexandrin est un souffle, pas une chanson.","Le rejet (quand un mot 'déborde' sur le vers suivant) crée un effet de surprise et de tension. Hugo en fait un usage révolutionnaire : 'Lui ? / Oui.' L'enjambement, le contre-rejet — ces outils sont les armes expressives du vers classique."],
    quiz:[{q:"Quelle est la règle d'alternance obligatoire dans le vers classique ?",o:["Rimes riches et pauvres","Alexandrins et octosyllabes","Rimes masculines et féminines","Vers longs et courts"],a:2},{q:"Qu'est-ce qu'un 'rejet' en versification ?",o:["Un vers supprimé","Un mot qui déborde sur le vers suivant","Une rime ratée","Un silence dans le vers"],a:1},{q:"Quel schéma de rimes correspond à ABBA ?",o:["Rimes suivies","Rimes croisées","Rimes embrassées","Rimes libres"],a:2}]},
],
interprete:[
  {id:"h_in1",title:"Brecht & la distanciation",cat:"Techniques",icon:"🎭",dur:"15 min",xp:45,
    content:["Bertolt Brecht (1898–1956) s'oppose frontalement à Stanislavski : là où le Russe veut l'identification émotionnelle, l'Allemand veut éveiller l'esprit critique. Le spectateur ne doit pas 'ressentir' — il doit 'réfléchir'.","Le Verfremdungseffekt (effet de distanciation ou d'étrangéification) : l'acteur montre qu'il joue, des pancartes résument l'action, des chansons interrompent la narration, l'éclairage est visible. Tout rappelle au public qu'il est au théâtre.","Ses pièces sont des paraboles politiques : Mère Courage (la guerre comme commerce), L'Opéra de quat'sous (la criminalité comme métaphore du capitalisme), La Résistible Ascension d'Arturo Ui (Hitler en gangster de Chicago), Le Cercle de craie caucasien.","Paradoxe : les pièces de Brecht, censées empêcher l'émotion, sont parmi les plus émouvantes du répertoire. Mère Courage qui tire sa carriole en chantant est l'une des images les plus déchirantes du théâtre mondial."],
    quiz:[{q:"Quel est l'objectif du Verfremdungseffekt chez Brecht ?",o:["Faire pleurer le public","Éveiller l'esprit critique du spectateur","Divertir sans réfléchir","Créer une transe collective"],a:1},{q:"Quelle pièce de Brecht est une parabole sur Hitler ?",o:["Mère Courage","L'Opéra de quat'sous","La Résistible Ascension d'Arturo Ui","Le Cercle de craie caucasien"],a:2},{q:"Quel est le paradoxe de Brecht ?",o:["Il écrit mal mais met bien en scène","Ses pièces anti-émotionnelles sont très émouvantes","Il déteste le théâtre","Il refuse de monter ses propres pièces"],a:1}]},
  {id:"h_in2",title:"Artaud & la cruauté",cat:"Techniques",icon:"🔥",dur:"12 min",xp:40,
    content:["Antonin Artaud (1896–1948) rêve d'un théâtre qui agit sur les sens comme une peste, un incendie, un choc physique. Son manifeste Le Théâtre et son Double (1938) est l'un des textes les plus influents de l'histoire du théâtre.","'Cruauté' ne signifie pas violence gratuite mais rigueur absolue, nécessité, mise à nu. C'est la cruauté de l'existence elle-même. Artaud veut un théâtre aussi inévitable qu'une opération chirurgicale.","Pour Artaud, le texte littéraire est un obstacle — le vrai théâtre est fait de cris, de souffles, de gestes, de lumières, de sons. Il rêve d'un 'langage physique' qui atteindrait directement le système nerveux du spectateur.","Son influence est immense malgré (ou à cause de) le fait qu'il n'a presque rien réalisé concrètement : le Living Theatre, Grotowski, Peter Brook, Jan Fabre, Romeo Castellucci — tous se réclament de lui. Son théâtre est plus un horizon qu'une méthode."],
    quiz:[{q:"Quel est le titre du manifeste d'Artaud publié en 1938 ?",o:["Le Théâtre Cruel","Le Théâtre et son Double","Vers un théâtre pauvre","L'Espace Vide"],a:1},{q:"Que signifie 'cruauté' chez Artaud ?",o:["Violence physique sur scène","Rigueur absolue et nécessité","Sadisme envers le public","Destruction du décor"],a:1},{q:"Pourquoi l'influence d'Artaud est-elle paradoxale ?",o:["Il a tout réalisé mais personne ne s'en souvient","Il n'a presque rien réalisé mais son influence est immense","Il a refusé d'être publié","Il ne parlait que de cinéma"],a:1}]},
],
artiste:[
  {id:"h_ar1",title:"Le théâtre contemporain",cat:"Histoire",icon:"🌬️",dur:"12 min",xp:40,
    content:["Depuis les années 1980, le théâtre explose ses propres frontières : performance, installation, théâtre immersif, théâtre documentaire, écriture de plateau (le spectacle se crée sans texte préalable).","Les figures majeures : Pina Bausch (Tanztheater de Wuppertal — danse et théâtre fusionnent), Robert Wilson (tableaux visuels hypnotiques au ralenti), Romeo Castellucci (images choc et beauté plastique radicale).","Le théâtre documentaire utilise de vrais témoignages, interviews, archives : Milo Rau reconstitue des procès, Rimini Protokoll met des 'experts du quotidien' (non-acteurs) sur scène. La frontière entre réel et fiction s'efface.","Le théâtre immersif (Sleep No More de Punchdrunk, les créations de Music Hall) transforme le spectateur en participant actif qui déambule dans l'espace. Il n'y a plus de scène, plus de salle — le théâtre est partout."],
    quiz:[{q:"Qu'est-ce que l'écriture de plateau ?",o:["Écrire un texte sur le plateau","Créer le spectacle sans texte préalable, directement en répétitions","Écrire debout","Un logiciel de dramaturgie"],a:1},{q:"Quelle compagnie a créé le spectacle immersif Sleep No More ?",o:["Complicité","Punchdrunk","Rimini Protokoll","Théâtre du Soleil"],a:1},{q:"Que met Rimini Protokoll sur scène à la place d'acteurs professionnels ?",o:["Des robots","Des experts du quotidien (non-acteurs)","Des hologrammes","Des animaux"],a:1}]},
  {id:"h_ar2",title:"Les grandes metteuses en scène",cat:"Auteurs",icon:"✒️",dur:"10 min",xp:35,
    content:["Ariane Mnouchkine (née en 1939) fonde le Théâtre du Soleil en 1964 à la Cartoucherie de Vincennes. Travail collectif, engagement politique, inspiration asiatique (kabuki, kathakali). Les Atrides, 1789, Le Dernier Caravansérail.","Pina Bausch (1940–2009) invente le Tanztheater à Wuppertal : ses danseurs parlent, crient, rient, pleurent. Café Müller, Le Sacre du printemps, Kontakthof — un langage universel qui touche aux tripes.","Katie Mitchell (née en 1964) pionnière du 'live cinema' : des caméras filment les acteurs en direct, le résultat est projeté en temps réel. Le spectateur voit à la fois le film ET sa fabrication. Technique bluffante.","Ces femmes ont prouvé que la mise en scène est un art de création à part entière — pas une simple 'illustration' du texte. Chacune a inventé un langage scénique qui n'existait pas avant elle."],
    quiz:[{q:"En quelle année Mnouchkine fonde-t-elle le Théâtre du Soleil ?",o:["1958","1964","1972","1980"],a:1},{q:"Qu'est-ce que le Tanztheater de Pina Bausch ?",o:["Du théâtre uniquement dansé","Une fusion de danse, théâtre, parole et émotion","Un ballet classique moderne","Du mime musical"],a:1},{q:"Quelle technique Katie Mitchell a-t-elle popularisée au théâtre ?",o:["Le masque neutre","Le live cinema (caméras en direct sur scène)","Le théâtre de rue","L'improvisation longue"],a:1}]},
],
metteur:[
  {id:"h_me1",title:"Peter Brook — l'espace vide",cat:"Techniques",icon:"🎭",dur:"12 min",xp:45,
    content:["Peter Brook (1925–2022) : 'Je peux prendre n'importe quel espace vide et l'appeler une scène nue. Un homme traverse cet espace vide pendant que quelqu'un d'autre l'observe, et c'est tout ce dont j'ai besoin pour qu'un acte de théâtre s'engage.'","Son livre L'Espace vide (1968) distingue quatre formes de théâtre : le théâtre mortel (ennuyeux, figé dans ses conventions), le sacré (rituel, invisible), le brut (populaire, direct), et l'immédiat (vivant, en prise avec l'instant).","Aux Bouffes du Nord à Paris (1974–2010), dans ce théâtre en ruines magnifiques, il crée un théâtre universel : Le Mahabharata (9 heures), La Cerisaie, Hamlet avec Adrian Lester, La Tempête — une quête d'essentialité.","Brook a travaillé sur tous les continents, avec des acteurs de toutes origines. Sa conviction : le théâtre est le lieu où l'invisible devient visible. Il cherche toujours à enlever — jamais à ajouter."],
    quiz:[{q:"En quelle année L'Espace vide est-il publié ?",o:["1958","1968","1978","1988"],a:1},{q:"Quel théâtre parisien Brook a-t-il dirigé pendant 36 ans ?",o:["L'Odéon","Les Bouffes du Nord","Le Théâtre de la Ville","La Cartoucherie"],a:1},{q:"Combien de temps dure la mise en scène du Mahabharata par Brook ?",o:["3 heures","6 heures","9 heures","12 heures"],a:2}]},
  {id:"h_me2",title:"Grotowski — le théâtre pauvre",cat:"Techniques",icon:"🎭",dur:"12 min",xp:45,
    content:["Jerzy Grotowski (1933–1999), metteur en scène polonais, pose une question radicale : que reste-t-il si on enlève tout — décor, costume, lumière, musique ? Réponse : l'acteur et le spectateur. C'est le 'théâtre pauvre'.","L'acteur grotowskien est un 'acteur saint' qui se donne totalement, sans protection, sans masque social. L'entraînement est extrême : vocalement, physiquement, psychologiquement. Ce n'est pas de la performance — c'est un acte de vérité.","Ses spectacles au Théâtre Laboratoire de Wrocław (Akropolis, Le Prince Constant, Apocalypsis cum Figuris) sont joués pour 40-60 spectateurs maximum. La proximité est absolue — les acteurs jouent parfois à 30 cm du public.","Après 1970, Grotowski abandonne le spectacle pour le 'parathéâtre' puis 'l'art comme véhicule' — la rencontre humaine sans public. Son influence sur le théâtre expérimental, la formation de l'acteur, et la réflexion sur l'essence du théâtre est incommensurable."],
    quiz:[{q:"Quelle est la question fondamentale de Grotowski ?",o:["Comment remplir les salles ?","Que reste-t-il quand on enlève tout sauf l'acteur et le spectateur ?","Comment moderniser les classiques ?","Comment former des stars ?"],a:1},{q:"Combien de spectateurs maximum dans les spectacles de Grotowski ?",o:["200","100","40-60","10"],a:2},{q:"Qu'est-ce que Grotowski fait après 1970 ?",o:["Il fait du cinéma","Il abandonne le spectacle pour le parathéâtre","Il dirige un théâtre national","Il enseigne à l'université"],a:1}]},
],
monstre:[
  {id:"h_mo1",title:"Le métier de comédien",cat:"Industrie",icon:"🎭",dur:"15 min",xp:50,
    content:["Le statut d'intermittent du spectacle : 507 heures de travail déclarées sur 12 mois pour ouvrir des droits à l'assurance chômage. Un système unique au monde, créé en 1936, constamment menacé et constamment défendu.","Le parcours type : formation (conservatoire, école privée, compagnie), premiers rôles (courts métrages, figuration, petites salles), castings (CV, bande démo, photo, agent), construction progressive d'un réseau et d'une réputation.","Les grandes écoles : le CNSAD (Conservatoire National Supérieur d'Art Dramatique — l'école de la Comédie-Française), le TNS (Théâtre National de Strasbourg), l'ENSATT (Lyon), le Cours Florent, l'ESAD, les conservatoires régionaux.","La réalité économique : seuls 3% des comédiens vivent exclusivement de leur art. La plupart cumulent : doublage, voix off, formation, animation, mise en scène. La passion est le moteur — pas le salaire."],
    quiz:[{q:"Combien d'heures faut-il déclarer pour le statut d'intermittent ?",o:["307 heures","407 heures","507 heures","607 heures"],a:2},{q:"En quelle année le statut d'intermittent a-t-il été créé ?",o:["1920","1936","1945","1968"],a:1},{q:"Quel pourcentage de comédiens vit exclusivement de son art ?",o:["3%","10%","25%","50%"],a:0}]},
  {id:"h_mo2",title:"L'écosystème du spectacle vivant",cat:"Industrie",icon:"🏛️",dur:"12 min",xp:40,
    content:["Le spectacle vivant en France : 250 000 emplois, 8 milliards d'euros de chiffre d'affaires. C'est un secteur économique majeur, pas seulement un 'hobby culturel'.","Les structures de diffusion : 5 Théâtres Nationaux (Comédie-Française, Odéon, Chaillot, Colline, TNS), 38 CDN (Centres Dramatiques Nationaux), 76 Scènes Nationales, des centaines de scènes conventionnées et de compagnies indépendantes.","Le financement : DRAC (Direction Régionale des Affaires Culturelles — État), collectivités territoriales (régions, départements, villes), billetterie (souvent moins de 30% du budget), mécénat privé (encore faible en France comparé aux pays anglo-saxons).","L'agent artistique prend 10% des cachets de l'artiste. C'est un allié indispensable pour accéder aux castings cinéma et TV. Au théâtre, le réseau personnel reste plus important que l'agent."],
    quiz:[{q:"Combien de Théâtres Nationaux existe-t-il en France ?",o:["3","5","7","10"],a:1},{q:"Quelle part du budget d'un théâtre public la billetterie représente-t-elle en moyenne ?",o:["Moins de 30%","50%","70%","90%"],a:0},{q:"Que signifie DRAC ?",o:["Direction Régionale des Arts et de la Culture","Direction Régionale des Affaires Culturelles","Département de Recherche en Art Contemporain","Délégation aux Relations Artistiques et Culturelles"],a:1}]},
],
affiche:[
  {id:"h_af1",title:"Créer son spectacle",cat:"Industrie",icon:"🎬",dur:"15 min",xp:50,
    content:["De l'idée au plateau : tout commence par un désir — un texte qui vous hante, une histoire qui vous brûle, une forme qui n'existe pas encore. Puis vient le temps de l'écriture (ou du choix du texte), de la recherche de financement, de la constitution de l'équipe.","Le dossier artistique est LA pièce maîtresse : note d'intention (votre vision du spectacle — pourquoi CE texte, pourquoi MAINTENANT), distribution pressentie, budget prévisionnel, calendrier de production, et votre parcours artistique.","Les résidences de création : des lieux (théâtres, friches, compagnies) qui accueillent des artistes pendant 2 à 6 semaines pour répéter. Précieuses et très demandées — il faut candidater 12 à 18 mois à l'avance. Les coproducteurs financent une partie en échange de dates de représentation.","La diffusion : trouver des programmateurs qui achèteront votre spectacle. Le festival d'Avignon Off est un tremplin mais aussi un gouffre financier (10 000 à 30 000€ pour 3 semaines). L'ONDA (Office National de Diffusion Artistique) aide à la circulation des spectacles."],
    quiz:[{q:"Quel document est indispensable pour monter un spectacle ?",o:["Le script seul","Le dossier artistique","Un certificat médical","L'avis du public"],a:1},{q:"Combien coûte en moyenne une participation au festival d'Avignon Off ?",o:["1 000-3 000€","5 000-8 000€","10 000-30 000€","50 000€+"],a:2},{q:"Que signifie ONDA ?",o:["Organisation Nationale des Arts","Office National de Diffusion Artistique","Observatoire National du Drame et des Arts","Ordre National des Directeurs Artistiques"],a:1}]},
  {id:"h_af2",title:"Le théâtre et le cinéma",cat:"Techniques",icon:"📹",dur:"10 min",xp:40,
    content:["Théâtre et cinéma : deux arts qui partagent l'acteur mais s'opposent en tout. Au théâtre : jeu large, projection vocale, présence physique totale, pas de montage — une seule prise qui dure toute la soirée. Au cinéma : jeu minimaliste, micro-expressions, intimité avec la caméra, fragments montés.","Les plus grands passent de l'un à l'autre : Isabelle Huppert, Denis Podalydès, Emmanuelle Devos, Vincent Macaigne. Chacun adapte son instrument. Le piège : 'jouer comme au théâtre' devant une caméra (sur-jouer) ou 'jouer comme au cinéma' sur scène (sous-jouer pour le dernier rang).","La self-tape est devenue le mode de casting dominant au cinéma et en série. C'est un art en soi : cadrage, lumière, jeu pour la caméra, choix de la prise. Un bon acteur de self-tape n'est pas forcément un bon acteur de plateau — et inversement.","Le passage du théâtre au cinéma enrichit l'acteur : le théâtre donne l'endurance, la voix, la présence ; le cinéma donne la subtilité, le naturel, la conscience de la caméra. Les meilleurs maîtrisent les deux."],
    quiz:[{q:"Quelle est la principale différence de jeu entre théâtre et cinéma ?",o:["Le costume","L'amplitude du jeu (large vs minimaliste)","Le salaire","Le texte"],a:1},{q:"Qu'est-ce qu'une self-tape ?",o:["Un enregistrement audio","Un casting filmé par l'acteur lui-même","Un cours en ligne","Un selfie de tournage"],a:1}]},
  {id:"h_af3",title:"L'écriture contemporaine",cat:"Auteurs",icon:"✒️",dur:"12 min",xp:45,
    content:["Bernard-Marie Koltès (1948–1989) : une écriture incandescente, musicale, nocturne. Dans la solitude des champs de coton, Roberto Zucco, Combat de nègre et de chiens. Koltès écrit sur la rencontre impossible, le désir, la marginalité. Ses phrases sont longues, sinueuses, comme un jazz verbal.","Jean-Luc Lagarce (1957–1995) : l'auteur le plus joué en France après Molière. Juste la fin du monde, Derniers remords avant l'oubli, Nous les héros. Son écriture est faite de répétitions, de parenthèses, de phrases qui se reprennent et se corrigent — comme la pensée réelle.","Wajdi Mouawad (né en 1968) : Incendies, Littoral, Forêts, Ciels — des fresques épiques sur la guerre, l'exil, la mémoire familiale. Un théâtre qui mêle mythologie, actualité politique et émotion brute. Il dirige le Théâtre de la Colline depuis 2016.","Joël Pommerat (né en 1963) : il n'écrit pas puis met en scène — il écrit PAR la mise en scène. Ses spectacles naissent en répétition. Ça ira (1) Fin de Louis est une réécriture de la Révolution française ; La Réunification des deux Corées explore l'amour sous toutes ses formes."],
    quiz:[{q:"Quel auteur contemporain est le plus joué en France après Molière ?",o:["Koltès","Lagarce","Mouawad","Pommerat"],a:1},{q:"Qu'est-ce qui caractérise l'écriture de Koltès ?",o:["Des phrases courtes et percutantes","Des phrases longues et musicales, comme du jazz","Du vers classique","De la prose minimaliste"],a:1},{q:"Quelle est la particularité de la méthode de Pommerat ?",o:["Il écrit seul pendant 5 ans","Il écrit PAR la mise en scène, en répétition","Il n'utilise que des classiques","Il travaille sans acteurs"],a:1}]},
],
etoile:[
  {id:"h_et1",title:"Le festival d'Avignon",cat:"Industrie",icon:"🏛️",dur:"12 min",xp:45,
    content:["Fondé en 1947 par Jean Vilar dans la Cour d'honneur du Palais des Papes, le Festival d'Avignon est le plus grand et le plus prestigieux festival de théâtre au monde. Vilar voulait un 'théâtre populaire' accessible à tous.","Le 'In' (programmation officielle, environ 40 spectacles) est dirigé par un artiste-directeur (Olivier Py, puis Tiago Rodrigues depuis 2023). La Cour d'honneur (2 000 places en plein air) est le saint des saints — y jouer est une consécration.","Le 'Off' (né en 1966) est un festival parallèle libre : plus de 1 500 spectacles dans 130 lieux pendant 3 semaines. C'est le plus grand marché du spectacle vivant — des carrières se lancent et se brisent en juillet à Avignon.","Chaque été, la ville entière (90 000 habitants) se transforme : les rues sont des scènes, les affiches recouvrent les murs, 700 000 entrées au Off, 100 000 au In. Avignon est le pouls du théâtre francophone — et de plus en plus international."],
    quiz:[{q:"En quelle année le Festival d'Avignon est-il fondé ?",o:["1937","1947","1957","1967"],a:1},{q:"Combien de spectacles environ sont présentés dans le Off ?",o:["200","500","1 000","1 500+"],a:3},{q:"Qui est le directeur du Festival d'Avignon depuis 2023 ?",o:["Olivier Py","Tiago Rodrigues","Thomas Ostermeier","Wajdi Mouawad"],a:1}]},
  {id:"h_et2",title:"L'héritage de Stanislavski",cat:"Techniques",icon:"🎭",dur:"12 min",xp:45,
    content:["Constantin Stanislavski (1863–1938) est le père de la formation moderne de l'acteur. Son 'Système' est la base de presque toutes les écoles de jeu dans le monde, même celles qui s'y opposent.","Les principes clés : la 'vérité' du jeu (ne pas 'montrer' l'émotion mais créer les conditions pour qu'elle émerge), le 'si magique' (si j'étais dans cette situation, que ferais-je ?), la 'mémoire affective' (utiliser ses souvenirs pour nourrir le jeu).","Lee Strasberg l'adapte aux États-Unis sous le nom de 'Method Acting' à l'Actors Studio. Brando, De Niro, Pacino, Hoffman, Streep — tous formés à la Méthode. Mais Strasberg pousse la mémoire affective plus loin que Stanislavski, ce qui crée des controverses (acteurs qui ne sortent plus de leur personnage).","Stella Adler et Sanford Meisner proposent des alternatives à Strasberg : Adler insiste sur l'imagination (pas besoin de souffrir pour jouer la souffrance), Meisner sur l'écoute et la réaction (le jeu naît de la relation à l'autre, pas de l'introspection). Ces trois branches se disputent l'héritage de Stanislavski encore aujourd'hui."],
    quiz:[{q:"Quel est le principe du 'si magique' de Stanislavski ?",o:["Utiliser des tours de magie sur scène","Se demander 'si j'étais dans cette situation, que ferais-je ?'","Croire que le théâtre est magique","Hypnotiser le public"],a:1},{q:"Qui a adapté Stanislavski aux États-Unis sous le nom de Method Acting ?",o:["Stella Adler","Sanford Meisner","Lee Strasberg","Michael Chekhov"],a:2},{q:"Sur quoi Sanford Meisner insiste-t-il ?",o:["La mémoire affective","L'écoute et la réaction à l'autre","L'improvisation libre","Le travail physique"],a:1}]},
  {id:"h_et3",title:"Le théâtre de demain",cat:"Histoire",icon:"⭐",dur:"10 min",xp:50,
    content:["Le théâtre virtuel et augmenté : des compagnies expérimentent avec la réalité virtuelle (le spectateur porte un casque VR et évolue dans un décor virtuel), la réalité augmentée (des éléments numériques se superposent à la scène réelle), et la motion capture en temps réel.","L'intelligence artificielle au théâtre : des spectacles co-écrits par des IA, des acteurs numériques, des mises en scène générées algorithmiquement. La question n'est pas 'l'IA va-t-elle remplacer l'acteur ?' mais 'qu'est-ce que l'IA révèle de ce qui est irremplaçable chez l'acteur ?'","Le théâtre engagé du XXIe siècle : écoféminisme, décolonialité, handicap sur scène, neurodiversité. Le théâtre reflète et anticipe les mutations sociales. Des compagnies comme DV8, Gob Squad, Forced Entertainment repoussent les frontières.","Ce qui ne changera jamais : un être humain vivant devant d'autres êtres humains vivants, dans le même espace, au même moment. C'est irremplaçable par aucune technologie. Et c'est pour ça que le théâtre existe depuis 2 500 ans."],
    quiz:[{q:"Quelle question pose l'utilisation de l'IA au théâtre ?",o:["Comment remplacer les acteurs","Qu'est-ce qui est irremplaçable chez l'acteur","Comment réduire les coûts","Comment attirer les jeunes"],a:1},{q:"Depuis combien de temps le théâtre existe-t-il ?",o:["500 ans","1 000 ans","2 500 ans","5 000 ans"],a:2}]},
],

const GLOSSAIRE=[
  {term:"Plateau",def:"La scène elle-même, l'espace de jeu.",difficulty:1},
  {term:"Côté cour",def:"Le côté droit de la scène vu depuis la salle (gauche pour l'acteur).",difficulty:1},
  {term:"Coulisses",def:"Zones latérales cachées du public, où les acteurs attendent leurs entrées.",difficulty:1},
  {term:"Lointain",def:"Fond de la scène, le plus éloigné du public.",difficulty:1},
  {term:"Réplique",def:"Texte dit par un personnage en réponse à un autre personnage.",difficulty:1},
  {term:"Tirade",def:"Longue réplique ininterrompue d'un personnage.",difficulty:1},
  {term:"Monologue",def:"Tirade d'un personnage seul en scène, exprimant ses pensées intimes.",difficulty:1},
  {term:"Aparté",def:"Réplique prononcée à part, entendue du public mais pas des autres personnages.",difficulty:1},
  {term:"Avant-scène",def:"Partie de la scène la plus proche du public, devant le rideau.",difficulty:1},
  {term:"Cintres",def:"Espace au-dessus de la scène où sont suspendus décors, rideaux et éclairages.",difficulty:1},
  {term:"Distanciation",def:"Technique brechtienne visant à empêcher l'identification émotionnelle du spectateur.",difficulty:2},
  {term:"Sous-texte",def:"Ce que le personnage pense ou ressent réellement, au-delà de ce qu'il dit.",difficulty:2},
  {term:"Dramaturge",def:"Celui qui écrit des pièces, ou le conseiller littéraire d'un metteur en scène.",difficulty:2},
  {term:"Quatrième mur",def:"Mur imaginaire entre la scène et le public, créant l'illusion du réalisme.",difficulty:2},
  {term:"Filage",def:"Répétition d'un spectacle du début à la fin sans interruption.",difficulty:2},
  {term:"Générale",def:"Dernière répétition avant la première, souvent devant un public invité.",difficulty:2},
  {term:"Note d'intention",def:"Document du metteur en scène expliquant sa vision artistique du spectacle.",difficulty:2},
  {term:"Distribution",def:"Répartition des rôles entre les comédiens.",difficulty:2},
  {term:"Côté jardin",def:"Le côté gauche de la scène vu depuis la salle (droite pour l'acteur).",difficulty:2},
  {term:"Entrée/Sortie",def:"Moment où un personnage apparaît ou quitte la scène. Chaque entrée modifie l'énergie.",difficulty:2},
  {term:"Conduite",def:"Document technique listant tous les effets (lumière, son) cue par cue.",difficulty:3},
  {term:"Contre-emploi",def:"Confier un rôle à un acteur dont le physique ou le tempérament est à l'opposé du personnage.",difficulty:3},
  {term:"Régie",def:"Espace technique d'où sont contrôlés lumière, son et effets pendant le spectacle.",difficulty:3},
  {term:"Résidence",def:"Période de travail dans un lieu d'accueil, souvent avant la création d'un spectacle.",difficulty:3},
  {term:"Italienne",def:"Répétition du texte seul, sans jeu ni déplacements, pour vérifier la mémorisation.",difficulty:3},
  {term:"Trac",def:"Anxiété avant d'entrer en scène. Naturel et même souhaitable — c'est de l'énergie.",difficulty:3},
  {term:"Trois coups",def:"Tradition française : trois coups frappés sur le plancher de scène avant le lever de rideau.",difficulty:3},
  {term:"Unités (règle des trois)",def:"Temps (24h), lieu (un seul), action (une seule intrigue) — règle du classicisme.",difficulty:3},
