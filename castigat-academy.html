        )}
      </div>
    </div>
  );
}

/* ═══ MON TEXTE ═══ */
function MonTexte({st,setSt,onClose}){
  const SAVE_MT="castigat_montexte";
  const loadTexts=()=>{try{const s=localStorage.getItem(SAVE_MT);return s?JSON.parse(s):[]}catch(e){return[]}};
  const saveTexts=(t)=>{try{localStorage.setItem(SAVE_MT,JSON.stringify(t))}catch(e){}};
  const[texts,setTexts]=useState(loadTexts);
  const[activeId,setActiveId]=useState(null);
  const[view,setView]=useState("list");
  const[stepIdx,setStepIdx]=useState(null);
  const[qi,setQi]=useState(0);
  const[phase,setPhase]=useState("intro"); // intro, question
  const[timer,setTimer]=useState(0);
  const[timerOn,setTimerOn]=useState(false);
  const[showRef,setShowRef]=useState(false);
  const[formTitle,setFormTitle]=useState("");
  const[formAuthor,setFormAuthor]=useState("");
  const[formChar,setFormChar]=useState("");
  const[formText,setFormText]=useState("");
  const[formImg,setFormImg]=useState(null);
  const[formImgName,setFormImgName]=useState("");

  const activeText=texts.find(t=>t.id===activeId);
  const totalQ=MONTEXTE_PARCOURS.reduce((a,e)=>a+e.questions.length,0);

  useEffect(()=>{
    if(!timerOn)return;
    const iv=setInterval(()=>setTimer(t=>t+1),1000);
    return()=>clearInterval(iv);
  },[timerOn]);

  const fmtTime=(s)=>{const m=Math.floor(s/60),ss=s%60;return`${m}:${ss<10?"0":""}${ss}`};

  const updateText=(id,fn)=>{
    setTexts(prev=>{const next=prev.map(t=>t.id===id?fn(t):t);saveTexts(next);return next});
  };

  const saveTime=()=>{
    if(!activeId||timer===0)return;
    updateText(activeId,t=>({...t,timeSpent:(t.timeSpent||0)+timer}));
    setTimer(0);
  };

  const saveAnswer=(eId,qIdx,val)=>{
    updateText(activeId,t=>{const a={...t.answers};if(!a[eId])a[eId]={};a[eId][qIdx]=val;return{...t,answers:a}});
  };

  const validateStep=(eId)=>{
    updateText(activeId,t=>{const v=[...(t.validated||[])];if(!v.includes(eId))v.push(eId);return{...t,validated:v}});
  };

  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    setFormImgName(file.name);
    const reader=new FileReader();
    reader.onload=(ev)=>setFormImg(ev.target.result);
    reader.readAsDataURL(file);
  };

  const createText=()=>{
    if(!formText.trim()&&!formImg)return;
    const newT={id:"mt_"+Date.now(),title:formTitle||"Sans titre",author:formAuthor||"",character:formChar||"",text:formText,image:formImg,imageName:formImgName,answers:{},validated:[],timeSpent:0,created:new Date().toISOString()};
    const next=[newT,...texts];
    setTexts(next);saveTexts(next);
    setActiveId(newT.id);setView("work");
    setFormTitle("");setFormAuthor("");setFormChar("");setFormText("");setFormImg(null);setFormImgName("");
  };

  const deleteText=(id)=>{
    if(!confirm("Supprimer ce texte ?"))return;
    const next=texts.filter(t=>t.id!==id);
    setTexts(next);saveTexts(next);
    if(activeId===id){setActiveId(null);setView("list");}
  };

  const getProgress=(t)=>{
    const done=(t.validated||[]).length;
    return{done,total:MONTEXTE_PARCOURS.length,pct:Math.round(done/MONTEXTE_PARCOURS.length*100)};
  };

  const isStepUnlocked=(t,idx)=>{
    if(idx===0)return true;
    return(t.validated||[]).includes(MONTEXTE_PARCOURS[idx-1].id);
  };

  /* === CREATE VIEW === */
  if(view==="create") return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
      <div className="mw">
        <button onClick={()=>setView("list")} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:20}}>{I.chL({size:16})} Retour</button>
        <h1 className="heading" style={{fontSize:24,marginBottom:4}}>Nouveau texte</h1>
        <p className="body" style={{fontSize:11,marginBottom:24}}>Importez un texte pour le travailler en profondeur</p>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <p className="label" style={{marginBottom:6}}>TITRE DE LA SCÈNE / DU MONOLOGUE</p>
            <input value={formTitle} onChange={e=>setFormTitle(e.target.value)} placeholder="Ex : Monologue de Phèdre" style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid var(--line-s)',background:'var(--bg-card)',color:'var(--text)',fontSize:13,fontFamily:'inherit'}}/>
          </div>
          <div style={{display:'flex',gap:10}}>
            <div style={{flex:1}}>
              <p className="label" style={{marginBottom:6}}>AUTEUR</p>
              <input value={formAuthor} onChange={e=>setFormAuthor(e.target.value)} placeholder="Racine" style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid var(--line-s)',background:'var(--bg-card)',color:'var(--text)',fontSize:13,fontFamily:'inherit'}}/>
            </div>
            <div style={{flex:1}}>
              <p className="label" style={{marginBottom:6}}>PERSONNAGE</p>
              <input value={formChar} onChange={e=>setFormChar(e.target.value)} placeholder="Phèdre" style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid var(--line-s)',background:'var(--bg-card)',color:'var(--text)',fontSize:13,fontFamily:'inherit'}}/>
            </div>
          </div>
          <div>
            <p className="label" style={{marginBottom:6}}>PHOTO OU PDF DU TEXTE</p>
            <label style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderRadius:12,border:'2px dashed var(--line-s)',background:'var(--bg-card)',cursor:'pointer'}}>
              {I.upload({size:20,sw:1.5,style:{color:'var(--gold)'}})}
              <div style={{flex:1}}>
                <p style={{fontSize:12,fontWeight:600,color:'var(--gold)'}}>{formImg?"Fichier sélectionné":"Importer une photo ou un PDF"}</p>
                {formImgName&&<p style={{fontSize:9,color:'var(--text-3)',marginTop:2}}>{formImgName}</p>}
                {!formImg&&<p style={{fontSize:9,color:'var(--text-3)',marginTop:2}}>Photo de la page, scan, PDF…</p>}
              </div>
              <input type="file" accept="image/*,.pdf" onChange={handleFile} style={{display:'none'}}/>
            </label>
            {formImg&&formImg.startsWith("data:image")&&(
              <div style={{marginTop:10,borderRadius:10,overflow:'hidden',border:'1px solid var(--line)'}}>
                <img src={formImg} style={{width:'100%',maxHeight:200,objectFit:'contain',background:'#111'}} alt="preview"/>
              </div>
            )}
          </div>
          <div>
            <p className="label" style={{marginBottom:6}}>TEXTE (OPTIONNEL SI VOUS IMPORTEZ UNE PHOTO)</p>
            <textarea value={formText} onChange={e=>setFormText(e.target.value)} placeholder="Facultatif si vous avez importé une photo" rows={3} style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid var(--line-s)',background:'var(--bg-card)',color:'var(--text)',fontSize:13,fontFamily:'Cormorant Garamond, serif',lineHeight:1.6,resize:'vertical'}}/>
          </div>
          <button onClick={createText} disabled={!formText.trim()&&!formImg} className="btn-gold" style={{padding:'14px 0',fontSize:14,width:'100%',opacity:(formText.trim()||formImg)?1:.4}}>Commencer le parcours</button>
        </div>
      </div>
    </div>
  );

  /* === STEP VIEW (parcours question) === */
  if(view==="work"&&activeText&&stepIdx!==null){
    const etape=MONTEXTE_PARCOURS[stepIdx];
    const q=etape.questions[qi];
    const existing=(activeText.answers?.[etape.id]?.[qi])||"";
    const isValidated=(activeText.validated||[]).includes(etape.id);

    // Intro phase — explains why this step matters
    if(phase==="intro") return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <button onClick={()=>{saveTime();setStepIdx(null);setPhase("intro");setQi(0);setTimerOn(false)}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:20}}>{I.chL({size:16})} Retour au parcours</button>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:56,height:56,borderRadius:14,background:`linear-gradient(135deg,${etape.color},var(--bg-raised))`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',boxShadow:`0 8px 30px ${etape.color}33`}}>
              <span className="emoji" style={{fontSize:'26px'}}>{etape.icon}</span>
            </div>
            <p className="label" style={{color:etape.color,marginBottom:6}}>ÉTAPE {stepIdx+1} / {MONTEXTE_PARCOURS.length}</p>
            <h1 className="heading" style={{fontSize:24,marginBottom:4}}>{etape.name}</h1>
          </div>
          <div className="card-gold" style={{padding:22,marginBottom:24}}>
            <p className="body" style={{fontSize:13,lineHeight:1.8,color:'var(--text)'}}>{etape.intro}</p>
          </div>
          <p style={{fontSize:11,color:'var(--text-2)',marginBottom:20,lineHeight:1.6,padding:'0 4px'}}>
            Cette étape contient <strong style={{color:'var(--text)'}}>{etape.questions.length} questions</strong> pour guider votre réflexion. Vous pouvez écrire vos réponses directement dans l'app, ou bien prendre un carnet — à vous de choisir. L'important c'est de prendre le temps d'y réfléchir.
          </p>
          <button onClick={()=>{setPhase("question");setQi(0)}} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13}}>
            {isValidated?"Revoir les questions":"Commencer cette étape"}
          </button>
        </div>
      </div>
    );

    // Question phase
    return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <button onClick={()=>{setPhase("intro")}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:16}}>{I.chL({size:16})} Retour à l'intro</button>

          {/* Header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span className="emoji" style={{fontSize:'16px'}}>{etape.icon}</span>
              <h2 className="heading" style={{fontSize:16}}>{etape.name}</h2>
            </div>
            <button onClick={()=>setTimerOn(!timerOn)} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:8,background:timerOn?'rgba(74,222,128,.08)':'var(--bg-card)',border:'1px solid',borderColor:timerOn?'var(--emerald)':'var(--line)',fontSize:10,fontWeight:700,color:timerOn?'var(--emerald)':'var(--text-3)'}}>
              {I.clock({size:12})} {fmtTime(timer)}
            </button>
          </div>
          <Bar val={qi+1} max={etape.questions.length} cls="fill-gold" h={3}/>
          <p style={{fontSize:8,color:'var(--text-3)',marginTop:4,marginBottom:16,textAlign:'right'}}>Question {qi+1} / {etape.questions.length}</p>

          {/* Reference toggle */}
          <button onClick={()=>setShowRef(!showRef)} className="btn-outline" style={{padding:'6px 12px',fontSize:10,marginBottom:12,display:'flex',alignItems:'center',gap:5}}>
            {I.book({size:12})} {showRef?"Masquer le texte":"Voir mon texte"}
          </button>
          {showRef&&<div style={{padding:14,borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',marginBottom:16,maxHeight:150,overflow:'auto'}}>
            {activeText.image&&activeText.image.startsWith("data:image")&&<img src={activeText.image} style={{width:'100%',maxHeight:80,objectFit:'contain',marginBottom:8,borderRadius:6}} alt="ref"/>}
            <p style={{fontSize:12,lineHeight:1.8,color:'var(--text-2)',fontFamily:'Cormorant Garamond, serif',fontWeight:400}}>{activeText.text}</p>
          </div>}

          {/* Question card */}
          <div className="card-gold" style={{padding:20,marginBottom:12}}>
            <p className="body" style={{fontSize:14,color:'var(--text)',lineHeight:1.7,fontWeight:500}}>{q.q}</p>
          </div>

          {/* Tip */}
          <div style={{display:'flex',gap:8,padding:'10px 12px',borderRadius:8,background:'rgba(200,164,78,.04)',border:'1px solid var(--line)',marginBottom:16}}>
            <span style={{color:'var(--gold-dim)',flexShrink:0,marginTop:1}}>{I.info({size:12,sw:1.4})}</span>
            <p style={{fontSize:10,color:'var(--text-2)',lineHeight:1.6,fontStyle:'italic'}}>{q.tip}</p>
          </div>

          {/* Optional answer area */}
          <p style={{fontSize:9,color:'var(--text-3)',marginBottom:6}}>✏️ Vous pouvez noter votre réponse ici, ou utiliser un carnet — à vous de voir :</p>
          <textarea defaultValue={existing} key={etape.id+"_"+qi} onBlur={(e)=>saveAnswer(etape.id,qi,e.target.value)} placeholder="(facultatif) Écrivez vos réflexions ici…" rows={4} style={{width:'100%',padding:'12px 14px',borderRadius:10,border:'1px solid var(--line)',background:'var(--bg-card)',color:'var(--text)',fontSize:12,fontFamily:'inherit',lineHeight:1.7,resize:'vertical',marginBottom:16}}/>

          {/* Navigation */}
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <button onClick={()=>qi>0?setQi(qi-1):setPhase("intro")} className="btn-outline" style={{padding:'10px 18px',fontSize:11}}>← Précédent</button>
            {qi<etape.questions.length-1?
              <button onClick={()=>setQi(qi+1)} className="btn-gold" style={{padding:'10px 18px',fontSize:11}}>Suivant →</button>
              :<button onClick={()=>{validateStep(etape.id);saveTime();setTimerOn(false);setStepIdx(null);setPhase("intro");setQi(0);SFX.xp();setSt(p=>({...p,xp:p.xp+20,weekXP:(p.weekXP||0)+20}))}} className="btn-gold" style={{padding:'10px 24px',fontSize:11}}>Valider cette étape ✓</button>
            }
          </div>
        </div>
      </div>
    );
  }

  /* === PARCOURS VIEW (dashboard for one text) === */
  if(view==="work"&&activeText){
    const prog=getProgress(activeText);
    return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <button onClick={()=>{saveTime();setActiveId(null);setView("list");setTimerOn(false)}} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:20}}>{I.chL({size:16})} Mes textes</button>
          <div style={{marginBottom:20}}>
            <h1 className="heading" style={{fontSize:22,marginBottom:4}}>{activeText.title}</h1>
            <p className="body" style={{fontSize:11}}>{[activeText.author,activeText.character].filter(Boolean).join(" — ")}</p>
          </div>

          {/* Stats */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
            <div style={{padding:12,borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',textAlign:'center'}}>
              <p style={{fontSize:8,color:'var(--text-3)'}}>PARCOURS</p>
              <p className="heading" style={{fontSize:20,color:'var(--gold)'}}>{prog.done}/{prog.total}</p>
            </div>
            <div style={{padding:12,borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',textAlign:'center'}}>
              <p style={{fontSize:8,color:'var(--text-3)'}}>TEMPS</p>
              <p className="heading" style={{fontSize:20,color:'var(--emerald)'}}>{fmtTime(activeText.timeSpent||0)}</p>
            </div>
            <div style={{padding:12,borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',textAlign:'center'}}>
              <p style={{fontSize:8,color:'var(--text-3)'}}>NIVEAU</p>
              <p className="heading" style={{fontSize:20,color:'var(--violet)'}}>{prog.pct===100?"✓":prog.pct+"%"}</p>
            </div>
          </div>
          <Bar val={prog.done} max={prog.total} cls="fill-gold" h={5}/>
          <p style={{fontSize:8,color:'var(--text-3)',marginTop:4,marginBottom:20}}>{prog.done===prog.total?"Parcours terminé ! Vous connaissez votre texte en profondeur.":`Étape ${prog.done+1} sur ${prog.total} — continuez le parcours`}</p>

          {/* Timer */}
          <div style={{display:'flex',alignItems:'center',gap:10,padding:14,borderRadius:12,background:timerOn?'rgba(74,222,128,.04)':'var(--bg-card)',border:'1px solid',borderColor:timerOn?'rgba(74,222,128,.2)':'var(--line)',marginBottom:20}}>
            {I.clock({size:18,sw:1.5,style:{color:timerOn?'var(--emerald)':'var(--text-3)'}})}
            <div style={{flex:1}}>
              <p style={{fontSize:12,fontWeight:700,color:timerOn?'var(--emerald)':'var(--text)'}}>Chronomètre de travail</p>
              <p style={{fontSize:9,color:'var(--text-3)'}}>Session : {fmtTime(timer)}</p>
            </div>
            <button onClick={()=>{if(timerOn)saveTime();setTimerOn(!timerOn)}} style={{padding:'6px 14px',borderRadius:8,fontSize:10,fontWeight:700,background:timerOn?'var(--emerald)':'var(--bg-raised)',color:timerOn?'#07070b':'var(--text)',border:'1px solid',borderColor:timerOn?'var(--emerald)':'var(--line)'}}>
              {timerOn?"⏸ Pause":"▶ Démarrer"}
            </button>
          </div>

          {/* Reference text */}
          <details style={{marginBottom:20}}>
            <summary style={{padding:'12px 14px',borderRadius:10,background:'var(--bg-card)',border:'1px solid var(--line)',cursor:'pointer',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:8,listStyle:'none'}}>
              {I.book({size:14,sw:1.5,style:{color:'var(--gold)'}})} Voir mon texte
            </summary>
            <div style={{padding:14,borderRadius:'0 0 10px 10px',background:'var(--bg-card)',borderLeft:'1px solid var(--line)',borderRight:'1px solid var(--line)',borderBottom:'1px solid var(--line)'}}>
              {activeText.image&&activeText.image.startsWith("data:image")&&<img src={activeText.image} style={{width:'100%',maxHeight:200,objectFit:'contain',marginBottom:10,borderRadius:6}} alt="ref"/>}
              <p style={{fontSize:14,lineHeight:1.9,color:'var(--text)',fontFamily:'Cormorant Garamond, serif',fontWeight:400}}>{activeText.text}</p>
            </div>
          </details>

          {/* Parcours steps */}
          <p className="label" style={{marginBottom:14}}>VOTRE PARCOURS</p>
          <div style={{display:'flex',flexDirection:'column',gap:0,marginBottom:24,position:'relative'}}>
            {/* Vertical line */}
            <div style={{position:'absolute',left:19,top:20,bottom:20,width:2,background:'var(--line)',zIndex:0}}/>
            {MONTEXTE_PARCOURS.map((etape,idx)=>{
              const validated=(activeText.validated||[]).includes(etape.id);
              const unlocked=isStepUnlocked(activeText,idx);
              const isCurrent=unlocked&&!validated;
              const isNext=!unlocked&&idx>0&&(activeText.validated||[]).includes(MONTEXTE_PARCOURS[idx-1]?.id);
              return(
                <button key={etape.id} disabled={!unlocked} onClick={()=>{setStepIdx(idx);setPhase("intro");setQi(0);setShowRef(false)}}
                  style={{display:'flex',alignItems:'center',gap:14,padding:'12px 4px',textAlign:'left',position:'relative',zIndex:1,cursor:unlocked?'pointer':'default',opacity:unlocked?1:.4}}>
                  <div style={{width:40,height:40,borderRadius:12,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                    background:validated?'rgba(74,222,128,.1)':isCurrent?`${etape.color}15`:'var(--bg-card)',
                    border:validated?'2px solid var(--emerald)':isCurrent?`2px solid ${etape.color}`:'2px solid var(--line)',
                    boxShadow:isCurrent?`0 0 12px ${etape.color}33`:'none',
                    animation:isCurrent?'pathPulse 2s ease-in-out infinite':'none'}}>
                    {validated?I.check({size:16,sw:2,style:{color:'var(--emerald)'}}):unlocked?<span className="emoji" style={{fontSize:'18px'}}>{etape.icon}</span>:I.lock({size:14,sw:1.5,style:{color:'var(--text-3)'}})}
                  </div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:12,fontWeight:700,color:validated?'var(--emerald)':isCurrent?'var(--text)':'var(--text-3)'}}>
                      {etape.name}
                    </p>
                    <p style={{fontSize:9,color:'var(--text-3)',marginTop:1}}>
                      {validated?"Complété ✓":isCurrent?"En cours — "+etape.questions.length+" questions":etape.questions.length+" questions"}
                    </p>
                  </div>
                  {isCurrent&&<span style={{fontSize:9,fontWeight:700,padding:'3px 10px',borderRadius:20,background:`${etape.color}15`,color:etape.color,border:`1px solid ${etape.color}33`}}>CONTINUER</span>}
                  {validated&&unlocked&&<span style={{fontSize:9,color:'var(--text-3)'}}>Revoir</span>}
                </button>
              );
            })}
          </div>

          <button onClick={()=>deleteText(activeText.id)} style={{width:'100%',padding:'10px 0',fontSize:10,color:'var(--text-3)',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
            Supprimer ce texte
          </button>
        </div>
      </div>
    );
  }

  /* === LIST VIEW === */
  return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:20}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:56,height:56,borderRadius:14,background:'linear-gradient(135deg,var(--violet-dim),var(--violet))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',boxShadow:'0 8px 30px rgba(167,139,250,.2)'}}>
            {I.book({size:26,sw:1.6,style:{color:'#fff'}})}
          </div>
          <h1 className="heading" style={{fontSize:26,marginBottom:4}}>Mon Texte</h1>
          <p className="body" style={{fontSize:12}}>Travaillez vos textes en profondeur</p>
        </div>
        <button onClick={()=>setView("create")} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:13,marginBottom:24,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          + Importer un nouveau texte
        </button>
        {texts.length===0&&(
          <div style={{textAlign:'center',padding:'40px 20px'}}>
            <div className="em-xl" style={{marginBottom:12}}>{I.pen({size:52,sw:1.6})}</div>
            <p className="body" style={{fontSize:12,marginBottom:4}}>Aucun texte pour l'instant</p>
            <p style={{fontSize:10,color:'var(--text-3)'}}>Importez votre premier monologue ou scène pour commencer le parcours d'apprentissage.</p>
          </div>
        )}
        {texts.length>0&&<>
          <p className="label" style={{marginBottom:12}}>MES TEXTES ({texts.length})</p>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {texts.map(t=>{
              const prog=getProgress(t);
              return(
                <button key={t.id} onClick={()=>{setActiveId(t.id);setView("work");setStepIdx(null)}} className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left'}}>
                  <div style={{width:40,height:40,borderRadius:10,background:prog.pct===100?'rgba(74,222,128,.08)':'rgba(167,139,250,.08)',border:`1px solid ${prog.pct===100?'rgba(74,222,128,.15)':'rgba(167,139,250,.15)'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{prog.pct===100?I.check({size:18,sw:1.8}):I.book({size:18,sw:1.6})}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</p>
                    <p style={{fontSize:9,color:'var(--text-3)',marginTop:1}}>{[t.author,t.character].filter(Boolean).join(" — ")}</p>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                      <div style={{flex:1,height:3,borderRadius:3,background:'rgba(255,255,255,.04)',maxWidth:80}}>
                        <div style={{width:prog.pct+"%",height:'100%',borderRadius:3,background:prog.pct===100?'var(--emerald)':'var(--violet)',transition:'width .5s'}}/>
                      </div>
                      <span style={{fontSize:8,color:'var(--text-3)'}}>{prog.done}/{prog.total} étapes</span>
                      <span style={{fontSize:8,color:'var(--text-3)'}}>· {fmtTime(t.timeSpent||0)}</span>
                    </div>
                  </div>
                  {I.chR({size:16,sw:1.5,style:{color:'var(--text-3)'}})}
                </button>
              );
            })}
          </div>
        </>}
      </div>
    </div>
  );
}

/* ═══ COACH CHAT ═══ */
function CoachChat({st,setSt,onClose}){
  const[msg,setMsg]=useState("");
  const[messages,setMessages]=useState([]);
  const[loading,setLoading]=useState(true);
  const chatEndRef=useRef(null);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'})},[messages]);
  const emailRef=useRef('');
  const ivRef=useRef(null);

  /* Get email/ID, load messages, start polling */
  useEffect(()=>{(async()=>{
    /* 1. Determine user identifier */
    const{data}=await _supabase.auth.getSession();
    if(data.session?.user?.email){await loadFromCloud();emailRef.current=data.session.user.email;}
    else{
      /* Priority: auth email > st.email > stored device ID > new device ID */
      const storedId=localStorage.getItem('castigat_chat_id');
      const emailFallback=st.email||(typeof st.user==='string'&&!st.user.startsWith('{')?st.user:null);
      if(emailFallback){emailRef.current=emailFallback;localStorage.setItem('castigat_chat_id',emailFallback);}
      else if(storedId){emailRef.current=storedId;}
      else{const nid='device_'+Math.random().toString(36).substr(2,9);localStorage.setItem('castigat_chat_id',nid);emailRef.current=nid;}
    }
    /* 2. Load messages now that emailRef is set */
    if(emailRef.current){
      const res=await _supabase.from('messages').select('*').order('created_at',{ascending:true});
      if(!res.error&&res.data){const filtered=res.data.filter(m=>m.student_email===emailRef.current);setMessages(filtered);}
    }
    setLoading(false);
    /* 3. Start polling AFTER emailRef is set */
    ivRef.current=setInterval(async()=>{
      if(!emailRef.current)return;
      const res=await _supabase.from('messages').select('*').order('created_at',{ascending:true});
      if(!res.error&&res.data){const filtered=res.data.filter(m=>m.student_email===emailRef.current);setMessages(filtered);}
    },8000);
  })();
  return()=>{if(ivRef.current)clearInterval(ivRef.current);};
  },[]);
  const sendMessage=async()=>{
    if(!msg.trim())return;
    /* Ensure emailRef has a value - use auth, st fields, or device ID */
    if(!emailRef.current){
      const currentUser=await _supabase.auth.getUser();
      if(currentUser.data?.user?.email)emailRef.current=currentUser.data.user.email;
      else{
        const storedId2=localStorage.getItem('castigat_chat_id');
        const emailFb2=st.email||(typeof st.user==='string'&&!st.user.startsWith('{')?st.user:null);
        if(emailFb2){emailRef.current=emailFb2;localStorage.setItem('castigat_chat_id',emailFb2);}
        else if(storedId2){emailRef.current=storedId2;}
        else{const newId='device_'+Math.random().toString(36).substr(2,9);localStorage.setItem('castigat_chat_id',newId);emailRef.current=newId;}
      }
    }
    const currentUser=await _supabase.auth.getUser();
    const{error}=await _supabase.from('messages').insert([{
      user_id:currentUser.data?.user?.id||null,
      student_email:emailRef.current,
      student_name:(typeof st.user==='string'?st.user:st.user?.prenom||st.user?.name)||st.pseudo||currentUser.data?.user?.user_metadata?.display_name||'Anonyme',
      sender:'student',
      content:msg.trim(),
      read:false
    }]);
    if(!error){
      /* Optimistic update: add message to state immediately */
      const newMsg={id:'temp_'+Date.now(),student_email:emailRef.current,student_name:(typeof st.user==='string'?st.user:st.user?.prenom||st.user?.name)||st.pseudo||'Anonyme',sender:'student',content:msg.trim(),read:false,created_at:new Date().toISOString()};
      setMessages(prev=>[...prev,newMsg]);
      setMsg("");
    }
  };

  return(
    <div className="safe-b fade-up" style={{padding:'68px 20px 140px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:20}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{width:56,height:56,borderRadius:14,background:'linear-gradient(135deg,var(--violet-dim),var(--violet))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',boxShadow:'0 8px 30px rgba(167,139,250,.2)'}}>
            {I.users({size:26,sw:1.6,style:{color:'#fff'}})}
          </div>
          <h1 className="heading" style={{fontSize:24,marginBottom:4}}>Mon Coach</h1>
          <p className="body" style={{fontSize:11}}>Communication directe avec votre coach</p>
        </div>

        <div style={{height:'50vh',overflowY:'auto',marginBottom:16,padding:12,borderRadius:12,background:'var(--bg-card)',border:'1px solid var(--line)',display:'flex',flexDirection:'column',gap:8}}>
          {loading&&<p style={{textAlign:'center',color:'var(--text-3)',fontSize:11,padding:20}}>Chargement...</p>}
          {!loading&&messages.length===0&&<div style={{textAlign:'center',padding:'40px 20px'}}><p style={{fontSize:32,marginBottom:8}}>💬</p><p style={{fontSize:12,color:'var(--text-2)',marginBottom:4}}>Aucun message pour l'instant</p><p style={{fontSize:10,color:'var(--text-3)'}}>Envoyez votre premier message à votre coach !</p></div>}
          {messages.map((m,i)=>{
            const isMe=m.sender==="student";
            return(
              <div key={m.id} style={{display:'flex',justifyContent:isMe?'flex-end':'flex-start'}}>
                <div style={{maxWidth:'75%',padding:'10px 14px',borderRadius:12,background:isMe?'var(--gold)':'rgba(167,139,250,.12)',borderBottomLeftRadius:isMe?12:2,borderBottomRightRadius:isMe?2:12}}>
                  {!isMe&&<p style={{fontSize:9,fontWeight:700,color:'var(--violet)',marginBottom:4}}>Coach</p>}
                  <p style={{fontSize:12,color:isMe?'#07070b':'var(--text)',lineHeight:1.6}}>{m.content}</p>

                </div>
              </div>
            );
          })}

        </div>

        <div style={{display:'flex',gap:8,position:'fixed',bottom:72,left:0,right:0,zIndex:60,background:'var(--bg)',padding:'10px 20px',maxWidth:480,margin:'0 auto'}}>
          <input type="text" placeholder="Votre message…" value={msg} onChange={(e)=>setMsg(e.target.value)} onKeyDown={(e)=>{if(e.key==="Enter"&&!e.shiftKey)sendMessage()}} style={{flex:1,padding:'12px 14px',borderRadius:12,border:'1px solid var(--line)',background:'var(--bg-raised)',color:'var(--text)',fontSize:12,fontFamily:'inherit'}}/>

        </div>
      </div>
    </div>
  );
}

                  {p.tag&&<span style={{fontSize:8,padding:'3px 8px',borderRadius:10,background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.15)',color:'var(--emerald)',fontWeight:700}}>{p.tag}</span>}
                </div>

                <div style={{display:'flex',alignItems:'center',gap:16}}>
                  <button onClick={()=>setCommunityPosts(ps=>ps.map(pp=>pp.id===p.id?{...pp,liked:!pp.liked,likes:pp.liked?pp.likes-1:pp.likes+1}:pp))} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:p.liked?'var(--coral)':'var(--text-3)',background:'none',border:'none',cursor:'pointer',padding:0}}>{p.liked?"❤️":"🤍"} {p.likes}</button>

                        <p style={{fontSize:10,color:'var(--text-2)',lineHeight:1.5}}>{r.text}</p>
                      </div>
                    </div>
                  ))}

                    style={{flex:1,padding:'8px 12px',borderRadius:10,border:'1px solid var(--line)',background:'var(--bg)',color:'var(--text)',fontSize:10,fontFamily:'inherit'}}/>
                  <button onClick={()=>{if(replyText.trim()){setCommunityPosts(ps=>ps.map(pp=>pp.id===p.id?{...pp,replies:[...pp.replies,{pseudo:st.user?.pseudo||"Moi",text:replyText.trim(),time:"À l'instant"}]}:pp));setReplyText("");setReplyTo(null)}}} className="btn-gold" style={{padding:'8px 14px',fontSize:10,flexShrink:0}}>Envoyer</button>
                </div>}
              </div>
            ))}
            {/* New post */}
            {showNewPost?(
              <div style={{padding:14,borderRadius:12,background:'var(--bg-raised)',border:'1px solid var(--emerald)'}}>
                {/* Name */}
                <div style={{marginBottom:8}}>
                  <p style={{fontSize:9,fontWeight:700,color:'var(--text-3)',marginBottom:4}}>VOTRE NOM</p>
                  <input value={newPostName} onChange={e=>setNewPostName(e.target.value)} placeholder="Prénom ou pseudo…" style={{width:'100%',padding:'8px 12px',borderRadius:10,border:'1px solid var(--line)',background:'var(--bg)',color:'var(--text)',fontSize:11,fontFamily:'inherit'}}/>
                </div>
                {/* Tag / theme */}
                <div style={{marginBottom:8}}>
                  <p style={{fontSize:9,fontWeight:700,color:'var(--text-3)',marginBottom:4}}>THÈME</p>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {["Respiration","Diction","Connexion","Monologue","Exercice","Échauffement","Culture","Autre"].map(t=>(
                      <button key={t} onClick={()=>setNewPostTag(newPostTag===t?null:t)} style={{padding:'4px 10px',borderRadius:16,fontSize:9,fontWeight:700,background:newPostTag===t?'rgba(74,222,128,.15)':'var(--bg)',border:'1px solid',borderColor:newPostTag===t?'var(--emerald)':'var(--line)',color:newPostTag===t?'var(--emerald)':'var(--text-3)',cursor:'pointer',transition:'all .2s'}}>{t}</button>
                    ))}
                  </div>
                </div>
                {/* Message */}
                <textarea value={newPostText} onChange={e=>setNewPostText(e.target.value)} placeholder="Partagez votre expérience, posez une question…" style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1px solid var(--line)',background:'var(--bg)',color:'var(--text)',fontSize:11,fontFamily:'inherit',resize:'vertical',minHeight:60,marginBottom:8}}/>
                <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                  <button onClick={()=>{setShowNewPost(false);setNewPostText("");setNewPostTag(null)}} className="btn-outline" style={{padding:'8px 16px',fontSize:10}}>Annuler</button>
                  <button onClick={()=>{if(newPostText.trim()){setCommunityPosts(ps=>[{id:Date.now(),pseudo:newPostName.trim()||st.user?.pseudo||"Anonyme",text:newPostText.trim(),time:"À l'instant",likes:0,tag:newPostTag,liked:false,replies:[]},...ps]);setNewPostText("");setNewPostTag(null);setShowNewPost(false)}}} className="btn-gold" style={{padding:'8px 16px',fontSize:10}}>Publier</button>
                </div>
              </div>
            ):(
              <button onClick={()=>{setShowNewPost(true);setNewPostName(st.user?.pseudo||"")}} className="btn-outline" style={{width:'100%',padding:'12px 0',fontSize:11,marginTop:4}}>Écrire un message…</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ MODULE LIST ═══ */
function ModList({title,sub,mods,dk,st,setSt,active,setMod,sec}){
  const[showQuiz,setShowQuiz]=useState(false);
  const lv=getLv(st.xp);const li=LEVELS.indexOf(lv);
  const sorted=[lv,...LEVELS.filter((_,i)=>i<li).reverse(),...LEVELS.filter((_,i)=>i>li)];
  if(active&&active.sec===sec){
    if(sec==="pr")return<ExV mod={active} st={st} setSt={setSt} back={()=>setMod(null)}/>;
    return<CuV mod={active} st={st} setSt={setSt} back={()=>setMod(null)}/>;
  }
  if(showQuiz&&sec==="cu")return<GlossaireQuiz st={st} setSt={setSt} onClose={()=>setShowQuiz(false)}/>;
  return(
    <div className="safe-b fade-up" style={{padding:'68px 20px 100px'}}>
      <div className="mw">
        <h1 className="heading" style={{fontSize:26,marginBottom:4}}>{title}</h1>
        <p className="body" style={{fontSize:12,marginBottom:24}}>{sub}</p>
        {sec==="cu"&&typeof GLOSSAIRE!=="undefined"&&(
          <div style={{marginBottom:24}}>
            <button onClick={()=>setShowQuiz(true)} className="card-gold" style={{width:'100%',padding:'18px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',transition:'all .3s'}}>
              <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.05))',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {I.book({size:20,sw:1.6,style:{color:'var(--gold)'}})}
              </div>
              <div style={{flex:1,textAlign:'left'}}>
                <p style={{fontSize:12,fontWeight:700,color:'var(--gold)',marginBottom:2}}>Quiz Glossaire</p>
                <p style={{fontSize:10,color:'var(--text-2)'}}>{GLOSSAIRE.length} termes à maîtriser</p>
              </div>
              <span style={{fontSize:14,color:'var(--gold)'}}>→</span>
            </button>
            <details style={{marginTop:16}}>
              <summary style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'10px 14px',borderRadius:12,background:'var(--bg-card)',border:'1px solid var(--line)',fontSize:11,fontWeight:700,color:'var(--text-3)'}}>
                📖 Voir tous les termes
              </summary>
              <div style={{padding:'12px 0',display:'flex',flexDirection:'column',gap:4,marginTop:6}}>
                {GLOSSAIRE.map(g=>(
                  <div key={g.term} style={{padding:'8px 14px',borderRadius:8,background:'var(--bg-card)',border:'1px solid var(--line)'}}>
                    <p style={{fontSize:11,fontWeight:700,color:'var(--gold)',marginBottom:2}}>{g.term}<span style={{fontSize:7,color:'var(--text-3)',marginLeft:6}}>Niveau {g.difficulty}</span></p>
                    <p style={{fontSize:10,color:'var(--text-2)',lineHeight:1.5}}>{g.def}</p>
                  </div>
                ))}
              </div>
            </details>
          </div>
        )}
        {sorted.map(l=>{
          const u=st.xp>=l.xp,ms=mods[l.id]||[],cur=l.id===lv.id;
          /* For culture: check if previous level's exam was passed (required to unlock higher-level culture) */
          const levelIdx=LEVELS.indexOf(l);
          const prevLevelId=levelIdx>0?LEVELS[levelIdx-1].id:null;
          const examPassedForPrev=!prevLevelId||(st.passedExams||[]).includes(prevLevelId);
          /* Culture above current level: show greyed out with lock */
          const cultureUnlocked=sec!=="cu"||levelIdx<=li||examPassedForPrev;
          if(!ms.length)return null;
          return(<div key={l.id} style={{marginBottom:26}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span className="emoji" style={{fontSize:'15px'}}>{l.icon}</span>
              <p className="label-gold" style={{color:u?'var(--gold-dim)':'var(--text-3)'}}>{l.name}</p>
              {cur&&<span style={{fontSize:7,fontWeight:700,padding:'2px 7px',borderRadius:20,background:'var(--gold-glow)',color:'var(--gold)',border:'1px solid var(--line-s)'}}>VOTRE NIVEAU</span>}
              {!u&&<span style={{fontSize:8,color:'var(--text-3)',fontWeight:600,opacity:.5}}>({LEVELS.find(ll=>ll.id===l.id)?.xp||0} XP)</span>}
              {sec==="cu"&&!cultureUnlocked&&<span style={{fontSize:7,fontWeight:700,padding:'2px 7px',borderRadius:20,background:'rgba(255,255,255,.03)',color:'var(--text-3)',border:'1px solid var(--line)'}}>EXAMEN REQUIS</span>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {ms.map((m,idx)=>{
                const d=st[dk].includes(m.id);
                /* Monologues unlock by total exercise count, others need previous done */
                const isMonologue=m.cat==="Monologue";
                const monoThresholds=[3,8,15,22,30,38,46,54,62,70,78,86];
                const monoIdx=isMonologue?(()=>{const allMonos=Object.values(PR).flat().filter(e=>e.cat==="Monologue");return allMonos.findIndex(e=>e.id===m.id)})():-1;
                const monoUnlocked=isMonologue&&monoIdx>=0&&monoIdx<monoThresholds.length?st.doneEx.length>=monoThresholds[monoIdx]:false;
                const prevDone=idx===0||st[dk].includes(ms[idx-1].id);
                const isLocked=d?false:isMonologue?!monoUnlocked:(!u||!prevDone||!cultureUnlocked);
                return(<button key={m.id} onClick={()=>{if(!isLocked)setMod({...m,sec})}}
                  className="card" style={{padding:'11px 12px',display:'flex',alignItems:'center',gap:10,opacity:isLocked?.3:1,cursor:isLocked?'default':'pointer',textAlign:'left',pointerEvents:isLocked?'none':'auto'}}>
                  <div className="em-box" style={{width:38,height:38,background:d?'rgba(74,222,128,.06)':isLocked?'rgba(255,255,255,.01)':'rgba(255,255,255,.02)',borderColor:d?'rgba(74,222,128,.12)':'rgba(255,255,255,.04)'}}>
                    <span className="emoji" style={{fontSize:16}}>{isLocked?"🔒":m.icon}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:5}}>
                      <p style={{fontSize:11,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isLocked?'var(--text-3)':'var(--text)'}}>{m.title}</p>
                      {m.premium&&!isLocked&&<span style={{fontSize:7,fontWeight:700,padding:'1px 6px',borderRadius:20,background:'rgba(167,139,250,.12)',color:'var(--violet)'}}>PREMIUM</span>}
                    </div>
                    <p style={{fontSize:9,color:'var(--text-3)',marginTop:1}}>{isLocked?(sec==="cu"&&!cultureUnlocked?"Passez l'examen du niveau précédent":sec==="pr"?"Terminez l'exercice précédent":"Terminez la leçon précédente"):m.cat+" · "+m.dur}</p>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                    {isLocked?<span className="emoji" style={{fontSize:12}}>🔒</span>:d&&st.stars?.[m.id]?<div style={{display:'flex',gap:1}}>{[1,2,3].map(s=><span key={s}>{I.star({size:10,sw:1.5,style:{color:s<=st.stars[m.id]?'var(--gold)':'var(--text-3)',fill:s<=st.stars[m.id]?'var(--gold)':'none'}})}</span>)}</div>:d?<span style={{color:'var(--emerald)'}}>{I.check({size:14})}</span>:<span style={{fontSize:9,fontWeight:800,color:'var(--gold)'}}>+{m.xp}</span>}
                  </div>
                </button>);
              })}
            </div>
          </div>);
        })}
      </div>
    </div>
  );
}

/* ═══ GLOSSAIRE QUIZ ═══ */
function GlossaireQuiz({st,setSt,onClose}){
  const[quizMode,setQuizMode]=useState(true);
  const[difficulty,setDifficulty]=useState(1);
  const[currentIdx,setCurrentIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[answered,setAnswered]=useState(false);
  const[selectedAns,setSelectedAns]=useState(null);
  const[shuffledOpts,setShuffledOpts]=useState([]);
  const terms=GLOSSAIRE.filter(t=>t.difficulty===difficulty);
  const current=terms[currentIdx];
  /* Shuffle options once per question */
  useEffect(()=>{
    if(!current)return;
    const wrongDefs=GLOSSAIRE.filter(t=>t.difficulty===difficulty&&t.term!==current.term)
      .sort(()=>Math.random()-0.5).slice(0,3).map(t=>({def:t.def,correct:false}));
    const all=[{def:current.def,correct:true},...wrongDefs].sort(()=>Math.random()-0.5);
    setShuffledOpts(all);
  },[currentIdx,difficulty]);
  const handleAnswer=(idx)=>{
    setSelectedAns(idx);setAnswered(true);
    const isCorrect=shuffledOpts[idx].correct;
    updateSRS(st,setSt,"glossary_"+current.term,isCorrect);
    if(isCorrect){setScore(s=>s+1);SFX.success();}
  };
  const nextQuestion=()=>{
    if(currentIdx+1<terms.length){setCurrentIdx(currentIdx+1);setAnswered(false);setSelectedAns(null);}
    else{setQuizMode(false);setSt(p=>({...p,glossScore:{...p.glossScore||{},[difficulty]:Math.max(p.glossScore?.[difficulty]||0,score+1)}}));}
  };
  if(!quizMode){
    const pct=Math.round(score/terms.length*100);
    return(
      <div style={{position:'fixed',inset:0,background:'rgba(5,5,10,0.95)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
        <div style={{textAlign:'center',animation:'fadeIn .5s ease-out',padding:28}}>
          <div className="emoji em-xl" style={{marginBottom:16}}>{pct>=80?"🏆":pct>=50?"👏":"💪"}</div>
          <h2 className="heading" style={{fontSize:28,color:'var(--gold)',marginBottom:12}}>
            {pct>=80?"Excellent !":pct>=50?"Bien joué !":"Continue !"}
          </h2>
          <p className="body" style={{fontSize:13,color:'var(--text-2)',marginBottom:4}}>Niveau {difficulty} — {difficulty===1?"Débutant":difficulty===2?"Intermédiaire":"Avancé"}</p>
          <p className="heading" style={{fontSize:24,color:'var(--gold)',marginBottom:28}}>{score}/{terms.length}</p>
          <div style={{display:'flex',gap:12,justifyContent:'center'}}>
            {difficulty<3&&pct>=50&&<button onClick={()=>{setDifficulty(d=>d+1);setCurrentIdx(0);setScore(0);setAnswered(false);setSelectedAns(null);setQuizMode(true);}} className="btn-gold" style={{padding:'12px 28px',fontSize:13,fontWeight:700}}>
              Niveau suivant
            </button>}
            <button onClick={()=>{setCurrentIdx(0);setScore(0);setAnswered(false);setSelectedAns(null);setQuizMode(true);}} className="btn-outline" style={{padding:'12px 28px',fontSize:13,fontWeight:700}}>
              {pct>=50&&difficulty<3?"Recommencer":"Réessayer"}
            </button>
            <button onClick={onClose} style={{padding:'12px 28px',fontSize:13,fontWeight:700,background:'none',border:'1px solid var(--line)',borderRadius:10,color:'var(--text-3)',cursor:'pointer'}}>Fermer</button>
          </div>
        </div>
      </div>
    );
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(5,5,10,0.95)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:'20px'}}>
      <div style={{background:'var(--bg-card)',borderRadius:18,border:'1px solid var(--line)',padding:28,maxWidth:420,width:'100%',maxHeight:'85vh',overflow:'auto',animation:'fadeUp .4s ease-out'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <p className="label" style={{color:'var(--gold)'}}>NIVEAU {difficulty} — {difficulty===1?"DÉBUTANT":difficulty===2?"INTERMÉDIAIRE":"AVANCÉ"}</p>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--text-3)'}}>✕</button>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{width:'100%',height:3,background:'var(--line)',borderRadius:3,overflow:'hidden',marginBottom:6}}>
            <div style={{width:(currentIdx+1)/terms.length*100+'%',height:'100%',background:'linear-gradient(90deg,var(--gold-dim),var(--gold))',transition:'width .3s'}}/>
          </div>
          <p style={{fontSize:9,color:'var(--text-3)'}}>Question {currentIdx+1} / {terms.length}</p>
        </div>
        <p style={{fontSize:10,color:'var(--text-3)',marginBottom:6,fontWeight:600}}>Quelle est la définition de :</p>
        <h3 className="heading" style={{fontSize:22,marginBottom:24,color:'var(--gold)'}}>{current.term}</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
          {shuffledOpts.map((opt,i)=>{
            const isSelected=selectedAns===i;
            const isCorrect=opt.correct;
            const showCorrect=answered&&isCorrect;
            const showWrong=answered&&isSelected&&!isCorrect;
            return(
              <button key={i} onClick={()=>{if(!answered)handleAnswer(i);}}
                disabled={answered}
                style={{padding:14,borderRadius:12,border:'2px solid',textAlign:'left',cursor:answered?'default':'pointer',transition:'all .2s',
                  background:showCorrect?'rgba(74,222,128,.1)':showWrong?'rgba(232,116,90,.1)':'var(--bg-raised)',
                  borderColor:showCorrect?'var(--emerald)':showWrong?'var(--coral)':isSelected?'var(--gold)':'var(--line)',
                  opacity:answered&&!isSelected&&!isCorrect?.35:1}}>
                <p style={{fontSize:12,lineHeight:1.5,color:showCorrect?'var(--emerald)':showWrong?'var(--coral)':'var(--text)'}}>{opt.def}</p>
              </button>
            );
          })}
        </div>
        {answered&&(
          <div style={{marginBottom:14,padding:12,borderRadius:10,
            background:shuffledOpts[selectedAns]?.correct?'rgba(74,222,128,.06)':'rgba(232,116,90,.06)',
            border:'1px solid '+(shuffledOpts[selectedAns]?.correct?'rgba(74,222,128,.2)':'rgba(232,116,90,.2)')}}>
            <p style={{fontSize:11,fontWeight:700,color:shuffledOpts[selectedAns]?.correct?'var(--emerald)':'var(--coral)',marginBottom:2}}>
              {shuffledOpts[selectedAns]?.correct?"✓ Bonne réponse !":"✗ Mauvaise réponse"}
            </p>
            {!shuffledOpts[selectedAns]?.correct&&<p style={{fontSize:10,color:'var(--text-2)'}}>La bonne réponse : {current.def}</p>}
          </div>
        )}
        <button onClick={nextQuestion} disabled={!answered} className="btn-gold" style={{width:'100%',padding:'12px 0',fontSize:12,opacity:answered?1:.3}}>
          {currentIdx+1===terms.length?"Voir les résultats":"Question suivante"}
        </button>
      </div>
    </div>
  );
}

function CuV({mod,st,setSt,back}){

  const advance=(ns)=>{setSel(null);setShowCorrection(false);
    if(qi<mod.quiz.length-1)setQi(qi+1);
    else{setPh("result");if(!st.doneCu.includes(mod.id)){setXp(true);SFX.xp();const ratio=ns/mod.quiz.length,cStars=ratio>=1?3:ratio>=0.6?2:1;setSt(p=>({...p,xp:p.xp+mod.xp,weekXP:(p.weekXP||0)+mod.xp,weekCulture:true,doneCu:[...p.doneCu,mod.id],perf:p.perf+(ns===mod.quiz.length?1:0),stars:{...p.stars,[mod.id]:Math.max(cStars,p.stars?.[mod.id]||0)},
      cuResults:{...(p.cuResults||{}),[mod.id]:{score:ns,total:mod.quiz.length,cat:mod.cat,date:new Date().toISOString()}}
    }))}}
  };

/* ═══ SESSION TRACKING ═══ */
/* Track time spent on app, session count, last active — updates profils in Supabase */
(function(){
  var SESSION_START=Date.now();
  /* Update profils on load (session count + last_active) */
  (async()=>{
    try{
      var usr=await _supabase.auth.getUser();
      if(!usr.data.user)return;
      var uid=usr.data.user.id;
      var{data:prof}=await _supabase.from('profiles').select('session_count').eq('id',uid).single();
      var count=(prof&&prof.session_count)||0;
      await _supabase.from('profiles').update({last_active:new Date().toISOString(),session_count:count+1}).eq('id',uid);
    }catch(e){console.log('session tracking init error',e)}
  })();
  /* Update total_minutes when user leaves */
  function saveSessionTime(){
    var mins=Math.round((Date.now()-SESSION_START)/60000);
    if(mins<1)return;
    (async()=>{
      try{
        var usr=await _supabase.auth.getUser();
        if(!usr.data.user)return;
        var uid=usr.data.user.id;
        var{data:prof}=await _supabase.from('profiles').select('total_minutes').eq('id',uid).single();
        var total=(prof&&prof.total_minutes)||0;
        await _supabase.from('profiles').update({total_minutes:total+mins}).eq('id',uid);
      }catch(e){}
    })();
  }
  document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')saveSessionTime();});
  window.addEventListener('beforeunload',saveSessionTime);
})();

function updateSRS(st,setSt,itemId,correct){
  const today=new Date().toDateString();
  const item=(st.srs||{})[itemId]||{nextReview:today,interval:1,ease:2.5,wrong:0};
  if(correct){
    item.interval=Math.ceil(item.interval*item.ease);
    item.ease=Math.min(3.0,item.ease+0.1);
  }else{
    item.interval=1;
    item.ease=Math.max(1.3,item.ease-0.2);
    item.wrong=(item.wrong||0)+1;
  }
  const nextDate=new Date();
  nextDate.setDate(nextDate.getDate()+item.interval);
  item.nextReview=nextDate.toDateString();
  setSt(p=>({...p,srs:{...p.srs,[itemId]:item}}));
}

function TutoOverlay({step,onNext,onDone}){
  const steps=[
    {target:"tuto-exercice",color:"var(--gold)",title:"Exercices",desc:"Travaille ta voix, ton corps et ton jeu pour progresser et gagner de l'XP."},
    {target:"tuto-culture",color:"var(--violet)",title:"Culture théâtrale",desc:"Découvre l'histoire du théâtre et les grands auteurs grâce à des quiz."},
    {target:"tuto-analyse",color:"var(--coral)",title:"Analyse de scène",desc:"Plonge dans les grandes scènes du répertoire pour affiner ton regard."},
  ];
  const s=steps[step]||steps[0];
  const[rect,setRect]=useState(null);
  useEffect(()=>{
    let tries=0;
    const find=()=>{
      const el=document.querySelector(`[data-tuto="${s.target}"]`);
      if(el){const r=el.getBoundingClientRect();setRect({top:r.top,left:r.left,width:r.width,height:r.height})}
      else if(tries<20){tries++;setTimeout(find,100)}
    };
    find();
    const onScroll=()=>{const el=document.querySelector(`[data-tuto="${s.target}"]`);if(el){const r=el.getBoundingClientRect();setRect({top:r.top,left:r.left,width:r.width,height:r.height})}};
    window.addEventListener("scroll",onScroll);window.addEventListener("resize",onScroll);
    return()=>{window.removeEventListener("scroll",onScroll);window.removeEventListener("resize",onScroll)};
  },[step,s.target]);
  if(!rect)return null;
  const pad=8;
  return(
    <div style={{position:'fixed',inset:0,zIndex:900}}>
      {/* Dark overlay with cutout */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
        <defs>
          <mask id="tuto-mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white"/>
            <rect x={rect.left-pad} y={rect.top-pad} width={rect.width+pad*2} height={rect.height+pad*2} rx="14" fill="black"/>
          </mask>
        </defs>
        <rect x="0" y="0" width="100%" height="100%" fill="rgba(5,5,10,0.82)" mask="url(#tuto-mask)"/>
      </svg>
      {/* Highlight border */}
      <div style={{position:'absolute',top:rect.top-pad,left:rect.left-pad,width:rect.width+pad*2,height:rect.height+pad*2,borderRadius:14,border:`2px solid ${s.color}`,boxShadow:`0 0 30px ${s.color}44`,pointerEvents:'none',animation:'pathPulse 2s ease-in-out infinite'}}/>
      {/* Tooltip */}
      <div className="fade-up" key={step} style={{position:'fixed',bottom:24,left:24,right:24,maxWidth:320,margin:'0 auto',background:'var(--bg-card)',border:`1px solid ${s.color}33`,borderRadius:16,padding:'20px 22px',textAlign:'center',boxShadow:`0 16px 50px rgba(0,0,0,.5), 0 0 20px ${s.color}11`}}>
        <p style={{fontSize:10,fontWeight:800,letterSpacing:'.16em',color:s.color,marginBottom:6}}>{step+1}/3</p>
        <h3 className="heading" style={{fontSize:18,marginBottom:6,color:'var(--text)'}}>{s.title}</h3>
        <p style={{fontSize:12,color:'var(--text-2)',lineHeight:1.6,marginBottom:16}}>{s.desc}</p>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          {step<2?(
            <React.Fragment>
              <button onClick={onDone} style={{padding:'10px 20px',borderRadius:10,background:'transparent',border:'1px solid var(--line)',color:'var(--text-3)',fontSize:11,cursor:'pointer'}}>Passer</button>
              <button onClick={onNext} className="btn-gold" style={{padding:'10px 28px',fontSize:12}}>Suivant</button>
            </React.Fragment>
          ):(
            <button onClick={onDone} className="btn-gold" style={{padding:'11px 36px',fontSize:12}}>C'est parti !</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══ PWA INSTALL PROMPT ═══ */
function InstallPrompt({st}){
  const[show,setShow]=useState(()=>{
    if(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)return false;
    if(navigator.standalone)return false;
    if(localStorage.getItem('pwa_installed')||localStorage.getItem('castigat_install_dismissed'))return false;
    return true;
  });
  const[isIOS,setIsIOS]=useState(false);

  useEffect(()=>{
    /* Detect iOS */
    const ua=navigator.userAgent.toLowerCase();
    const isApple=/iphone|ipad|ipod/.test(ua);
    setIsIOS(isApple);
  },[]);

  useEffect(()=>{
    /* Skip if already installed as PWA */
    if(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||navigator.standalone){setShow(false);return;}
    if(!st.onb||!show)return;
    if(!deferredPrompt&&!isIOS)return;/* Only show if available or iOS */

    /* Check if user dismissed in last 3 days */
    const dismissed=localStorage.getItem('castigat_install_dismissed');
    if(dismissed){
      const dismissTime=parseInt(dismissed);
      const now=Date.now();
      const daysPassed=(now-dismissTime)/(1000*60*60*24);
      if(daysPassed<365){setShow(false);return}
    }

    /* Show after 3 seconds */
    const timer=setTimeout(()=>setShow(true),3000);
    return()=>clearTimeout(timer);
  },[st.onb,deferredPrompt,isIOS]);

  if(!st.onb||!show||(typeof deferredPrompt==='undefined'&&!isIOS))return null;

  const handleDismiss=()=>{
    localStorage.setItem('castigat_install_dismissed',String(Date.now()));
    setShow(false);
  };

  const handleInstall=async()=>{
    if(deferredPrompt){
      deferredPrompt.prompt();
      const result=await deferredPrompt.userChoice;
      if(result.outcome==='accepted'){
        window.deferredPrompt=null;
        handleDismiss();
      }
    }
  };

  
    /* If already installed as PWA, don't show install prompt */
    const isStandalone=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
    if(!show||isStandalone)return null;
return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:99,animation:'slideUp .4s cubic-bezier(.22,1,.36,1) forwards'}}>
      <div style={{background:'linear-gradient(180deg,var(--bg-raised) 0%,var(--bg) 100%)',borderTop:'1px solid var(--line)',padding:'24px 20px 32px',margin:0}}>
        <div style={{display:'flex',alignItems:'center',gap:16,maxWidth:500,margin:'0 auto',marginBottom:16}}>
          <div style={{width:50,height:50,borderRadius:12,background:'linear-gradient(135deg,var(--gold),var(--gold-light))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{fontSize:28,filter:'grayscale(1) brightness(10)'}}>🎭</span>
          </div>
          <div style={{flex:1}}>
            <p className="heading" style={{fontSize:16,marginBottom:2}}>Installer Castigat Academy</p>
            {isIOS?(
              <p style={{fontSize:12,color:'var(--text-2)',lineHeight:1.4}}>Appuyez sur <span style={{fontWeight:700,color:'var(--gold)'}}>partage</span> puis <span style={{fontWeight:700,color:'var(--gold)'}}>Sur l'écran d'accueil</span></p>
            ):(
              <p style={{fontSize:12,color:'var(--text-2)'}}>Accédez à l'app directement depuis votre écran d'accueil</p>
            )}
          </div>
          <button onClick={handleDismiss} style={{fontSize:18,cursor:'pointer',background:'none',border:'none',color:'var(--text-3)',padding:'4px 8px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
        </div>
        {!isIOS&&(
          <button onClick={handleInstall} style={{width:'100%',padding:'14px 16px',background:'linear-gradient(135deg,var(--gold),var(--gold-light))',color:'#05050a',borderRadius:12,border:'none',fontWeight:700,fontSize:14,cursor:'pointer',marginBottom:8,transition:'all .25s cubic-bezier(.22,1,.36,1)',boxShadow:'0 4px 20px rgba(212,168,67,.25)'}}>
            Installer
          </button>
        )}
        <button onClick={handleDismiss} style={{width:'100%',padding:'10px 16px',background:'transparent',color:'var(--text-3)',borderRadius:12,border:'none',fontWeight:500,fontSize:12,cursor:'pointer',transition:'color .2s'}}>
          Plus tard
        </button>
      </div>
    </div>
  );
}

const defaultSt={xp:0,initialXp:0,streak:0,lastActiveDate:null,doneEx:[],doneCu:[],doneSA:[],perf:0,vid:0,lv:0,onb:false,user:null,plan:"free",showCGU:false,theme:"dark",stars:{},weekXP:0,weekEx:0,weekAnalysis:false,weekCulture:false,weekRevision:false,lastWeekScore:null,perfectWeeks:0,weekStart:new Date().toDateString(),srs:{},seenBadges:[],warmups:0,avantScenes:0,connexions:0,challenges:0,totalBreaths:0,coachMessages:[],seenTuto:false,exFeedback:{},catLastPracticed:{},firstActivityDate:null,saResults:{},cuResults:{},lastSADate:null,dailyPulse:{answers:[],lastAnswerDate:null},challengeScores:{},passedExams:[],unreadMessageCount:0,messages:[]};

function App(){
  const[st,setSt]=useState(()=>{const saved=loadState();if(!saved)return defaultSt;const merged={...defaultSt,...saved,plan:saved.plan||(saved.premium?"standard":"free"),srs:saved.srs||{},seenBadges:saved.seenBadges||[],exFeedback:saved.exFeedback||{},catLastPracticed:saved.catLastPracticed||{},firstActivityDate:saved.firstActivityDate||saved.lastActiveDate||null,saResults:saved.saResults||{},cuResults:saved.cuResults||{},lastSADate:saved.lastSADate||null,dailyPulse:saved.dailyPulse||{answers:[],lastAnswerDate:null},challengeScores:saved.challengeScores||{},passedExams:saved.passedExams||[],unreadMessageCount:saved.unreadMessageCount||0,messages:saved.messages||[]};return merged;});
  const[tab,setTab]=useState("home");
  const[mod,setMod]=useState(null);
  const[exam,setExam]=useState(null);
  const[badgePopup,setBadgePopup]=useState(null);
  const[tutoStep,setTutoStep]=useState(0);
  const go=t=>{if(t!==tab)setMod(null);setTab(t);window.scrollTo(0,0)};

  /* Scroll to top when opening/closing an exercise or switching exam */
  useEffect(()=>{window.scrollTo(0,0)},[mod,exam]);

  /* Theme (dark/light) */
  useEffect(()=>{
    if(st.theme==="light")document.documentElement.classList.add("light");
    else document.documentElement.classList.remove("light");
  },[st.theme]);

  /* Streak management — check on app load and track daily visits */
  useEffect(()=>{
    if(!st.onb)return;
    const today=new Date().toDateString();
    if(st.lastActiveDate===today)return;/* already counted today */
    const last=st.lastActiveDate?new Date(st.lastActiveDate):null;
    const now=new Date();now.setHours(0,0,0,0);
    let newStreak=1;
    if(last){
      const prev=new Date(last);prev.setHours(0,0,0,0);
      const diff=Math.round((now-prev)/(1000*60*60*24));
      if(diff===1)newStreak=st.streak+1;/* consecutive day */
      else if(diff===0)newStreak=st.streak;/* same day */
      else newStreak=1;/* streak broken */
    }
    setSt(p=>({...p,streak:newStreak,lastActiveDate:today,firstActivityDate:p.firstActivityDate||today}));
  },[st.onb,st.lastActiveDate]);
  /* Weekly reset — reset objectives every Monday, save last week score */
  useEffect(()=>{
    if(!st.onb)return;
    const now=new Date();
    const weekId=Math.floor((now.getTime()-259200000)/(604800000));
    const savedWeek=st.weekStart||"";
    if(savedWeek!==String(weekId)){
      /* Count how many objectives were done last week */
      const lastScore=((st.weekEx||0)>=3?1:0)+(st.weekCulture?1:0)+(st.weekAnalysis?1:0)+(st.weekRevision?1:0);
      const perfectWeeks=(lastScore===4)?((st.perfectWeeks||0)+1):(0);
      setSt(p=>({...p,weekStart:String(weekId),weekEx:0,weekXP:0,weekAnalysis:false,weekCulture:false,weekRevision:false,lastWeekScore:lastScore,perfectWeeks}));
    }
  },[st.onb]);
  /* Also re-check streak when tab becomes visible (user returns to app) */
  useEffect(()=>{
    const onVisible=()=>{if(document.visibilityState==="visible"&&st.onb){
      const today=new Date().toDateString();
      if(st.lastActiveDate!==today){
        const last=st.lastActiveDate?new Date(st.lastActiveDate):null;
        const now=new Date();now.setHours(0,0,0,0);
        let newStreak=1;
        if(last){const prev=new Date(last);prev.setHours(0,0,0,0);const diff=Math.round((now-prev)/(1000*60*60*24));if(diff===1)newStreak=st.streak+1;else if(diff===0)newStreak=st.streak;else newStreak=1}
        setSt(p=>({...p,streak:newStreak,lastActiveDate:today,firstActivityDate:p.firstActivityDate||today}));
      }
    }};
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[st.onb,st.lastActiveDate,st.streak]);

  /* Badge detection — check for new badges on every state change */
  useEffect(()=>{
    if(!st.onb)return;
    const earned=BADGES.filter(b=>b.c(st));
    const newBadge=earned.find(b=>!(st.seenBadges||[]).includes(b.id));
    if(newBadge){
      setBadgePopup(newBadge);
      SFX.levelUp();
      setSt(p=>({...p,seenBadges:[...(p.seenBadges||[]),newBadge.id]}));
    }
  },[st.xp,st.doneEx.length,st.doneCu.length,st.streak,st.perf,st.vid,st.warmups,st.avantScenes,st.connexions,st.challenges,st.totalBreaths]);

  /* Auto-save on state change */
  useEffect(()=>{if(st.onb)saveState(st)},[st]);

  /* ═══ DAILY PULSE — Question quotidienne ═══ */
  const dailyPulse=st.dailyPulse||{answers:[],lastAnswerDate:null};
  const todayStr=new Date().toDateString();
  const alreadyAnsweredToday=dailyPulse.lastAnswerDate===todayStr;
  const answeredIds=dailyPulse.answers.map(a=>a.qId);
  const remainingQs=DAILY_QUESTIONS.filter(q=>!answeredIds.includes(q.id));
  const todayQuestion=(!alreadyAnsweredToday&&st.onb)?(remainingQs.length>0?remainingQs[0]:DAILY_QUESTIONS[dailyPulse.answers.length%DAILY_QUESTIONS.length]):null;
  const[showDailyQ,setShowDailyQ]=useState(!!todayQuestion);

  /* CGU from profile */
  if(st.showCGU) return <CGU onClose={()=>setSt(p=>({...p,showCGU:false}))}/>;

  if(!st.onb)return<Onboard done={(i,user)=>{SFX.success();window.scrollTo(0,0);setSt(p=>({...p,onb:true,xp:0,lv:0,user,streak:1,lastActiveDate:new Date().toDateString(),seenTuto:false}));setTutoStep(0)}}/>;
  const answerDailyQ=(qId,optId,val,cat)=>{
    setSt(p=>{
      const pulse=p.dailyPulse||{answers:[],lastAnswerDate:null};
      return{...p,dailyPulse:{answers:[...pulse.answers,{qId,optId,val,cat,date:new Date().toISOString()}],lastAnswerDate:todayStr}};
    });
    SFX.tap();
    setTimeout(()=>setShowDailyQ(false),600);
  };

  if(showDailyQ&&todayQuestion){
    return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'var(--bg)'}}>
        <div style={{width:'100%',maxWidth:380}}>
          {/* Header */}
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
              {I.mic({size:18,sw:1.4,style:{color:'#07070b'}})}
            </div>
            <p className="label-gold" style={{fontSize:8,marginBottom:6}}>PULSE DU JOUR</p>
          </div>

          {/* Question */}
          <div className="card" style={{padding:20,marginBottom:20,border:'1px solid rgba(200,164,78,.12)'}}>
            <p style={{fontSize:13,fontWeight:700,color:'var(--text)',lineHeight:1.5,marginBottom:20,textAlign:'center'}}>{todayQuestion.q}</p>

            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {todayQuestion.opts.map((opt,oi)=>(
                <button key={opt.id} onClick={()=>answerDailyQ(todayQuestion.id,opt.id,opt.val,todayQuestion.cat)}
                  style={{padding:'12px 16px',borderRadius:10,border:'1px solid var(--line)',background:'rgba(255,255,255,.02)',cursor:'pointer',textAlign:'left',transition:'all .2s',display:'flex',alignItems:'center',gap:10}}
                  onMouseOver={e=>{e.currentTarget.style.borderColor='rgba(200,164,78,.3)';e.currentTarget.style.background='rgba(200,164,78,.04)'}}
                  onMouseOut={e=>{e.currentTarget.style.borderColor='var(--line)';e.currentTarget.style.background='rgba(255,255,255,.02)'}}>
                  <span style={{width:22,height:22,borderRadius:6,background:'rgba(200,164,78,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'var(--gold)',flexShrink:0}}>{String.fromCharCode(65+oi)}</span>
                  <span style={{fontSize:11,color:'var(--text)',lineHeight:1.4}}>{opt.text}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Skip */}
          <button onClick={()=>setShowDailyQ(false)} style={{display:'block',margin:'0 auto',padding:'8px 16px',border:'none',background:'none',cursor:'pointer',fontSize:9,color:'var(--text-3)',fontWeight:600}}>Passer pour aujourd'hui</button>
          <p style={{fontSize:8,color:'var(--text-3)',textAlign:'center',marginTop:12,lineHeight:1.5,fontStyle:'italic'}}>Vos réponses alimentent votre bilan personnalisé</p>
        </div>
      </div>
    );
  }

  if(exam) return <ExamView levelId={exam} st={st} setSt={setSt} onPass={()=>{SFX.levelUp();setExam(null)}} onBack={()=>setExam(null)}/>;

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {!st.seenTuto&&tab==="home"&&<TutoOverlay step={tutoStep} onNext={()=>setTutoStep(tutoStep+1)} onDone={()=>setSt(p=>({...p,seenTuto:true}))}/>}
      {badgePopup&&<BadgePopup badge={badgePopup} onClose={()=>setBadgePopup(null)}/>}
      <Top xp={st.xp} streak={st.streak}/>
      <InstallPrompt st={st}/>
      {tab==="home"&&<Home st={st} setSt={setSt} go={go} setMod={setMod} setExam={setExam}/>}
      {tab==="practice"&&<ModList title="Pratique" sub="Exercices progressifs" mods={PR} dk="doneEx" st={st} setSt={setSt} active={mod} setMod={setMod} sec="pr"/>}
      {tab==="culture"&&<ModList title="Culture" sub="Histoire, auteurs, techniques" mods={CU} dk="doneCu" st={st} setSt={setSt} active={mod} setMod={setMod} sec="cu"/>}
      {tab==="feed"&&<Feed st={st} setSt={setSt}/>}
      {tab==="profile"&&<Profile st={st} setSt={setSt}/>}
      <Nav tab={tab} go={go} plan={st.plan}/>
    </div>
  );
}

try{ReactDOM.createRoot(document.getElementById("root")).render(<App/>)}catch(e){document.getElementById("root");const pre=document.createElement('pre');pre.style.cssText='color:red;padding:20px;font-size:12px';pre.textContent=e.message+'\n'+e.stack;document.getElementById("root").appendChild(pre)}
</script>
<script>window.onerror=function(msg,src,line,col,err){
  /* Don't destroy the app for "Script error" (CORS-masked, not actionable) */
  if(msg==="Script error."&&line===0)return true;
  console.error("JS Error:",msg,"Line:",line,"Col:",col,err);
  var el=document.createElement("div");
  el.style.cssText="position:fixed;top:0;left:0;right:0;padding:8px 16px;background:rgba(220,50,50,.9);color:#fff;font-size:11px;font-family:monospace;z-index:99999;cursor:pointer";
  el.textContent="⚠ "+msg+(line?" (L"+line+")":"");
  el.onclick=function(){el.remove()};
  document.body.appendChild(el);
}</script>
</body>
