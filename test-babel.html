<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<pre id="result" style="white-space:pre-wrap;font-size:14px;padding:20px;">Loading Babel...</pre>
<script>
window.addEventListener('load', function() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'castigat-academy.html', true);
  xhr.onload = function() {
    var html = xhr.responseText;
    var match = html.match(/<script type="text\/babel">([\s\S]*?)<\/script>/);
    if (!match) {
      document.getElementById('result').textContent = 'No babel script found';
      return;
    }
    try {
      Babel.transform(match[1], {presets:['react']});
      document.getElementById('result').textContent = 'SUCCESS: No syntax errors found!';
    } catch(e) {
      document.getElementById('result').textContent = 'BABEL ERROR:\n\n' + e.message;
    }
  };
  xhr.send();
});
</script>
</body>
</html>
