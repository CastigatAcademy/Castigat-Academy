<style>
:root {
  --bg-deep: #0a0a0f;
  --bg-card: #13131a;
  --bg-card-hover: #1a1a24;
  --bg-surface: #0e0e15;
  --bg-elevated: #1c1c28;
  --gold: #c9a84c;
  --gold-light: #e4c76b;
  --gold-dim: #8a7235;
  --gold-glow: rgba(201, 168, 76, 0.15);
  --violet: #a78bfa;
  --violet-bright: #c4b5fd;
  --violet-dim: #7c5cbf;
  --violet-glow: rgba(167, 139, 250, 0.12);
  --coral: #e07a5f;
  --coral-light: #f0a08a;
  --emerald: #4ade80;
  --emerald-dim: #22c55e;
  --text-primary: #f0ece4;
  --text-secondary: #9a9590;
  --text-muted: #5a5550;
  --border: rgba(201, 168, 76, 0.1);
  --border-strong: rgba(201, 168, 76, 0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
.serif { font-family: 'Playfair Display', Georgia, serif; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
@keyframes glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes xpBurst {
  0% { transform: scale(0.5) translateY(20px); opacity: 0; }
  40% { transform: scale(1.3) translateY(-10px); opacity: 1; }
  100% { transform: scale(1) translateY(-40px); opacity: 0; }
}
.animate-fade { animation: fadeIn 0.5s ease-out; }
.animate-slide { animation: slideUp 0.6s ease-out; }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-glow { animation: glow 2s ease-in-out infinite; }

/* Gold shimmer text */
.gold-shimmer {
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-light), var(--gold), var(--gold-light), var(--gold-dim));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 4s linear infinite;
}

/* Progress bar */
.progress-track {
  width: 100%; border-radius: 99px; overflow: hidden;
  background: rgba(255,255,255,0.06);
}
.progress-fill {
  height: 100%; border-radius: 99px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.progress-gold { background: linear-gradient(90deg, var(--gold-dim), var(--gold-light)); }
.progress-violet { background: linear-gradient(90deg, var(--violet-dim), var(--violet)); }
.progress-emerald { background: linear-gradient(90deg, #16a34a, var(--emerald)); }
.progress-coral { background: linear-gradient(90deg, #c2553c, var(--coral-light)); }
.progress-white { background: rgba(255,255,255,0.85); }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  transition: all 0.25s ease;
}
.card:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
.card-glow {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  box-shadow: 0 0 30px var(--gold-glow), inset 0 1px 0 rgba(201,168,76,0.1);
}
.card-violet {
  background: linear-gradient(135deg, rgba(124,92,191,0.15), rgba(167,139,250,0.05));
  border: 1px solid rgba(167,139,250,0.2);
  border-radius: 16px;
}

/* Buttons */
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #0a0a0f;
  font-weight: 700;
  border-radius: 12px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(201,168,76,0.25);
}
.btn-gold:hover { box-shadow: 0 6px 30px rgba(201,168,76,0.4); transform: translateY(-1px); }
.btn-gold:active { transform: scale(0.98); }
.btn-outline {
  border: 1.5px solid var(--border-strong);
  color: var(--gold);
  font-weight: 600;
  border-radius: 12px;
  transition: all 0.2s;
}
.btn-outline:hover { background: var(--gold-glow); border-color: var(--gold); }
.btn-violet {
  background: linear-gradient(135deg, var(--violet-dim), var(--violet));
  color: white;
  font-weight: 700;
  border-radius: 12px;
  box-shadow: 0 4px 20px var(--violet-glow);
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* Utility */
.max-w { max-width: 28rem; margin: 0 auto; }
.safe-bottom { padding-bottom: calc(5rem + env(safe-area-inset-bottom, 0px)); }

/* Monochrome emoji treatment */
.emoji {
  filter: grayscale(1) brightness(1.8) contrast(0.9);
  display: inline-block;
}
.emoji-gold {
  filter: grayscale(1) brightness(1.2) sepia(1) hue-rotate(5deg) saturate(2);
  display: inline-block;
}
.emoji-container {
  width: 44px; height: 44px; border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.emoji-container span { filter: grayscale(1) brightness(2); }
.emoji-lg { font-size: 40px; filter: grayscale(1) brightness(2); display: inline-block; }
.emoji-xl { font-size: 56px; filter: grayscale(1) brightness(2); display: inline-block; }
</style>
</head>

// ─── HELPERS ───────────────────────────────────────────────────────────

function getLevel(xp) { return LEVELS.filter(l=>xp>=l.xpReq).pop(); }

function PBar({val, max, cls="progress-gold", h=6}) {
  return <div className="progress-track" style={{height:h}}><div className={`progress-fill ${cls}`} style={{width:Math.min(val/max*100,100)+"%"}}/></div>;
}

function XPBurst({amount, onDone}) {
  const [v,setV] = useState(true);
  useEffect(()=>{ const t=setTimeout(()=>{setV(false);onDone?.();},1800); return ()=>clearTimeout(t); },[]);
  if(!v) return null;
  return (
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,pointerEvents:'none'}}>
      <div style={{animation:'xpBurst 1.8s ease-out forwards',fontFamily:'Playfair Display,serif',fontSize:'2.5rem',fontWeight:900,color:'var(--gold-light)',textShadow:'0 0 40px rgba(201,168,76,0.6)'}}>
        +{amount} XP
      </div>
    </div>
  );
}

      <button className="btn-gold" onClick={()=>onDone(idx)} style={{padding:'16px 48px',fontSize:15}}>
        C'est parti 🎭
      </button>
    </div>
  );
}

function ModList({title, sub, mods, doneKey, st, setSt, active, setMod, sec}) {
  const lv = getLevel(st.xp);
  // Reorder: current level first, then levels below (reversed), then levels above
  const lvIdx = LEVELS.indexOf(lv);
  const sortedLevels = [lv, ...LEVELS.filter((_,i)=>i<lvIdx).reverse(), ...LEVELS.filter((_,i)=>i>lvIdx)];

  if(active && active.sec === sec) {
    if(sec==="practice") return <ExView mod={active} st={st} setSt={setSt} onBack={()=>setMod(null)}/>;
    return <CultView mod={active} st={st} setSt={setSt} onBack={()=>setMod(null)}/>;
  }

  return (
    <div className="safe-bottom animate-fade" style={{paddingTop:72,padding:'72px 20px 100px'}}>
      <div className="max-w">
        <h1 className="serif" style={{fontSize:26,fontWeight:700,marginBottom:4}}>{title}</h1>
        <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:28}}>{sub}</p>

        {sortedLevels.map(l => {
          const unlocked = st.xp >= l.xpReq;
          const ms = mods[l.id]||[];
          if(!ms.length) return null;
          return (
            <div key={l.id} style={{marginBottom:32}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <span className="emoji" style={{fontSize:18}}>{l.icon}</span>

                {l.id===lv.id && <span style={{fontSize:9,fontWeight:700,padding:'2px 10px',borderRadius:20,background:'var(--gold-glow)',color:'var(--gold)',border:'1px solid var(--border-strong)',letterSpacing:'0.05em'}}>VOTRE NIVEAU</span>}

              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {ms.map(m => {

                      className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:14,opacity:unlocked?1:0.35,cursor:unlocked?'pointer':'not-allowed',textAlign:'left'}}>
                      <div className="emoji-container" style={{background:done?'rgba(74,222,128,0.08)':'rgba(255,255,255,0.03)',borderColor:done?'rgba(74,222,128,0.15)':'rgba(255,255,255,0.06)'}}>
                        <span className="emoji">{unlocked?m.icon:"🔒"}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <p style={{fontSize:13,fontWeight:700,color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.title}</p>
                          {m.premium && <span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:20,background:'rgba(167,139,250,0.15)',color:'var(--violet)',letterSpacing:'0.05em'}}>PREMIUM</span>}
                        </div>
                        <p style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{m.cat} · {m.dur}</p>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                        {done && <div style={{color:'var(--emerald)'}}>{I.check({size:18})}</div>}
                        <span style={{fontSize:11,fontWeight:800,color:'var(--gold)'}}>+{m.xp}</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── EXERCISE VIEW ─────────────────────────────────────────────────────

function ExView({mod, st, setSt, onBack}) {
  const [step, setStep] = useState(0);

  const [vidSent, setVidSent] = useState(false);

  const complete = () => {
    if(!done) { setDone(true); setXpShow(true); setSt(p=>({...p,xp:p.xp+mod.xp,doneEx:[...p.doneEx,mod.id]})); }
  };

  return (
    <div className="safe-bottom animate-fade" style={{paddingTop:16,padding:'16px 20px 100px',minHeight:'100vh'}}>
      <div className="max-w">
        {xpShow && <XPBurst amount={mod.xp} onDone={()=>setXpShow(false)}/>}

          {I.chevL({size:18})} Retour
        </button>

        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="emoji-lg" style={{marginBottom:8}}>{mod.icon}</div>

            {!vidSent ? (<>

                  {I.crown({size:16})} Passer à Premium
                </button>
              )}

              <p className="serif" style={{fontSize:18,fontWeight:700,color:'var(--emerald)'}}>Vidéo envoyée !</p>

              <div>
                <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',color:'var(--gold)',marginBottom:4}}>LE SAVIEZ-VOUS</p>
                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>{mod.tip}</p>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CULTURE VIEW ──────────────────────────────────────────────────────

function CultView({mod, st, setSt, onBack}) {
  const [phase, setPhase] = useState("lesson");
  const [ci, setCi] = useState(0);
  const [qi, setQi] = useState(0);
  const [score, setScore] = useState(0);
  const [sel, setSel] = useState(null);
  const [xpShow, setXpShow] = useState(false);

  const answer = (idx) => {
    setSel(idx);
    setTimeout(()=>{
      const ok = idx===mod.quiz[qi].ans;
      const ns = ok?score+1:score;
      setScore(ns); setSel(null);
      if(qi<mod.quiz.length-1) setQi(qi+1);
      else {
        setPhase("result");
        if(!st.doneCu.includes(mod.id)) {
          setXpShow(true);
          setSt(p=>({...p,xp:p.xp+mod.xp,doneCu:[...p.doneCu,mod.id],perfects:p.perfects+(ns===mod.quiz.length?1:0)}));
        }
      }
    },1000);
  };

  return (
    <div className="safe-bottom animate-fade" style={{paddingTop:16,padding:'16px 20px 100px',minHeight:'100vh'}}>
      <div className="max-w">
        {xpShow && <XPBurst amount={mod.xp} onDone={()=>setXpShow(false)}/>}
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:6,color:'var(--text-muted)',fontSize:13,marginBottom:28}}>
          {I.chevL({size:18})} Retour
        </button>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="emoji-lg" style={{marginBottom:8}}>{mod.icon}</div>
          <h1 className="serif" style={{fontSize:22,fontWeight:700}}>{mod.title}</h1>
          <p style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{mod.cat} · {mod.dur}</p>
        </div>

        {phase==="lesson" && (<>
          <div style={{marginBottom:16}}>
            <PBar val={ci+1} max={mod.content.length} cls="progress-violet" h={3}/>
            <p style={{fontSize:10,color:'var(--text-muted)',marginTop:6,textAlign:'right'}}>{ci+1}/{mod.content.length}</p>
          </div>
          <div style={{padding:28,borderRadius:18,background:'var(--bg-card)',border:'1px solid var(--border)',minHeight:200,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
            <p className="serif" style={{fontSize:17,color:'var(--text-primary)',lineHeight:1.8}}>{mod.content[ci]}</p>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:24}}>
              <button onClick={()=>setCi(Math.max(0,ci-1))} className="btn-outline" style={{padding:'10px 18px',fontSize:12,opacity:ci===0?0.3:1}}>← Précédent</button>
              {ci<mod.content.length-1 ? (
                <button onClick={()=>setCi(ci+1)} className="btn-violet" style={{padding:'10px 20px',fontSize:12}}>Suivant →</button>
              ) : (
                <button onClick={()=>setPhase("quiz")} className="btn-gold" style={{padding:'10px 24px',fontSize:12}}>Quiz 🧠</button>
              )}
            </div>
          </div>
        </>)}

        {phase==="quiz" && (<>
          <div style={{marginBottom:16}}>
            <PBar val={qi+1} max={mod.quiz.length} h={3}/>
            <p style={{fontSize:10,color:'var(--text-muted)',marginTop:6,textAlign:'right'}}>Question {qi+1}/{mod.quiz.length}</p>
          </div>
          <div style={{padding:28,borderRadius:18,background:'var(--bg-card)',border:'1px solid var(--border)'}}>
            <h2 className="serif" style={{fontSize:19,fontWeight:700,marginBottom:20}}>{mod.quiz[qi].q}</h2>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {mod.quiz[qi].opts.map((o,i) => {
                const isC = i===mod.quiz[qi].ans;
                const isS = sel===i;
                let bg = 'var(--bg-elevated)', bc = 'var(--border)';
                if(sel!==null) { if(isC) { bg='rgba(74,222,128,0.1)'; bc='var(--emerald)'; } else if(isS) { bg='rgba(239,68,68,0.1)'; bc='#ef4444'; } }
                return (
                  <button key={i} onClick={()=>sel===null&&answer(i)}
                    style={{padding:'12px 16px',borderRadius:12,border:'1.5px solid',borderColor:bc,background:bg,textAlign:'left',fontSize:13,fontWeight:500,display:'flex',alignItems:'center',gap:10,transition:'all 0.2s'}}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--gold)'}}>{String.fromCharCode(65+i)}</span>
                    <span>{o}</span>
                    {sel!==null && isC && <span style={{marginLeft:'auto',color:'var(--emerald)'}}>✓</span>}
                    {sel!==null && isS && !isC && <span style={{marginLeft:'auto',color:'#ef4444'}}>✗</span>}
                  </button>
                );
              })}
            </div>
          </div>
        </>)}

        {phase==="result" && (
          <div className="animate-slide" style={{textAlign:'center'}}>
            <div style={{padding:40,borderRadius:20,background:'var(--bg-card)',border:'1px solid var(--border-strong)',boxShadow:'0 0 60px var(--gold-glow)'}}>
              <div className="emoji-xl" style={{marginBottom:16}}>{score===mod.quiz.length?"🏆":score>0?"👏":"💪"}</div>
              <h2 className="serif" style={{fontSize:26,fontWeight:800,marginBottom:8}}>
                {score===mod.quiz.length?"Parfait !":score>0?"Bien joué !":"On recommence ?"}
              </h2>
              <p style={{fontSize:16,color:'var(--text-secondary)',marginBottom:20}}>{score}/{mod.quiz.length} bonnes réponses</p>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,color:'var(--gold)',fontWeight:800,fontSize:18,marginBottom:28,fontFamily:'Playfair Display,serif'}}>
                {I.zap({size:20})} +{mod.xp} XP
              </div>
              <button onClick={onBack} className="btn-gold" style={{width:'100%',padding:'14px 0',fontSize:14}}>Continuer</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [st, setSt] = useState({xp:0,streak:1,doneEx:[],doneCu:[],perfects:0,videos:0,lv:0,onb:false});
  const [tab, setTab] = useState("home");
  const [mod, setMod] = useState(null);
  const chTab = (t) => { if(t!==tab) setMod(null); setTab(t); };

  if(!st.onb) return <Onboarding onDone={(i)=>setSt(p=>({...p,onb:true,xp:LEVELS[i]?.xpReq||0,lv:i}))}/>;

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-deep)'}}>
      <TopBar xp={st.xp} streak={st.streak}/>
      {tab==="home" && <Home st={st} setSt={setSt} setTab={chTab} setMod={setMod}/>}
      {tab==="practice" && <ModList title="Pratique" sub="Exercices progressifs pour développer votre jeu" mods={PRACTICE} doneKey="doneEx" st={st} setSt={setSt} active={mod} setMod={setMod} sec="practice"/>}
      {tab==="culture" && <ModList title="Culture théâtrale" sub="Histoire, auteurs, techniques et courants" mods={CULTURE} doneKey="doneCu" st={st} setSt={setSt} active={mod} setMod={setMod} sec="culture"/>}
      {tab==="profile" && <Profile st={st} setSt={setSt}/>}
      <Nav tab={tab} setTab={chTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
