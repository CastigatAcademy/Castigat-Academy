<script>
/* ââ Supabase Client Init ââ */
const SUPABASE_URL='https://ewvzcagorcsimdljazkn.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_cXOU-pPxOR5zX-fX60AooA_ZvynKw9I';
/* Disable browser scroll restoration (fixes PWA reopening at bottom) */
if('scrollRestoration' in history) history.scrollRestoration='manual';
window.scrollTo(0,0);

const _supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/* PENDING PLAN UPDATE (mobile Stripe redirect fix) */
_supabase.auth.onAuthStateChange(function(event, session){
  if(session && session.user){
    var pendingRaw = localStorage.getItem('pending_plan_update');
    if(pendingRaw){
      try{
        var pending = JSON.parse(pendingRaw);
        if(pending.uid === session.user.id){
          _supabase.from('profiles').update({plan:pending.plan,plan_started_at:new Date().toISOString()}).eq('id',session.user.id).then(function(){
            localStorage.removeItem('pending_plan_update');
          });
        }
      }catch(e){localStorage.removeItem('pending_plan_update');}
    }
  }
});

/* ââ Cloud Sync: save/load progress to Supabase ââ */
const saveToCloud=async(stateData)=>{
  try{
    const{data:{user}}=await _supabase.auth.getUser();
    if(!user)return;
    const uid=user.id;
    /* Save main progress */
    await _supabase.from('user_progress').upsert({user_id:uid,data:stateData,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    /* Save texts */
    const mt=localStorage.getItem('castigat_montexte');
    if(mt)await _supabase.from('user_texts').upsert({user_id:uid,data:JSON.parse(mt),updated_at:new Date().toISOString()},{onConflict:'user_id'});
    /* Save monologues progress */
    const mp=localStorage.getItem('castigat_monologues_progress');
    if(mp)await _supabase.from('user_monologues').upsert({user_id:uid,data:JSON.parse(mp),updated_at:new Date().toISOString()},{onConflict:'user_id'});
  }catch(e){console.log('Cloud save error',e)}
};

const loadFromCloud=async()=>{
  try{
    const{data:{user}}=await _supabase.auth.getUser();
    if(!user)return null;
    const uid=user.id;
    /* Load main progress */
    const{data:prog}=await _supabase.from('user_progress').select('data').eq('user_id',uid).single();
    if(prog&&prog.data){
      localStorage.setItem(SAVE_KEY,JSON.stringify(prog.data));
    }
    /* Load texts */
    const{data:texts}=await _supabase.from('user_texts').select('data').eq('user_id',uid).single();
    if(texts&&texts.data){
      localStorage.setItem('castigat_montexte',JSON.stringify(texts.data));
    }
    /* Load monologues */
    const{data:mono}=await _supabase.from('user_monologues').select('data').eq('user_id',uid).single();
    if(mono&&mono.data){
      localStorage.setItem('castigat_monologues_progress',JSON.stringify(mono.data));
    }
    return prog?.data||null;
  }catch(e){console.log('Cloud load error',e);return null}
};


/* ââ Cloudinary Config ââ */
const CLOUDINARY_CLOUD='dsecqyf3w';
const CLOUDINARY_PRESET='vidÃ©os de castigat';

async function uploadToCloudinary(file,onProgress){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',CLOUDINARY_PRESET);
  fd.append('resource_type','video');
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST','https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/video/upload');
    if(onProgress)xhr.upload.onprogress=e=>{if(e.lengthComputable)onProgress(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{if(xhr.status===200)resolve(JSON.parse(xhr.responseText));else reject(new Error('Upload failed'))};
    xhr.onerror=()=>reject(new Error('Network error'));
    xhr.send(fd);
  });
}

async function saveVideoSubmission(data){
  const{data:result,error}=await _supabase.from('video_submissions').insert([data]);
  if(error)console.error('Supabase save error:',error);
  return{result,error};
}

  if(!iconName||typeof iconName!=='string')return null;

};

/* âââ CONFETTI âââ */
function Confetti({count=40,duration=3000,tada=true}){
  const[show,setShow]=useState(()=>{if(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches||navigator.standalone)return false;return true;});
  const[tadaVisible,setTadaVisible]=useState(tada);
  useEffect(()=>{const t=setTimeout(()=>setShow(false),duration);return()=>clearTimeout(t)},[]);
  useEffect(()=>{if(tada){const t=setTimeout(()=>setTadaVisible(false),2200);return()=>clearTimeout(t)}},[]);
  if(!show&&!tadaVisible)return null;
  const colors=['#C8A44E','#D4B35C','#A78BFA','#8B5CF6','#E8D5A0','#C4B5FD'];
  return(<div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:200}}>
    {show&&Array.from({length:count}).map((_,i)=>{
      const left=Math.random()*100;const delay=Math.random()*1.5;const dur=2+Math.random()*2;const size=4+Math.random()*8;
      const color=colors[Math.floor(Math.random()*colors.length)];
      const shape=Math.random()>.5?'50%':'2px';
      return <div key={i} className="confetti-piece" style={{left:left+'%',width:size,height:size,background:color,borderRadius:shape,animationDuration:dur+'s',animationDelay:delay+'s'}}/>;
    })}
    {tadaVisible&&<div style={{position:'fixed',top:'30%',left:'50%',transform:'translateX(-50%)',zIndex:201,textAlign:'center',animation:'tada-pop 0.6s ease-out forwards'}}>
      <div style={{fontSize:'3rem',marginBottom:'0.3rem'}}>ð</div>
      <div style={{fontSize:'1.4rem',fontWeight:700,color:'var(--gold)',textShadow:'0 2px 12px rgba(200,164,78,0.5)',fontFamily:'var(--font-heading)'}}>Bravo !</div>
    </div>}
  </div>);
}

/* âââ SOUND FX âââ */
const SFX={
  play:(freq=520,dur=.12,type='sine',vol=.04)=>{
    try{
let _sfxCtx=null;
function getSfxCtx(){if(!_sfxCtx)_sfxCtx=new(window.AudioContext||window.webkitAudioContext)();if(_sfxCtx.state==='suspended')_sfxCtx.resume();return _sfxCtx;}
      const ctx=getSfxCtx();
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      const filter=ctx.createBiquadFilter();
      filter.type='lowpass';filter.frequency.value=2000;
      osc.type=type;osc.frequency.value=freq;
      gain.gain.setValueAtTime(vol,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+dur);
      osc.connect(filter);filter.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
    }catch(e){}
  },
  xp:()=>{SFX.play(440,.1,'sine',.03);setTimeout(()=>SFX.play(554,.14,'sine',.025),100)},
  success:()=>{SFX.play(392,.08,'sine',.03);setTimeout(()=>SFX.play(494,.08,'sine',.025),110);setTimeout(()=>SFX.play(587,.12,'sine',.03),220)},
  click:()=>SFX.play(330,.04,'sine',.02),
  tap:()=>SFX.play(400,.05,'sine',.02),
  error:()=>{SFX.play(220,.15,'triangle',.03);setTimeout(()=>SFX.play(180,.2,'triangle',.025),120)},
  badge:()=>{SFX.play(523,.1,'sine',.03);setTimeout(()=>SFX.play(659,.1,'sine',.03),120);setTimeout(()=>SFX.play(784,.12,'sine',.03),240);setTimeout(()=>SFX.play(1047,.18,'sine',.025),380)},
  levelUp:()=>{SFX.play(392,.1,'sine',.03);setTimeout(()=>SFX.play(494,.1,'sine',.025),130);setTimeout(()=>SFX.play(587,.1,'sine',.025),260);setTimeout(()=>SFX.play(784,.16,'sine',.03),390)},
};

    content:["Jerzy Grotowski (1933â1999), metteur en scÃ¨ne polonais, pose une question radicale : que reste-t-il si on enlÃ¨ve tout â dÃ©cor, costume, lumiÃ¨re, musique ? RÃ©ponse : l'acteur et le spectateur. C'est le 'thÃ©Ã¢tre pauvre'.","L'acteur grotowskien est un 'acteur saint' qui se donne totalement, sans protection, sans masque social. L'entraÃ®nement est extrÃªme : vocalement, physiquement, psychologiquement. Ce n'est pas de la performance â c'est un acte de vÃ©ritÃ©.","Ses spectacles au ThÃ©Ã¢tre Laboratoire de WrocÅaw (Akropolis, Le Prince Constant, Apocalypsis cum Figuris) sont jouÃ©s pour 40-60 spectateurs maximum. La proximitÃ© est absolue â les acteurs jouent parfois Ã  30 cm du public.","AprÃ¨s 1970, Grotowski abandonne le spectacle pour le 'parathÃ©Ã¢tre' puis 'l'art comme vÃ©hicule' â la rencontre humaine sans public. Son influence sur le thÃ©Ã¢tre expÃ©rimental, la formation de l'acteur, et la rÃ©flexion sur l'essence du thÃ©Ã¢tre est incommensurable."],

  {id:"h_af2",title:"Le thÃ©Ã¢tre et le cinÃ©ma",cat:"Techniques",icon:"ð¹",dur:"10 min",xp:40,

  {id:"fm15",title:"Figaro â le monologue",source:"Beaumarchais â Le Mariage de Figaro, Acte V, sc.3",text:"Non, Monsieur le Comte, vous ne l'aurez pas... vous ne l'aurez pas. Parce que vous Ãªtes un grand Seigneur, vous vous croyez un grand gÃ©nie !... Noblesse, fortune, un rang, des places, tout cela rend si fier ! Qu'avez-vous fait pour tant de biens ? Vous vous Ãªtes donnÃ© la peine de naÃ®tre, et rien de plus. Du reste, homme assez ordinaire ! Tandis que moi, morbleu ! perdu dans la foule obscure, il m'a fallu dÃ©ployer plus de science et de calculs pour subsister seulement, qu'on n'en a mis depuis cent ans Ã  gouverner toutes les Espagnes : et vous voulez jouter... On imprime mes idÃ©es, et voilÃ  ma libertÃ© supprimÃ©e ! Il s'Ã©lÃ¨ve une question sur la nature des richesses ; et, comme il n'est pas nÃ©cessaire de tenir les choses pour en raisonner, n'ayant pas un sou, j'Ã©cris sur la valeur de l'argent et sur son produit net : aussitÃ´t je vois, du fond d'un fiacre, baisser pour moi le pont d'un chÃ¢teau fort. Que je voudrais bien tenir un de ces puissants de quatre jours, si lÃ©gers sur le mal qu'ils ordonnent !",tier:"intermediaire",difficulty:2,genre:"homme",tips:"Figaro parle au nom de tous les opprimÃ©s. C'est un discours politique autant qu'intime. L'ironie est l'arme du faible contre le puissant. Le rythme s'accÃ©lÃ¨re avec la colÃ¨re."},

  {id:"fm13",title:"Ruy Blas â le ver de terre",source:"Hugo â Ruy Blas, Acte III, sc.2",text:"Bon appÃ©tit, messieurs ! Ã ministres intÃ¨gres ! Conseillers vertueux ! VoilÃ  votre faÃ§on de servir, serviteurs qui pillez la maison ! Donc vous n'avez pas honte et vous choisissez l'heure, l'heure sombre oÃ¹ l'Espagne agonisante pleure ! Donc vous n'avez ici pas d'autres intÃ©rÃªts que remplir votre poche et vous moquer du reste ! Soyez flÃ©tris, devant votre pays qui tombe, fossoyeurs qui venez le voler dans sa tombe ! Mais voyez, regardez, ayez quelque pudeur. L'Espagne et sa vertu, l'Espagne et sa grandeur, tout s'en va. Et l'on voit cheminer les affaires, l'Ãtat est un cadavre, ils sont les vers de terre ! Charles Quint, dans ces temps d'opprobre et de terreur, que fais-tu dans ta tombe, Ã´ puissant Empereur ? Oh ! lÃ¨ve-toi ! Viens voir !",tier:"avance",difficulty:3,genre:"homme",tips:"C'est un volcan qui explose. La colÃ¨re est juste, les mots sont des armes. Projetez chaque accusation comme un coup de poing. Le rythme hugolien s'accÃ©lÃ¨re â les vers sont de plus en plus courts, de plus en plus percutants."},

  {id:"fm18",title:"Camille â les imprÃ©cations",source:"Corneille â Horace, Acte IV, sc.5",text:"Rome, l'unique objet de mon ressentiment ! Rome, Ã  qui vient ton bras d'immoler mon amant ! Rome qui t'a vu naÃ®tre, et que ton cÅur adore ! Rome enfin que je hais parce qu'elle t'honore ! Puissent tous ses voisins ensemble conjurÃ©s saper ses fondements encore mal assurÃ©s ! Et si ce n'est assez de toute l'Italie, que l'Orient contre elle Ã  l'Occident s'allie ; que cent peuples unis des bouts de l'univers passent pour la dÃ©truire et les monts et les mers ! Qu'elle-mÃªme sur soi renverse ses murailles, et de ses propres mains dÃ©chire ses entrailles ! Que le courroux du ciel, allumÃ© par mes vÅux, fasse pleuvoir sur elle un dÃ©luge de feux ! PuissÃ©-je de mes yeux y voir tomber ce foudre, voir ses maisons en cendres, et tes lauriers en poudre, voir le dernier Romain Ã  son dernier soupir, moi seule en Ãªtre cause, et mourir de plaisir !",tier:"avance",difficulty:3,genre:"femme",tips:"Camille maudit Rome devant son frÃ¨re qui vient de tuer son amant. C'est un acte de bravoure suicidaire. Chaque 'Rome' est un coup de poignard. L'imprÃ©cation monte crescendo jusqu'Ã  l'image finale â sa propre mort de plaisir."},
  {id:"fm24",title:"NÃ©ron â la cruautÃ©",source:"Racine â Britannicus, Acte II, sc.2",text:"ExcitÃ© d'un dÃ©sir curieux, cette nuit je l'ai vue arriver en ces lieux, triste, levant au ciel ses yeux mouillÃ©s de larmes, qui brillaient au travers des flambeaux et des armes. Belle, sans ornements, dans le simple appareil d'une beautÃ© qu'on vient d'arracher au sommeil. Que veux-tu ? Je ne sais si cette nÃ©gligence, les ombres, les flambeaux, les cris et le silence, et le farouche aspect de ses fiers ravisseurs, relevaient de ses yeux les timides douceurs. Quoi qu'il en soit, ravi d'une si belle vue, j'ai voulu lui parler, et ma voix s'est perdue : immobile, saisi d'un long Ã©tonnement, je l'ai laissÃ©e passer dans son appartement. J'ai passÃ© dans le mien. C'est lÃ  que, solitaire, de son image en vain j'ai voulu me distraire. Trop prÃ©sente Ã  mes yeux, je croyais lui parler ; j'aimais jusqu'Ã  ses pleurs que je faisais couler.",tier:"avance",difficulty:3,genre:"homme",tips:"NÃ©ron dÃ©crit Junie avec une beautÃ© terrifiante. DerriÃ¨re l'Ã©merveillement esthÃ©tique, il y a le prÃ©dateur. La douceur des mots cache la violence du dÃ©sir. Le dernier vers est glaÃ§ant â il aime ses propres crimes."},

/* âââ PROGRESSION PATH âââ */
function ProgressPath({st,go,setMod,setExam,setSceneAn}){
  const lv=getLv(st.xp);
  const currentNodeRef=useRef(null);
  const[showPrevLevels,setShowPrevLevels]=useState(false);
  /* The level the user started at (from onboarding test) */
  const startLevelIdx=st.lv||0;
  /* Map each level to a scene analysis */
  const LEVEL_SA={figurant:"sa1",apprenti:"sa2",dimanche:"sa3",amateur:"sa4",pensionnaire:"sa5",societaire:"sa6",interprete:"sa7",artiste:"sa8",metteur:"sa9"};
  const allNodes=[];
  let prevTier=null;
  let globalNodeIdx=0;
  LEVELS.forEach((level,li)=>{
    /* Skip previous levels unless user toggled them */
    if(li<startLevelIdx&&!showPrevLevels)return;
    const tier=getTier(level);
    if(!prevTier||prevTier.id!==tier.id){allNodes.push({type:"tier",tier,levelIdx:li});prevTier=tier}
    allNodes.push({type:"sublevel",level,levelIdx:li});
    const prM=PR[level.id]||[],cuM=CU[level.id]||[];
    const merged=[];let pi=0,ci=0;
    while(pi<prM.length||ci<cuM.length){if(pi<prM.length){merged.push({...prM[pi],sec:"pr"});pi++}if(ci<cuM.length){merged.push({...cuM[ci],sec:"cu"});ci++}}
    /* Insert scene analysis node roughly in the middle of the level */
    const saId=LEVEL_SA[level.id];
    const saObj=saId?SCENE_ANALYSES.find(s=>s.id===saId):null;
    const insertAt=saObj?Math.floor(merged.length/2):null;
    let nodeCount=0;
    merged.forEach((m,mi)=>{
      const isDone=m.sec==="pr"?st.doneEx.includes(m.id):st.doneCu.includes(m.id);
      /* Unlock logic: first node always unlocked, monologues unlock by total exercise count, rest requires previous done */
      const isMonologue=m.cat==="Monologue";
      const totalExDone=st.doneEx.length;
      /* Monologue thresholds: 1st at 3 ex, 2nd at 8, 3rd at 15, 4th at 22, then every +8 */
      const monoThresholds=[3,8,15,22,30,38,46,54,62,70,78,86];
      const monoIdx=isMonologue?(()=>{const allMonos=Object.values(PR).flat().filter(e=>e.cat==="Monologue");return allMonos.findIndex(e=>e.id===m.id)})():-1;
      const monoUnlocked=isMonologue&&monoIdx>=0&&monoIdx<monoThresholds.length?totalExDone>=monoThresholds[monoIdx]:false;
      /* Exercises from levels below test level are always unlocked */
      const belowTestLevel=li<startLevelIdx;
      /* Culture nodes in levels above current require previous level's exam passed */
      const isCultureNode=m.sec==="cu";
      const prevLevelId=li>0?LEVELS[li-1].id:null;
      const cultureGated=isCultureNode&&li>LEVELS.indexOf(lv)&&prevLevelId&&!(st.passedExams||[]).includes(prevLevelId);
      const isUnlocked=cultureGated?false:(isDone||belowTestLevel||globalNodeIdx===0||(isMonologue?monoUnlocked:(()=>{
        const prevNodes=allNodes.filter(n=>n.type==="node"||n.type==="scene_analysis");
        if(prevNodes.length===0)return true;
        const lastPrev=prevNodes[prevNodes.length-1];
        return lastPrev.isDone;
      })()));
      allNodes.push({type:"node",mod:m,isDone,isUnlocked,levelIdx:li,nodeIdx:globalNodeIdx++,total:merged.length,level});
      nodeCount++;
      /* Insert scene analysis after the midpoint */
      if(saObj&&nodeCount===insertAt){
        const saDone=(st.doneSA||[]).includes(saObj.id);
        /* SA unlocked only if previous node is done */
        const prevNodes=allNodes.filter(n=>n.type==="node"||n.type==="scene_analysis");
        const lastPrev=prevNodes.length>0?prevNodes[prevNodes.length-1]:null;
        const saUnlocked=saDone||(lastPrev?lastPrev.isDone:true);
        allNodes.push({type:"scene_analysis",sa:saObj,isDone:saDone,isUnlocked:saUnlocked,levelIdx:li,nodeIdx:globalNodeIdx++,level});
      }
    });
    /* Add exam node at end of each level (except last) */
    if(li<LEVELS.length-1&&EXAMS[level.id]){
      const nextLv=LEVELS[li+1];
      const allDone=merged.every(m=>m.sec==="pr"?st.doneEx.includes(m.id):st.doneCu.includes(m.id));
      const examReady=st.xp>=level.xp&&allDone;
      const examPassed=st.xp>=nextLv.xp;
      allNodes.push({type:"exam",levelId:level.id,level,nextLevel:nextLv,examReady,examPassed});
    }
  });
  let currentIdx=-1;
  let lastDoneIdx=-1;
  for(let i=0;i<allNodes.length;i++){
    const isActive=allNodes[i].type==="node"||allNodes[i].type==="scene_analysis";
    if(isActive&&allNodes[i].isDone) lastDoneIdx=i;
    if(isActive&&allNodes[i].isUnlocked&&!allNodes[i].isDone&&currentIdx===-1) currentIdx=i;
  }

  /* Auto-scroll disabled on load to prevent page jumping */
  /* useEffect(()=>{
    if(currentNodeRef.current){
      currentNodeRef.current.scrollIntoView({behavior:'smooth',block:'center'});
    }
  },[]); */

  /* Build positioned nodes for sinuous path */
  const W=320;const CX=W/2;const AMP=80;const ROW=90;
  const posNodes=[];let row=0;
  allNodes.forEach((node,idx)=>{
    if(node.type==="tier"||node.type==="sublevel"||node.type==="exam"){posNodes.push({...node,idx,x:CX,y:row*ROW,isLayout:true});row++;return;}
    /* Sinuous S-curve: nodes swing left-right */
    const cycle=node.nodeIdx%6;
    const t=cycle/5;
    const xOff=Math.sin(t*Math.PI*2)*AMP;
    posNodes.push({...node,idx,x:CX+xOff,y:row*ROW,isLayout:false});
    row++;
  });
  const totalH=row*ROW+40;

  /* SVG path between consecutive activity nodes */
  const activityNodes=posNodes.filter(n=>!n.isLayout);
  const pathSegments=[];
  for(let i=1;i<activityNodes.length;i++){
    const a=activityNodes[i-1],b=activityNodes[i];
    const isDone=b.isDone;const isCur=b.idx===currentIdx;
    const col=isDone?(b.type==="scene_analysis"?'var(--coral)':b.mod?.sec==="cu"?'var(--violet)':'var(--gold)'):isCur?'var(--gold)':'var(--line)';
    const opa=isDone?.6:isCur?.8:.15;
    const my=(a.y+b.y)/2;
    pathSegments.push({d:`M${a.x},${a.y} C${a.x},${my} ${b.x},${my} ${b.x},${b.y}`,col,opa,done:isDone||isCur});
  }

  return(
    <div style={{position:'relative',width:W,margin:'0 auto',minHeight:totalH,padding:'0 0 16px'}}>
      {/* Button to show previous levels */}
      {startLevelIdx>0&&!showPrevLevels&&(
        <button onClick={()=>setShowPrevLevels(true)} style={{width:'100%',padding:'10px 0',marginBottom:12,borderRadius:10,border:'1px solid var(--line)',background:'var(--bg-card)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{fontSize:10,color:'var(--text-2)',fontWeight:600}}>Voir les niveaux prÃ©cÃ©dents ({startLevelIdx})</span>
          <span style={{fontSize:9,color:'var(--text-3)'}}>â¼</span>
        </button>
      )}
      {startLevelIdx>0&&showPrevLevels&&(
        <button onClick={()=>setShowPrevLevels(false)} style={{width:'100%',padding:'10px 0',marginBottom:12,borderRadius:10,border:'1px solid var(--gold-dim)',background:'rgba(200,164,78,.04)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{fontSize:10,color:'var(--gold)',fontWeight:600}}>Masquer les niveaux prÃ©cÃ©dents</span>
          <span style={{fontSize:9,color:'var(--gold)'}}>â²</span>
        </button>
      )}
      {/* Dotted connectors between nodes */}
      <svg style={{position:'absolute',top:0,left:0,width:W,height:totalH,pointerEvents:'none',zIndex:0}}>
        {activityNodes.slice(1).map((b,i)=>{
          const a=activityNodes[i];
          const steps=5;const dots=[];
          for(let t=1;t<=steps;t++){
            const frac=t/(steps+1);
            const mx=(a.x+b.x)/2;const my=(a.y+b.y)/2;
            const px=a.x*(1-frac)*(1-frac)*1+2*mx*frac*(1-frac)+b.x*frac*frac;
            const py=a.y+frac*(b.y-a.y);
            dots.push({x:px,y:py});
          }
          const isDone=b.isDone;const isCur=b.idx===currentIdx;
          const col=isDone?'var(--text-3)':isCur?'var(--text-3)':'var(--line)';
          const opa=isDone?.5:isCur?.4:.2;
          return dots.map((dot,di)=>(
            <circle key={i+"-"+di} cx={dot.x} cy={dot.y} r={1.5} fill={col} opacity={opa}/>
          ));
        })}
      </svg>

      {/* Render nodes */}
      {posNodes.map((node,pidx)=>{
        if(node.type==="exam"){
          return(<div key={"exam"+pidx} style={{position:'absolute',top:node.y-18,left:0,right:0,display:'flex',justifyContent:'center',zIndex:2}}>
            <button disabled={!node.examReady&&!node.examPassed} onClick={()=>{if(node.examReady&&!node.examPassed)setExam(node.levelId)}}
              style={{padding:'8px 18px',borderRadius:12,
                background:node.examPassed?'linear-gradient(135deg,rgba(74,222,128,.1),rgba(74,222,128,.03))':node.examReady?'linear-gradient(135deg,rgba(200,164,78,.1),rgba(200,164,78,.03))':'var(--bg-card)',
                border:node.examPassed?'1.5px solid var(--emerald)':node.examReady?'1.5px solid var(--gold)':'1.5px solid var(--line)',
                cursor:node.examReady&&!node.examPassed?'pointer':'default',opacity:node.examReady||node.examPassed?1:.3,
                display:'flex',alignItems:'center',gap:8,transition:'all .3s',backdropFilter:'blur(8px)'}}>
              <span className="emoji" style={{fontSize:14}}>{node.examPassed?"â":node.examReady?"âï¸":"ð"}</span>
              <div style={{textAlign:'left'}}>
                <p style={{fontSize:9,fontWeight:800,color:node.examPassed?'var(--emerald)':node.examReady?'var(--gold)':'var(--text-3)',letterSpacing:'.05em'}}>
                  {node.examPassed?"RÃUSSI":"EXAMEN"}</p>
                <p style={{fontSize:8,color:'var(--text-3)'}}>{node.level.name} â {node.nextLevel.name}</p>
              </div>
            </button>
          </div>);
        }
        if(node.type==="tier"){
          const unlocked=st.xp>=LEVELS.find(l=>l.tier===node.tier.id)?.xp;
          return(<div key={"t"+pidx} style={{position:'absolute',top:node.y-8,left:0,right:0,zIndex:2}}>
            <TierBanner tierId={node.tier.id} unlocked={unlocked}/>
          </div>);
        }
        if(node.type==="sublevel"){
          const unlocked=st.xp>=node.level.xp;const isCur=node.level.id===lv.id;

/* âââ SPEECH HELPERS âââ */
const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition||null;
function normalize(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()}
function levenshtein(a,b){
  if(a===b)return 0;const m=a.length,n=b.length;
  const d=Array.from({length:m+1},(_,i)=>i);
  for(let j=1;j<=n;j++){let prev=d[0];d[0]=j;
    for(let i=1;i<=m;i++){const tmp=d[i];d[i]=a[i-1]===b[j-1]?prev:1+Math.min(prev,d[i],d[i-1]);prev=tmp}}
  return d[m];
}
function fuzzyMatch(a,b){
  /* Match if Levenshtein distance is within threshold relative to word length */
  if(a===b)return true;
  const threshold=a.length<=3?1:a.length<=6?2:3;
  return levenshtein(a,b)<=threshold;
}
function compareWords(expected,spoken){
  const origWords=expected.split(/\s+/);
  const ew=normalize(expected).split(" ").filter(w=>w);
  const sw=normalize(spoken).split(" ").filter(w=>w);
  if(!sw.length)return ew.map((w,i)=>({word:origWords[i]||w,status:"pending"}));
  /* Sliding window: for each expected word, search nearby spoken words */
  const matched=new Set();/* indices in sw already used */
  return ew.map((w,i)=>{
    /* Search in a window around position i (Â±3 words to handle insertions/omissions) */
    const searchStart=Math.max(0,i-3);
    const searchEnd=Math.min(sw.length-1,i+3);
    let bestIdx=-1,bestDist=999;
    for(let j=searchStart;j<=searchEnd;j++){
      if(matched.has(j))continue;
      const d=levenshtein(w,sw[j]);
      if(d<bestDist){bestDist=d;bestIdx=j}
    }
    const threshold=w.length<=3?1:w.length<=6?2:3;
    if(bestIdx>=0&&bestDist<=threshold){
      matched.add(bestIdx);
      return{word:origWords[i]||w,status:"correct"};
    }
    /* Check if any spoken word further ahead matches (speaker may be ahead) */
    for(let j=searchEnd+1;j<sw.length;j++){
      if(matched.has(j))continue;
      if(fuzzyMatch(w,sw[j])){matched.add(j);return{word:origWords[i]||w,status:"correct"}}
    }
    /* If user has spoken enough words to cover this position â wrong (red) */
    /* Otherwise â pending (not yet spoken, stays white) */
    if(sw.length>i)return{word:origWords[i]||w,status:"wrong"};
    return{word:origWords[i]||w,status:"pending"};
  });
}

function Warmup({onClose,st,setSt}){

  /* Start speech recognition */

    if(!SpeechRec){setMicError("Votre navigateur ne supporte pas la reconnaissance vocale. Utilisez Chrome pour cette fonctionnalitÃ©.");return}
    try{
      const rec=new SpeechRec();
      rec.lang="fr-FR";rec.continuous=true;rec.interimResults=true;
      rec.onresult=(e)=>{
        let full="";
        for(let i=0;i<e.results.length;i++){full+=e.results[i][0].transcript}
        setTranscript(full);
        const results=compareWords(ex.phrase,full);
        setWordResults(results);
        /* Check if all words matched */
        const correct=results.filter(r=>r.status==="correct").length;

          setScore({correct,total});
        }else{

        else if(e.error!=='aborted')setMicError("Erreur micro : "+e.error);

        if(recRef.current&&phase==="active"){try{rec.start()}catch(e){}}
        else{setListening(false)}

      rec.start();

      setListening(true);

    }catch(e){setMicError("Impossible de dÃ©marrer le micro.")}
  };

  const stopListening=()=>{

          {WARMUP_LEVELS.map(lv=>{

/* âââ ANALYSE DE SCÃNE âââ */
function SceneAnalysis({analysis,st,setSt,onClose}){
  const[qi,setQi]=useState(0);
  const[answers,setAnswers]=useState({});/* {idx: {chosen, selfEval, userText, revealed}} */
  const[phase,setPhase]=useState("intro");/* intro, question, correction, results */
  const q=analysis.questions[qi];
  const ans=answers[qi]||{};
  const total=analysis.questions.length;
  const tierColor=analysis.tier==="avance"?"var(--violet)":analysis.tier==="intermediaire"?"var(--coral)":"var(--gold)";

  const selectQCM=(idx)=>{if(ans.revealed)return;setAnswers(a=>({...a,[qi]:{...ans,chosen:idx}}))};
  const setUserText=(t)=>setAnswers(a=>({...a,[qi]:{...ans,userText:t}}));
  const setSelfEval=(v)=>setAnswers(a=>({...a,[qi]:{...ans,selfEval:v}}));

  const reveal=()=>{
    setAnswers(a=>({...a,[qi]:{...ans,revealed:true}}));
    if(q.type==="qcm"&&ans.chosen===q.a)SFX.success();
    else SFX.click();
  };

  const nextQ=()=>{
    if(qi<total-1){setQi(qi+1)}
    else{
      /* Calculate score */
      let score=0;
      analysis.questions.forEach((qq,i)=>{
        const aa=answers[i]||{};
        if(qq.type==="qcm"&&aa.chosen===qq.a)score++;
        if(qq.type==="libre"&&aa.selfEval==="found")score++;
        if(qq.type==="libre"&&aa.selfEval==="partial")score+=0.5;
        if(qq.type==="argument"&&aa.selfEval)score++;
      });
      const xpGain=analysis.tier==="avance"?60:analysis.tier==="intermediaire"?45:30;
      const saScore=Math.round(score/total*100);
      setSt(p=>({...p,xp:p.xp+xpGain,weekXP:(p.weekXP||0)+xpGain,weekAnalysis:true,doneSA:[...(p.doneSA||[]),analysis.id].filter((v,i,a)=>a.indexOf(v)===i),
        saResults:{...(p.saResults||{}),[analysis.id]:{score:saScore,total,tier:analysis.tier,date:new Date().toISOString()}},
        lastSADate:new Date().toISOString()
      }));
      SFX.success();
      setPhase("results");
    }
  };

  const canReveal=q.type==="qcm"?ans.chosen!==undefined:q.type==="libre"?(ans.userText||"").trim().length>2:q.type==="argument"?(ans.userText||"").trim().length>2:false;

  /* Intro */

          <p className="label" style={{color:tierColor,marginBottom:8}}>{analysis.tier==="avance"?"AVANCÃ":analysis.tier==="intermediaire"?"INTERMÃDIAIRE":"DÃBUTANT"}</p>
          <h1 className="heading hero-text" style={{fontSize:24,marginBottom:8}}>{analysis.title}</h1>
          <p className="body" style={{fontSize:11,marginBottom:20}}>{analysis.source}</p>
        </div>
        {analysis.context&&<div style={{padding:16,borderRadius:12,background:'rgba(255,255,255,.02)',border:'1px solid var(--line)',marginBottom:16}}>
          <p className="label" style={{marginBottom:6,color:'var(--text-2)'}}>CONTEXTE</p>
          <p style={{fontSize:11,color:'var(--text-2)',lineHeight:1.7}}>{analysis.context}</p>
        </div>}
        <div className="card-gold" style={{padding:22,marginBottom:20}}>
          <p className="label-gold" style={{marginBottom:10}}>EXTRAIT</p>
          <p style={{fontSize:14,lineHeight:1.9,color:'var(--text)',fontFamily:'Cormorant Garamond, serif',fontWeight:400}}>Â« {analysis.extract} Â»</p>
        </div>
        <p className="body" style={{fontSize:11,textAlign:'center',marginBottom:16}}>{total} question{total>1?"s":""} â QCM, rÃ©flexion libre et analyse argumentÃ©e</p>
        <button onClick={()=>setPhase("question")} className="btn-gold btn-pulse" style={{width:'100%',padding:'14px 0',fontSize:13}}>Commencer l'analyse</button>
      </div>
    </div>
  );

  /* Results */
  if(phase==="results"){
    let score=0;let maxScore=0;
    analysis.questions.forEach((qq,i)=>{
      const aa=answers[i]||{};
      if(qq.type==="qcm"){maxScore++;if(aa.chosen===qq.a)score++}
      if(qq.type==="libre"){maxScore++;if(aa.selfEval==="found")score++;else if(aa.selfEval==="partial")score+=0.5}
      if(qq.type==="argument"){maxScore++;if(aa.selfEval)score++}
    });

    return(

/* âââ CHALLENGE DICTION â 90s speed run âââ */
function DictionChallenge({onClose,st,setSt}){
  const[level,setLevel]=useState(null);
  const[phase,setPhase]=useState("pick");/* pick, countdown, go, done */
  const[timeLeft,setTimeLeft]=useState(60);
  const[phraseIdx,setPhraseIdx]=useState(0);
  const[validated,setValidated]=useState(0);
  const[transcript,setTranscript]=useState("");
  const[wordResults,setWordResults]=useState([]);
  const[listening,setListening]=useState(false);
  const[micError,setMicError]=useState("");
  const[countdownVal,setCountdownVal]=useState(3);
  const[phrases,setPhrases]=useState([]);
  const[history,setHistory]=useState([]);/* {phrase,success,time} */
  const recRef=React.useRef(null);
  const phraseRef=React.useRef(0);
  const validatedRef=React.useRef(0);
  const timeRef=React.useRef(60);
  const stoppedRef=React.useRef(false);
  const consumedRef=React.useRef(0);/* char offset: text before this belongs to previous phrases */
  const fullTextRef=React.useRef("");/* full transcript so far (for buttons) */

  /* Shuffle phrases for the level */
  const startChallenge=(lv)=>{
    const pool=[...CHALLENGE_PHRASES[lv]];
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
    setPhrases(pool);
    setLevel(lv);
    setPhraseIdx(0);phraseRef.current=0;
    setValidated(0);validatedRef.current=0;
    setTimeLeft(60);timeRef.current=60;
    setTranscript("");setWordResults([]);setHistory([]);
    stoppedRef.current=false;consumedRef.current=0;fullTextRef.current="";
    setPhase("countdown");setCountdownVal(3);
  };

  /* Countdown 3-2-1 */
  useEffect(()=>{
    if(phase!=="countdown")return;
    if(countdownVal<=0){setPhase("go");launchRec();return}
    const t=setTimeout(()=>setCountdownVal(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[phase,countdownVal]);

  /* Main 60s timer */
  useEffect(()=>{
    if(phase!=="go")return;
    const iv=setInterval(()=>{
      setTimeLeft(t=>{
        const nt=t-1;
        timeRef.current=nt;
        if(nt<=0){clearInterval(iv);stopListening();setPhase("done");return 0}
        return nt;
      });
    },1000);
    return()=>clearInterval(iv);
  },[phase]);

  /* ââ Speech recognition: ONE session continuous=true, char-offset per phrase ââ */
  const launchRec=()=>{
    if(!SpeechRec){setMicError("Votre navigateur ne supporte pas la reconnaissance vocale. Utilisez Chrome.");return}
    stoppedRef.current=false;
    consumedRef.current=0;fullTextRef.current="";
    try{
      const rec=new SpeechRec();
      rec.lang="fr-FR";rec.continuous=true;rec.interimResults=true;

      rec.onresult=(e)=>{
        /* Build FULL transcript from all results */
        let full="";
        for(let i=0;i<e.results.length;i++){full+=e.results[i][0].transcript+" "}
        full=full.trimEnd();
        fullTextRef.current=full;
        /* Text for current phrase = everything after consumed chars */
        const phraseText=full.substring(consumedRef.current).trim();
        setTranscript(phraseText);
        const currentPhrase=phrases[phraseRef.current];
        if(!currentPhrase||!phraseText)return;
        const results=compareWords(currentPhrase,phraseText);
        setWordResults(results);
        const correct=results.filter(r=>r.status==="correct").length;
        const total=results.length;
        const wrong=results.filter(r=>r.status==="wrong").length;
        const spoken=correct+wrong;/* words actually attempted */
        if(correct>=Math.ceil(total*0.85)&&spoken>=Math.ceil(total*0.75)&&total>0){
          SFX.tap();
          /* Mark all current text as consumed */
          consumedRef.current=full.length;
          const newV=validatedRef.current+1;
          validatedRef.current=newV;
          setValidated(newV);
          setHistory(h=>[...h,{phrase:currentPhrase,success:true,time:60-timeRef.current}]);
          let nextIdx=phraseRef.current+1;
          if(nextIdx>=phrases.length)nextIdx=0;
          phraseRef.current=nextIdx;
          setPhraseIdx(nextIdx);
          setTranscript("");setWordResults([]);
        }
      };

      rec.onerror=(e)=>{
        if(e.error==='not-allowed'){setMicError("AccÃ¨s au micro refusÃ©.");stoppedRef.current=true}
        /* no-speech / network / audio-capture = transient, onend restarts */
      };

      rec.onend=()=>{
        if(!stoppedRef.current&&timeRef.current>0){
          /* Try to restart same instance first */
          try{rec.start()}catch(ex){
            /* If that fails, create fresh instance */
            setTimeout(()=>{if(!stoppedRef.current&&timeRef.current>0){
              try{const r2=new SpeechRec();r2.lang="fr-FR";r2.continuous=true;r2.interimResults=true;
              r2.onresult=rec.onresult;r2.onerror=rec.onerror;r2.onend=rec.onend;
              r2.start();recRef.current=r2;setListening(true);consumedRef.current=0;fullTextRef.current="";}catch(e2){}
            }},300);
          }
        }else{setListening(false)}
      };

      rec.start();
      recRef.current=rec;
      setListening(true);setMicError("");
    }catch(e){setMicError("Impossible de dÃ©marrer le micro.")}
  };

  const stopListening=()=>{
    stoppedRef.current=true;
    if(recRef.current){try{recRef.current.abort()}catch(e){}recRef.current=null}
    setListening(false);
  };

  useEffect(()=>()=>stopListening(),[]);

  /* Save score when challenge ends â must be BEFORE any conditional return */
  const[scoreSaved,setScoreSaved]=useState(false);
  useEffect(()=>{
    if(phase==="done"&&!scoreSaved){
      setScoreSaved(true);
      const xpG=Math.max(10,validated*8+(level==="avance"?20:level==="intermediaire"?10:0));
      const prev=(st.challengeScores||{})[level]||0;
      if(validated>prev){
        setSt(p=>({...p,xp:p.xp+xpG,challengeScores:{...(p.challengeScores||{}),[level]:validated},challenges:(p.challenges||0)+1}));
      }else{
        setSt(p=>({...p,xp:p.xp+Math.round(xpG/2),challenges:(p.challenges||0)+1}));
      }
      SFX.success();
    }
  },[phase,scoreSaved]);

  const tier=CHALLENGE_TIERS.slice().reverse().find(t=>validated>=t.min)||CHALLENGE_TIERS[0];
  const nextTier=CHALLENGE_TIERS.find(t=>t.min>validated);
  const fmtTime=s=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?'0':''}${sec}`};
  const currentPhrase=phrases[phraseIdx]||"";

  /* ââ Level picker ââ */
  if(phase==="pick")return(
    <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 100px'}}>
      <div className="mw">
        <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:5,color:'var(--text-3)',fontSize:12,marginBottom:24}}>{I.chL({size:16})} Retour</button>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:'linear-gradient(135deg,var(--coral)22,var(--coral))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',boxShadow:'0 8px 32px rgba(248,113,113,.2)'}}>
            {I.zap({size:24,sw:1.6,style:{color:'#fff'}})}
          </div>
          <h1 className="heading" style={{fontSize:26,marginBottom:6}}>Challenge Diction</h1>
          <p className="body" style={{fontSize:12}}>60 secondes. Un max de phrases. C'est parti.</p>
        </div>
        {/* Best scores */}
        {(st.challengeScores||{})[level]&&<p style={{fontSize:10,color:'var(--gold)',textAlign:'center',marginBottom:16}}>Votre record : {(st.challengeScores||{})[level]} phrases</p>}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {WARMUP_LEVELS.map(lv=>{
            const locked=st.xp<lv.unlockXP;
            const best=(st.challengeScores||{})[lv.id];
            const phraseCount=CHALLENGE_PHRASES[lv.id]?.length||0;
            return(
              <button key={lv.id} disabled={locked} onClick={()=>startChallenge(lv.id)}
                className="card obj-3d" style={{padding:18,display:'flex',alignItems:'center',gap:14,opacity:locked?.4:1,cursor:locked?'not-allowed':'pointer',textAlign:'left'}}>
                <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${lv.color}22,${lv.color}08)`,
                  border:`1.5px solid ${lv.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                  {locked?I.lock({size:20,sw:1.5}):<span className="emoji" style={{fontSize:'20px'}}>{lv.icon}</span>}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:700,color:locked?'var(--text-3)':'var(--text)'}}>{lv.name}</p>
                  <p style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{phraseCount} phrases Â· 60 secondes</p>
                  {best!=null&&<p style={{fontSize:9,color:'var(--gold)',marginTop:2,fontWeight:600}}>Record : {best} phrases</p>}
                  {locked&&<p style={{fontSize:9,color:lv.color,marginTop:3,fontWeight:600}}>{lv.unlockXP} XP requis</p>}
                </div>
                {I.zap({size:18,sw:1.4,style:{color:lv.color}})}
              </button>
            );
          })}
        </div>
        {/* Tier legend */}
        <div style={{marginTop:20,padding:14,borderRadius:10,background:'rgba(255,255,255,.02)',border:'1px solid var(--line)'}}>
          <p style={{fontSize:9,fontWeight:700,color:'var(--text-2)',marginBottom:8}}>Paliers</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {CHALLENGE_TIERS.filter(t=>t.min>0).map(t=>(
              <span key={t.name} style={{fontSize:8,padding:'3px 8px',borderRadius:6,border:`1px solid ${t.color}`,color:t.color,fontWeight:700}}>{t.min}+ = {t.name}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  /* ââ Countdown 3-2-1 ââ */
  if(phase==="countdown")return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <p style={{fontSize:80,fontWeight:900,color:'var(--gold)',animation:'fadeIn .3s ease-out'}}>{countdownVal}</p>
        <p style={{fontSize:14,color:'var(--text-2)',marginTop:8}}>PrÃ©parez-vousâ¦</p>
      </div>
    </div>
  );

  /* ââ Results ââ */
  if(phase==="done"){
    const xpGain=Math.max(10,validated*8+(level==="avance"?20:level==="intermediaire"?10:0));
    const isNewRecord=!(st.challengeScores||{})[level]||validated>(st.challengeScores||{})[level];
    return(
      <div className="fade-up" style={{minHeight:'100vh',background:'var(--bg)',padding:'28px 20px 40px'}}>
        <div className="mw">
          <Confetti count={validated>=12?50:validated>=8?30:validated>=5?15:0}/>
          <div style={{textAlign:'center',marginBottom:24}}>

  const[breathPhase,setBreathPhase]=useState("in");/* in, out */
  const[breathTimer,setBreathTimer]=useState(0);
  const[breathTotal,setBreathTotal]=useState(0);
  const[bodyStep,setBodyStep]=useState(0);
  const[visuStep,setVisuStep]=useState(0);
  const[mantraIdx]=useState(()=>Math.floor(Math.random()*AVANTSCENE_MANTRAS.length));
  const[sessionTime,setSessionTime]=useState(0);
  const[detenteIdx,setDetenteIdx]=useState(0);
  const[textFade,setTextFade]=useState(true);/* text fade-in animation trigger */
  const[musicOn,setMusicOn]=useState(false);
  const[immersionPhase,setImmersionPhase]=useState("intro");/* intro, breathing, affirmations */
  const[immersionBreathCount,setImmersionBreathCount]=useState(0);
  const[showYFIntro,setShowYFIntro]=useState(true);/* show intro screen for yeux fermÃ©s */
  const[showIntroDur,setShowIntroDur]=useState(false);/* introspection duration picker */
  const ambientRef=useRef(null);
  const ambientGainRef=useRef(null);

  const fmt=AVANTSCENE_FORMATS.find(f=>f.id===format);
  const modules=fmt?fmt.modules:[];
  const currentMod=modules[modIdx];
  const isConnexion=format?.startsWith("introspection")||format?.startsWith("connexion");

  /* Ambient music â warm harmonic drone using Web Audio API */
  const startAmbient=()=>{
    if(ambientRef.current)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(ctx.state==='suspended')ctx.resume();
      const master=ctx.createGain();master.gain.value=0;master.connect(ctx.destination);
      const freqs=[136.1,174,220,261.6];
      const oscs=freqs.map((f,i)=>{
        const o=ctx.createOscillator();o.type=i<2?"sine":"triangle";o.frequency.value=f;
        const g=ctx.createGain();g.gain.value=i<2?0.12:0.06;
        o.connect(g);return{o,g};
      });
      const lfo=ctx.createOscillator();lfo.type="sine";lfo.frequency.value=0.15;
      const lfoGain=ctx.createGain();lfoGain.gain.value=0.02;
      lfo.connect(lfoGain);
      const filter=ctx.createBiquadFilter();filter.type="lowpass";filter.frequency.value=800;filter.Q.value=0.7;
      oscs.forEach(({o,g})=>{g.connect(filter);lfoGain.connect(g.gain);o.start()});
      lfo.start();
      filter.connect(master);
      master.gain.linearRampToValueAtTime(0.55,ctx.currentTime+4);
      ambientRef.current=ctx;ambientGainRef.current=master;
      setMusicOn(true);
    }catch(e){console.log("Audio context error",e)}
  };
  const stopAmbient=()=>{
    if(!ambientRef.current)return;
    try{
      if(ambientGainRef.current)ambientGainRef.current.gain.linearRampToValueAtTime(0,ambientRef.current.currentTime+3);
      setTimeout(()=>{try{ambientRef.current.close()}catch(e){}ambientRef.current=null;ambientGainRef.current=null},3500);
    }catch(e){ambientRef.current=null}
    setMusicOn(false);
  };

  /* Cleanup ambient on unmount */
  useEffect(()=>{return()=>{stopAmbient()}},[]);

  /* Session timer */
  useEffect(()=>{
    if(!format||phase==="done")return;
    const iv=setInterval(()=>setSessionTime(t=>t+1),1000);
    return()=>clearInterval(iv);
  },[format,phase]);

  /* Start ambient for immersive modules */
  useEffect(()=>{
    if(isConnexion&&currentMod==="breathing")startAmbient();
    if(currentMod==="detente"||currentMod==="immersion"||currentMod==="immersion_short")startAmbient();
    if(currentMod!=="detente"&&currentMod!=="immersion"&&currentMod!=="immersion_short"&&currentMod!=="breathing"&&currentMod!=="mantra"&&currentMod!=="visu"){stopAmbient()}
  },[currentMod]);

  const br=AVANTSCENE_BREATHING[0];

        return nt;
      });

    return()=>clearInterval(iv);

  const chatEndRef=useRef(null);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'})},[messages]);
  const emailRef=useRef('');
  const ivRef=useRef(null);

  /* Get email/ID, load messages, start polling */
  useEffect(()=>{(async()=>{
    /* 1. Determine user identifier */
    const{data}=await _supabase.auth.getSession();
    if(data.session?.user?.email){await loadFromCloud();emailRef.current=data.session.user.email;}
    else{
      /* Priority: auth email > st.email > stored device ID > new device ID */
      const storedId=localStorage.getItem('castigat_chat_id');
      const emailFallback=st.email||(typeof st.user==='string'&&!st.user.startsWith('{')?st.user:null);
      if(emailFallback){emailRef.current=emailFallback;localStorage.setItem('castigat_chat_id',emailFallback);}
      else if(storedId){emailRef.current=storedId;}
      else{const nid='device_'+Math.random().toString(36).substr(2,9);localStorage.setItem('castigat_chat_id',nid);emailRef.current=nid;}
    }
    /* 2. Load messages now that emailRef is set */
    if(emailRef.current){
      const res=await _supabase.from('messages').select('*').order('created_at',{ascending:true});
      if(!res.error&&res.data){const filtered=res.data.filter(m=>m.student_email===emailRef.current);setMessages(filtered);}

    setLoading(false);
    /* 3. Start polling AFTER emailRef is set */
    ivRef.current=setInterval(async()=>{
      if(!emailRef.current)return;

      if(!res.error&&res.data){const filtered=res.data.filter(m=>m.student_email===emailRef.current);setMessages(filtered);}
    },8000);
  })();
  return()=>{if(ivRef.current)clearInterval(ivRef.current);};

    if(!emailRef.current){
      const currentUser=await _supabase.auth.getUser();

      sender:'student',
      content:msg.trim(),
      read:false

    if(!error){
      /* Optimistic update: add message to state immediately */
      const newMsg={id:'temp_'+Date.now(),student_email:emailRef.current,student_name:(typeof st.user==='string'?st.user:st.user?.prenom||st.user?.name)||st.pseudo||'Anonyme',sender:'student',content:msg.trim(),read:false,created_at:new Date().toISOString()};
      setMessages(prev=>[...prev,newMsg]);

            {I.users({size:26,sw:1.6,style:{color:'#fff'}})}

        <div style={{height:'50vh',overflowY:'auto',marginBottom:16,padding:12,borderRadius:12,background:'var(--bg-card)',border:'1px solid var(--line)',display:'flex',flexDirection:'column',gap:8}}>

          {!loading&&messages.length===0&&<div style={{textAlign:'center',padding:'40px 20px'}}><p style={{fontSize:32,marginBottom:8}}>ð¬</p><p style={{fontSize:12,color:'var(--text-2)',marginBottom:4}}>Aucun message pour l'instant</p><p style={{fontSize:10,color:'var(--text-3)'}}>Envoyez votre premier message Ã  votre coach !</p></div>}
          {messages.map((m,i)=>{
            const isMe=m.sender==="student";

/* âââ GLOSSAIRE QUIZ âââ */
function GlossaireQuiz({st,setSt,onClose}){
  const[quizMode,setQuizMode]=useState(true);
  const[difficulty,setDifficulty]=useState(1);
  const[currentIdx,setCurrentIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[answered,setAnswered]=useState(false);
  const[selectedAns,setSelectedAns]=useState(null);
  const[shuffledOpts,setShuffledOpts]=useState([]);
  const terms=GLOSSAIRE.filter(t=>t.difficulty===difficulty);
  const current=terms[currentIdx];
  /* Shuffle options once per question */
  useEffect(()=>{
    if(!current)return;
    const wrongDefs=GLOSSAIRE.filter(t=>t.difficulty===difficulty&&t.term!==current.term)
      .sort(()=>Math.random()-0.5).slice(0,3).map(t=>({def:t.def,correct:false}));
    const all=[{def:current.def,correct:true},...wrongDefs].sort(()=>Math.random()-0.5);
    setShuffledOpts(all);
  },[currentIdx,difficulty]);
  const handleAnswer=(idx)=>{
    setSelectedAns(idx);setAnswered(true);
    const isCorrect=shuffledOpts[idx].correct;
    updateSRS(st,setSt,"glossary_"+current.term,isCorrect);
    if(isCorrect){setScore(s=>s+1);SFX.success();}
  };
  const nextQuestion=()=>{
    if(currentIdx+1<terms.length){setCurrentIdx(currentIdx+1);setAnswered(false);setSelectedAns(null);}
    else{setQuizMode(false);setSt(p=>({...p,glossScore:{...p.glossScore||{},[difficulty]:Math.max(p.glossScore?.[difficulty]||0,score+1)}}));}
  };
  if(!quizMode){
    const pct=Math.round(score/terms.length*100);
    return(

/* âââ SESSION TRACKING âââ */
/* Track time spent on app, session count, last active â updates profils in Supabase */
(function(){
  var SESSION_START=Date.now();
  /* Update profils on load (session count + last_active) */
  (async()=>{
    try{
      var usr=await _supabase.auth.getUser();
      if(!usr.data.user)return;
      var uid=usr.data.user.id;
      var{data:prof}=await _supabase.from('profiles').select('session_count').eq('id',uid).single();
      var count=(prof&&prof.session_count)||0;
      await _supabase.from('profiles').update({last_active:new Date().toISOString(),session_count:count+1}).eq('id',uid);
    }catch(e){console.log('session tracking init error',e)}
  })();
  /* Update total_minutes when user leaves */
  function saveSessionTime(){
    var mins=Math.round((Date.now()-SESSION_START)/60000);
    if(mins<1)return;
    (async()=>{
      try{
        var usr=await _supabase.auth.getUser();
        if(!usr.data.user)return;
        var uid=usr.data.user.id;
        var{data:prof}=await _supabase.from('profiles').select('total_minutes').eq('id',uid).single();
        var total=(prof&&prof.total_minutes)||0;
        await _supabase.from('profiles').update({total_minutes:total+mins}).eq('id',uid);
      }catch(e){}
    })();
  }
  document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')saveSessionTime();});
  window.addEventListener('beforeunload',saveSessionTime);
})();

function updateSRS(st,setSt,itemId,correct){
  const today=new Date().toDateString();
  const item=(st.srs||{})[itemId]||{nextReview:today,interval:1,ease:2.5,wrong:0};
  if(correct){
    item.interval=Math.ceil(item.interval*item.ease);
    item.ease=Math.min(3.0,item.ease+0.1);
  }else{
    item.interval=1;
    item.ease=Math.max(1.3,item.ease-0.2);
    item.wrong=(item.wrong||0)+1;
  }
  const nextDate=new Date();

  item.nextReview=nextDate.toDateString();

}

function TutoOverlay({step,onNext,onDone}){
  const steps=[
    {target:"tuto-exercice",color:"var(--gold)",title:"Exercices",desc:"Travaille ta voix, ton corps et ton jeu pour progresser et gagner de l'XP."},
    {target:"tuto-culture",color:"var(--violet)",title:"Culture thÃ©Ã¢trale",desc:"DÃ©couvre l'histoire du thÃ©Ã¢tre et les grands auteurs grÃ¢ce Ã  des quiz."},
    {target:"tuto-analyse",color:"var(--coral)",title:"Analyse de scÃ¨ne",desc:"Plonge dans les grandes scÃ¨nes du rÃ©pertoire pour affiner ton regard."},
  ];
  const s=steps[step]||steps[0];
  const[rect,setRect]=useState(null);
  useEffect(()=>{
    let tries=0;
    const find=()=>{
      const el=document.querySelector(`[data-tuto="${s.target}"]`);
      if(el){const r=el.getBoundingClientRect();setRect({top:r.top,left:r.left,width:r.width,height:r.height})}
      else if(tries<20){tries++;setTimeout(find,100)}
    };
    find();
    const onScroll=()=>{const el=document.querySelector(`[data-tuto="${s.target}"]`);if(el){const r=el.getBoundingClientRect();setRect({top:r.top,left:r.left,width:r.width,height:r.height})}};
    window.addEventListener("scroll",onScroll);window.addEventListener("resize",onScroll);
    return()=>{window.removeEventListener("scroll",onScroll);window.removeEventListener("resize",onScroll)};
  },[step,s.target]);
  if(!rect)return null;
  const pad=8;
  return(
    <div style={{position:'fixed',inset:0,zIndex:900}}>
      {/* Dark overlay with cutout */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
        <defs>
          <mask id="tuto-mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white"/>
            <rect x={rect.left-pad} y={rect.top-pad} width={rect.width+pad*2} height={rect.height+pad*2} rx="14" fill="black"/>
          </mask>
        </defs>
        <rect x="0" y="0" width="100%" height="100%" fill="rgba(5,5,10,0.82)" mask="url(#tuto-mask)"/>
      </svg>
      {/* Highlight border */}
      <div style={{position:'absolute',top:rect.top-pad,left:rect.left-pad,width:rect.width+pad*2,height:rect.height+pad*2,borderRadius:14,border:`2px solid ${s.color}`,boxShadow:`0 0 30px ${s.color}44`,pointerEvents:'none',animation:'pathPulse 2s ease-in-out infinite'}}/>
      {/* Tooltip */}
      <div className="fade-up" key={step} style={{position:'fixed',bottom:24,left:24,right:24,maxWidth:320,margin:'0 auto',background:'var(--bg-card)',border:`1px solid ${s.color}33`,borderRadius:16,padding:'20px 22px',textAlign:'center',boxShadow:`0 16px 50px rgba(0,0,0,.5), 0 0 20px ${s.color}11`}}>
        <p style={{fontSize:10,fontWeight:800,letterSpacing:'.16em',color:s.color,marginBottom:6}}>{step+1}/3</p>
        <h3 className="heading" style={{fontSize:18,marginBottom:6,color:'var(--text)'}}>{s.title}</h3>
        <p style={{fontSize:12,color:'var(--text-2)',lineHeight:1.6,marginBottom:16}}>{s.desc}</p>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          {step<2?(
            <React.Fragment>
              <button onClick={onDone} style={{padding:'10px 20px',borderRadius:10,background:'transparent',border:'1px solid var(--line)',color:'var(--text-3)',fontSize:11,cursor:'pointer'}}>Passer</button>
              <button onClick={onNext} className="btn-gold" style={{padding:'10px 28px',fontSize:12}}>Suivant</button>
            </React.Fragment>
          ):(
            <button onClick={onDone} className="btn-gold" style={{padding:'11px 36px',fontSize:12}}>C'est parti !</button>
          )}
        </div>
      </div>
    </div>
  );
}

function InstallPrompt({st}){
  const[show,setShow]=useState(()=>{
    if(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)return false;
    if(navigator.standalone)return false;
    if(localStorage.getItem('pwa_installed')||localStorage.getItem('castigat_install_dismissed'))return false;
    return true;
  });
  const[isIOS,setIsIOS]=useState(false);

  useEffect(()=>{
    /* Detect iOS */
    const ua=navigator.userAgent.toLowerCase();
    const isApple=/iphone|ipad|ipod/.test(ua);
    setIsIOS(isApple);
  },[]);

  useEffect(()=>{
    /* Skip if already installed as PWA */
    if(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||navigator.standalone){setShow(false);return;}
    if(!st.onb||!show)return;
    if(!deferredPrompt&&!isIOS)return;/* Only show if available or iOS */

    /* Check if user dismissed in last 3 days */
    const dismissed=localStorage.getItem('castigat_install_dismissed');
    if(dismissed){
      const dismissTime=parseInt(dismissed);
      const now=Date.now();
      const daysPassed=(now-dismissTime)/(1000*60*60*24);
      if(daysPassed<365){setShow(false);return}
    }

    /* Show after 3 seconds */
    const timer=setTimeout(()=>setShow(true),3000);
    return()=>clearTimeout(timer);
  },[st.onb,deferredPrompt,isIOS]);

  if(!st.onb||!show||(typeof deferredPrompt==='undefined'&&!isIOS))return null;

  const handleDismiss=()=>{
    localStorage.setItem('castigat_install_dismissed',String(Date.now()));
    setShow(false);
  };

  const handleInstall=async()=>{
    if(deferredPrompt){
      deferredPrompt.prompt();
      const result=await deferredPrompt.userChoice;
      if(result.outcome==='accepted'){
        window.deferredPrompt=null;
        handleDismiss();
      }
    }
  };

  
    /* If already installed as PWA, don't show install prompt */
    const isStandalone=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
    if(!show||isStandalone)return null;
return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:99,animation:'slideUp .4s cubic-bezier(.22,1,.36,1) forwards'}}>
      <div style={{background:'linear-gradient(180deg,var(--bg-raised) 0%,var(--bg) 100%)',borderTop:'1px solid var(--line)',padding:'24px 20px 32px',margin:0}}>
        <div style={{display:'flex',alignItems:'center',gap:16,maxWidth:500,margin:'0 auto',marginBottom:16}}>
          <div style={{width:50,height:50,borderRadius:12,background:'linear-gradient(135deg,var(--gold),var(--gold-light))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{fontSize:28,filter:'grayscale(1) brightness(10)'}}>ð­</span>
          </div>
          <div style={{flex:1}}>
            <p className="heading" style={{fontSize:16,marginBottom:2}}>Installer Castigat Academy</p>
            {isIOS?(
              <p style={{fontSize:12,color:'var(--text-2)',lineHeight:1.4}}>Appuyez sur <span style={{fontWeight:700,color:'var(--gold)'}}>partage</span> puis <span style={{fontWeight:700,color:'var(--gold)'}}>Sur l'Ã©cran d'accueil</span></p>
            ):(
              <p style={{fontSize:12,color:'var(--text-2)'}}>AccÃ©dez Ã  l'app directement depuis votre Ã©cran d'accueil</p>
            )}
          </div>
          <button onClick={handleDismiss} style={{fontSize:18,cursor:'pointer',background:'none',border:'none',color:'var(--text-3)',padding:'4px 8px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>â</button>
        </div>
        {!isIOS&&(
          <button onClick={handleInstall} style={{width:'100%',padding:'14px 16px',background:'linear-gradient(135deg,var(--gold),var(--gold-light))',color:'#05050a',borderRadius:12,border:'none',fontWeight:700,fontSize:14,cursor:'pointer',marginBottom:8,transition:'all .25s cubic-bezier(.22,1,.36,1)',boxShadow:'0 4px 20px rgba(212,168,67,.25)'}}>
            Installer
          </button>
        )}
        <button onClick={handleDismiss} style={{width:'100%',padding:'10px 16px',background:'transparent',color:'var(--text-3)',borderRadius:12,border:'none',fontWeight:500,fontSize:12,cursor:'pointer',transition:'color .2s'}}>
          Plus tard
        </button>
      </div>
    </div>
  );
}

const defaultSt={xp:0,initialXp:0,streak:0,lastActiveDate:null,doneEx:[],doneCu:[],doneSA:[],perf:0,vid:0,lv:0,onb:false,user:null,plan:"free",showCGU:false,theme:"dark",stars:{},weekXP:0,weekEx:0,weekAnalysis:false,weekCulture:false,weekRevision:false,lastWeekScore:null,perfectWeeks:0,weekStart:new Date().toDateString(),srs:{},seenBadges:[],warmups:0,avantScenes:0,connexions:0,challenges:0,totalBreaths:0,coachMessages:[],seenTuto:false,exFeedback:{},catLastPracticed:{},firstActivityDate:null,saResults:{},cuResults:{},lastSADate:null,dailyPulse:{answers:[],lastAnswerDate:null},challengeScores:{},passedExams:[],unreadMessageCount:0,messages:[]};

function App(){
  const[st,setSt]=useState(()=>{const saved=loadState();if(!saved)return defaultSt;const merged={...defaultSt,...saved,plan:saved.plan||(saved.premium?"standard":"free"),srs:saved.srs||{},seenBadges:saved.seenBadges||[],exFeedback:saved.exFeedback||{},catLastPracticed:saved.catLastPracticed||{},firstActivityDate:saved.firstActivityDate||saved.lastActiveDate||null,saResults:saved.saResults||{},cuResults:saved.cuResults||{},lastSADate:saved.lastSADate||null,dailyPulse:saved.dailyPulse||{answers:[],lastAnswerDate:null},challengeScores:saved.challengeScores||{},passedExams:saved.passedExams||[],unreadMessageCount:saved.unreadMessageCount||0,messages:saved.messages||[]};return merged;});
  const[tab,setTab]=useState("home");
  const[mod,setMod]=useState(null);
  const[exam,setExam]=useState(null);
  const[badgePopup,setBadgePopup]=useState(null);
  const[tutoStep,setTutoStep]=useState(0);
  const go=t=>{if(t!==tab)setMod(null);setTab(t);window.scrollTo(0,0)};

  /* Scroll to top when opening/closing an exercise or switching exam */
  useEffect(()=>{window.scrollTo(0,0)},[mod,exam]);

  /* Theme (dark/light) */
  useEffect(()=>{
    if(st.theme==="light")document.documentElement.classList.add("light");
    else document.documentElement.classList.remove("light");
  },[st.theme]);

  /* Streak management â check on app load and track daily visits */
  useEffect(()=>{
    if(!st.onb)return;
    const today=new Date().toDateString();
    if(st.lastActiveDate===today)return;/* already counted today */
    const last=st.lastActiveDate?new Date(st.lastActiveDate):null;
    const now=new Date();now.setHours(0,0,0,0);
    let newStreak=1;
    if(last){
      const prev=new Date(last);prev.setHours(0,0,0,0);
      const diff=Math.round((now-prev)/(1000*60*60*24));
      if(diff===1)newStreak=st.streak+1;/* consecutive day */
      else if(diff===0)newStreak=st.streak;/* same day */
      else newStreak=1;/* streak broken */
    }
    setSt(p=>({...p,streak:newStreak,lastActiveDate:today,firstActivityDate:p.firstActivityDate||today}));
  },[st.onb,st.lastActiveDate]);
  /* Weekly reset â reset objectives every Monday, save last week score */
  useEffect(()=>{
    if(!st.onb)return;
    const now=new Date();
    const weekId=Math.floor((now.getTime()-259200000)/(604800000));
    const savedWeek=st.weekStart||"";
    if(savedWeek!==String(weekId)){
      /* Count how many objectives were done last week */
      const lastScore=((st.weekEx||0)>=3?1:0)+(st.weekCulture?1:0)+(st.weekAnalysis?1:0)+(st.weekRevision?1:0);
      const perfectWeeks=(lastScore===4)?((st.perfectWeeks||0)+1):(0);
      setSt(p=>({...p,weekStart:String(weekId),weekEx:0,weekXP:0,weekAnalysis:false,weekCulture:false,weekRevision:false,lastWeekScore:lastScore,perfectWeeks}));
    }
  },[st.onb]);
  /* Also re-check streak when tab becomes visible (user returns to app) */
  useEffect(()=>{
    const onVisible=()=>{if(document.visibilityState==="visible"&&st.onb){
      const today=new Date().toDateString();
      if(st.lastActiveDate!==today){
        const last=st.lastActiveDate?new Date(st.lastActiveDate):null;
        const now=new Date();now.setHours(0,0,0,0);
        let newStreak=1;
        if(last){const prev=new Date(last);prev.setHours(0,0,0,0);const diff=Math.round((now-prev)/(1000*60*60*24));if(diff===1)newStreak=st.streak+1;else if(diff===0)newStreak=st.streak;else newStreak=1}
        setSt(p=>({...p,streak:newStreak,lastActiveDate:today,firstActivityDate:p.firstActivityDate||today}));
      }
    }};
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[st.onb,st.lastActiveDate,st.streak]);

  /* Badge detection â check for new badges on every state change */
  useEffect(()=>{
    if(!st.onb)return;
    const earned=BADGES.filter(b=>b.c(st));
    const newBadge=earned.find(b=>!(st.seenBadges||[]).includes(b.id));
    if(newBadge){
      setBadgePopup(newBadge);
      SFX.levelUp();
      setSt(p=>({...p,seenBadges:[...(p.seenBadges||[]),newBadge.id]}));
    }
  },[st.xp,st.doneEx.length,st.doneCu.length,st.streak,st.perf,st.vid,st.warmups,st.avantScenes,st.connexions,st.challenges,st.totalBreaths]);

  /* Auto-save on state change */
  useEffect(()=>{if(st.onb)saveState(st)},[st]);

  /* âââ DAILY PULSE â Question quotidienne âââ */
  const dailyPulse=st.dailyPulse||{answers:[],lastAnswerDate:null};
  const todayStr=new Date().toDateString();
  const alreadyAnsweredToday=dailyPulse.lastAnswerDate===todayStr;
  const answeredIds=dailyPulse.answers.map(a=>a.qId);
  const remainingQs=DAILY_QUESTIONS.filter(q=>!answeredIds.includes(q.id));
  const todayQuestion=(!alreadyAnsweredToday&&st.onb)?(remainingQs.length>0?remainingQs[0]:DAILY_QUESTIONS[dailyPulse.answers.length%DAILY_QUESTIONS.length]):null;
  const[showDailyQ,setShowDailyQ]=useState(!!todayQuestion);

  /* CGU from profile */
  if(st.showCGU) return <CGU onClose={()=>setSt(p=>({...p,showCGU:false}))}/>;

  if(!st.onb)return<Onboard done={(i,user)=>{SFX.success();window.scrollTo(0,0);setSt(p=>({...p,onb:true,xp:0,lv:0,user,streak:1,lastActiveDate:new Date().toDateString(),seenTuto:false}));setTutoStep(0)}}/>;
  const answerDailyQ=(qId,optId,val,cat)=>{
    setSt(p=>{
      const pulse=p.dailyPulse||{answers:[],lastAnswerDate:null};
      return{...p,dailyPulse:{answers:[...pulse.answers,{qId,optId,val,cat,date:new Date().toISOString()}],lastAnswerDate:todayStr}};
    });
    SFX.tap();
    setTimeout(()=>setShowDailyQ(false),600);
  };

  if(showDailyQ&&todayQuestion){
    return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'var(--bg)'}}>
        <div style={{width:'100%',maxWidth:380}}>
          {/* Header */}
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,var(--gold-dim),var(--gold))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
              {I.mic({size:18,sw:1.4,style:{color:'#07070b'}})}
            </div>
            <p className="label-gold" style={{fontSize:8,marginBottom:6}}>PULSE DU JOUR</p>
          </div>

          {/* Question */}
          <div className="card" style={{padding:20,marginBottom:20,border:'1px solid rgba(200,164,78,.12)'}}>
            <p style={{fontSize:13,fontWeight:700,color:'var(--text)',lineHeight:1.5,marginBottom:20,textAlign:'center'}}>{todayQuestion.q}</p>

            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {todayQuestion.opts.map((opt,oi)=>(
                <button key={opt.id} onClick={()=>answerDailyQ(todayQuestion.id,opt.id,opt.val,todayQuestion.cat)}
                  style={{padding:'12px 16px',borderRadius:10,border:'1px solid var(--line)',background:'rgba(255,255,255,.02)',cursor:'pointer',textAlign:'left',transition:'all .2s',display:'flex',alignItems:'center',gap:10}}
                  onMouseOver={e=>{e.currentTarget.style.borderColor='rgba(200,164,78,.3)';e.currentTarget.style.background='rgba(200,164,78,.04)'}}
                  onMouseOut={e=>{e.currentTarget.style.borderColor='var(--line)';e.currentTarget.style.background='rgba(255,255,255,.02)'}}>
                  <span style={{width:22,height:22,borderRadius:6,background:'rgba(200,164,78,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'var(--gold)',flexShrink:0}}>{String.fromCharCode(65+oi)}</span>
                  <span style={{fontSize:11,color:'var(--text)',lineHeight:1.4}}>{opt.text}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Skip */}
          <button onClick={()=>setShowDailyQ(false)} style={{display:'block',margin:'0 auto',padding:'8px 16px',border:'none',background:'none',cursor:'pointer',fontSize:9,color:'var(--text-3)',fontWeight:600}}>Passer pour aujourd'hui</button>
          <p style={{fontSize:8,color:'var(--text-3)',textAlign:'center',marginTop:12,lineHeight:1.5,fontStyle:'italic'}}>Vos rÃ©ponses alimentent votre bilan personnalisÃ©</p>
        </div>
      </div>
    );
  }

  if(exam) return <ExamView levelId={exam} st={st} setSt={setSt} onPass={()=>{SFX.levelUp();setExam(null)}} onBack={()=>setExam(null)}/>;

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {!st.seenTuto&&tab==="home"&&<TutoOverlay step={tutoStep} onNext={()=>setTutoStep(tutoStep+1)} onDone={()=>setSt(p=>({...p,seenTuto:true}))}/>}
      {badgePopup&&<BadgePopup badge={badgePopup} onClose={()=>setBadgePopup(null)}/>}
      <Top xp={st.xp} streak={st.streak}/>
      <InstallPrompt st={st}/>
      {tab==="home"&&<Home st={st} setSt={setSt} go={go} setMod={setMod} setExam={setExam}/>}
      {tab==="practice"&&<ModList title="Pratique" sub="Exercices progressifs" mods={PR} dk="doneEx" st={st} setSt={setSt} active={mod} setMod={setMod} sec="pr"/>}
      {tab==="culture"&&<ModList title="Culture" sub="Histoire, auteurs, techniques" mods={CU} dk="doneCu" st={st} setSt={setSt} active={mod} setMod={setMod} sec="cu"/>}
      {tab==="feed"&&<Feed st={st} setSt={setSt}/>}
      {tab==="profile"&&<Profile st={st} setSt={setSt}/>}
      <Nav tab={tab} go={go} plan={st.plan}/>
    </div>
  );
}
